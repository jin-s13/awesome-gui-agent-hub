  - mobile agent
  arxiv_categories:
  - cs.CV
  - cs.LG
  - cs.AI
  - cs.CL
  - cs.HC
  date_from: '2023-01-01'
  huggingface_daily_max_days: 7
  daily_search_days: 3
  sources:
    arxiv: true
    huggingface_daily: true
    huggingface_trending: true
    huggingface_datasets: true
    upstream_awesome: true
    alphaxiv: false
  datasets:
    huggingface: true
    huggingface_max_keywords: 5
    huggingface_limit_per_keyword: 20
    derive_from_papers: true
  alphaxiv:
    enabled: false
    endpoint: ''
  upstream_awesome:
    repos: []
    auto_discover: true
  auto_discover:
    enabled: true
    min_stars: 5
    max_sources: 10
    max_search_terms: 2
    max_repos_to_fetch: 5
    request_timeout_seconds: 10
    max_rate_limit_sleep_seconds: 30
    query_expansion:
    - GUI agent
    - computer use agent
    - browser agent
    - web agent benchmark
    - OSWorld
    - WebArena
    - AndroidWorld
  seed_discovery:
    enabled: false
    api: semantic_scholar
    max_references_per_paper: 50
    max_seeds_per_run: 10
    initial_seed_arxiv_ids:
    - '2404.07972'
    - '2307.13854'
    - '2306.06070'
    - '2410.05243'
  candidate_pool:
    enabled: true
    db_path: data/candidates.db
    promote_batch_size: 80
  overrides:
    enabled: true
    file: data/papers.overrides.yaml
  scoring:
    base_score: 1.5
    weight_coefficient: 2.5
    max_score_per_keyword: 10
    filter_min_score: 5.0
    author_bonus:
      enabled: false
      bonus_points: 5.0
      expert_authors: []
  ranking:
    enabled: true
    weights:
      topical_relevance: 0.25
      citation_impact: 0.15
      graph_prestige: 0.15
      citation_velocity: 0.1
      methodology_quality: 0.15
      reproducibility: 0.15
      recency: 0.05
    citation_graph:
      enabled: true
      fetch_openalex: false
      timeout: 20
      workers: 6
      api_key: ''
      mailto: ''
  deep_analysis:
    enabled: true
    min_score: 30
    pdf_parser: mineru
    max_papers_per_run: 10
  interpretations:
    enabled: true
    workers: 4
    daily_limit: 80
    checkpoint_interval: 5
    force_analysis: false
    sleep: 0.0
  teasers:
    workers: 4
    retry_fallbacks: true
  deep_research:
    enabled: true
    min_read_first_score: 70
    max_papers_per_run: 10
  enrichment:
    enabled: true
    max_concurrent: 4
    request_timeout: 30
    progress_interval_seconds: 15
    use_mineru_pdf_fallback: true
    mineru_poll_timeout: 180
    extract_affiliations: true
    extract_figures: true
    extract_methods: true
  grading:
    enabled: true
    must_read_min_score: 40
    worth_reading_min_score: 20
  history:
    enabled: true
    retention_days: 30
    min_papers_per_run: 20
    weekend_mode: true
  image_localization:
    enabled: true
    check_reachability: true
    download_fallback: true
    pdf_extract_fallback: true
  keyword_tracking:
    enabled: true
    report_frequency: weekly
