  - ECG
  - EEG
  - blood pressure
  - diabetes
  - COVID
  - pneumonia
  - skin lesion
  - financial
  - stock market
  - trading
  - cryptocurr
  - look-ahead bias
  - dexterous manipulation
  - humanoid
  - grasping
  - robot manipulation
  - climate
  - weather
  - microfluidic
  - live-cell
  - anomaly detection
  - defect detection
  - point cloud registration
  - articulated pose
  - category-level pose
  - egocentric
  - sim-to-real
  - medical image
  - radiology report
  - protein
  - molecule
  - stock
  - weather
  - autonomous driving
  - robot grasping
  - robotic manipulation
