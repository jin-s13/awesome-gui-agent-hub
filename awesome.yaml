project:
  name: Awesome GUI Agent Hub
  description: A curated hub for GUI agent papers, benchmarks, datasets, projects,
    and computer-use research.
  github_url: https://github.com/jin-s13/awesome-gui-agent-hub
  site_url: https://jin-s13.github.io/awesome-gui-agent-hub
  generator_repo: jin-s13/awesome-hub-generator
research:
  keywords:
  - GUI agent
  - graphical user interface agent
  - computer use agent
  - computer control agent
  - visual GUI automation
  - web agent
  - mobile agent
  - OS agent
  - screen grounding
  - UI grounding
  - browser agent
  taxonomy:
    paper_types:
    - label: method
      description: GUI agent models, planning, grounding, action prediction, training,
        or reasoning methods
    - label: benchmark
      description: GUI/web/mobile/OS automation datasets, environments, tasks, metrics,
        and benchmarks
    - label: system
      description: Runnable GUI agent systems, frameworks, sandboxes, tool-use platforms,
        or orchestration layers
    - label: theory
      description: Formal analysis, task abstractions, interaction theory, or reliability/safety
        framing for GUI agents
    - label: survey
      description: Surveys, taxonomies, tutorials, position papers, or roadmap papers
        for GUI agents
    - label: application
      description: Domain applications of GUI agents, such as office automation, mobile
        apps, web tasks, software operation, or professional tools
    dimensions:
    - name: techniques
      description: key techniques such as screenshot perception, grounding, planning,
        memory, RL, SFT, tool use, or reflection
    - name: inputs
      description: input types such as screenshots, DOM/accessibility trees, OCR,
        natural-language instructions, trajectories, or APIs
    - name: outputs
      description: output/action types such as clicks, typing, gestures, browser actions,
        app commands, code, or tool calls
  taxonomy_discovery:
    enabled: true
    update_mode: propose
    max_depth: 3
    max_children_per_node: 8
    nodes: []
    source_headings: []
  relevance_criteria:
    include:
    - Agents that operate graphical user interfaces from screenshots, UI trees, DOM,
      accessibility trees, or screen observations
    - Computer-use, browser-use, desktop-use, mobile-use, OS-use, web navigation,
      or app automation agents
    - GUI grounding, screen grounding, element localization, action prediction, click/typing/gesture
      planning, or multimodal UI understanding
    - Benchmarks and environments such as OSWorld, WebArena, MiniWoB, AndroidWorld,
      MobileBench, ScreenSpot, Mind2Web, WebVoyager, or related GUI automation tasks
    - Training methods for GUI agents, including trajectory data, SFT, RL, preference
      learning, reflection, memory, or tool/MCP integration
    - Open-source GUI agent systems, browser agents, computer-use frameworks, mobile
      agents, and sandboxed evaluation projects
    exclude:
    - General LLM agents without GUI, screen, browser, desktop, mobile, OS, or web-interaction
      contribution
    - Pure chatbots, RAG systems, coding assistants, workflow automation, or tool
      agents that do not interact with GUIs
    - Robotics manipulation or embodied navigation unless the main task is digital
      GUI interaction
    - General OCR, document parsing, UI design generation, or screenshot classification
      without agentic action
    - General computer vision, image generation, visual question answering, or object
      detection without GUI grounding/action
    - Security, finance, medical, weather, biology, or generic benchmark papers unrelated
      to GUI automation
  llm:
    workers: 4
    survey_workers: 2
  negative_keywords:
  - medical imaging
  - weather forecast
  - protein folding
  - drug discovery
  - cancer detection
  - breast cancer
  - thyroid cancer
  - coronary artery
  - cardiovascular
  - mammogr
  - radiology
