  related_work_outline:
  - 'Mainstream direction: leveraging vision-language models trained with weak supervision
    or compiled from successful runs, combined with comprehensive benchmarks featuring
    fine-grained metrics, to improve GUI agent accuracy and efficiency.'
  - 'Shared research pattern: using screenshots and task descriptions as input to
    multimodal models, then optimizing action prediction through supervised fine-tuning,
    reinforcement learning calibration, or programmatic compilation.'
  - 'Key differences: supervision signal (weakly-supervised from unannotated data
    vs. full annotation vs. compiled programs), interaction primitives (click, drag,
    context management), evaluation settings (static desktop, dynamic short-video,
    mobile), and efficiency strategies (state-machine replay, proactive context management).'
  - 'Trend evolution: works in 2026 concentrate on moving beyond simple pass@1 metrics
    toward multi-dimensional evaluation (uncertainty, cost-accuracy), and on reducing
    annotation cost through weak supervision and compiled reuse of successful trajectories.'
  - 'Open questions: robust observation control in dynamic interfaces, cross-domain
    generalization of training recipes, minimal metric set for real-world performance
    prediction, and integrating uncertainty quantification into multi-step agent loops.'
  related_work_outline_zh:
  - 主流方向：利用视觉语言模型，通过弱监督或成功轨迹编译进行训练，并结合细粒度指标的综合性基准，提升GUI智能体的准确性和效率。
  - 研究共性：以截图和任务描述作为多模态模型输入，通过监督微调、强化学习校准或状态机编译优化动作预测。
  - 关键差异：监督信号类型（未标注弱监督、全标注、程序编译）、交互原语（点击、拖拽、上下文管理）、评估场景（静态桌面、动态短视频、移动端）和效率优化策略（状态机重放、主动上下文管理）存在显著分野。
  - 趋势演进：2026年工作集中从单一Pass@1指标转向多维度评估（不确定性、成本-准确性），并开始通过弱监督和编译重用降低对昂贵标注的依赖。
  - 开放问题：动态界面中的观察控制、训练配方跨域泛化、预测真实世界性能的最小指标集，以及将不确定性量化融入多步智能体闭环。
  literature_review:
    line_of_work_matrix:
    - line: Method representation and objective design
      what_it_solves: 'Turning GUI agent training ideas into concrete representations,
        losses, and training recipes: weakly-supervised visual grounding from unannotated
        screenshots, task-driven keyframe extraction for video-guided tasks, and state-machine
        program compilation from successful runs.'
      what_remains_open: Whether these representations transfer across operating systems,
        dynamic vs. static interfaces, and application domains; how much gain is due
        to the representation vs. data volume or RL calibration.
    - line: Planning and action-interface methods
      what_it_solves: Connecting learned representations to efficient action execution,
        e.g., treating context management as first-class actions (ConAct) and compiling
        trajectories into verifiable state-machine programs for fast replay without
        per-step LLM calls.
      what_remains_open: How much of the speedup stems from the compile-and-replay
        mechanism vs. the underlying model; whether these methods maintain robustness
        when interface states or task distributions change.
    - line: Method evidence and ablation protocol
      what_it_solves: Separating method contribution from dataset, baseline, metric,
        and implementation effects through benchmarks with fine-grained multi-checkpoint
        scoring, cost-accuracy metrics, drag interaction coverage, and post-hoc uncertainty
        quantification across diverse models.
      what_remains_open: Benchmark coverage is typically limited to specific platforms
        (macOS, short-video, mobile) and interaction types; cross-model UQ ranking
        transfer is weak, and single-step grounding evaluations may not capture multi-step
        agent dynamics.
    consensus:
    - All approaches use vision-language models to perceive GUI states and predict
      actions, emphasizing task completion accuracy and execution efficiency.
    - Fine-grained evaluation metrics beyond simple pass@1 (e.g., sub-goal completion,
      cost-accuracy, conformal click regions) are necessary to reveal model differences.
    - Training or adapting models with specialized data—whether weakly-supervised,
      fully annotated, or compiled from execution traces—is a common strategy to improve
      performance on target platforms.
    disagreements:
    - 'Supervision paradigm: weakly-supervised learning from unannotated screenshots
      (GUICrafter) contrasts with full expert annotation and with programmatic compilation
      of successful agent runs (PreAct).'
    - 'Interaction scope: single-step grounding (Argus UQ), multi-step long-horizon
      trajectories (MemGUI-Agent, MacAgentBench), and repeated task execution (PreAct)
      target different temporal granularities.'
    - 'Evaluation setting: static desktop (MacAgentBench), dynamic short-video platforms
      (LivingScreen), mobile (MemGUI-Agent), and drag-based interactions (DragOn)
      introduce distinct failure modes such as over-observation vs. sub-goal completion.'
    - 'Action representation: proactive context management actions (ConAct), drag
      primitives (DragOn), and state-machine program compilation (PreAct) reflect
      divergent design choices for the action space.'
    open_questions:
    - How can GUI agents achieve robust observation control to avoid over- and under-observation
      in dynamic interfaces, as highlighted by LivingScreen?
    - To what extent can weakly-supervised or compiled methods generalize across operating
      systems and application domains not seen during training, given the platform-specific
      nature of current benchmarks?
    - What is the minimal set of evaluation metrics and benchmark coverage needed
      to reliably predict real-world agent performance, considering that models with
      similar Pass@1 can differ substantially in sub-goal completion?
    - How can post-hoc uncertainty quantification be integrated into multi-step agent
      trajectories to improve safety and reliability, when cross-model UQ ranking
      transfer is currently weak?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 方法表示与目标设计
      解决的问题: 将GUI智能体训练思想转化为具体表示、损失函数和训练配方：利用未标注截图的弱监督视觉定位、面向视频引导任务的任务驱动关键帧提取，以及将成功运行编译为状态机程序。
      尚未覆盖: 这些表示方法在操作系统、动态与静态界面以及应用领域间的迁移性；性能提升有多少来自表示本身，有多少来自数据量或强化学习校准。
    - 路线: 规划与动作接口方法
      解决的问题: 将学习到的表示连接到高效动作执行，例如将上下文管理视为第一类动作（ConAct），以及将轨迹编译为可验证的状态机程序以实现无需每步语言模型调用的快速重放。
      尚未覆盖: 加速效果有多少来自编译-重放机制而非底层模型；当界面状态或任务分布变化时，这些方法能否保持鲁棒性。
    - 路线: 方法证据与消融协议
      解决的问题: 通过具有细粒度多检查点评分、成本-准确性指标、拖拽交互覆盖以及跨多种模型的后验不确定性量化等基准，分离方法贡献与数据集、基线、指标和实现因素的影响。
      尚未覆盖: 基准覆盖通常局限于特定平台（macOS、短视频、移动端）和交互类型；跨模型的不确定性量化排名迁移较弱，单步定位评估可能无法捕捉多步智能体动态。
    共识:
    - 所有方法均使用视觉语言模型感知GUI状态并预测动作，重点关注任务完成准确性和执行效率。
    - 超越简单Pass@1的细粒度评估指标（如子目标完成度、成本-准确性、共形点击区域）对于揭示模型差异是必要的。
    - 使用专门数据（无论是弱监督、全标注还是从执行轨迹编译）训练或适配模型，是提升目标平台性能的通用策略。
    分歧:
    - 监督范式：从无标注截图的弱监督学习（GUICrafter）与全专家标注以及成功代理运行的程序化编译（PreAct）形成对比。
    - 交互范围：单步定位（Argus不确定性量化）、多步长时域轨迹（MemGUI-Agent、MacAgentBench）和重复任务执行（PreAct）针对不同的时间粒度。
    - 评估场景：静态桌面（MacAgentBench）、动态短视频平台（LivingScreen）、移动端（MemGUI-Agent）和基于拖拽的交互（DragOn）引入了不同的失败模式，如过度观察与子目标完成度不足。
    - 动作表示：主动上下文管理动作（ConAct）、拖拽原语（DragOn）和状态机程序编译（PreAct）反映了动作空间设计的差异。
    开放问题:
    - GUI智能体如何实现鲁棒的观察控制，以避免LivingScreen所揭示的动态界面中的过度观察和观察不足？
    - 鉴于当前基准的平台特定性，弱监督或编译方法在多大程度上可泛化到训练中未见过的操作系统和应用领域？
    - 考虑到Pass@1相似的模型在子目标完成度上可能差异显著，预测真实世界智能体性能所需的最小评估指标集和基准覆盖范围是什么？
    - 当跨模型不确定性量化排名迁移目前较弱时，如何将后验不确定性量化集成到多步智能体轨迹中以提高安全性和可靠性？
