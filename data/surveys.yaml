  literature_review:
    line_of_work_matrix:
    - line: Benchmark and evaluation protocol design
      what_it_solves: Creates controlled environments to measure GUI agent capabilities
        on dimensions such as video-guided interaction, uncertainty calibration, fraud
        detection, safety under attack, and long-horizon task chaining, revealing
        where current models fail.
      what_remains_open: Results are often incompatible across benchmarks due to differing
        assumptions (e.g., single-step vs. multi-step, URL visibility); real-world
        distribution shifts and the absence of standardized evaluation protocols limit
        generalizability claims.
    - line: Agent capability enhancement via context, learning, and demonstration
      what_it_solves: Improves agent performance on complex tasks through proactive
        context management, RL fine-tuning with autonomous evaluators, and automatic
        tutorial generation from human screen recordings, addressing context collapse
        and data scarcity.
      what_remains_open: Methods are validated on narrow platform-specific benchmarks;
        the scalability of autonomous reward signals and the cross-platform transfer
        of context management strategies remain unproven.
    - line: Safety and reliability assessment
      what_it_solves: Quantifies vulnerability to prompt injection and measures uncertainty
        in GUI grounding, showing that safety is domain-conditioned and that post-hoc
        uncertainty methods can provide selective calibration.
      what_remains_open: Safety hardening does not generalize across domains (browser
        vs. coding); uncertainty quantification transfer across model tiers is weak,
        and integration into real-time agent execution is unexplored.
    consensus:
    - Vision-language models serve as the universal backbone for GUI agents, processing
      screenshots and instructions to generate actions.
    - Task success rate is the primary metric, but it is sensitive to evaluation protocol
      details such as step granularity and environment resetting.
    - Current agents exhibit significant failure rates on long-horizon, safety-critical,
      or out-of-distribution tasks, motivating the need for better benchmarks and
      training methods.
    - Autonomous or learned evaluation signals (e.g., VLM judges, noise-corrected
      rewards) are emerging as scalable alternatives to manual verification.
    disagreements:
    - 'Evaluation granularity: some benchmarks assess single-step grounding, while
      others require multi-step trajectories, leading to different conclusions about
      model competence.'
    - 'Attack and defense scope: safety evaluations differ in using hand-crafted versus
      RL-optimized injection strings, and findings about agent resistance depend on
      whether the attack surface includes coding domains.'
    - 'Training methodology: approaches range from no training (zero-shot prompting)
      to supervised fine-tuning on curated trajectories to online RL with autonomous
      rewards, with no clear winner across all settings.'
    - 'Context representation: some agents passively accumulate history, while others
      actively manage structured context fields, and the trade-off between completeness
      and efficiency is unresolved.'
    open_questions:
    - How can evaluation protocols be standardized to enable fair comparison across
      heterogeneous GUI agent benchmarks and interaction modalities?
    - To what extent can safety mechanisms trained in one domain (e.g., browser) transfer
      to others (e.g., coding, mobile), and what causes domain-conditioned brittleness?
    - Can uncertainty quantification be moved from post-hoc analysis to online decision-making,
      and would it improve agent reliability in deployment?
    - What is the minimal context representation that preserves task-relevant information
      without exceeding model context windows or introducing distracting noise?
