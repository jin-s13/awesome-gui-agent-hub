        over-observation and sub-goal incompleteness.
      what_remains_open: Whether benchmarks cover all critical interaction types (e.g.,
        drag, dynamic content) and how to translate benchmark insights into improved
        agent design—no closed-loop optimization is demonstrated.
    - line: Data-efficient learning and skill reuse
      what_it_solves: Reduces reliance on expensive human annotations by leveraging
        unannotated screenshots or structured multimodal skill libraries, enabling
        agents to learn grounding and workflows with less supervision.
      what_remains_open: Skill correctness and coverage for novel applications are
        not guaranteed; offline compilation may not adapt to UI changes without re-training
        or re-building.
    - line: Runtime efficiency and reliability mechanisms
      what_it_solves: Improves agent speed and safety through compiled state-machine
        replay, proactive context management, or post-hoc uncertainty quantification
        for grounding.
      what_remains_open: Cross-model and cross-platform transfer of these mechanisms
        is weak; formal guarantees on safety or correctness are absent, and evaluation
        remains limited to controlled benchmarks.
    - line: Formalizing interaction and dynamic environments
      what_it_solves: Provides definitions for living-screen-native agents and state-machine
        abstractions of task execution, clarifying assumptions about observation control
        and repeatability.
      what_remains_open: The formal conditions have not been empirically validated
        across diverse agents; the gap between abstract models and learned policy
        behavior is not bridged.
    consensus:
    - GUI agents need evaluation beyond simple task success, incorporating fine-grained
      sub-goal completion, information efficiency, and reliability.
    - Vision-language models serve as the backbone, but their raw performance is insufficient;
      additional structure (skills, context management, compilation) is necessary
      for real-world deployment.
    - Dynamic and long-horizon settings expose current agents' lack of observation
      control and context management, demanding new interaction paradigms.
    - Data scarcity and annotation cost are major bottlenecks; reusing unlabeled data
      or existing successful runs is a promising direction.
    disagreements:
    - 'Supervision paradigm: Some methods rely on weak supervision from unannotated
      screenshots, while others use fully annotated trajectories or compile agent
      runs without additional training.'
    - 'Evaluation target: Papers differ in whether they prioritize task success rate,
      sub-goal completion, cost-accuracy, or uncertainty calibration, leading to incompatible
      comparisons.'
    - 'Interaction focus: Most benchmarks target point-and-click actions, while DragOn
      specifically addresses drag-based interactions, revealing a fragmented coverage
      of GUI primitives.'
    - 'Context representation: MemGUI-Agent treats context management as explicit
      actions with structured fields, whereas others use implicit history accumulation
      or skill retrieval, with no consensus on the best representation.'
    open_questions:
    - How can formal interaction models be empirically validated and used to guide
      agent design, rather than remaining descriptive?
    - Can uncertainty quantification and efficiency techniques transfer across model
      tiers and interface types without re-evaluation?
    - What is the minimal set of evaluation dimensions that jointly predict real-world
      safety and user trust for GUI agents?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实基准与任务设计
      解决的问题: 在多步、真实场景下用细粒度指标评估GUI代理，揭示过度观察、子目标未完成等失败模式，弥补仅看成功率不足。
      尚未覆盖: 基准是否覆盖所有关键交互类型（如拖拽、动态内容）未知，且如何将基准发现转化为代理设计改进未展示闭环优化。
    - 路线: 数据高效学习与技能复用
      解决的问题: 利用无标注截图或结构化多模态技能库减少对昂贵人工标注的依赖，使代理以较少监督学习定位和工作流。
      尚未覆盖: 新应用场景下技能的正确性和覆盖度无保证；离线编译可能无法适应UI变更而不重新训练或构建。
    - 路线: 运行时效率与可靠性机制
      解决的问题: 通过编译状态机重放、主动上下文管理或后验不确定性量化提升代理速度和安全性。
      尚未覆盖: 这些机制跨模型和平台迁移能力弱；缺乏形式化安全或正确性保证，评估仍限于受控基准。
    - 路线: 交互与动态环境的形式化
      解决的问题: 为动态屏幕原生代理和状态机执行提供定义，澄清观察控制和可重复性假设。
      尚未覆盖: 形式化条件未在多种代理上实证验证；抽象模型与学习策略行为之间的鸿沟未弥合。
    共识:
    - GUI代理需要超越简单任务成功的评估，纳入细粒度子目标完成、信息效率与可靠性。
    - 视觉语言模型是骨干，但原始性能不足；需要额外结构（技能、上下文管理、编译）才能用于真实部署。
    - 动态和长时域设置暴露当前代理缺乏观察控制和上下文管理，亟需新的交互范式。
    - 数据稀缺和标注成本是主要瓶颈；复用无标签数据或现有成功运行是可行方向。
    分歧:
    - 监督范式：部分方法依赖无标注截图的弱监督，另一些使用全标注轨迹或编译代理运行而不额外训练。
    - 评测目标：论文分别侧重任务成功率、子目标完成度、成本-准确率或不确定性校准，导致不可比较。
    - 交互重点：多数基准针对点击动作，而DragOn专注拖拽交互，反映GUI原语覆盖的碎片化。
    - 上下文表示：MemGUI-Agent将上下文管理作为显式动作并采用结构化字段，其他方法则使用隐式历史累积或技能检索，未就最佳表示达成共识。
    开放问题:
    - 如何将形式化交互模型进行实证验证并用于指导代理设计，而非仅停留在描述层面？
    - 不确定性量化和效率技术能否在无需重新评估的情况下跨模型等级和接口类型迁移？
    - 能够联合预测真实世界安全性和用户信任的最优评估维度最小集合是什么？
