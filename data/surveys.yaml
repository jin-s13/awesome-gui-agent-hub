  - 'Mainstream direction: Building reliability and efficiency frameworks for GUI
    agents through formalized interaction models, uncertainty quantification, and
    programmatic replay, moving beyond static click-based benchmarks.'
  - 'Shared research pattern: Proposing a new task abstraction or interaction primitive
    (drag, dynamic screen, context management action) and evaluating it with a dedicated
    benchmark or dataset, often revealing a capability gap in existing agents.'
  - 'Key differences: Some works focus on expanding interaction types (drag, living-screen),
    others on agent internals (multimodal skill libraries, proactive context management),
    and a third group on post-hoc safety (uncertainty quantification, state-machine
    verification).'
  - 'Trend evolution: Within 2024–2026, the frontier shifted from static single-step
    grounding to dynamic, long-horizon, and multimodal settings, with a growing emphasis
    on cost, speed, and formal safety guarantees.'
  - 'Open questions: Whether formal interaction models (e.g., living-screen-native)
    generalize across platforms; how to unify skill representation, context management,
