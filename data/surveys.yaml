    vision-language models with structured representations (skills, state machines,
    context fields) or learning strategies (weak supervision), then evaluate on step-level
    and task-level metrics beyond simple success rate.'
  - 'Key differences: Some works emphasize formalizing interaction models and dynamic
    screen behavior, others target data-efficient learning from unannotated screenshots,
    while a third group prioritizes runtime safety and repeatability via uncertainty
    quantification or program compilation.'
  - 'Trend evolution: The 2024–2026 span shows a shift from static click-based benchmarks
    toward dynamic, multimodal, and long-horizon tasks, with growing attention to
    agent reliability, observation control, and cost-accuracy trade-offs.'
  - 'Open questions: Whether formal models match real agent behavior; how to transfer
    uncertainty quantification and efficiency gains across model tiers and platforms;
    how to design evaluation that captures safety, generalization, and deviation from
    human-like interaction.'
