  related_work_outline:
  - 'Mainstream direction: Building GUI agents that generalize across diverse applications
    and interaction modes, with a strong emphasis on training data efficiency (synthetic
    task generation, weak supervision) and long-horizon reliability (context management,
    uncertainty quantification).'
  - 'Shared research pattern: Most works introduce a new benchmark or dataset that
    exposes a specific capability gap (e.g., drag actions, dynamic content, observation
    control) and then propose a method or training recipe to close that gap, evaluated
    on both existing and new benchmarks.'
  - 'Key differences: Supervision signals range from self-supervised visual grounding
    on unlabeled screenshots to verifiable RL task synthesis; interaction modes expand
    from click-only to drag and continuous screen observation; evaluation targets
    vary from strict task success to combined cost-accuracy metrics and uncertainty
    calibration.'
  - 'Trend evolution: Within the 2024–2026 frontier, the field has moved from static
    desktop benchmarks toward dynamic, multimodal, and long-horizon mobile/desktop
    scenarios, and from pure performance reporting to analyzing failure modes (observation
    control, UQ transfer) and training efficiency.'
  - 'Open questions: How to endow agents with explicit observation control rather
    than passive screenshot ingestion; whether synthetic training tasks capture real-world
    diversity and edge cases; how to generalize uncertainty quantification across
    models and interfaces without re-calibration; and how to unify discrete and continuous
    action spaces in a single agent.'
  related_work_outline_zh:
  - 主流方向：构建能够跨应用和交互模式泛化的GUI代理，重点关注训练数据效率（合成任务生成、弱监督）和长时域可靠性（上下文管理、不确定性量化）。
  - 研究共性：多数工作提出了新的基准或数据集，暴露特定能力缺口（如拖拽操作、动态内容、观察控制），然后提出方法或训练配方来弥补该缺口，并在现有和新基准上评估。
  - 关键差异：监督信号从无标注截图的自我监督视觉定位到可验证的RL任务合成不等；交互模式从仅点击扩展到拖拽和连续屏幕观察；评估目标从严格的任务成功率到结合成本-准确率指标和不确定性校准。
  - 趋势演进：在2024–2026年前沿内，领域从静态桌面基准转向动态、多模态、长时域移动/桌面场景，从纯粹的性能报告转向分析失败模式（观察控制、UQ迁移）和训练效率。
  - 开放问题：如何赋予代理显式的观察控制而非被动接收截图；合成训练任务是否覆盖真实世界多样性和边缘情况；如何在不重新校准的情况下跨模型和界面泛化不确定性量化；以及如何在单一代理中统一离散和连续动作空间。
  literature_review:
    line_of_work_matrix:
    - line: Training data generation and efficiency
      what_it_solves: Reducing reliance on expensive human annotations by generating
        verifiable synthetic tasks or leveraging large-scale unannotated screenshots
        for visual grounding.
      what_remains_open: Distribution shift from synthetic to real tasks, quality
        of weak supervision signals, and the long-tail coverage of edge cases in generated
        data.
    - line: Context and memory management for long-horizon tasks
      what_it_solves: Preventing information loss in extended trajectories by treating
        context management as a first-class policy action rather than passive history
        truncation.
      what_remains_open: Generalization to other domains and task types, automatic
        learning of what constitutes critical information to retain, and optimal compact
        representation of UI state.
    - line: Observation control and information efficiency
      what_it_solves: Addressing over- and under-observation in dynamic interfaces
        by formalizing observation as a controllable agent behavior, and improving
        efficiency via keyframe extraction.
      what_remains_open: End-to-end integration of observation control with agent
        training, and determining when and what to observe without task-specific heuristics.
    - line: Action space expansion beyond click
      what_it_solves: Enabling agents to perform drag-based interactions (text selection,
        resizing, slider manipulation) that are common in real-world GUIs but absent
        from most benchmarks.
      what_remains_open: Joint modeling of drag with other action types in a unified
        framework, and integration into full multi-step agent systems rather than
        isolated grounding tasks.
    - line: Uncertainty quantification and reliability
      what_it_solves: Evaluating post-hoc UQ methods for GUI grounding to detect unreliable
        predictions and enable safe action calibration, e.g., via conformal prediction
        regions.
      what_remains_open: Cross-model and cross-interface generalization of UQ rankings
        without target-specific re-ranking, and closing the gap between calibration
        and deployment under distribution shift.
    - line: Comprehensive benchmarking and capability diagnosis
      what_it_solves: Revealing agent limitations in real-world scenarios (multi-app,
        GUI+CLI, dynamic screens) through fine-grained metrics and capability annotations.
      what_remains_open: Unified evaluation standards across platforms and interaction
        types, and translating benchmark insights into actionable training improvements
        for deployed agents.
    consensus:
    - Vision-language models are the default backbone for GUI agents, evaluated in
      end-to-end task completion on realistic or simulated environments.
    - Current agents fail on dynamic, long-horizon, and complex interaction tasks,
      and performance alone is insufficient; metrics should capture information efficiency,
      observation control, and reliability.
    - Training data scarcity is a critical bottleneck, driving interest in synthetic
      generation, weak supervision, and efficient RL.
    - Uncertainty quantification and safety calibration are emerging as necessary
      components for trustworthy agent deployment.
    disagreements:
    - 'Single-step grounding vs. multi-step trajectory evaluation: some works focus
      on atomic actions (e.g., UQ, drag grounding), while others evaluate full task
      completion.'
    - 'Supervision paradigm: verifiable RL with synthetic tasks contrasts with weakly
      supervised visual grounding from unlabeled data, and with SFT on curated datasets.'
    - 'Interaction modality: most benchmarks assume click-based actions, but drag,
      continuous scrolling, and dynamic content observation introduce distinct action
      and observation representations.'
    - 'Context handling: proactive context management via learned actions vs. passive
      window-based history truncation, with no consensus on the optimal representation.'
    - 'Success metrics: task success rate vs. cost-accuracy trade-offs vs. uncertainty-aware
      calibration, leading to different optimization targets.'
    open_questions:
    - How can observation control be learned end-to-end, allowing agents to decide
      when and which screenshots to observe based on task state?
    - Do synthetic tasks generated by verifiable frameworks capture the full diversity
      of real-world GUI tasks, including rare edge cases and adversarial scenarios?
    - Can uncertainty quantification methods transfer across model families and GUI
      interfaces without requiring per-target re-ranking or calibration?
    - How should drag and other continuous actions be integrated into the discrete
      action spaces of current VLM-based agents without losing performance on click-based
      tasks?
    - What is the minimal set of context information that must be retained in long-horizon
      tasks, and can it be learned automatically rather than engineered?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 训练数据生成与效率
      解决的问题: 通过生成可验证的合成任务或利用大规模无标注截图进行视觉定位，减少对昂贵人工标注的依赖。
      尚未覆盖: 合成任务到真实任务的分布偏移、弱监督信号的质量保证、以及生成数据对长尾边缘情况的覆盖。
    - 路线: 长时域上下文与记忆管理
      解决的问题: 通过将上下文管理作为策略的第一类动作，而非被动历史截断，防止扩展轨迹中的信息丢失。
      尚未覆盖: 对其他领域和任务类型的泛化、自动学习何谓关键保留信息、以及UI状态的最优紧凑表示。
    - 路线: 观察控制与信息效率
      解决的问题: 通过将观察形式化为可控的代理行为，并利用关键帧提取提高效率，解决动态界面中的过度观察和观察不足问题。
      尚未覆盖: 观察控制与代理训练的端到端集成，以及如何在没有任务特定启发式的情况下决定观察时机和内容。
    - 路线: 超越点击的动作空间扩展
      解决的问题: 使代理能够执行现实GUI中常见但大多数基准缺失的拖拽交互（文本选择、调整大小、滑块操作）。
      尚未覆盖: 在统一框架中联合建模拖拽与其他动作类型，以及将拖拽集成到完整多步代理系统而非孤立的基础任务中。
    - 路线: 不确定性量化与可靠性
      解决的问题: 评估GUI基础中的后验UQ方法，以检测不可靠预测并通过共形预测区域实现安全动作校准。
      尚未覆盖: UQ排名在跨模型和跨界面下的泛化，无需目标特定重新排名，以及在校准与部署分布偏移下缩小差距。
    - 路线: 全面基准测试与能力诊断
      解决的问题: 通过细粒度指标和能力注释，揭示代理在真实场景（多应用、GUI+CLI、动态屏幕）中的局限性。
      尚未覆盖: 跨平台和交互类型的统一评估标准，以及将基准洞察转化为可操作的训练改进用于部署代理。
    共识:
    - 视觉语言模型是GUI代理的默认骨干，在真实或模拟环境中的端到端任务完成进行评估。
    - 当前代理在动态、长时域和复杂交互任务上表现不佳，仅性能指标不够，应捕捉信息效率、观察控制和可靠性。
    - 训练数据稀缺是关键瓶颈，推动对合成生成、弱监督和高效RL的兴趣。
    - 不确定性量化和安全校准正成为可信代理部署的必要组成部分。
    分歧:
    - 单步基础与多步轨迹评估：部分工作聚焦原子动作（如UQ、拖拽基础），其他则评估完整任务完成。
    - 监督范式：使用合成任务的可验证RL与来自无标签数据的弱监督视觉定位，以及基于精选数据集的SFT形成对比。
    - 交互模态：大多数基准假设基于点击的动作，但拖拽、连续滚动和动态内容观察引入了不同的动作和观察表示。
    - 上下文处理：通过学习动作的主动上下文管理与基于被动窗口的历史截断，尚未就最优表示达成共识。
    - 成功指标：任务成功率与成本-准确率权衡与不确定性感知校准，导致不同的优化目标。
    开放问题:
    - 观察控制如何端到端学习，使代理能根据任务状态自主决定何时以及观察哪些截图？
    - 由可验证框架生成的合成任务是否覆盖真实世界GUI任务的完整多样性，包括罕见边缘情况和对抗场景？
    - 不确定性量化方法能否跨模型家族和GUI界面迁移，而无需每个目标重新排名或校准？
    - 如何将拖拽和其他连续动作集成到当前基于VLM的代理的离散动作空间中，而不损失点击任务的性能？
    - 在长时域任务中必须保留的最小上下文信息集是什么，能否自动学习而非人工设计？
