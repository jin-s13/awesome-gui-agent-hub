  - 研究共性：所有工作均以视觉语言模型为核心代理，以任务成功或准确性为评估指标，并识别出观察控制、动作精度或效率方面的不足。
  - 关键差异：它们针对不同的应用领域（macOS桌面、短视频、拖拽交互、短信欺诈），并提出不同的改进策略（技能库、记忆、评判、编译、失败分析）。
  - 趋势演进：在2026年的前沿中，领域正从静态点击任务转向动态、拖拽和多应用工作流，从独立代理转向具备技能、记忆和效率机制的增强代理。
