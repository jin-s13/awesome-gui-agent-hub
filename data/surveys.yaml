  related_work_outline_zh:
  - 主流方向：通过形式化交互模型、不确定性量化和程序化重放，构建GUI智能体的可靠性与效率框架，超越静态点击式基准测试。
  - 研究共性：提出新的任务抽象或交互原语（如拖拽、动态屏幕、上下文管理动作），并用专用基准或数据集评估，通常揭示现有智能体的能力缺口。
  - 关键差异：部分工作聚焦扩展交互类型（拖拽、动态屏幕），部分关注智能体内部机制（多模态技能库、主动上下文管理），第三类关注事后安全（不确定性量化、状态机验证）。
  - 趋势演进：2024–2026年间，前沿从静态单步定位转向动态、长时域和多模态设置，并越来越重视成本、速度和形式化安全保证。
  - 开放问题：形式化交互模型（如动态屏幕原生）能否跨平台泛化；如何将技能表示、上下文管理和验证统一到单一智能体架构中；不确定性量化能否迁移到多步轨迹。
  literature_review:
    line_of_work_matrix:
    - line: Interaction primitive and task abstraction
      what_it_solves: Expands the set of GUI actions agents can perform (e.g., drag,
        dynamic content interaction) and defines task taxonomies that capture multi-app,
        multi-step workflows.
      what_remains_open: Whether these abstractions cover all real-world interaction
        patterns and how to compose them without combinatorial explosion in evaluation.
    - line: Skill and context representation
      what_it_solves: Structures agent knowledge (multimodal skill libraries) and
        manages dialogue history (proactive context management as actions) to improve
        long-horizon task completion.
      what_remains_open: Automatic skill construction across applications and the
        interaction between skill retrieval and context management under strict latency
        budgets.
    - line: Reliability and safety framing
      what_it_solves: Quantifies agent uncertainty in grounding decisions and enforces
        safe execution via state-machine compilation with runtime screen-checking,
        reducing silent failures.
      what_remains_open: Validation of uncertainty estimates on multi-step trajectories
        and the generalization of compiled programs to visually or functionally similar
        tasks.
    - line: Data-efficient learning paradigms
      what_it_solves: Reduces reliance on expensive human annotations by leveraging
        large-scale unannotated screenshots with weak supervision and curriculum reinforcement
        learning.
      what_remains_open: Robustness of weakly-supervised visual grounding when applied
        to complex, dynamic interfaces beyond static screenshots.
    consensus:
    - GUI agents must handle interaction types beyond simple clicks, including drag,
      scroll, and dynamic content that changes between actions.
    - Multimodal information (visual figures, screenshots) is critical for accurate
      UI element identification and workflow state verification.
    - Context management, whether through structured fields or skill retrieval, is
      essential for long-horizon tasks to avoid history overflow and loss of key facts.
    - Post-hoc reliability mechanisms such as uncertainty quantification and runtime
      verification are necessary because model predictions remain imperfect.
    disagreements:
    - 'Representation of agent knowledge: hierarchical multimodal skill files versus
      structured context fields emitted as actions versus compiled state-machine programs.'
    - 'Supervision signal: weakly-supervised learning from unannotated screenshots
      versus full fine-tuning on human-annotated trajectories with action labels.'
    - 'Evaluation target: task completion accuracy versus combined cost-accuracy metrics
      versus uncertainty calibration quality.'
    - 'Interaction mode: static screen assumptions versus living-screen-native formalizations
      that require observation control.'
    - 'Deployment setting: desktop macOS environments versus mobile platforms versus
      browser-based short-video platforms.'
    open_questions:
    - Can uncertainty quantification methods that rank well on single-step grounding
      maintain their calibration on full agent trajectories with multiple actions?
    - How can observation control be integrated into GUI agents to prevent over- and
      under-observation on dynamic interfaces?
    - Do state-machine programs compiled from successful runs transfer to tasks with
      slight visual or workflow variations, or do they require re-compilation?
    - What is the minimal annotation budget needed for weakly-supervised methods to
      match fully-supervised agents on complex, multi-application workflows?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 交互原语与任务抽象
      解决的问题: 扩展GUI智能体可执行的动作集合（如拖拽、动态内容交互），并定义捕捉多应用、多步骤工作流的任务分类体系。
      尚未覆盖: 这些抽象是否覆盖所有真实交互模式，以及如何在评估中组合它们而不导致组合爆炸。
    - 路线: 技能与上下文表示
      解决的问题: 结构化智能体知识（多模态技能库）并管理对话历史（作为动作的主动上下文管理），以提升长时域任务完成度。
      尚未覆盖: 跨应用的自动技能构建，以及在严格延迟预算下技能检索与上下文管理的交互。
    - 路线: 可靠性与安全框架
      解决的问题: 量化智能体在定位决策中的不确定性，并通过带运行时屏幕检查的状态机编译强制安全执行，减少静默失败。
      尚未覆盖: 多步轨迹上不确定性估计的验证，以及编译程序对视觉或功能相似任务的泛化能力。
    - 路线: 数据高效学习范式
      解决的问题: 通过利用大规模未标注截图进行弱监督和课程强化学习，减少对昂贵人工标注的依赖。
      尚未覆盖: 弱监督视觉定位在复杂动态界面（超越静态截图）上的鲁棒性。
    共识:
    - GUI智能体必须处理超越简单点击的交互类型，包括拖拽、滚动以及在动作之间变化的动态内容。
    - 多模态信息（视觉图形、截图）对于准确的UI元素识别和工作流状态验证至关重要。
    - 无论是通过结构化字段还是技能检索，上下文管理对于长时域任务必不可少，以避免历史溢出和关键事实丢失。
    - 由于模型预测仍不完美，事后可靠性机制（如不确定性量化和运行时验证）是必要的。
    分歧:
    - 智能体知识的表示方式：分层多模态技能文件 vs. 作为动作发出的结构化上下文字段 vs. 编译的状态机程序。
    - 监督信号：来自未标注截图的弱监督学习 vs. 在人工标注轨迹上的完全微调（含动作标签）。
    - 评测目标：任务完成准确率 vs. 成本-准确率综合指标 vs. 不确定性校准质量。
    - 交互模式：静态屏幕假设 vs. 需要观察控制的动态屏幕原生形式化。
