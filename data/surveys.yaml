    agent improvement.'
  related_work_outline_zh:
  - 主流方向：构建可运行的GUI代理，通过弱监督或在线强化学习在真实或仿真环境中执行多步骤任务，并在长期基准上评估。
  - 研究共性：所有论文都部署了感知截图、推理UI状态、通过工具调用行动的代理；一致发现当前代理在长期一致性、约束跟踪和错误传播方面表现不佳。
  - 关键差异：训练范式不同（从无标注截图弱监督 vs. 在线多轮RL vs. 技能库），记忆表示不同（全图 vs. 动作裁剪 vs. 分层多模态技能工件），安全评估目标不同（浏览器任务
    vs. 编码任务）。
  - 趋势演进：前沿从短期静态基准（2024–2025）转向长期真实世界任务（OSWorld2.0, Workflow-GYM）和在线交互训练（OpenWebRL），最近增加了领域条件安全审计和结构化技能/记忆模块。
  - 开放问题：如何保证跨领域安全性和任务一致性超越训练分布，如何在不降低动作级准确性的前提下扩展技能库和记忆，以及如何将基准失败反馈到自动化代理改进循环中。
  literature_review:
    line_of_work_matrix:
    - line: Training-efficient GUI agent learning (e.g., GUICrafter, OpenWebRL)
      what_it_solves: Reducing reliance on expensive human annotations by using weak
        supervision from unannotated screenshots or online multi-turn RL on live websites,
        enabling competitive performance with minimal labeled data.
      what_remains_open: Generalization to unseen applications and domains beyond
        the training websites; the minimal amount of real interaction data required
        for robust deployment; transfer of learned policies across different operating
        systems and UI toolkits.
    - line: Structured skill and memory frameworks (e.g., VISUALSKILL, AGMem)
      what_it_solves: Improving long-horizon task success by capturing reusable visual
        skills or action-grounded memory crops, reducing state-level and action-level
        errors such as hidden operation blindness and grounding mistakes.
      what_remains_open: How to update and scale skill libraries over time without
        catastrophic forgetting; whether visual memory crops can handle dynamic UI
        layouts; the trade-off between memory granularity and agent decision latency.
    - line: Long-horizon real-world evaluation (e.g., OSWorld2.0, Workflow-GYM)
      what_it_solves: Providing benchmarks that capture streaming interaction, dynamic
        environments, cross-source reasoning, and professional workflows, revealing
        where frontier agents fail beyond simple GUI control.
      what_remains_open: Automatic feedback loops that use benchmark diagnostics to
        improve agent design; coverage of safety-critical tasks; standardized metrics
        that capture partial progress and error recovery.
    - line: Safety and privacy auditing for computer-use agents (e.g., domain-conditioned
        safety, user-sensitive exploration)
      what_it_solves: Evaluating resistance to prompt injection and identifying queries
        that lead to user-sensitive states, uncovering domain-conditioned safety where
        browser-hardened agents remain vulnerable in coding contexts.
      what_remains_open: Generalizability of safety hardening across all agent modalities;
        automated privacy-preserving mechanisms during task execution; systematic
        reproducibility of adversarial red-teaming results.
    consensus:
    - GUI agents require multimodal perception (screenshots and text) and tool-use
      capabilities for multi-step task execution.
    - Even the strongest frontier agents achieve low success rates (20–30%) on long-horizon
      real-world tasks due to constraint miss, information loss, objective drift,
      and error propagation.
    - Incorporating structured knowledge—either through skill libraries, action-grounded
      memory, or reinforcement learning—improves performance over naive baselines.
    - Safety properties are not uniform; agents hardened in one domain (browsing)
      can fail catastrophically in another (coding), indicating domain-conditioned
      robustness.
    disagreements:
    - 'Training data efficiency: GUICrafter achieves strong results with only 0.1%
      of the data used by comparable systems, while OpenWebRL relies on online RL
      with a small supervised seed, suggesting no consensus on the minimal data recipe.'
    - 'Memory representation: Full-image visual memory reduces state-level errors
      but exacerbates action-level errors (AGMem), whereas VISUALSKILL retains visual
      figures alongside text and claims substantial gains, implying a tension between
      memory granularity and actionable precision.'
    - 'Safety evaluation targets: The domain-conditioned safety benchmark shows zero
      attack success on browser tasks but up to 100% on coding tasks, revealing that
      conclusions about agent safety are highly dependent on the evaluation domain
      and attack construction method.'
    open_questions:
    - How can we design agents that maintain constraints and verify intermediate states
      across hundreds of tool calls without human intervention?
    - What is the minimal set of training signals (annotated data, online interactions,
      synthetic demonstrations) needed to reach robust long-horizon performance?
    - How can safety mechanisms generalize across domains, and what evaluation protocols
      would detect such cross-domain vulnerabilities before deployment?
    - To what extent do skill libraries and action-grounded memories transfer across
      different applications, operating systems, and UI paradigms?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 数据高效的GUI代理训练（如 GUICrafter, OpenWebRL）
      解决的问题: 通过从未标注截图的弱监督或在真实网站上的在线多轮RL，减少对昂贵人工标注的依赖，以极少标注数据实现竞争性能。
      尚未覆盖: 对训练期间未见应用的泛化，未知的跨域迁移能力，以及在不同操作系统和UI工具包上策略的可迁移性。
    - 路线: 结构化技能与记忆框架（如 VISUALSKILL, AGMem）
      解决的问题: 通过捕获可复用的视觉技能或动作接地记忆裁剪，提升长期任务成功率，减少隐藏操作盲区和接地错误。
      尚未覆盖: 如何随时间更新和扩展技能库而不发生灾难性遗忘；视觉记忆裁剪能否处理动态UI布局；记忆粒度与代理决策延迟间的权衡。
    - 路线: 长期真实世界评估基准（如 OSWorld2.0, Workflow-GYM）
      解决的问题: 提供捕捉流式交互、动态环境、跨源推理和专业工作流的基准，揭示前沿代理在超越简单GUI控制时的失败模式。
      尚未覆盖: 利用基准诊断自动改进代理的闭环；安全关键任务的覆盖；标准化反映部分进展和错误恢复的评估指标。
    - 路线: 计算机使用代理的安全与隐私审计（如 领域条件安全、用户敏感探索）
      解决的问题: 评估对提示注入的抵抗力，识别导致用户敏感状态的查询，揭示浏览器加固的代理在编码环境中仍脆弱的安全领域条件性。
      尚未覆盖: 安全加固能泛化到所有代理模态的程度；任务执行中的自动化隐私保护机制；对抗性红队测试结果的系统性可复现。
    共识:
    - GUI代理需要多模态感知（截图和文本）和工具使用能力来完成多步骤任务。
    - 即使最强的前沿代理在长期真实世界任务上成功率也仅20-30%，主要因约束遗漏、信息丢失、目标漂移和错误传播。
    - 通过技能库、动作接地记忆或强化学习引入结构化知识，能比简单基线提升性能。
    - 安全属性不统一；在一个领域（浏览）加固的代理在另一领域（编码）可能灾难性失败，表明安全是领域条件的。
    分歧:
    - 训练数据效率：GUICrafter仅用可比系统0.1%的数据即取得强结果，而OpenWebRL依赖少量监督种子加在线RL，说明最小数据配方尚未达成共识。
    - 记忆表示：全图像记忆降低了状态级错误但加剧了动作级错误（AGMem），而VISUALSKILL保留视觉图形并声称显著提升，反映出记忆粒度与操作精度间的紧张关系。
    - 安全评估目标：领域条件安全基准在浏览器任务上攻击成功率为零，但在编码任务上高达100%，表明关于代理安全性的结论高度依赖评估领域和攻击构造方法。
    开放问题:
    - 如何设计能在数百次工具调用中维持约束和验证中间状态而无需人工干预的代理？
    - 达到稳健长期性能所需的最小训练信号组合（标注数据、在线交互、合成演示）是什么？
    - 安全机制如何跨领域泛化，以及何种评估协议能在部署前检测到此类跨域漏洞？
    - 技能库和动作接地记忆在不同应用、操作系统和UI范式间的迁移程度如何？
