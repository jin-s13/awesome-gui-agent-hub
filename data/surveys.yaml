  related_work_outline_zh:
  - 主流方向：构建面向桌面、移动、网页、短视频等真实应用场景的GUI代理综合基准与增强方法。
  - 研究共性：均以视觉语言模型为核心代理，在GUI环境中通过任务完成率评估，并识别出观察控制、接地错误、短视规划等具体失败模式。
  - 关键差异：覆盖的交互模态（点击、拖拽、动态内容）、增强策略（多模态技能库、动作接地记忆、历史感知评判、状态机编译）以及评估设置（是否抑制信誉捷径、静态与动态界面）。
  - 趋势演进：2024至2026年间，基准从静态桌面任务扩展到动态、交互丰富的环境，方法从单体代理演进为针对记忆、技能复用、执行速度和错误拦截的模块化增强。
  - 开放问题：如何统一记忆表示以减少状态级和动作级错误；技能库能否跨应用自动迁移；动态界面下如何实现观察控制；在安全关键部署中如何不依赖元数据捷径确保可靠性。
  literature_review:
    line_of_work_matrix:
    - line: Comprehensive GUI agent benchmarking
      what_it_solves: Systematic evaluation of GUI agents in specific application
        domains (macOS desktop, short-video platforms, drag-based interactions, fraud
        detection) with fine-grained metrics beyond task success.
      what_remains_open: Coverage of more dynamic interface types, multimodal interactions,
        real-world noise, and safety-critical scenarios without relying on reputation
        shortcuts.
    - line: Agent capability augmentation via skills and memory
      what_it_solves: Lack of application-specific knowledge and historical context
        that causes planning and execution errors, using multimodal skill libraries,
        action-grounded visual memory, or macro-action history.
      what_remains_open: Automatic construction and cross-application transfer of
        skill libraries; memory mechanisms that do not interfere with action grounding
        or introduce new failure modes.
    - line: Execution efficiency and error interception
      what_it_solves: Slow repeated task execution and flawed actions by compiling
        successful runs into state-machine programs for fast replay, or by integrating
        visually grounded critics to intercept errors before execution.
      what_remains_open: Robustness to environment changes during replay; generalization
        of critic models across diverse applications and agent policies.
    - line: Interaction modality expansion
      what_it_solves: Narrow focus on click-based actions by introducing benchmarks
        and datasets for drag interactions and formalizing agents for dynamic, living-screen
        interfaces where content changes between actions.
      what_remains_open: Unified support for a broader range of interaction types
        (e.g., gestures, long-press) and observation control mechanisms for dynamic
        content.
    consensus:
    - Vision-language models serve as the backbone for GUI agents, but their raw performance
      is insufficient for complex real-world tasks, necessitating additional augmentation.
    - Fine-grained evaluation metrics (sub-goal completion, information efficiency,
      failure taxonomies) reveal performance differences that aggregate success rates
      mask.
    - Agents suffer from common failure modes including observation control (over-
      or under-observation), grounding errors, and short-sighted planning due to lack
      of history.
    disagreements:
    - 'Optimal memory representation: full-image screenshots reduce state-level failures
      but worsen action-level errors, while action-grounded image crops or macro-action
      summaries improve action accuracy but may lose global context.'
    - 'Skill representation: text-only skill descriptions are outperformed by multimodal
      skills that retain visual figures, suggesting that purely textual knowledge
      is insufficient for UI element identification.'
    - 'Evaluation realism: some benchmarks suppress URL and reputation metadata to
      test genuine fraud detection capability, while others preserve real-world shortcuts,
      leading to different conclusions about agent competence.'
    open_questions:
    - Can a unified memory framework simultaneously reduce state misunderstandings
      and action grounding errors without trading off one for the other?
    - How can skill libraries be automatically constructed and transferred across
      applications with minimal human authoring?
    - What mechanisms enable GUI agents to control their own observation frequency
      in dynamic interfaces to balance information gain and efficiency?
    - How can agents reliably detect fraud or other safety-critical patterns when
      real-world reputation signals are unavailable or manipulated?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 综合GUI代理基准测试
      解决的问题: 在特定应用领域（macOS桌面、短视频平台、拖拽交互、欺诈检测）中系统评估GUI代理能力，提供超越任务成功率的细粒度指标。
      尚未覆盖: 更多动态界面类型、多模态交互、真实世界噪声以及不依赖信誉捷径的安全关键场景覆盖。
    - 路线: 通过技能与记忆增强代理能力
      解决的问题: 代理缺乏应用特定知识和历史上下文导致的规划与执行错误，通过多模态技能库、动作接地视觉记忆或宏观动作历史来缓解。
      尚未覆盖: 技能库的自动构建与跨应用迁移；不干扰动作接地或引入新失败模式的记忆机制。
    - 路线: 执行效率与错误拦截
      解决的问题: 重复任务执行缓慢和有缺陷的动作，通过将成功运行编译为状态机程序实现快速重放，或集成视觉基础评判模型在执行前拦截错误。
      尚未覆盖: 重放时对环境变化的鲁棒性；评判模型在不同应用和代理策略上的泛化能力。
    - 路线: 交互模态扩展
      解决的问题: 现有工作过度聚焦点击操作，通过引入拖拽交互基准与数据集，以及形式化面向内容动态变化的动态屏幕代理来扩展交互覆盖。
      尚未覆盖: 对更广泛交互类型（如手势、长按）的统一支持，以及动态内容下的观察控制机制。
    共识:
    - 视觉语言模型是GUI代理的骨干，但其原始性能不足以应对复杂真实任务，需要额外增强。
    - 细粒度评估指标（子目标完成度、信息效率、失败分类）揭示了总体成功率掩盖的性能差异。
