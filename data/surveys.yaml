  related_work_outline:
  - 'Mainstream direction: Building fine-grained benchmarks for GUI agents across
    desktop, mobile, and short-video platforms, emphasizing multi-step tasks, dynamic
    interfaces, and efficiency-aware metrics beyond simple success rates.'
  - 'Shared research pattern: Exposing agent weaknesses in observation control, long-horizon
    planning, and uncertainty handling through novel tasks and evaluation dimensions,
    then proposing skill libraries, weak supervision, or context management to address
    them.'
  - 'Key differences: Task types vary from click-based to drag, video-guided, and
    CLI/GUI mixed; evaluation targets diverge into task completion, cost-accuracy,
    and uncertainty calibration; training paradigms range from fully annotated to
    weakly supervised and skill-augmented.'
  - 'Trend evolution: Within the 2024–2026 frontier, benchmarks are moving from static
    single-step tasks toward dynamic, multimodal, long-horizon scenarios, and metrics
    are expanding from accuracy to include observation efficiency, sub-goal completion,
    and conformal safety.'
  - 'Open questions: Cross-platform benchmark unification, uncertainty propagation
    in multi-step trajectories, scalability of weak supervision to dynamic interaction
    data, and principled observation control for agents in continuously changing interfaces.'
  related_work_outline_zh:
  - 主流方向：构建覆盖桌面、移动、短视频平台的细粒度GUI代理基准，强调多步任务、动态界面和超越简单成功率的效率感知指标。
  - 研究共性：通过新任务和评估维度暴露代理在观察控制、长时域规划和不确定性处理上的不足，然后提出技能库、弱监督或上下文管理等方法加以解决。
  - 关键差异：任务类型从点击扩展到拖拽、视频引导和CLI/GUI混合；评估目标分化为任务完成、成本-准确性和不确定性校准；训练范式涵盖全标注、弱监督和技能增强。
  - 趋势演进：在2024–2026前沿窗口内，基准从静态单步任务向动态多模态长时域场景演进，指标从准确率扩展到观察效率、子目标完成度和共形安全。
  - 开放问题：跨平台基准统一、多步轨迹中的不确定性传播、弱监督方法向动态交互数据的可扩展性，以及面向持续变化界面的代理观察控制机制。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creates shared tasks and datasets that cover real application
        scenarios (desktop, mobile, short-video) and expose agent capabilities beyond
        simple clicks, such as drag, video-guided interaction, and mixed CLI/GUI workflows.
      what_remains_open: Whether the task distribution fully captures dynamic interfaces,
        long-horizon dependencies, and cross-platform variability that agents face
        in real-world use.
    - line: Metric and stress-test design
      what_it_solves: Probes agent prediction, observation control, robustness, and
        decision utility through fine-grained scoring, cost-accuracy trade-offs, uncertainty
        quantification, and context management evaluation.
      what_remains_open: Alignment between these proxy metrics and the downstream
        task success or safety requirements that end users actually care about; stability
        of metric rankings across model classes and deployment interfaces.
    - line: Comparable baselines and reporting
      what_it_solves: Makes results auditable by providing common baselines (no-skill,
        text-only skill, varying data regimes) and releasing artifacts such as datasets,
        skill libraries, and UQ scores.
      what_remains_open: Whether benchmark conclusions remain stable across different
        implementations, compute budgets, and calibration-test splits; lack of standardized
        reporting conventions for agent trajectories and failure modes.
    consensus:
    - Current GUI agents underperform on complex, dynamic, and long-horizon tasks,
      and simple task success rates are insufficient to capture their real-world reliability.
    - Fine-grained evaluation that decomposes performance into sub-goal completion,
      observation efficiency, or uncertainty calibration reveals hidden weaknesses
      even when aggregate scores appear similar.
    - Augmenting agents with multimodal skill libraries or weakly supervised pre-training
      on unannotated screenshots can significantly improve grounding and task execution
      with less human annotation.
    disagreements:
    - 'Evaluation targets differ: some benchmarks prioritize end-to-end task completion,
      while others emphasize information efficiency (cost-accuracy) or the quality
      of uncertainty estimates for safe decision-making.'
    - 'Interaction modality coverage is uneven: most benchmarks focus on click-based
      actions, with drag, scroll, and video-guided operations only recently being
      introduced, leading to gaps in assessing full interaction capabilities.'
    - 'Deployment environments vary substantially: desktop OS, mobile, and short-video
      platforms impose different perception and action spaces, and findings from one
      platform do not readily transfer to others.'
    open_questions:
    - How can we design a unified cross-platform GUI agent benchmark that yields transferable
      conclusions about agent competence?
    - How does uncertainty propagate across multi-step agent trajectories, and can
      conformal or other UQ methods guarantee safety under distribution shift?
    - Can weakly supervised or skill-augmented approaches scale from static screenshots
      to dynamic, streaming interfaces without catastrophic forgetting or observation
      miscount?
    - What mechanisms enable agents to learn when to observe versus act in continuously
      changing environments, and how should benchmarks measure this observation control
      capability?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 创建覆盖真实应用场景（桌面、移动、短视频）的共享任务和数据集，暴露代理在拖拽、视频引导交互和混合CLI/GUI工作流等超越简单点击的能力。
      尚未覆盖: 任务分布是否充分涵盖动态界面、长时域依赖和跨平台变异性，即代理在真实使用中面临的挑战。
    - 路线: 指标与压力测试设计
      解决的问题: 通过细粒度评分、成本-准确性权衡、不确定性量化和上下文管理评估，检验代理的预测、观察控制、鲁棒性和决策效用。
      尚未覆盖: 这些代理指标与最终用户关心的下游任务成功或安全需求之间的一致性；指标排名在不同模型类别和部署接口下的稳定性。
    - 路线: 可比基线与报告规范
      解决的问题: 通过提供统一基线（无技能、纯文本技能、不同数据量）和发布数据集、技能库、UQ分数等工件，使结果可审计。
      尚未覆盖: 基准结论在不同实现、算力预算和校准-测试分割下是否稳定；缺乏针对代理轨迹和失败模式的标准化报告惯例。
    共识:
    - 当前GUI代理在复杂、动态和长时域任务上表现不足，简单的任务成功率不足以反映其真实可靠性。
    - 将性能分解为子目标完成度、观察效率或不确定性校准的细粒度评估，能揭示即使总分相近时隐藏的弱点。
    - 通过多模态技能库或在未标注截图上进行弱监督预训练来增强代理，可以显著提升定位和任务执行能力，同时减少人工标注需求。
    分歧:
    - 评估目标不同：一些基准优先考虑端到端任务完成，而另一些则强调信息效率（成本-准确性）或不确定性估计的质量以支持安全决策。
    - 交互模态覆盖不均衡：多数基准聚焦点击操作，拖拽、滚动和视频引导操作最近才被引入，导致评估完整交互能力时存在缺口。
    - 部署环境差异显著：桌面操作系统、移动端和短视频平台对感知和动作空间的要求不同，一个平台的发现难以直接迁移到其他平台。
    开放问题:
    - 如何设计统一的跨平台GUI代理基准，使其得出的代理能力结论具有可迁移性？
    - 不确定性如何在多步代理轨迹中传播，共形或其他UQ方法能否在分布偏移下保证安全？
    - 弱监督或技能增强方法能否从静态截图扩展到动态流式界面，而不发生灾难性遗忘或观察计数错误？
    - 何种机制能让代理学会在持续变化的环境中何时观察、何时行动，基准应如何衡量这种观察控制能力？
