  related_work_outline:
  - 'Mainstream direction: Building GUI agent benchmarks that move beyond static click-based
    tasks toward dynamic, multimodal, and long-horizon interactions across diverse
    platforms (desktop, mobile, short-video).'
  - 'Shared research pattern: Introducing fine-grained evaluation metrics (multi-checkpoint
    scoring, cost-accuracy, uncertainty calibration) to reveal capability differences
    hidden by aggregate success rates.'
  - 'Key differences: Evaluation environments range from real macOS desktops to simulated
    browsers and specific apps; interaction primitives span click, drag, CLI, and
    dynamic content; supervision varies from weak (unannotated screenshots) to full
    (annotated trajectories).'
  - 'Trend evolution: All evidence is from 2026, indicating a concentrated frontier
    push toward richer interaction coverage, context management, and safety-oriented
