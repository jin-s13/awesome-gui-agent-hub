  related_work_outline:
  - 'Mainstream direction: Building and evaluating GUI agents that handle diverse
    interaction modes (click, drag, CLI, context management) on realistic platforms,
    with a growing emphasis on data-efficient training and reliability.'
  - 'Shared research pattern: Almost all works introduce a new benchmark or dataset
    to expose shortcomings of current VLM-based agents, then propose a novel method
    or training recipe to address those shortcomings, evaluated on task success rate.'
  - 'Key differences: Supervision strategy varies from online RL with synthetic tasks
    (ScaleCUA), weak supervision from unannotated screenshots (GUICrafter), to supervised
    fine-tuning on action-specific datasets (DragOn, MemGUI-Agent). The action space
    and observation paradigm also differ: static click-based vs. drag, dynamic video,
    context management actions, and combinations of GUI+CLI.'
  - 'Trend evolution: The field in 2024–2026 is moving from simple static desktop
    clicks to dynamic, long-horizon, multi-application tasks with richer action spaces.
    2026 sees a surge in benchmarks that diagnose specific failures (observation control,
    drag, uncertainty) and methods that emphasize data efficiency and online learning.'
  - 'Open questions: Can a unified agent handle all interaction modes without specialized
    modules? How well do data-efficient methods (weak supervision, task synthesis)
    generalize to unseen real-world apps? Can uncertainty quantification be integrated
    into agent decision-making to improve safety, rather than remaining a post-hoc
    analysis? There is a lack of controlled ablation studies that separate the contributions
    of model, data, action space, and environment.'
  related_work_outline_zh:
  - 主流方向：构建和评估能够在真实平台上处理多样化交互模式（点击、拖拽、命令行、上下文管理）的 GUI 代理，越来越强调数据高效训练和可靠性。
  - 研究共性：几乎所有工作都引入新的基准或数据集来揭示当前基于 VLM 的代理的不足，然后提出一种新颖的方法或训练配方来解决这些不足，以任务成功率作为主要评估指标。
  - 关键差异：监督策略差异显著，从使用合成任务的在线强化学习（ScaleCUA），到利用未标注截图的弱监督（GUICrafter），再到在动作特定数据集上的监督微调（DragOn、MemGUI-Agent）。动作空间和观察范式也不同：静态点击
    vs 拖拽、动态视频、上下文管理动作、GUI 与 CLI 的组合。
  - 趋势演进：2024–2026 年，领域从简单的静态桌面点击任务转向动态、长时域、多应用且具有更丰富动作空间的任务。2026 年涌现了大量基准，专门诊断特定失败模式（观察控制、拖拽、不确定性），以及强调数据效率和在线学习的方法。
  - 开放问题：一个统一的代理能否在不使用专用模块的情况下处理所有交互模式？数据高效方法（弱监督、任务合成）在未见过的真实应用中泛化如何？不确定性量化能否被集成到代理决策中以提升安全性，而不仅仅是事后分析？缺乏严格的受控消融研究来分离模型、数据、动作空间和环境的贡献。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark construction and capability diagnosis
      what_it_solves: Evaluates GUI agents on realistic, diverse tasks and interfaces
        (macOS desktop, dynamic short-video platforms, drag-based interactions, GUI
        grounding) to expose specific failure modes such as poor observation control,
        inability to drag, or miscalibration.
      what_remains_open: Whether benchmarks can predict real-world deployment performance,
        and how to translate diagnosed failures into systematic training improvements
        without overfitting to the benchmark.
    - line: Training recipes and data strategies
      what_it_solves: Reduces reliance on expensive human annotations by using online
        RL with verifiable synthetic tasks, weak supervision from unannotated screenshots,
        or fine-tuning on action-specific datasets, achieving competitive or state-of-the-art
        results with less supervision.
      what_remains_open: Generalization of these strategies across different platforms,
        action spaces, and unseen application domains; the complementarity of different
        data strategies is not yet studied.
    - line: Interaction and action space expansion
      what_it_solves: Addresses the limitation of click-only agents by introducing
        drag actions, context management as first-class actions, and observation control
        in dynamic environments, enabling agents to perform more complex, long-horizon
        tasks.
      what_remains_open: How to unify these expanded action spaces into a single agent
        architecture, and whether the decision efficiency degrades when more actions
        are available.
    - line: Uncertainty quantification and reliability
      what_it_solves: Provides post-hoc uncertainty estimates for GUI grounding actions,
        enabling safer deployment through calibrated confidence and conformal prediction
        regions.
      what_remains_open: The impact of UQ on actual agent behavior and task completion
        is not shown; UQ ranking transfer across model classes is weak, and integration
        into training or online decision-making is unexplored.
    consensus:
    - All top papers adopt vision-language models as the agent backbone and use task
      success rate (e.g., Pass@1) as the primary evaluation metric.
    - Researchers agree that current GUI agents are deficient in complex, real-world
      scenarios, and that new benchmarks are needed to reveal these deficiencies.
    - There is a shared recognition that data efficiency and training cost are critical
      bottlenecks for scaling GUI agents.
    disagreements:
    - 'Supervision approach: online RL with synthetic tasks versus weak supervision
      from uncurated screenshots versus supervised fine-tuning on manually collected
      action datasets.'
    - 'Evaluation target: some papers focus on broad desktop OS benchmarks (OSWorld,
      ScienceBoard), while others target niche interaction modes (drag, short-video
      platforms) or specific reliability properties (uncertainty calibration).'
    - 'Action space design: some works expand actions to include drag, context management,
      or CLI, while others stick to click-based grounding, implying no consensus on
      what constitutes a sufficient action space.'
    - 'Interaction paradigm: static screen assumptions versus dynamic, living-screen
      environments where content changes between actions, leading to different observation
      control requirements.'
    open_questions:
    - Can a single agent architecture handle click, drag, CLI, and context management
      actions without sacrificing performance on any mode?
    - How well do data-efficient training methods (weak supervision, task synthesis)
      transfer to real-world apps outside the training distribution?
    - Can uncertainty quantification be moved from post-hoc evaluation to an active
      component of agent decision-making to improve safety and exploration?
    - What is the relative contribution of model scale, training data, action space,
      and environment to the reported performance gains, given the lack of controlled
      ablation studies across works?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准构建与能力诊断
      解决的问题: 在真实、多样的任务和界面（macOS 桌面、动态短视频平台、拖拽交互、GUI 基础）上评估 GUI 代理，以暴露特定的失败模式，如观察控制差、无法拖拽或校准错误。
      尚未覆盖: 基准测试能否预测真实世界部署的性能，以及如何将诊断出的失败模式转化为系统性的训练改进而不至于过拟合于基准。
    - 路线: 训练配方与数据策略
      解决的问题: 通过使用可验证合成任务的在线强化学习、未标注截图的弱监督或在动作特定数据集上微调，减少对昂贵人工标注的依赖，以更少的监督信号达到竞争性或最优性能。
      尚未覆盖: 这些策略在不同平台、动作空间和未见应用领域的泛化能力；不同数据策略之间的互补性尚未被研究。
    - 路线: 交互与动作空间扩展
      解决的问题: 解决仅有点击代理的局限性，引入拖拽动作、将上下文管理作为第一类动作、动态环境中的观察控制，使代理能执行更复杂的长时域任务。
      尚未覆盖: 如何将这些扩展的动作空间统一到单一代理架构中，以及当可用动作增多时决策效率是否降低。
    - 路线: 不确定性量化与可靠性
      解决的问题: 为 GUI 基础动作提供事后不确定性估计，通过校准的置信度和共形预测区域实现更安全的部署。
      尚未覆盖: 不确定性量化对代理实际行为和任务完成的影响未展示；不确定性量化排名在模型类别间迁移弱，且集成到训练或在线决策中尚未探索。
    共识:
    - 所有顶级论文都采用视觉语言模型作为代理骨干，并使用任务成功率（如 Pass@1）作为主要评估指标。
    - 研究者一致认为当前 GUI 代理在复杂的真实场景中存在不足，需要新的基准来揭示这些不足。
    - 普遍认识到数据效率和训练成本是扩展 GUI 代理的关键瓶颈。
    分歧:
    - 监督方式：使用合成任务的在线强化学习 vs 从未经整理的截图中进行弱监督 vs 在人工收集的动作数据集上进行监督微调。
    - 评测目标：部分论文聚焦于广泛的桌面操作系统基准（OSWorld、ScienceBoard），其他则关注小众交互模式（拖拽、短视频平台）或特定可靠性属性（不确定性校准）。
    - 动作空间设计：一些工作将动作扩展至拖拽、上下文管理或 CLI，而另一些仍坚持基于点击的基础定位，这意味着对什么是足够的动作空间尚无共识。
    - 交互范式：静态屏幕假设 vs 动态、实时变化的屏幕环境，后者导致对观察控制的不同要求。
    开放问题:
    - 单一代理架构能否同时处理点击、拖拽、CLI 和上下文管理动作，而不在任何模式下损失性能？
    - 数据高效的训练方法（弱监督、任务合成）在训练分布之外的真实应用中的迁移效果如何？
    - 不确定性量化能否从事后评估转变为代理决策的主动组成部分，以提高安全性和探索能力？
    - 在缺乏跨工作受控消融研究的情况下，模型规模、训练数据、动作空间和评估环境对报告的性能提升的相对贡献是多少？
