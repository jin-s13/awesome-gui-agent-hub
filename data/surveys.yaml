  related_work_outline:
  - 'Mainstream direction: GUI agent methods are shifting from static click-based
    tasks to dynamic, multi-step, multi-modal interactions on real-world platforms,
    with training paradigms moving toward weak supervision, online RL, and context
    management to reduce annotation cost and handle long horizons.'
  - 'Shared research pattern: New benchmarks introduce fine-grained evaluation beyond
    pass/fail, including sub-goal completion, information efficiency, and uncertainty
    quantification, to isolate method contributions from framework or data effects.'
  - 'Key differences: Training paradigms diverge—weakly supervised curriculum learning
    vs. online multi-turn RL vs. compiling successful runs into state machines; interaction
    modes span click, drag, dynamic screens, and desktop multi-app workflows; context
    handling ranges from passive history to proactive structured management.'
  - 'Trend evolution: Within the 2026 frontier, the field is rapidly moving from simulated
    static environments to live, dynamic benchmarks (macOS desktop, short-video platforms,
    drag-based tasks) and from monolithic success metrics to diagnostic, capability-level
    analysis.'
  - 'Open questions: How to unify diverse action spaces (click, drag, scroll) in a
    single agent; whether weak-supervision and RL-trained agents generalize across
    unseen apps and dynamic UIs; how to systematically address over/under-observation;
    and how to achieve robust cross-model uncertainty quantification transfer.'
  related_work_outline_zh:
  - 主流方向：GUI agent 方法正从静态点击任务转向真实平台上的动态、多步、多模态交互，训练范式趋向弱监督、在线强化学习和上下文管理，以降低标注成本并处理长时域任务。
  - 研究共性：新基准引入超越通过/失败的细粒度评估，包括子目标完成度、信息效率和不确定性量化，以分离方法贡献与框架或数据影响。
  - 关键差异：训练范式存在分歧——弱监督课程学习 vs. 在线多轮强化学习 vs. 将成功运行编译为状态机；交互模式涵盖点击、拖拽、动态屏幕和桌面多应用工作流；上下文处理从被动历史到主动结构化管理各不相同。
  - 趋势演进：在2026年前沿内，领域正从模拟静态环境快速转向真实动态基准（macOS桌面、短视频平台、拖拽任务），并从单一成功率指标转向诊断性、能力层面的分析。
  - 开放问题：如何统一多种动作空间（点击、拖拽、滚动）；弱监督和强化学习训练的agent能否泛化到未见应用和动态界面；如何系统解决过度/不足观察；以及如何实现鲁棒的跨模型不确定性量化迁移。
  literature_review:
    line_of_work_matrix:
    - line: Training paradigm and objective design
      what_it_solves: Reducing reliance on expensive human annotations and improving
        sample efficiency for GUI agents via weak supervision from unannotated screenshots
        (e.g., GUICrafter), online multi-turn RL on live websites (e.g., OpenWebRL),
        proactive context management as first-class actions (e.g., MemGUI-Agent),
        and compiling successful runs into reusable state-machine programs (e.g.,
        PreAct).
      what_remains_open: Cross-app and cross-platform generalization of these training
        strategies; the trade-off between training cost, data diversity, and final
        agent robustness; and whether gains come from the training recipe or the underlying
        model scale.
    - line: Interaction modality and action-interface methods
      what_it_solves: Expanding GUI agents beyond click-only actions to drag-based
        interactions (DragOn), dynamic content handling on short-video platforms (LivingScreen),
        and multi-app desktop workflows combining GUI and CLI (MacAgentBench); also
        includes runtime screen-checking fallback mechanisms for robust replay.
      what_remains_open: A unified action space that seamlessly integrates click,
        drag, scroll, and other continuous inputs; systematic handling of observation
        control to prevent over- and under-observation in dynamic interfaces; and
        how to balance planned versus reactive actions in long-horizon tasks.
    - line: Evaluation methodology and evidence protocols
      what_it_solves: 'Moving beyond binary success metrics to fine-grained, capability-level
        diagnostics: multi-checkpoint sub-goal scoring (MacAgentBench), cost-accuracy
        metrics for information efficiency (LivingScreen), post-hoc uncertainty quantification
        for grounding reliability (Argus), and dedicated benchmarks for under-explored
        interactions like drag (DragOn).'
      what_remains_open: Standardized evaluation protocols that enable fair comparison
        across diverse benchmarks and deployment settings; whether UQ rankings transfer
        robustly across model tiers and interfaces; and how to integrate these diagnostic
        signals into agent training loops rather than using them only for post-hoc
        analysis.
    consensus:
    - GUI agent evaluation is moving from static, simulated tasks to dynamic, real-world
      environments that require multi-step reasoning and diverse interaction modalities.
    - Fine-grained metrics (sub-goal completion, information efficiency, uncertainty
      calibration) are necessary to diagnose agent capabilities beyond aggregate success
      rates.
    - Training efficiency is a shared concern, with multiple works aiming to reduce
      human annotation through weak supervision, online RL, or replay compilation.
    - Context management is critical for long-horizon tasks, and structured or proactive
      approaches outperform passive history accumulation.
    disagreements:
    - 'Training signal: weakly-supervised visual grounding from unlabeled screenshots
      versus online multi-turn RL with trajectory-level success rewards versus compiling
      successful trajectories into deterministic programs.'
    - 'Interaction scope: some works focus on single-step grounding or a single interaction
      type (drag, dynamic screen), while others target end-to-end multi-app, multi-step
      workflows.'
    - 'Evaluation setting: live websites and real desktop environments versus browser-based
      simulators; this affects reproducibility and the generality of reported results.'
    - 'Uncertainty handling: post-hoc UQ methods show strong within-model stability
      but weak cross-model transfer, suggesting that UQ strategy must be tailored
      to the agent architecture rather than being universally applicable.'
    open_questions:
    - Can weak-supervision and online RL methods generalize to unseen applications
      and dynamic interfaces without catastrophic forgetting or overfitting to training
      websites?
    - How should observation control (deciding when to stop observing and act) be
      explicitly modeled in GUI agents to avoid the over/under-observation failures
      identified in dynamic environments?
    - What is the minimal set of interaction primitives needed to cover real-world
      GUI tasks, and can a single model master click, drag, scroll, and CLI commands
      simultaneously?
    - How can uncertainty quantification be made robust across model families and
      interfaces, and can it be used online to trigger fallback or human intervention?
    - What are the trade-offs between compiling agent runs for speed and maintaining
      flexibility to handle UI changes, and can hybrid reactive-compiled approaches
      be formalized?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 训练范式与目标设计
      解决的问题: 通过未标注截图的弱监督（如GUICrafter）、真实网站的在线多轮强化学习（如OpenWebRL）、将上下文管理作为第一类动作的主动策略（如MemGUI-Agent）以及将成功运行编译为可复用状态机程序（如PreAct），减少对昂贵人工标注的依赖并提高样本效率。
      尚未覆盖: 这些训练策略的跨应用和跨平台泛化能力；训练成本、数据多样性与最终agent鲁棒性之间的权衡；以及性能提升究竟来自训练配方还是底层模型规模。
    - 路线: 交互模态与动作接口方法
      解决的问题: 将GUI agent从仅点击扩展到拖拽交互（DragOn）、短视频平台动态内容处理（LivingScreen）以及结合GUI和CLI的多应用桌面工作流（MacAgentBench）；同时包括运行时屏幕检查回退机制以实现鲁棒回放。
      尚未覆盖: 无缝集成点击、拖拽、滚动等连续输入的统一动作空间；系统性地处理动态界面中的观察控制以防止过度和不足观察；以及如何在长时域任务中平衡规划与反应式动作。
    - 路线: 评估方法与证据协议
      解决的问题: 超越二元成功指标，转向细粒度能力诊断：多检查点子目标评分（MacAgentBench）、信息效率的成本-准确性指标（LivingScreen）、用于基础可靠性的后验不确定性量化（Argus），以及针对拖拽等探索不足的交互的专用基准（DragOn）。
      尚未覆盖: 能够在多样化基准和部署设置中进行公平比较的标准化评估协议；UQ排名是否能在模型层级和接口间鲁棒迁移；以及如何将这些诊断信号集成到agent训练循环中，而非仅用于事后分析。
    共识:
    - GUI agent评估正从静态模拟任务转向需要多步推理和多样化交互模态的动态真实环境。
    - 细粒度指标（子目标完成度、信息效率、不确定性校准）对于诊断agent能力是必要的，超越了总体成功率。
    - 训练效率是共同关注点，多项工作旨在通过弱监督、在线强化学习或回放编译来减少人工标注。
    - 上下文管理对长时域任务至关重要，结构化或主动方法优于被动历史累积。
    分歧:
    - 训练信号：基于未标注截图的弱监督视觉定位 vs. 基于轨迹级成功奖励的在线多轮强化学习 vs. 将成功轨迹编译为确定性程序。
    - 交互范围：部分工作聚焦于单步基础或单一交互类型（拖拽、动态屏幕），而其他工作则瞄准端到端的多应用、多步工作流。
    - 评估设置：真实网站和真实桌面环境 vs. 基于浏览器的模拟器；这影响了可复现性和报告结果的普适性。
    - 不确定性处理：后验UQ方法在模型内表现出强稳定性，但跨模型迁移较弱，表明UQ策略必须针对agent架构定制，而非普遍适用。
    开放问题:
    - 弱监督和在线强化学习方法能否泛化到未见应用和动态界面，而不会灾难性遗忘或过拟合训练网站？
    - 应如何在GUI agent中显式建模观察控制（决定何时停止观察并执行动作），以避免动态环境中发现的过度/不足观察失败？
    - 覆盖真实世界GUI任务所需的最小交互原语集是什么？单一模型能否同时掌握点击、拖拽、滚动和CLI命令？
    - 如何使不确定性量化在模型家族和接口间保持鲁棒，并能否在线用于触发回退或人工干预？
    - 在编译agent运行以提升速度与保持处理UI变化的灵活性之间存在何种权衡？能否形式化混合反应式-编译方法？
