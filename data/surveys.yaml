  related_work_outline:
  - 'Mainstream direction: Constructing GUI/desktop automation benchmarks that cover
    real operating systems, dynamic interfaces, multi‑application workflows, and diverse
    interaction modalities (click, drag, video‑guided) to enable holistic evaluation
    of agent capabilities.'
  - 'Shared research pattern: Relying on multimodal vision‑language models as the
    core agent architecture, and moving beyond task success rate to fine‑grained metrics
    such as observation efficiency, sub‑goal completion, and uncertainty calibration.'
  - 'Key differences: Interaction types vary from static clicks to drag, dynamic video,
    and CLI‑GUI combinations; evaluation environments range from simulated browsers
    to real macOS desktops; agent training and augmentation methods split into weakly
    supervised, online RL, and multimodal skill libraries.'
  - 'Trend evolution: Within the 2024–2026 window, the focus is shifting rapidly from
    simple web‑page benchmarks to complex, living‑screen and OS‑level benchmarks,
    while training methods leveraging large‑scale synthetic data and unsupervised
    learning emerge alongside evaluation.'
  - 'Open questions: How to validate alignment between benchmark tasks and real‑world
    user needs; how observation control and uncertainty quantification translate to
    deployment reliability; cross‑platform and cross‑model transferability of both
    capabilities and evaluation metrics remains largely unexplored.'
  related_work_outline_zh:
  - 主流方向：构建覆盖真实操作系统、动态界面、多应用工作流和多种交互方式（点击、拖拽、视频引导）的GUI/桌面自动化基准，全面评估智能体能力。
  - 研究共性：依赖多模态视觉‑语言模型作为核心智能体架构，并在任务成功率之外引入细粒度指标（如观察效率、子目标完成度、不确定性校准）。
  - 关键差异：交互类型从静态点击扩展到拖拽、动态视频与CLI‑GUI组合；评估环境从浏览器模拟到真实macOS桌面；智能体训练与增强方法分为弱监督、在线强化学习和多模态技能库。
  - 趋势演进：在2024‑2026窗口内，研究从简单网页任务基准快速转向复杂的活体屏幕和操作系统级基准，同时利用大规模合成数据和无监督学习的训练方法伴随评估一起出现。
  - 开放问题：如何验证基准任务与真实用户需求的对应关系；观察控制能力和不确定性量化如何转化为实际部署的可靠性；跨平台和跨模型的能力与评估指标迁移性仍待探索。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Providing diverse, realistic GUI interaction tasks (desktop,
        dynamic video, drag) and environments that make agent capabilities comparable
        across models and frameworks.
      what_remains_open: Whether the task distribution covers all critical platforms
        (mobile, cross‑device) and real‑world user workflows, and whether task difficulty
        scales match actual deployment demands.
    - line: Metric and stress‑test design
      what_it_solves: Evaluating agent performance beyond task success rate by measuring
        observation efficiency, uncertainty calibration, fine‑grained sub‑goal completion,
        and spatial safety.
      what_remains_open: The connection between these proxy metrics and downstream
        user value (e.g., task completion time, error recovery) is unverified; cross‑model
        and cross‑task robustness of uncertainty quantification methods is limited.
    - line: Comparable baselines and reporting
      what_it_solves: Enabling auditable progress through unified evaluation protocols,
        multi‑framework model comparisons, and publicly released artifacts, as seen
        in multi‑agent benchmark suites and systematic UQ studies.
      what_remains_open: Stability of benchmark conclusions across different implementations
        and compute budgets, and the absence of standardized reproducibility reporting
        for agent evaluations.
    consensus:
    - All studies rely on multimodal vision‑language models as the core agent architecture
      and highlight the need for richer interaction modalities beyond simple point‑and‑click.
    - There is agreement that current benchmarks fail to capture the complexity of
      real‑world GUI use, especially dynamic content, multi‑step workflows, and observation
      control.
    - Fine‑grained evaluation beyond aggregate success rate is widely recognized as
      essential, with sub‑goal completion, observation cost, and uncertainty being
      recurring themes.
    disagreements:
    - 'Interaction types covered: some benchmarks focus on click-based grounding,
      others on drag, dynamic video feeds, or combined CLI‑GUI operations, reflecting
      different assumptions about user interface primitives.'
    - 'Evaluation environment fidelity: real macOS desktop (MacAgentBench) versus
      browser‑based simulation (LivingScreen) versus synthetic task generation (ScaleCUA),
      leading to different validity and reproducibility trade‑offs.'
    - 'Optimization target: several works propose new benchmarks for pure evaluation,
      while others introduce training methods (weakly supervised, online RL, skill
      libraries) that use benchmarks to demonstrate performance gains, creating a
      split between evaluators and builders.'
    - 'Uptake of advanced metrics: uncertainty quantification and observation‑control
      metrics are introduced in only a subset of papers, and there is no consensus
      on whether these should become standard reporting requirements.'
    open_questions:
    - How can benchmarks be systematically extended to mobile, cross‑device, and multi‑platform
      scenarios while maintaining reproducibility and task validity?
    - What is the mapping from current evaluation metrics (sub‑goal completion, observation
      cost, UQ calibration) to user‑centric outcomes such as task completion time,
      error rate, and satisfaction?
    - How can observation control capability be quantified and improved in agents
      that currently over‑observe or under‑observe dynamic interfaces?
    - What factors cause the observed weak cross‑model and cross‑interface transferability
      of uncertainty quantification rankings, and can robust UQ be achieved without
      target‑specific re‑evaluation?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 提供多样化、真实的GUI交互任务（桌面、动态视频、拖拽）和环境，使不同模型和框架下的智能体能力具备可比性。
      尚未覆盖: 任务分布是否覆盖所有关键平台（移动端、跨设备）和真实用户工作流，以及任务难度分级是否匹配实际部署需求。
    - 路线: 指标与压力测试设计
      解决的问题: 在任务成功率之外，通过观察效率、不确定性校准、细粒度子目标完成度和空间安全性来评估智能体表现。
      尚未覆盖: 这些代理指标与下游用户价值（如任务完成时间、错误恢复）之间的关联未经验证；不确定性量化方法的跨模型和跨任务鲁棒性有限。
    - 路线: 可比基线与报告规范
      解决的问题: 通过统一评估协议、多框架模型比较和公开工件，使进展可审计，例如多智能体基准套件和系统性UQ研究。
      尚未覆盖: 基准结论在不同实现和算力预算下的稳定性，以及缺乏针对智能体评估的标准化可重复性报告规范。
    共识:
    - 所有研究均依赖多模态视觉‑语言模型作为核心智能体架构，并强调需要超越简单点击的丰富交互方式。
    - 普遍认为现有基准未能捕捉真实世界GUI使用的复杂性，特别是动态内容、多步工作流和观察控制。
    - 超越总体成功率的细粒度评估被广泛认可为必要，子目标完成度、观察成本和不确定性是反复出现的主题。
    分歧:
    - 覆盖的交互类型：部分基准关注基于点击的定位，其他则关注拖拽、动态视频流或CLI‑GUI组合操作，反映了对用户界面基元的不同假设。
    - 评估环境保真度：真实macOS桌面（MacAgentBench） vs 基于浏览器的模拟（LivingScreen） vs 合成任务生成（ScaleCUA），导致有效性和可重复性之间的权衡不同。
    - 优化目标：几项工作提出用于纯评估的新基准，而另一些工作引入训练方法（弱监督、在线RL、技能库）并使用基准展示性能提升，形成评估者与构建者之间的分裂。
    - 先进指标的采用：不确定性量化和观察控制指标仅在一部分论文中被引入，尚未就是否应成为标准报告要求达成共识。
    开放问题:
    - 如何系统地将基准扩展到移动端、跨设备和多平台场景，同时保持可重复性和任务有效性？
    - 当前评估指标（子目标完成度、观察成本、UQ校准）如何映射到以用户为中心的结果，如任务完成时间、错误率和满意度？
    - 如何在当前存在过度观察或观察不足的动态界面智能体中量化并改进观察控制能力？
    - 哪些因素导致不确定性量化排名在跨模型和跨接口下迁移性弱，能否在不进行目标特定重新评估的情况下实现鲁棒的UQ？
