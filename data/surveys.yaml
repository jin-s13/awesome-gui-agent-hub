  related_work_outline:
  - 'Mainstream direction: GUI agent methods built on vision-language models (VLMs)
    are shifting from static click-based tasks to dynamic, drag-based, and long-horizon
    interactions, with growing emphasis on weakly-supervised training, proactive context
    management, and efficient re-execution via program compilation.'
  - 'Shared research pattern: All works rely on large VLMs for screen understanding
    and action grounding; evaluations increasingly move beyond pass@1 to fine-grained,
    multi-checkpoint, uncertainty-aware, and cost-accuracy metrics that isolate agent
    capabilities from framework effects.'
  - 'Key differences: Works differ in the interaction primitives they support (click-only
    vs. drag, CLI, or dynamic screens), the supervision signal (massive unannotated
    screenshots vs. curated expert demonstrations), the action space (direct UI actions
    vs. context management as action vs. state-machine compilation), and the evaluation
    target (benchmark success rate vs. uncertainty calibration vs. runtime efficiency).'
  - 'Trend evolution: Within the 2024–2026 frontier, the field is moving from building
    general desktop/mobile benchmarks to specialized settings (short-video platforms,
    drag interactions, macOS with CLI) and from pure success rates to metrics that
    capture efficiency, uncertainty, and repeated-task speedup.'
  - 'Open questions: It remains unclear whether weakly-supervised grounding generalizes
    to unseen interfaces, why uncertainty quantification rankings fail to transfer
    across model tiers, and how proactive context management or compiled replay can
    handle continuously evolving UIs over arbitrarily long horizons.'
  related_work_outline_zh:
  - 主流方向：基于视觉语言模型的GUI代理方法正从静态点击任务转向动态、拖拽和长时域交互，越来越强调弱监督训练、主动上下文管理以及通过程序编译实现高效重复执行。
  - 研究共性：所有工作都依赖大型视觉语言模型进行屏幕理解和动作定位；评估逐步从Pass@1转向细粒度、多检查点、不确定性感知和成本-准确性指标，以将代理能力与框架效应分离。
  - 关键差异：工作差异体现在支持的交互原语（仅点击 vs. 拖拽、命令行或动态屏幕）、监督信号（海量未标注截图 vs. 精心采集的专家演示）、动作空间（直接UI动作
    vs. 视为动作的上下文管理 vs. 状态机编译）以及评估目标（基准成功率 vs. 不确定性校准 vs. 运行时效率）。
  - 趋势演进：在2024-2026年的前沿中，领域正从构建通用桌面/移动基准转向专门场景（短视频平台、拖拽交互、带命令行的macOS），并从纯粹成功率转向捕捉效率、不确定性和重复任务加速的指标。
  - 开放问题：弱监督定位能否泛化到未见界面、为何不确定性量化排名在跨模型层级转移时失败、主动上下文管理或编译重放能否在任意长时域中应对持续变化的UI，这些问题仍悬而未决。
  literature_review:
    line_of_work_matrix:
    - line: Method representation and objective design
      what_it_solves: Designs training recipes, loss functions, and action representations
        that reduce annotation cost, accelerate repeated tasks, or maintain long-horizon
        coherence—for example, weakly-supervised grounding from unannotated screenshots,
        state-machine compilation of successful runs, and context-as-action primitives.
      what_remains_open: None of these methods have been validated on interfaces that
        undergo frequent layout changes; the robustness of weakly-supervised visual
        grounding beyond the training distribution, and the ability of compiled programs
        or active context fields to adapt to UI drift, remain unmeasured.
    - line: Planning and action-interface methods
      line_zh: ''
      what_it_solves: 'Connects learned screen understanding to decision-time behavior:
        PreAct replaces planning with compiled replay, MemGUI-Agent injects structured
        context management into the policy, and TASKER selects keyframes to bridge
        video-based planning with GUI actions.'
      what_remains_open: The gain attributed to compilation or context management
        has not been isolated from the base VLM’s planning quality; the failure modes
        of these strategies under novel, non-repeating tasks are not characterized.
    - line: Method evidence and ablation protocol
      line_zh: ''
      what_it_solves: 'Provides benchmarks and metrics that disentangle method contribution
        from framework, dataset, and model scale: MacAgentBench’s fine-grained multi-checkpoint
        scoring, Argus’s post-hoc uncertainty quantification, DragOn’s drag-specific
        evaluation, and LivingScreen’s cost-accuracy metric.'
      what_remains_open: Current evidence is limited to single-step grounding or single-run
        trajectories; multi-step, cross-application agent evaluations that report
        uncertainty and efficiency alongside accuracy are still missing, and no benchmark
        studies how methods degrade when UI workflows change over weeks.
    consensus:
    - All evaluated GUI agents are built on top of large vision-language models, and
      their performance is heavily influenced by the underlying model’s visual grounding
      capability rather than the agent framework alone.
    - Fine-grained evaluation metrics (multi-checkpoint, sub-goal completion, cost-accuracy,
      uncertainty calibration) reveal ranking differences that a single pass@1 score
      obscures.
    - Current agents exhibit poor observation control in dynamic interfaces, leading
      to over-observation or under-observation as the dominant failure mode.
    - 'Data efficiency is a shared concern: methods that exploit unannotated screenshots
      or compile successful runs aim to reduce reliance on expensive human demonstrations
      or repeated LLM calls.'
    disagreements:
    - 'Supervision paradigm: GUICrafter uses weak supervision from massive unannotated
      screenshots, while MemGUI-Agent relies on curated trajectories with explicit
      context-action annotations.'
    - 'Interaction scope: DragOn targets drag-based interactions (resize, slider,
      highlight), MacAgentBench covers GUI+CLI workflows, and LivingScreen addresses
      dynamic, content-changing interfaces—each requiring different grounding and
      action representations.'
    - 'Evaluation focus: Argus emphasizes uncertainty calibration and conformal coverage,
      whereas PreAct optimizes for runtime efficiency on repeated tasks, and LivingScreen
      introduces a cost-accuracy trade-off.'
    - 'Context handling: MemGUI-Agent treats context management as a first-class action
      emitted by the policy, while PreAct eliminates per-step LLM calls entirely by
      compiling runs into deterministic state machines.'
    - 'Deployment environment: mobile (MemGUI-Agent), desktop/macOS (MacAgentBench,
      PreAct), web-based short-video platforms (LivingScreen), and video-guided tasks
      (VG-GUIBench) each impose distinct latency, screen resolution, and input modality
      constraints.'
    open_questions:
    - Can weakly-supervised grounding from unannotated screenshots learn reliable
      action targeting when the visual style or widget set differs significantly from
      the training corpus?
    - Why does post-hoc uncertainty quantification ranking transfer well within the
      same model tier but nearly vanish when moving from open-weight to closed-source
      agents, and what does this imply for safety-critical deployments?
    - What is the upper bound of fine-tuning on drag-specific datasets, and do improvements
      in drag grounding transfer to composite tasks that mix drag, click, and type
      actions?
    - How do proactive context management policies degrade as the task horizon extends
      beyond the MemGUI-Bench length, and can the context folding thresholds be learned
      automatically rather than set manually?
    - Can state-machine compilation handle UI updates that change element positions
      or labels, and what fallback frequency is acceptable before the speedup advantage
      is lost?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 方法表示与目标设计
      解决的问题: 设计训练配方、损失函数和动作表示，以降低标注成本、加速重复任务或保持长时域连贯性——例如，利用未标注截图的弱监督定位、将成功运行编译为状态机，以及将上下文管理作为动作原语。
      尚未覆盖: 这些方法均未在频繁布局变化的界面上验证；弱监督视觉定位在训练分布之外的鲁棒性，以及编译程序或主动上下文字段适应UI漂移的能力，尚未得到测量。
    - 路线: 规划与动作接口方法
      解决的问题: 将学习到的屏幕理解连接到决策时行为：PreAct用编译重放替代规划，MemGUI-Agent将结构化上下文管理注入策略，TASKER选择关键帧以桥接视频规划与GUI动作。
      尚未覆盖: 编译或上下文管理带来的增益尚未与基础VLM的规划质量隔离；这些策略在新型非重复任务下的失败模式未得到表征。
    - 路线: 方法证据与消融协议
      解决的问题: 提供基准和指标，将方法贡献与框架、数据集和模型规模分离：MacAgentBench的细粒度多检查点评分、Argus的后验不确定性量化、DragOn的拖拽特定评估，以及LivingScreen的成本-准确性指标。
      尚未覆盖: 当前证据仅限于单步定位或单次运行轨迹；仍然缺少跨应用、多步代理评估，同时报告不确定性、效率和准确性，并且没有基准研究当UI工作流在数周内变化时方法如何退化。
    共识:
    - 所有评估的GUI代理都构建在大型视觉语言模型之上，其性能主要取决于底层模型的视觉定位能力，而非代理框架本身。
    - 细粒度评估指标（多检查点、子目标完成度、成本-准确性、不确定性校准）揭示了单一Pass@1分数所掩盖的排名差异。
    - 当前代理在动态界面上缺乏观察控制，过度观察或观察不足是主要失败模式。
    - 数据效率是共同关注点：利用未标注截图或编译成功运行的方法，旨在减少对昂贵人工演示或重复LLM调用的依赖。
    分歧:
    - 监督范式：GUICrafter使用海量未标注截图的弱监督，而MemGUI-Agent依赖带有明确上下文-动作标注的精心采集轨迹。
    - 交互范围：DragOn针对拖拽交互（调整大小、滑块、高亮），MacAgentBench覆盖GUI+CLI工作流，LivingScreen处理动态内容变化界面——各自需要不同的定位和动作表示。
    - 评估焦点：Argus强调不确定性校准和共形覆盖，而PreAct优化重复任务的运行时效率，LivingScreen引入成本-准确性权衡。
    - 上下文处理：MemGUI-Agent将上下文管理作为策略发出的第一类动作，而PreAct通过将运行编译为确定性状态机，完全消除每步LLM调用。
    - 部署环境：移动端（MemGUI-Agent）、桌面/macOS（MacAgentBench、PreAct）、基于Web的短视频平台（LivingScreen）和视频引导任务（VG-GUIBench），各自施加不同的延迟、屏幕分辨率和输入模态约束。
    开放问题:
    - 当视觉风格或控件集与训练语料显著不同时，从未标注截图学习的弱监督定位能否可靠地瞄准动作目标？
    - 为何后验不确定性量化排名在同一模型层级内迁移良好，但在从开源权重转移到闭源代理时几乎消失？这对安全关键部署意味着什么？
    - 在拖拽特定数据集上微调的性能上限是什么？拖拽定位的改进是否能迁移到混合拖拽、点击和打字的复合任务？
    - 随着任务时域超出MemGUI-Bench的长度，主动上下文管理策略如何退化？上下文折叠阈值能否自动学习，而非手动设置？
    - 状态机编译能否处理改变元素位置或标签的UI更新？在加速优势丧失之前，可接受的回退频率是多少？
