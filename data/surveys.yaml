  related_work_outline_zh:
  - 主流方向：GUI智能体研究正从单步基础转向跨桌面、移动和Web的长时域多步任务，重点关注可靠性（不确定性量化、安全性）、自主学习和可扩展评估。
  - 研究共性：多数工作以视觉-语言模型为核心智能体，引入新基准或协议暴露失败模式（上下文退化、领域条件安全、工件精度），并提出架构或训练干预。
  - 关键差异：工作在交互模式（端到端策略 vs. 解耦观察）、监督信号（人类演示、自主评估器、手工攻击）、评估时域（单步 vs. 多轮链）和目标平台（浏览器、桌面、移动）上存在分歧。
  - 趋势演进：所有证据均来自2026年，表明前沿正朝着长时域、安全感知和自我改进的智能体发展；趋势处于当前前沿内，无更早年份可供比较。
  - 开放问题：如何实现跨平台安全泛化、自主奖励的可扩展噪声校正、UQ向闭源模型的迁移，以及在不丢失任务相关信息的前提下进行高效上下文管理。
  literature_review:
    line_of_work_matrix:
    - line: Taxonomy and roadmap synthesis
      what_it_solves: Organizes GUI agent research into categories such as benchmarking,
        context management, safety analysis, and learning paradigms, identifying milestones
        and gaps.
      what_remains_open: Whether the proposed taxonomy captures all emerging sub-areas
        (e.g., tutorial generation, fraud detection) and whether the roadmap is grounded
        in systematic evidence rather than selective examples.
    - line: Comparative evaluation synthesis
      what_it_solves: Summarizes how different evaluation choices (single-step vs.
        multi-turn, browser vs. desktop vs. mobile, hand-crafted vs. RL-optimized
        attacks) shape conclusions about agent capabilities.
      what_remains_open: The compatibility of results across settings is uncertain;
        for instance, safety resistance observed in browser tasks does not transfer
        to coding domains, and UQ ranking transfer is weak across model tiers.
    - line: Open problem and gap mapping
      what_it_solves: Converts broad literature coverage into concrete next research
        questions, such as long-horizon context management, cross-domain safety, and
        noise-resilient autonomous learning.
      what_remains_open: Prioritization of which gaps (e.g., session management vs.
        artifact precision) most critically limit progress, and how to design unified
        benchmarks that cover multiple failure modes simultaneously.
    consensus:
    - Current GUI agents struggle with long-horizon tasks due to context degradation
      and session management issues.
    - Vision-language models are the dominant backbone, but their reliability varies
      across domains and evaluation protocols.
    - Benchmarks are essential for exposing failure modes, and there is a shared interest
      in moving beyond single-step, simplified evaluations.
    - Safety and alignment are recognized as important, but current hardening is domain-conditioned
      and does not generalize.
    disagreements:
    - 'Context management strategy: proactive context-as-action vs. signal-driven
      observation decoupling vs. implicit reliance on long-context models.'
    - 'Evaluation protocol: single-turn prompting with all tasks upfront vs. multi-turn
      sequential revelation, leading to different failure profiles.'
    - 'Safety evaluation: hand-crafted attacks show near-zero success on browser tasks
      but high success on coding tasks, suggesting disagreement on whether safety
      should be measured per domain or holistically.'
    - 'Learning paradigm: supervised fine-tuning from human demonstrations vs. RL
      with autonomous noisy rewards, with differing assumptions about scalability
      and reward quality.'
    open_questions:
    - How can context management scale to extremely long horizons without losing critical
      task state?
    - Can safety hardening be made domain-agnostic, or must it remain conditioned
      on the interaction surface?
    - What is the most effective way to correct noise in autonomous evaluation rewards
      for RL training?
    - How do UQ methods transfer across model architectures and access levels (open-weight
      vs. closed-source)?
