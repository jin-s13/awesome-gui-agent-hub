    研究路线矩阵:
    - 路线: 基准与评估协议设计
      解决的问题: 创建受控环境以衡量GUI代理在视频引导交互、不确定性校准、欺诈检测、攻击下的安全性以及长时程任务链等维度上的能力，揭示当前模型的失败之处。
      尚未覆盖: 由于假设不同（如单步与多步、URL可见性），各基准的结果往往不可比较；真实世界分布偏移和标准化评估协议的缺失限制了泛化性结论。
    - 路线: 通过上下文、学习和演示增强代理能力
      解决的问题: 通过主动上下文管理、使用自主评估器的RL微调以及从人类屏幕录制自动生成教程，提升代理在复杂任务上的表现，解决上下文崩溃和数据稀缺问题。
      尚未覆盖: 方法在狭窄的平台特定基准上验证；自主奖励信号的可扩展性和上下文管理策略的跨平台迁移性尚未得到证明。
    - 路线: 安全与可靠性评估
      解决的问题: 量化提示注入的脆弱性并测量GUI基础中的不确定性，表明安全性是领域条件的，且事后不确定性方法可提供选择性校准。
      尚未覆盖: 安全加固无法跨领域泛化（浏览器与编码）；不确定性量化跨模型层级的迁移较弱，且集成到实时代理执行中尚未探索。
    共识:
    - 视觉语言模型作为GUI代理的通用骨干，处理截图和指令以生成动作。
    - 任务成功率是主要指标，但它对评估协议细节（如步骤粒度和环境重置）敏感。
    - 当前代理在长时程、安全关键或分布外任务上表现出显著的失败率，推动了对更好基准和训练方法的需求。
    - 自主或学习的评估信号（如VLM评判器、噪声校正奖励）正作为人工验证的可扩展替代方案出现。
    分歧:
    - 评估粒度：部分基准评估单步基础，而其他基准要求多步轨迹，导致关于模型能力的结论不同。
    - 攻击与防御范围：安全评估在使用手工制作与RL优化的注入字符串上存在差异，关于代理抵抗力的发现取决于攻击面是否包含编码领域。
    - 训练方法：方法涵盖从零样本提示到在策划轨迹上的监督微调，再到使用自主奖励的在线RL，尚无在所有设置下均胜出的方案。
    - 上下文表示：部分代理被动累积历史，而其他代理主动管理结构化上下文字段，完整性与效率之间的权衡尚未解决。
    开放问题:
    - 如何标准化评估协议，以实现异构GUI代理基准和交互模态间的公平比较？
    - 在一个领域（如浏览器）训练的安全机制能在多大程度上迁移到其他领域（如编码、移动），什么导致了领域条件的脆弱性？
    - 不确定性量化能否从事后分析转向在线决策，并提高代理在部署中的可靠性？
    - 在不超出模型上下文窗口或引入干扰噪声的前提下，保留任务相关信息的最小上下文表示是什么？
