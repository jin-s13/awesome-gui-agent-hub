  related_work_outline:
  - 'Mainstream direction: Researchers are building more realistic and diverse GUI/desktop
    agent benchmarks, moving from static screenshots to dynamic, multimodal environments
    with fine-grained evaluation.'
  - 'Shared research pattern: New benchmarks emphasize task realism, multimodal interaction
    (GUI + CLI, video), and detailed metrics that capture sub-goal completion, cost-efficiency,
    and uncertainty.'
  - 'Key differences: Benchmarks differ in platform (macOS, short-video platforms,
    video-guided tasks), interaction type (click, drag, observation control), and
    evaluation dimensions (Pass@1, cost-accuracy, UQ rankings).'
  - 'Trend evolution: The evidence from 2024–2026 shows a rapid expansion toward living-screen,
    video-guided, and drag-based tasks, with a strong focus on reproducibility and
    weak-supervision to scale evaluation.'
  - 'Open questions: Cross-platform generalization of agent performance, alignment
    between proxy metrics and real user utility, and robustness under distribution
    shift remain largely unaddressed.'
  related_work_outline_zh:
  - 主流方向：研究者正在构建更真实、多样化的GUI/桌面代理基准，从静态截图转向动态、多模态环境，并采用细粒度评估。
  - 研究共性：新基准强调任务真实感、多模态交互（GUI+CLI、视频）和超越简单成功率的详细指标，如子目标完成度、成本效率、不确定性。
  - 关键差异：基准在平台（macOS、短视频、视频引导）、交互类型（点击、拖拽、观察控制）和评估维度（Pass@1、成本-准确性、UQ排名）上存在差异。
  - 趋势演进：2024-2026年证据显示该领域迅速向动态屏幕、视频引导和拖拽任务扩展，同时注重可复现性和弱监督规模化评估。
  - 开放问题：代理性能的跨平台泛化、代理指标与真实用户效用的一致性，以及分布偏移下的鲁棒性等问题仍未充分解决。
  literature_review:
    line_of_work_matrix:
    - line: Realistic desktop OS benchmarks with fine-grained evaluation
      what_it_solves: Provides comprehensive, deterministic rule-based scoring across
        many real applications and GUI+CLI interactions, revealing sub-goal completion
        differences hidden by aggregate success rates.
      what_remains_open: Limited to one OS (macOS) and a fixed set of 25 apps; scaling
        to other platforms and long-horizon multi-app workflows is not yet demonstrated.
    - line: Dynamic and video-guided task benchmarks
      what_it_solves: Captures interfaces where content changes between actions, and
        formally evaluates observation control and information efficiency beyond task
        completion, addressing a gap in static screenshot benchmarks.
      what_remains_open: Restricted to short-video platforms or specific video datasets;
        generalization to other dynamic UIs (games, streaming) and integration with
        continuous control policies remain open.
    - line: Interaction-type-specific benchmarks (drag, grounding) and uncertainty
        quantification
      what_it_solves: Expands GUI agent evaluation to drag-based interactions and
        quantifies prediction confidence, enabling localized reliability assessment
        and safer spatial actions.
      what_remains_open: Current UQ benchmarks only cover single-step grounding, not
        multi-step trajectories; drag coverage is limited to four interaction types,
        and cross-interface UQ transfer is weak.
    - line: Scalable training and evaluation via verifiable task synthesis and weak
        supervision
      what_it_solves: Reduces reliance on expensive human annotation by generating
        large-scale verifiable RL tasks or leveraging unannotated screenshots, enabling
        systematic benchmarking of agent learning curves.
      what_remains_open: Synthesized task distributions may not fully reflect real
        user intent; the long-term stability of benchmark conclusions under different
        compute budgets and training seeds is unverified.
    consensus:
    - Aggregate success rates are insufficient; fine-grained metrics (step-level,
      cost-accuracy, sub-goal completion) are necessary to distinguish agent capabilities.
    - Realistic, dynamic environments with multimodal interaction provide a more faithful
      testbed than static, simplified screenshots.
    - Open-source artifacts, deterministic evaluation logic, and reproducibility are
      critical for fair comparison across models and frameworks.
    disagreements:
    - 'Evaluation targets differ: some benchmarks focus on final task completion,
      while others integrate interaction cost (e.g., number of observations) into
      the primary metric.'
    - 'Environment scope varies: single-OS desktop versus cross-platform web/mobile
      versus dedicated video-based simulation, leading to incomparable difficulty
      and skill requirements.'
    - 'Supervision paradigm: methods like GUICrafter and ScaleCUA emphasize weak or
      synthesized supervision for agent training, while Argus and DragOn concentrate
      on evaluation without training, creating a split between training-centric and
      evaluation-centric benchmarks.'
    open_questions:
    - How can we design a unified benchmark that spans desktop, mobile, and web with
      consistent difficulty and metric definitions?
    - To what extent do fine-grained proxy metrics (e.g., sub-goal accuracy, uncertainty
      calibration) correlate with user satisfaction in real-world deployments?
    - Can uncertainty quantification and conformal prediction methods remain reliable
      when transferring from single-step grounding to full multi-step task execution?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实桌面操作系统基准与细粒度评估
      解决的问题: 提供跨多个真实应用和GUI+CLI交互的全面、确定性基于规则的评分，揭示被总体成功率掩盖的子目标完成差异。
      尚未覆盖: 仅限单一操作系统（macOS）和固定的25个应用；尚未证明可扩展到其他平台和长周期多应用工作流。
    - 路线: 动态与视频引导任务基准
      解决的问题: 捕捉操作之间内容变化的界面，正式评估观察控制和信息效率，填补静态截图基准的空白。
      尚未覆盖: 限于短视频平台或特定视频数据集；泛化到其他动态UI（游戏、直播）以及与连续控制策略的集成仍未解决。
    - 路线: 特定交互类型基准（拖拽、接地）与不确定性量化
      解决的问题: 将GUI代理评估扩展到拖拽交互，并量化预测置信度，支持局部可靠性评估和更安全的空间操作。
      尚未覆盖: 当前UQ基准仅覆盖单步接地，未涉及多步轨迹；拖拽覆盖限于四种交互类型，跨界面UQ迁移弱。
    - 路线: 通过可验证任务合成与弱监督实现规模化训练与评估
      解决的问题: 通过生成大规模可验证RL任务或利用未标注截图，减少对昂贵人工标注的依赖，支持对代理学习曲线的系统基准测试。
      尚未覆盖: 合成任务分布可能不完全反映真实用户意图；在不同计算预算和训练种子下基准结论的长期稳定性未经验证。
    共识:
    - 总体成功率不足以区分代理能力，需要细粒度指标（步骤级、成本-准确性、子目标完成度）。
    - 真实、动态的多模态交互环境比静态简化的截图提供更可靠的测试平台。
    - 开源工件、确定性评估逻辑和可复现性对于跨模型和框架的公平比较至关重要。
    分歧:
    - 评估目标不同：部分基准关注最终任务完成，而其他将交互成本（如观察次数）纳入首要指标。
    - 环境范围不一：单一操作系统桌面、跨平台网页/移动与专用视频模拟之间存在差异，导致难度和技能要求不可比。
    - 监督范式：GUICrafter、ScaleCUA等方法强调弱监督或合成监督用于代理训练，而Argus、DragOn等聚焦于评估而不涉及训练，形成以训练为中心和以评估为中心的基准之间的分野。
    开放问题:
    - 如何设计一个横跨桌面、移动和网页的统一基准，并保持难度和指标定义一致？
    - 细粒度代理指标（如子目标准确率、不确定性校准）在多大程度上与真实部署中的用户满意度相关？
    - 不确定性量化和共形预测方法在从单步接地迁移到完整多步任务执行时能否保持可靠？
