  - 'Mainstream direction: Building benchmarks and methods for GUI agents that operate
    across diverse real-world application domains—desktop, mobile, web, and video
    platforms—with a focus on task completion accuracy, interaction mode coverage,
    and agent efficiency.'
  - 'Shared research pattern: Most works construct a task suite or environment (e.g.,
    macOS apps, short-video platforms, drag interactions) and evaluate multimodal
    agents using proprietary or open-weight vision-language models; they highlight
    gaps between current agent capabilities and human performance, often proposing
    a technique to close the gap (skill libraries, keyframe extraction, history-aware
    critics).'
  - 'Key differences: Papers diverge in the interaction mode they target (click, drag,
    video-guided, CLI+GUI), the deployment context (desktop OS, mobile web, SMS-to-web),
    the evaluation target (task success vs. speed vs. fraud detection), and the architectural
    intervention (external skill library vs. compiled state machine vs. critic-in-the-loop).'
  - 'Trend evolution: Within the 2024–2026 window, the field is moving from static
    click-based benchmarks to dynamic and multimodal settings (video, drag, SMS-to-web)
    and from pure agent evaluation to agent augmentation for efficiency and reliability,
    though evidence is limited to the current frontier.'
  - 'Open questions: How well do these agents generalize across unseen applications,
    platforms, and interaction modalities? Can observation-control mechanisms be made
    robust to dynamic content? What are the trade-offs between speed optimizations
    and robustness to UI changes? How do safety-critical applications like fraud detection
    perform when reputation shortcuts are unavailable?'
