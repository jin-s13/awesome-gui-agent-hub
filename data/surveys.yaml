  related_work_outline:
  - 'Mainstream direction: Developing richer benchmarks and methods that push GUI
    agents beyond static click-based tasks toward dynamic, long-horizon, multi-application,
    and diverse interaction modes, while simultaneously improving reliability, efficiency,
    and data efficiency through modular augmentation and post-hoc validation.'
  - 'Shared research pattern: All works rely on multimodal vision-language models
    as the core agent, evaluate on curated task suites that expose specific failure
    modes (e.g., over-observation, lack of drag grounding, context collapse), and
    propose either a new evaluation protocol or a targeted capability enhancement
    to address those gaps.'
  - 'Key differences: They diverge in the interaction primitives they target (click,
    drag, CLI, dynamic content), the evaluation dimensions they prioritize (pass/fail
    accuracy, fine-grained sub-goal completion, cost-accuracy tradeoff, uncertainty
    calibration), and the improvement strategy (skill retrieval, weak supervision
    from unannotated screenshots, proactive context management, program compilation,
    or post-hoc uncertainty quantification).'
  - 'Trend evolution: Within the 2024–2026 window, the frontier moves from static,
    single-step benchmarks to multi-step, dynamic, and long-horizon tasks, with a
    growing emphasis on efficiency (speed, cost), reliability (uncertainty, fallback),
    and reducing annotation cost, reflecting a shift from feasibility to deployability.'
  - 'Open questions: How to extend single-step uncertainty quantification into multi-step
    agent planning and recovery; how to formally model observation control to prevent
    over-/under-observation in dynamic streams; whether compiled state-machine replays
    can maintain safety under UI drift; and how to combine skill libraries with weak
    supervision to achieve low-cost, high-reliability agents in open-ended settings.'
  related_work_outline_zh:
  - 主流方向：构建更丰富的基准和方法，推动GUI代理超越静态点击任务，迈向动态、长时域、多应用和多样化交互模式，同时通过模块化增强和事后验证来提高可靠性、效率和数据效率。
  - 研究共性：所有工作都依赖多模态视觉语言模型作为核心代理，在精心设计的任务集上评测，暴露特定失败模式（如过度观察、缺乏拖拽定位、上下文崩溃），并提出新的评估协议或针对性的能力增强来解决这些缺陷。
  - 关键差异：差异体现在交互原语（点击、拖拽、CLI、动态内容）、评测维度（通过率、细粒度子目标完成度、成本-准确性权衡、不确定性校准）以及改进策略（技能检索、从未标注截图弱监督、主动上下文管理、程序编译或事后不确定性量化）。
  - 趋势演进：在2024–2026年窗口内，前沿从静态、单步基准转向多步、动态和长时域任务，并越来越重视效率（速度、成本）、可靠性（不确定性、回退）和降低标注成本，体现从可行性到可部署性的转变。
  - 开放问题：如何将单步不确定性量化扩展到多步代理规划和恢复；如何形式化观察控制以预防动态流中的过度/不足观察；编译的状态机重放在UI漂移下能否保持安全；如何将技能库与弱监督结合，在开放场景中实现低成本、高可靠性的代理。
  literature_review:
    line_of_work_matrix:
    - line: Benchmarking and task abstraction for GUI agents
      what_it_solves: Systematically defines evaluation tasks, interaction primitives
        (click, drag, CLI, dynamic content), and metrics to measure agent capabilities
        and expose failure modes that are invisible to coarse pass/fail scores.
      what_remains_open: Most benchmarks are tied to a specific platform or interaction
        type; cross-platform generalization and multi-step uncertainty quantification
        are not evaluated; human baselines are sparse and often limited to accuracy
        rather than efficiency or safety.
    - line: Agent capability enhancement via auxiliary knowledge and training
      what_it_solves: Improves long-horizon, multi-application performance by providing
        structured multimodal skill libraries, managing context proactively, or leveraging
        weak supervision from massive unannotated screenshots to reduce annotation
        cost.
      what_remains_open: Composability of skill retrieval, context management, and
        weak supervision has not been tested; generalization to unseen applications
        and tasks remains unverified; the trade-off between data efficiency and reliability
        under distribution shift is not systematically explored.
    - line: Reliability and efficiency frameworks
      what_it_solves: Enhances agent trustworthiness and speed by quantifying prediction
        uncertainty for single-step grounding, compiling successful runs into verifiable
        state-machine programs for fast replay, and introducing runtime checks with
        fallback to prevent error accumulation.
      what_remains_open: Uncertainty quantification is currently limited to single-step
        grounding and does not guide multi-step planning; compilation methods assume
        task repeatability and rely on screen-state matching that may fail under UI
        changes; safety guarantees in continuously evolving environments are not validated.
    consensus:
    - Multimodal vision-language models are the de facto engine for GUI agents, but
      they consistently fail on tasks requiring fine-grained observation control,
      long-term context maintenance, or precise manipulation beyond simple clicks.
    - Fine-grained, multi-dimensional evaluation (sub-goal completion, cost-accuracy,
      UQ calibration) is necessary to diagnose agent failures and guide improvement,
      and pass/fail accuracy alone is insufficient.
    - There is a shared recognition that agents need stronger reliability mechanisms—whether
      through uncertainty estimation, runtime verification, or fallback strategies—and
      that current models lack built-in observation control and context management.
    disagreements:
    - 'The choice of evaluation protocol: deterministic rule-based scoring, model-based
      judges, and human evaluation are used in different works, leading to potentially
      incomparable conclusions about model capability and limiting cross-benchmark
      generalization.'
    - 'The preferred path to improvement: some works augment agents with external
      skill libraries or context management modules, others rely on data-driven training
      (weak supervision, fine-tuning on interaction datasets), and a third group applies
      post-hoc reliability layers (uncertainty quantification, compilation and replay);
      no single paradigm has emerged as dominant.'
    - 'The scope of interaction primitives: while most benchmarks historically focused
      on click and type, some works now emphasize drag, CLI, or dynamically changing
      content, revealing a fragmentation in what constitutes a “complete” GUI agent
      and no unified interaction abstraction.'
    open_questions:
    - How can post-hoc uncertainty quantification for single-step grounding be extended
      to inform multi-step planning, recovery, and human hand-off decisions?
    - What formal model of observation control can explain and prevent the over- and
      under-observation failures observed in dynamic environments such as short-video
      platforms?
    - Can compiled state-machine replays maintain safety guarantees when the underlying
      application UI changes, and how can we detect unsafe drift without falling back
      to the full agent on every step?
    - Is it possible to combine skill libraries and weak supervision to achieve both
      low annotation cost and high reliability in open-ended real-world tasks, and
      what are the minimal assumptions needed for such a combination to work?
  literature_review_zh:
    研究路线矩阵:
    - 路线: GUI代理的基准测试与任务抽象
      解决的问题: 系统定义评估任务、交互原语（点击、拖拽、CLI、动态内容）和度量指标，以测量代理能力并暴露粗粒度通过率无法揭示的失败模式。
      尚未覆盖: 多数基准绑定特定平台或交互类型；跨平台泛化与多步不确定性量化未评估；人类基线稀疏且多限于准确率，缺乏效率或安全性对比。
    - 路线: 通过辅助知识与训练增强代理能力
      解决的问题: 通过提供结构化多模态技能库、主动管理上下文或利用海量未标注截图进行弱监督，改善长时域、多应用任务的性能，降低标注成本。
      尚未覆盖: 技能检索、上下文管理和弱监督的可组合性未测试；对未见应用和任务的泛化未验证；分布偏移下数据效率与可靠性的权衡未系统探索。
    - 路线: 可靠性与效率框架
      解决的问题: 通过量化单步定位的不确定性、将成功运行编译为可验证状态机程序以加速重放、引入运行时检查与回退防止错误积累，增强代理的可信度和速度。
      尚未覆盖: 不确定性量化目前限于单步定位，未指导多步规划；编译方法假设任务可重复，依赖屏幕状态匹配，在UI变化时可能失效；在持续演化环境中的安全保证未验证。
    共识:
    - 多模态视觉语言模型是当前GUI代理的事实引擎，但在需要精细观察控制、长程上下文维护或超越简单点击的精确操作时一致失败。
    - 细粒度、多维度的评估（子目标完成度、成本-准确性、UQ校准）对于诊断代理失败和指导改进是必要的，仅看通过率不够。
    - 研究者普遍认识到代理需要更强的可靠性机制——无论通过不确定性估计、运行时验证还是回退策略——而当前模型缺乏内置的观察控制和上下文管理。
    分歧:
    - 评估协议选择：不同工作分别采用确定性规则评分、基于模型的评判或人类评估，导致模型能力结论可能不可比，限制了跨基准泛化。
    - 改进路径偏好：部分工作通过外部技能库或上下文管理模块增强代理，另一些依赖数据驱动训练（弱监督、在交互数据集上微调），第三类应用事后可靠性层（不确定性量化、编译与重放）；尚无占主导地位的范式。
    - 交互原语的范围：尽管多数基准历史上聚焦点击和键入，一些工作现在强调拖拽、CLI或动态变化内容，这反映出对“完整”GUI代理构成要素的认知碎片化，缺少统一的交互抽象。
    开放问题:
    - 如何将单步定位的事后不确定性量化扩展到指导多步规划、恢复和人工交接决策？
    - 什么样的观察控制形式模型能解释并预防短视频平台等动态环境中观察到的过度/不足观察失败？
    - 编译的状态机重放在底层应用UI变化时能否保持安全保证，以及如何在不每步回退到完整代理的情况下可靠检测不安全漂移？
    - 是否可能结合技能库和弱监督，在开放真实世界任务中同时实现低标注成本和高可靠性，这种组合所需的最小假设是什么？
