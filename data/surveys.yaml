  related_work_outline:
  - 'Mainstream direction: Building GUI agents that reduce reliance on expensive human
    annotations through weakly-supervised or online reinforcement learning, while
    improving long-horizon task performance via context management and accelerating
    repeated task execution through program compilation.'
  - 'Shared research pattern: Moving beyond static, click-only benchmarks toward dynamic,
    multi-application, and fine-grained evaluation that captures sub-goal completion,
    observation control, drag interactions, and uncertainty calibration.'
  - 'Key differences: Training paradigms diverge into weak supervision from unlabeled
    screenshots, online multi-turn RL on live websites, and supervised fine-tuning
    with structured context actions; evaluation targets split among task success,
    inference speed, and uncertainty quality.'
  - 'Trend evolution: Within the 2024–2026 frontier, the field is shifting from single-metric
    task success to multi-dimensional assessment, from static offline datasets to
    live interactive environments, and from monolithic agent architectures to modular
    designs with explicit context management and replay mechanisms.'
  - 'Open questions: How well do weakly-supervised and online RL methods transfer
    across platforms and dynamic interfaces? Can uncertainty quantification remain
    calibrated under distribution shift in multi-step deployments? What are the limits
    of context management as task horizons grow unboundedly?'
  related_work_outline_zh:
  - 主流方向：构建通过弱监督或在线强化学习减少对昂贵人工标注依赖的GUI代理，同时通过上下文管理提升长时域任务表现，并通过程序编译加速重复任务执行。
  - 研究共性：超越静态、仅点击的基准测试，转向动态、多应用、细粒度的评估，捕捉子目标完成度、观察控制、拖拽交互和不确定性校准。
  - 关键差异：训练范式分化为利用未标注截图的弱监督、在真实网站上的在线多轮强化学习，以及带有结构化上下文动作的监督微调；评估目标在任务成功率、推理速度和不确定性质量之间分化。
  - 趋势演进：在2024–2026前沿内，领域正从单一任务成功率转向多维评估，从静态离线数据集转向实时交互环境，从单体代理架构转向具有显式上下文管理和重放机制的模块化设计。
  - 开放问题：弱监督和在线强化学习方法在不同平台和动态界面上的迁移能力如何？不确定性量化在多步部署中面临分布偏移时能否保持校准？当任务时域无限增长时，上下文管理的极限在哪里？
  literature_review:
    line_of_work_matrix:
    - line: Weakly-supervised and data-efficient training
      what_it_solves: Reducing dependence on costly human-annotated GUI trajectories
        by leveraging large-scale unlabeled screenshots and web pages for visual grounding,
        then calibrating with minimal annotated data.
      what_remains_open: Generalization to highly dynamic interfaces where visual
        context changes rapidly, and whether the curriculum design transfers to non-web
        or non-mobile platforms.
    - line: Online multi-turn reinforcement learning on live environments
      what_it_solves: Training visual web agents through direct interaction with real
        websites, using trajectory-level success signals to improve policy robustness
        beyond static datasets.
      what_remains_open: Sample efficiency and safety during online exploration, and
        scalability to a broader range of websites and task types beyond shopping
        and information retrieval.
    - line: Proactive context management for long-horizon tasks
      what_it_solves: Preventing context overload in extended mobile GUI tasks by
        treating context management as first-class actions that fold history and retain
        critical facts.
      what_remains_open: Optimal context retention strategies across varying task
        lengths and model scales, and integration with external memory or retrieval
        mechanisms.
    - line: Execution acceleration via program compilation and replay
      what_it_solves: Eliminating per-step language model calls on repeated tasks
        by compiling successful runs into state-machine programs with runtime screen-checking
        and fallback.
      what_remains_open: Robustness to UI changes and environment drift over time,
        and the maintenance cost of stored programs as tasks evolve.
    - line: Comprehensive benchmarking with fine-grained evaluation
      what_it_solves: Revealing agent weaknesses beyond pass/fail rates by measuring
        sub-goal completion, observation control, drag interaction capability, and
        uncertainty calibration across diverse platforms.
      what_remains_open: Coverage remains limited to specific platforms (macOS, short-video,
        drag-based) and interaction types; the gap between benchmark metrics and real-world
        deployment reliability is unquantified.
    - line: Post-hoc uncertainty quantification for GUI grounding
      what_it_solves: Providing confidence estimates for single-step grounding actions
        to enable safer deployment, with systematic comparison of 27 UQ methods across
        models and datasets.
      what_remains_open: Transfer of UQ rankings across model tiers and interfaces
        is weak; calibration degrades under distribution shift, and extension to multi-step
        agent trajectories is unexplored.
    consensus:
    - Current GUI agents lack observation control on dynamic interfaces, leading to
      over- or under-observation failures.
    - Fine-grained metrics (sub-goal completion, cost-accuracy, uncertainty calibration)
      expose capability differences that single success rates hide.
    - Leveraging unlabeled screenshots or online interaction can drastically reduce
      the need for human-annotated training data.
    - Context management is critical for long-horizon tasks, as passive history accumulation
      degrades performance.
    - Reusing successful execution traces can significantly accelerate repeated task
      completion without per-step model inference.
    disagreements:
    - 'Training signal: weak supervision from static unlabeled screenshots versus
      online multi-turn RL with live environment feedback versus supervised fine-tuning
      on curated trajectories with context actions.'
    - 'Evaluation priority: task completion success versus inference speed and cost
      versus uncertainty calibration quality.'
    - 'Interaction scope: click-based grounding versus drag-based manipulation; static
      screens versus dynamic, continuously changing interfaces.'
    - 'Deployment setting: mobile (Android) versus desktop (macOS) versus web browsers,
      each with distinct UI semantics and action spaces.'
    open_questions:
    - Can weakly-supervised visual grounding trained on static screenshots adapt to
      interfaces where content changes between actions?
    - How does online RL training handle safety-critical tasks where exploration errors
      have real consequences?
    - Do post-hoc UQ methods maintain calibration across multi-step trajectories when
      the agent's own actions shift the input distribution?
    - What is the maximum effective task horizon for proactive context management
      before information loss becomes inevitable?
    - Can program-compilation replay methods generalize to tasks with high UI variability
      without frequent fallback to the original agent?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 弱监督与数据高效训练
      解决的问题: 通过利用大规模未标注截图和网页进行视觉定位，减少对昂贵人工标注GUI轨迹的依赖，然后用极少量标注数据校准。
      尚未覆盖: 对视觉上下文快速变化的高度动态界面的泛化能力，以及课程设计能否迁移到非网页或非移动平台。
    - 路线: 基于真实环境的在线多轮强化学习
      解决的问题: 通过与真实网站直接交互训练视觉网页代理，利用轨迹级成功信号提升策略鲁棒性，超越静态数据集。
      尚未覆盖: 在线探索的样本效率和安全性，以及向购物和信息检索之外更广泛网站和任务类型的可扩展性。
    - 路线: 面向长时域任务的主动上下文管理
      解决的问题: 通过将上下文管理视为第一类动作，折叠历史并保留关键事实，防止扩展移动GUI任务中的上下文过载。
      尚未覆盖: 在不同任务长度和模型规模下的最优上下文保留策略，以及与外部记忆或检索机制的集成。
    - 路线: 通过程序编译与重放加速执行
      解决的问题: 将成功运行编译为带有运行时屏幕检查和回退机制的状态机程序，消除重复任务上的每步语言模型调用。
      尚未覆盖: 对UI变化和环境随时间漂移的鲁棒性，以及随着任务演变所存储程序的维护成本。
    - 路线: 具有细粒度评估的全面基准测试
      解决的问题: 通过测量子目标完成度、观察控制、拖拽交互能力和跨平台不确定性校准，揭示代理在通过/失败率之外的弱点。
      尚未覆盖: 覆盖范围仍限于特定平台（macOS、短视频、拖拽式）和交互类型；基准指标与真实部署可靠性之间的差距未被量化。
    - 路线: GUI基础的后验不确定性量化
      解决的问题: 为单步基础动作提供置信度估计以实现更安全的部署，系统比较了跨模型和数据集的27种UQ方法。
      尚未覆盖: UQ排名跨模型层级和接口的迁移性弱；校准在分布偏移下退化，且向多步代理轨迹的扩展尚未探索。
    共识:
    - 当前GUI代理在动态界面上缺乏观察控制，导致过度观察或观察不足的失败。
    - 细粒度指标（子目标完成度、成本-准确性、不确定性校准）揭示了单一成功率所掩盖的能力差异。
    - 利用未标注截图或在线交互可以大幅减少对人工标注训练数据的需求。
    - 上下文管理对长时域任务至关重要，因为被动历史累积会降低性能。
    - 重用成功执行轨迹可以显著加速重复任务完成，无需每步模型推理。
    分歧:
    - 训练信号：基于静态未标注截图的弱监督 vs. 基于真实环境反馈的在线多轮强化学习 vs. 基于带上下文动作的精选轨迹的监督微调。
    - 评估优先级：任务完成成功率 vs. 推理速度与成本 vs. 不确定性校准质量。
    - 交互范围：基于点击的定位 vs. 基于拖拽的操作；静态屏幕 vs. 动态持续变化的界面。
    - 部署场景：移动端（Android） vs. 桌面端（macOS） vs. 网页浏览器，各自具有不同的UI语义和动作空间。
    开放问题:
    - 在静态截图上训练的弱监督视觉定位能否适应内容在操作之间变化的界面？
    - 在线强化学习训练如何处理探索错误可能产生实际后果的安全关键任务？
    - 当代理自身动作改变输入分布时，后验UQ方法能否在多步轨迹中保持校准？
    - 在信息丢失不可避免之前，主动上下文管理能有效处理的最大任务时域是多少？
    - 程序编译重放方法能否在UI高度可变的任务中泛化，而无需频繁回退到原始代理？
