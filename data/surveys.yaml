  related_work_outline_zh:
  - 主流方向：构建端到端可运行的GUI代理系统，融合训练框架、多模态技能库与安全机制，面向长期真实世界任务。
  - 研究共性：多数论文提出框架、基准或记忆模块，并以代理成功率或任务完成度评估，揭示当前代理在长期一致性、隐藏状态与安全性方面仍存在困难。
  - 关键差异：方法在表示（全图 vs. 动作接地视觉记忆）、监督信号（未标注截图弱监督 vs. 在线RL轨迹反馈）和评估目标（短期浏览器任务 vs. 数小时专业工作流）上存在分歧。
  - 趋势演进：在2024–2026前沿期内，重心正从静态基准和单轮动作转向在线、多轮、长期任务，并引入安全审计与领域专用专业软件。
  - 开放问题：如何跨领域泛化安全加固，如何在不发生错误传播的前提下维持长期工作流一致性，以及如何在真实部署中平衡探索与用户敏感状态保护。
  literature_review:
    line_of_work_matrix:
    - line: Online multi-turn reinforcement learning frameworks for visual web agents
      what_it_solves: enables training GUI agents on live websites with trajectory-level
        success signals, reducing the need for static datasets and improving real-world
        adaptability
      what_remains_open: safety risks during online exploration, scalability to diverse
        professional applications, and the trade-off between exploration and user-sensitive
        state exposure
    - line: Weakly-supervised training pipelines from unannotated screenshots
      what_it_solves: drastically reduces annotation cost by leveraging large-scale
        unlabeled GUI data for visual grounding, then calibrating with minimal high-quality
        data
      what_remains_open: quality control of automatically extracted supervision signals,
        transfer to unseen application domains, and the effect of unlabeled data biases
        on agent behavior
    - line: Hierarchical multimodal skill libraries with action-grounded visual memory
      what_it_solves: improves agent performance on UI tasks by retaining visual figures
        and storing action-relevant image crops, mitigating state-level and action-level
        errors
      what_remains_open: automatic construction and maintenance of skill libraries
        across evolving applications, and whether action-grounded memory generalizes
        to non-UI embodied tasks
    - line: Safety benchmarking and domain-conditioned auditing of computer-using
        agents
      what_it_solves: provides reproducible evaluation of prompt injection resistance
        and reveals that safety hardening is domain-specific, not universal
      what_remains_open: generalization of safety beyond browser or coding domains,
        reproducibility of RL-optimized attacks, and integration of user-sensitive
        state detection into agent handover protocols
    - line: Long-horizon real-world task benchmarks for computer-use agents
      what_it_solves: measures agent performance on multi-hour professional workflows
        with streaming interaction, dynamic environments, and implicit state, exposing
        failure modes like constraint loss and objective drift
      what_remains_open: coverage of diverse professional software, automated evaluation
        of partial progress, and translation of benchmark insights into better system
        design
    consensus:
    - Current GUI agents, even frontier models, achieve low success rates on long-horizon
      real-world tasks, often failing due to workflow stage omission, error propagation,
      and hidden state misunderstanding.
    - Incorporating structured visual memory or multimodal skill artifacts improves
      task completion over naive full-image context or text-only skills.
    - Safety evaluation is essential for deployment, but existing safety hardening
      does not transfer across domains; agents resistant to browser prompt injection
      can be highly vulnerable on coding tasks.
    - Online interaction and training on live environments provide a path to better
      generalization, but introduce risks around user-sensitive data and reliable
      reward signals.
    disagreements:
    - 'Visual memory design: full-image memory can reduce state-level failures but
      increases action-level errors, while action-grounded crops improve action precision
      at the cost of broader context.'
    - 'Training paradigm: some works advocate online multi-turn RL with trajectory-level
      success as more realistic, while others show that weakly-supervised grounding
      from massive unlabeled data can match or outperform RL-based methods with far
      fewer annotations.'
    - 'Safety evaluation methodology: one line of work argues that hand-crafted injection
      templates are insufficient and that RL-optimized attack strings are needed for
      meaningful auditing; another demonstrates that frontier models are already robust
      to hand-crafted attacks, highlighting a reproducibility gap in published red-teaming
      results.'
    - 'Benchmark scope: benchmarks differ in task horizon (short browser tasks vs.
      multi-hour professional workflows) and domain (generic web vs. specialized professional
      software), leading to different conclusions about agent capabilities and primary
      failure modes.'
    open_questions:
    - How can safety hardening be made to generalize across browser, coding, and other
      GUI domains without requiring per-domain retraining?
    - What mechanisms can prevent error propagation and objective drift in agents
      executing workflows lasting hours, and how can these be evaluated without human-in-the-loop?
    - To what extent do the conclusions from current long-horizon benchmarks transfer
      to unseen professional software and dynamic environments not covered by the
      benchmarks?
    - How can online training frameworks safely explore live environments without
      exposing user-sensitive states, and how should sensitive-state detection be
      integrated into the agent loop?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 视觉网页代理的在线多轮强化学习框架
      解决的问题: 在真实网站上以轨迹级成功信号训练GUI代理，减少对静态数据集的依赖，提升真实环境适应能力
      尚未覆盖: 在线探索中的安全风险、对多样化专业应用的可扩展性，以及探索与用户敏感状态暴露之间的权衡
    - 路线: 从无标注截图的弱监督训练流水线
      解决的问题: 利用大规模无标注GUI数据进行视觉定位，再以少量高质量数据校准，大幅降低标注成本
      尚未覆盖: 自动提取的监督信号的质量控制、向未知应用领域的迁移，以及无标注数据偏差对代理行为的影响
    - 路线: 分层多模态技能库与动作接地视觉记忆
      解决的问题: 通过保留视觉图形和存储动作相关图像裁剪，减少状态级与动作级错误，提升UI任务完成率
      尚未覆盖: 在持续演化的应用中自动构建与维护技能库，以及动作接地记忆能否泛化到非UI的具身任务
    - 路线: 计算机使用代理的安全基准与领域条件审计
      解决的问题: 提供可复现的提示注入抵抗力评估，揭示安全加固是领域特异的而非通用的
      尚未覆盖: 安全能力在浏览器或编码之外的领域泛化、RL优化攻击的可复现性，以及用户敏感状态检测与代理接管协议的集成
    - 路线: 面向计算机使用代理的长期真实世界任务基准
      解决的问题: 以数小时的专业工作流、流式交互、动态环境与隐式状态测量代理性能，暴露约束丢失与目标漂移等失败模式
      尚未覆盖: 对多样化专业软件的覆盖、部分进度的自动评估，以及如何将基准洞察转化为更好的系统设计
    共识:
    - 当前GUI代理，即便是前沿模型，在长期真实世界任务上的成功率仍然很低，常因工作流阶段遗漏、错误传播和隐式状态误解而失败。
    - 引入结构化视觉记忆或多模态技能工件，相比朴素的全图上下文或纯文本技能，能够提升任务完成度。
    - 安全评估对部署至关重要，但现有安全加固不具备跨领域泛化能力：在浏览器上抵抗提示注入的代理，在编码任务上可能高度脆弱。
    - 在真实环境中的在线交互与训练为实现更好的泛化提供了路径，但带来了用户敏感数据与可靠奖励信号方面的风险。
    分歧:
    - 视觉记忆设计：全图记忆可减少状态级失败，但会增加动作级错误；动作接地的图像裁剪则提升动作精度，但牺牲了更广的上下文。
    - 训练范式：一方主张在线多轮RL用轨迹级成功作为信号更真实，另一方则展示从海量无标注数据中弱监督定位，用极少量标准数据即可匹敌或超越RL方法。
    - 安全评估方法论：一方认为手工攻击模板不足，须用RL优化的攻击字符串进行有意义的审计；另一方则证明前沿模型已能抵抗手工攻击，指出已发表红队结果存在不可复现的缺口。
    - 基准范围：不同基准在任务时长（短浏览器任务 vs. 数小时专业工作流）和领域（通用Web vs. 专用专业软件）上存在差异，导致对代理能力和主要失败模式得出不同结论。
    开放问题:
    - 如何让安全加固跨浏览器、编码及其他GUI领域泛化，而不需要每领域重新训练？
    - 何种机制能够防止代理在数小时工作流中发生错误传播与目标漂移，且如何在没有人类介入的情况下进行评估？
    - 当前长期基准得出的结论，在多大程度上能迁移到基准未覆盖的未知专业软件和动态环境中？
    - 在线训练框架如何在探索真实环境时安全地避免暴露用户敏感状态，以及敏感状态检测应如何集成到代理循环中？
