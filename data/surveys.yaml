  related_work_outline:
  - 'Mainstream direction: Building large-scale GUI agent benchmarks while formalizing
    agent capabilities (e.g., interaction primitives, uncertainty, context management)
    to support reliability and scalability claims.'
  - 'Shared research pattern: Multiple works explicitly formalize agent–environment
    abstractions (drag, observation, uncertainty, context) as first-class entities
    and quantify them via benchmarks, but deeper theoretical guarantees remain scarce.'
  - 'Key differences: Works differ in the abstraction level they formalize—low-level
    interaction primitives vs. high-level cognitive functions vs. training paradigms—leading
    to incomparable evaluation metrics and assumptions.'
  - 'Trend evolution: Within 2024–2026, the frontier is shifting from coarse task
    success toward fine-grained capability decomposition and reliability dimensions
    (uncertainty, observation control, context management), with growing attention
    to theoretical models of agent–environment interaction.'
  - 'Open questions: Can formalized definitions predict failure on out-of-distribution
    tasks? Does uncertainty quantification generalize across model families and interfaces?
    What are the theoretical boundaries of proactive context management? Are scaling
    approaches without guarantees reliable for deployment?'
  related_work_outline_zh:
  - 主流方向：构建大规模 GUI 代理基准，同时对代理能力（交互原语、不确定性、上下文管理）进行形式化，以支撑可靠性和可扩展性主张。
  - 研究共性：多项工作将代理与环境的交互抽象（拖拽、观察、不确定性、上下文）显式形式化为第一等实体，并通过基准量化，但深层理论保证普遍缺失。
  - 关键差异：各工作选择的形式化抽象层次不同——低层交互原语、高层认知功能或训练范式——导致评估指标和假设不可直接比较。
  - 趋势演进：2024–2026 年内，前沿正从粗粒度任务成功率转向细粒度能力分解与可靠性维度（不确定性、观察控制、上下文管理），对代理-环境交互理论模型的关注增强。
  - 开放问题：形式化定义能否预测分布外任务的失败？不确定性量化能否跨模型族和接口泛化？主动上下文管理的理论边界在哪里？缺乏理论保证的缩放方法是否可靠部署？
  literature_review:
    line_of_work_matrix:
    - line: Formal definitions and assumptions
      what_it_solves: Clarifies what a GUI agent must represent (e.g., living-screen
        observation, post-hoc uncertainty, context management actions) and under which
        interface assumptions the claims hold.
      what_remains_open: Whether these formal conditions hold in realistic multi-step
        trajectories, and whether they generalize across model families and deployment
        interfaces.
    - line: Scaling laws and guarantees
      what_it_solves: Connects training data scale, task synthesis, or reinforcement
        learning efficiency to agent performance, showing that more data or verifiable
        tasks can improve scores.
      what_remains_open: Direct validation that the observed scaling patterns predict
        failures or transfer across domains; theoretical guarantees for sample efficiency
        and safety are missing.
    - line: Conceptual taxonomy and boundaries
      what_it_solves: Organizes fragmented agent capabilities into taxonomies (drag
        interaction types, capability annotations, multimodal skill representations)
        to enable fine-grained evaluation.
      what_remains_open: Whether these taxonomies change how researchers design or
        train models, or merely serve as evaluation labels without design impact.
    consensus:
    - Agents need explicit modeling of interaction primitives and uncertainty beyond
      simple click-based actions to improve reliability.
    - Benchmarks should move from coarse task success to fine-grained capability decomposition,
      capturing sub-goal completion, observation efficiency, and confidence.
    - Reliability, safety, and more transparent failure modes are recognized as crucial
      next steps for real-world GUI agent deployment.
    disagreements:
    - 'Granularity of formalization: some works focus on low-level atomic operations
      (drag, observation), while others target high-level cognitive states (uncertainty,
      proactive context management).'
    - 'Supervision paradigm: reinforcement learning with verifiable rewards vs. weakly-supervised
      learning from unannotated data imply different assumptions about scalability
      and correctness.'
    - 'Evaluation context: studies cover desktop OS, mobile, short-video platforms,
      and GUI grounding, with varying interaction modes (GUI-only, GUI+CLI, static
      vs. dynamic screens), making direct comparisons difficult.'
    open_questions:
    - Do the proposed formal abstractions (e.g., living-screen agent, ConAct) hold
      under distribution shift and multi-step task execution in the wild?
    - How can uncertainty quantification rankings transfer across model families and
      interface types without re-evaluation?
    - What are the theoretical limits of proactive context management, and when does
      it become harmful?
    - Can scaling approaches without formal guarantees provide reliable safety margins
      for autonomous GUI agents?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 形式化定义与假设
      解决的问题: 澄清 GUI 代理必须表示什么（如动态屏幕观察、后验不确定性、上下文管理动作），以及相关主张在何种接口假设下成立。
      尚未覆盖: 这些形式条件在真实多步轨迹中是否成立，以及能否跨模型族和部署接口泛化。
    - 路线: 缩放规律与保证
      解决的问题: 将训练数据规模、任务合成或强化学习效率与代理性能联系起来，表明更多数据或可验证任务可提升评分。
      尚未覆盖: 直接验证观察到的缩放模式能否预测失败或跨域迁移；样本效率和安全性的理论保证缺失。
    - 路线: 概念分类与边界
      解决的问题: 将碎片化的代理能力组织为分类体系（拖拽交互类型、能力注释、多模态技能表示），以实现细粒度评估。
      尚未覆盖: 这些分类是否改变研究者设计或训练模型的方式，还是仅作为评估标签而无设计影响。
    共识:
    - 代理需要超越简单点击操作的交互原语和不确定性显式建模，以提升可靠性。
    - 基准应从粗粒度任务成功率转向细粒度能力分解，捕获子目标完成度、观察效率与置信度。
    - 可靠性、安全性以及更透明的失败模式被公认为 GUI 代理现实部署的关键下一步。
    分歧:
    - 形式化粒度：部分工作聚焦于低层原子操作（拖拽、观察），另一些则面向高层认知状态（不确定性、主动上下文管理）。
    - 监督范式：基于可验证奖励的强化学习与基于未标注数据的弱监督学习，对可扩展性和正确性隐含不同假设。
    - 评估场景：研究覆盖桌面、移动端、短视频平台和 GUI 基础，交互模式各异（纯 GUI、GUI+CLI、静态/动态屏幕），难以直接比较。
    开放问题:
