  related_work_outline:
  - 'Mainstream direction: Building formal abstractions and evaluation frameworks
    for GUI agents, moving beyond static click-based tasks to dynamic interfaces,
    multi-step context management, and interaction diversity, while improving reliability
    through uncertainty quantification and efficient training.'
  - 'Shared research pattern: Most works propose a structured representation (skill
    library, context fields, UQ methods) and validate it on a new benchmark or dataset,
    often comparing frontier models and highlighting a gap (e.g., observation control,
    drag interaction, data efficiency) that existing agents fail to address.'
  - 'Key differences: Supervision strategy varies widely—weak supervision from unannotated
    screenshots, online RL with verifiable tasks, supervised fine-tuning with context
    annotations, or post-hoc UQ without training. Interaction paradigms differ (click,
    drag, dynamic content), and evaluation targets range from task success to information
    efficiency and uncertainty calibration.'
  - 'Trend evolution: Within 2024–2026, the frontier shifts from pure task-completion
    benchmarks to analyses of agent properties such as observation control, context
    management, and reliability. There is a growing emphasis on data efficiency and
    the ability to handle long-horizon, multi-modal, and non-standard interactions.'
  - 'Open questions: Whether formal characterizations of agent behavior (e.g., observation
    control, proactive context pruning) generalize across unseen applications and
    interfaces; whether UQ rankings transfer across model tiers and deployment settings;
    how to balance task synthesis scalability with real-world distribution coverage.'
  related_work_outline_zh:
  - 主流方向：构建GUI代理的形式化抽象与评估框架，从静态点击任务转向动态界面、多步上下文管理和交互多样性，同时通过不确定性量化和高效训练提升可靠性。
  - 研究共性：多数工作提出一种结构化表示（技能库、上下文字段、UQ方法），并在新基准或数据集上验证，常对比前沿模型并揭示当前代理未能解决的缺口（如观察控制、拖拽交互、数据效率）。
  - 关键差异：监督策略差异显著——从未标注截图的弱监督、可验证任务的在线RL、带上下文标注的监督微调，到无需训练的后验UQ。交互范式不同（点击、拖拽、动态内容），评测目标涵盖任务成功率、信息效率及不确定性校准。
  - 趋势演进：2024–2026年间，前沿从纯任务完成基准转向分析代理属性，如观察控制、上下文管理和可靠性。日益强调数据效率以及处理长时域、多模态和非标准交互的能力。
  - 开放问题：代理行为的形式化特征（如观察控制、主动上下文剪枝）能否泛化到未见应用和界面；UQ排名能否跨模型层级和部署设置迁移；如何在任务合成可扩展性与真实世界分布覆盖间取得平衡。
  literature_review:
    line_of_work_matrix:
    - line: Formal definitions and assumptions for dynamic and context-aware GUI agents
      what_it_solves: Provides operational definitions for dynamic interfaces where
        content changes between actions, and for context management as a first-class
        agent action, enabling precise evaluation of observation control and long-horizon
        memory.
      what_remains_open: Whether the formal conditions (e.g., living-screen-native
        assumption, structured context fields) match empirical agent behavior in unseen
        applications, and whether they improve generalization beyond the evaluated
        platforms.
    - line: Scaling laws and guarantees for data-efficient agent training
      what_it_solves: Connects model training to data efficiency by using verifiable
        task synthesis for online RL or weak supervision from massive unannotated
        screenshots, aiming to reduce human annotation cost while maintaining or improving
        task success.
      what_remains_open: Direct validation that the proposed scaling methods (Frontier
        Sampling, visual grounding pre-training) reliably predict agent failures on
        out-of-distribution tasks, and whether the performance gains are proportionally
        maintained as model size increases.
    - line: Conceptual taxonomy and boundaries of interaction modalities and reliability
        techniques
      what_it_solves: Organizes fragmented GUI interaction types (drag, multimodal
        skill retrieval) and post-hoc uncertainty quantification methods into frameworks
        that clarify what agents can and cannot do, and how to assess their confidence.
      what_remains_open: Whether the taxonomies change how researchers design or evaluate
        agents; e.g., UQ ranking transfer across model classes is weak, and drag interaction
        coverage may not extend to all real-world GUI paradigms.
    consensus:
    - All works agree that GUI agents must handle more than simple click actions,
      requiring richer interaction abstractions such as drag, dynamic content observation,
      and proactive context management.
    - Visual information (screenshots, figures) is consistently treated as essential,
      and multimodal skill artifacts or visual grounding are leveraged to improve
      UI element identification.
    - 'Evaluation credibility is a shared concern: fine-grained metrics, multi-checkpoint
      scoring, and uncertainty quantification are introduced to go beyond coarse task
      success rates.'
    - There is a common recognition that current frontier models lack certain capabilities,
      notably observation control in dynamic interfaces and reliable confidence estimation,
      which motivates new benchmarks.
    disagreements:
    - 'Representation of agent knowledge: hierarchical multimodal skill libraries
      vs. structured context fields with explicit context management actions vs. visual
      grounding from unlabeled data.'
    - 'Supervision and training: online RL with verifiable task synthesis contrasts
      with weak supervision from unannotated screenshots and supervised fine-tuning
      on annotated context actions.'
    - 'Evaluation target: task success rate and sub-goal completion vs. information
      efficiency (cost-accuracy) vs. calibration of uncertainty estimations.'
    - 'Interaction paradigm: dynamic screen-native interfaces where content changes
      between actions vs. drag-based interactions vs. traditional click-based GUIs,
      with different assumptions about environment stability.'
