  - 主流方向：构建面向桌面、移动、网页、视频平台等多种真实应用领域的GUI代理基准与方法，重点关注任务完成准确率、交互模式覆盖度与代理效率。
  - 研究共性：多数工作构建一个任务集或环境（如macOS应用、短视频平台、拖拽交互），并使用专有或开源视觉语言模型评估多模态代理；它们都揭示当前代理能力与人类表现之间的差距，并常提出一种技术来缩小差距（技能库、关键帧提取、历史感知评判）。
  - 关键差异：论文在目标交互模式（点击、拖拽、视频引导、CLI+GUI）、部署环境（桌面操作系统、移动网页、短信到网页）、评估目标（任务成功率 vs. 速度 vs.
    欺诈检测）以及架构干预手段（外部技能库 vs. 编译状态机 vs. 循环内评判器）上存在分歧。
  - 趋势演进：在2024–2026年窗口内，领域正从静态点击基准向动态多模态场景（视频、拖拽、短信到网页）演进，并从纯代理评估转向面向效率与可靠性的代理增强，但证据仅限于当前前沿。
  - 开放问题：这些代理在未见应用、平台和交互模式间的泛化能力如何？观察控制机制能否对动态内容保持鲁棒？速度优化与UI变化鲁棒性之间的权衡是什么？在信誉捷径不可用时，安全关键应用（如欺诈检测）的表现如何？
  literature_review:
    line_of_work_matrix:
    - line: Domain-specific GUI agent benchmarks
      what_it_solves: Evaluates multimodal agents on concrete, real-world tasks such
        as macOS desktop operations, short-video platform interactions, video-guided
        GUI tasks, and drag-based manipulations, covering modalities beyond simple
        clicks.
      what_remains_open: Whether performance on these benchmarks transfers to unseen
        applications, platforms, or interaction modes; the limited task count and
        environment diversity may not capture full real-world variability.
    - line: Agent skill and knowledge augmentation
      what_it_solves: Improves agent success by providing external multimodal skill
        libraries (VISUALSKILL) or task-specific keyframe extraction algorithms (TASKER)
        that enrich the agent's context without retraining the core model.
      what_remains_open: The scalability of skill construction to a large number of
        apps and the generality of keyframe extraction to non-video tasks remain unverified;
        reliance on authored documentation or fixed extraction heuristics may limit
        adaptability.
    - line: Agent efficiency and reliability optimization
      what_it_solves: Reduces latency and cost on repeated tasks by compiling successful
        runs into verifiable state machines (PreAct) and improves planning/execution
        by adding a history-aware, visually grounded critic (HiViG).
      what_remains_open: Long-term robustness of compiled programs against UI changes
        and the critic's ability to generalize across diverse agent architectures
        and environments are not fully established; fallback mechanisms may still
        rely on slow agent replanning.
    - line: Security-critical agent applications
      what_it_solves: Assesses web agents' ability to detect SMS-to-webpage fraud
        in a controlled setting where reputation shortcuts (URLs, domains) are removed,
        exposing reliance on shallow patterns.
      what_remains_open: The benchmark artificially suppresses reputation cues, so
        real-world detection performance with available shortcuts is unknown; the
        dataset size and scenario coverage are limited, and benign recall remains
        a key weakness.
    consensus:
    - All works use vision-language models as the core agent backbone and evaluate
      via task completion metrics, confirming that current agents still fall short
      of human-level performance in real-world application domains.
    - There is a shared recognition that agents struggle with dynamic, non-standard
      interactions (e.g., video-based tasks, drag operations, SMS-to-web navigation)
      and that improving context representation (multimodal skills, history, keyframes)
      is essential.
    - Papers consistently separate the agent policy from evaluation or augmentation
      modules, treating the agent as a callable component, which allows plug-and-play
      comparisons across different model backends.
    disagreements:
    - 'Interaction modality coverage: some benchmarks focus on click-based actions
      (implicitly in MacAgentBench, DragOn), while others explicitly target drag,
      video-guided, or CLI+GUI hybrid actions, revealing a lack of a unified interaction
      taxonomy.'
    - 'Evaluation dimension emphasis: PreAct prioritizes speed and cost, while most
      benchmarks prioritize task success rate; FraudSMSWalker introduces a safety
      metric (fraud detection recall/precision), highlighting a divergence between
      productivity-oriented and security-oriented evaluation.'
    - 'Agent augmentation strategy: VISUALSKILL injects external knowledge at input
      time, PreAct compiles past experience into a deterministic program, and HiViG
      adds a runtime critic, creating different assumptions about whether the bottleneck
      is knowledge, repetition, or execution errors.'
    open_questions:
    - Can agents be trained or prompted to adapt to new interaction modalities (e.g.,
      drag, video-following) without modal-specific fine-tuning or benchmark-specific
      prompting?
    - What is the failure mode of skill libraries and state machines when the underlying
      application UI changes, and how can we detect when a stored skill or program
      is stale?
    - How do we design benchmarks that jointly evaluate task success, efficiency,
      and safety in a single, multi-faceted metric without over-penalizing cautious
      agents?
    - To what extent do the observed performance gaps on these benchmarks reflect
      fundamental limitations of vision-language models versus insufficient task-specific
      grounding data?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 特定领域的GUI代理基准
      解决的问题: 在具体真实任务上评估多模态代理，如macOS桌面操作、短视频平台交互、视频引导GUI任务和拖拽操作，覆盖了简单点击之外的模式。
      尚未覆盖: 这些基准上的表现能否迁移到未见应用、平台或交互模式；有限的任务数量和环境多样性可能无法捕捉真实世界的全部变化。
    - 路线: 代理技能与知识增强
      解决的问题: 通过提供外部多模态技能库（VISUALSKILL）或任务特定关键帧提取算法（TASKER）来丰富代理上下文，从而在不重新训练核心模型的情况下提升代理成功率。
      尚未覆盖: 技能构建对大量应用的可扩展性以及关键帧提取对非视频任务的通用性尚未验证；依赖编写文档或固定提取启发式方法可能限制适应性。
    - 路线: 代理效率与可靠性优化
      解决的问题: 通过将成功运行编译为可验证的状态机（PreAct）来降低重复任务的延迟和成本，并通过添加历史感知、视觉基础的评判器（HiViG）来改进规划与执行。
      尚未覆盖: 编译程序对UI变化的长期鲁棒性以及评判器在不同代理架构和环境中的泛化能力尚未完全确立；回退机制可能仍依赖缓慢的代理重规划。
    - 路线: 安全关键代理应用
      解决的问题: 在抑制信誉捷径（URL、域名）的受控环境中评估网页代理检测短信到网页欺诈的能力，暴露其对浅层模式的依赖。
      尚未覆盖: 基准人为抑制了信誉线索，因此真实世界中可用的捷径下检测性能未知；数据集规模和场景覆盖有限，良性召回仍是关键弱点。
    共识:
    - 所有工作都使用视觉语言模型作为核心代理骨干，并通过任务完成指标进行评估，确认当前代理在真实应用领域仍远低于人类水平。
    - 普遍认识到代理在动态、非标准交互（如视频任务、拖拽操作、短信到网页导航）中表现挣扎，且改善上下文表示（多模态技能、历史、关键帧）至关重要。
    - 论文一致将代理策略与评估或增强模块分离，将代理视为可调用组件，从而允许在不同模型后端之间进行即插即用比较。
    分歧:
    - 交互模式覆盖度：一些基准侧重于点击动作（如MacAgentBench、DragOn中隐含），而其他则明确针对拖拽、视频引导或CLI+GUI混合动作，揭示缺乏统一的交互分类法。
    - 评估维度侧重：PreAct优先考虑速度和成本，而多数基准优先考虑任务成功率；FraudSMSWalker引入安全指标（欺诈检测召回率/精确率），突显了生产力导向与安全导向评估之间的分歧。
    - 代理增强策略：VISUALSKILL在输入时注入外部知识，PreAct将过去经验编译为确定性程序，HiViG添加运行时评判器，这三者对于瓶颈是知识、重复还是执行错误存在不同假设。
    开放问题:
    - 能否训练或提示代理在无需模态特定微调或基准特定提示的情况下适应新交互模式（如拖拽、视频跟随）？
    - 当底层应用UI变化时，技能库和状态机的失败模式是什么？如何检测存储的技能或程序已过时？
    - 如何设计在单一多维度指标中同时评估任务成功率、效率和安全性，而不过度惩罚谨慎代理的基准？
    - 这些基准上观察到的性能差距在多大程度上反映了视觉语言模型的基本限制，而非特定任务基础数据的不足？
