  related_work_outline:
  - 'Mainstream direction: Building realistic, diverse GUI agent benchmarks across
    desktop, mobile, dynamic web, and drag-based interactions, paired with fine-grained
    diagnostic metrics beyond task success rate.'
  - 'Shared research pattern: All benchmarks adopt rule-based or automated evaluation,
    emphasize real application scenarios, release datasets, and reveal that current
    models struggle with complex interactions such as dynamic content, long horizons,
    and drag operations.'
  - 'Key differences: Platforms and interaction modalities vary (macOS desktop with
    CLI+GUI, short-video web, mobile long-horizon, drag-based); metrics focus on different
    aspects—sub-goal completion, cost-accuracy, uncertainty quantification, or single-step
    grounding vs. multi-step tasks.'
  - 'Trend evolution: Within the 2024–2026 frontier, benchmarks are moving from static
    click-based tasks toward dynamic, multi-app, drag-inclusive scenarios, and from
    aggregate success rates toward diagnostic metrics and reliability assessment;
    method papers concurrently expose efficiency and data-efficiency dimensions that
    benchmarks have yet to standardize.'
  - 'Open questions: How to build a unified cross-platform benchmark; alignment between
    fine-grained proxy metrics and real user satisfaction; reliability evaluation
    for multi-step agent trajectories; standardized testing of agent efficiency, skill
    reuse, and data efficiency.'
  related_work_outline_zh:
  - 主流方向：构建覆盖桌面、移动、动态网页和拖拽交互的真实多样化GUI代理基准，并引入超越任务成功率的细粒度诊断指标。
  - 研究共性：所有基准均采用基于规则或自动化的评估，强调真实应用场景，公开数据集，并揭示当前模型在动态内容、长时域和拖拽等复杂交互上的不足。
  - 关键差异：平台与交互模态各异（macOS桌面含CLI+GUI、短视频网页、移动长时域、拖拽操作）；指标侧重点不同——子目标完成度、成本-准确性、不确定性量化，或单步基础与多步任务之分。
  - 趋势演进：在2024–2026前沿窗口内，基准从静态点击任务向动态、多应用、含拖拽的场景演进，指标从总体成功率转向细粒度诊断与可靠性评估；方法论文同时暴露出效率与数据效率维度，但尚未被基准标准化。
  - 开放问题：如何构建统一的跨平台基准；细粒度代理指标与真实用户满意度的一致性；多步代理轨迹的可靠性评估；代理效率、技能复用与数据效率的标准化测试。
  literature_review:
    line_of_work_matrix:
    - line: Realistic multi-platform GUI agent benchmark construction
      what_it_solves: Provides diverse, real-world tasks and environments to evaluate
        GUI agents on desktop, mobile, dynamic web, and drag-based interactions, moving
        beyond simplified click-only settings.
      what_remains_open: Task distributions may not fully cover real user workflows;
        environment fidelity vs. reproducibility trade-offs; lack of a unified cross-platform
        benchmark; drag and dynamic-content coverage is still narrow.
    - line: Fine-grained diagnostic metrics and reliability assessment
      what_it_solves: Goes beyond aggregate success rate by measuring sub-goal completion,
        cost-accuracy trade-offs, and uncertainty quantification for GUI grounding,
        enabling deeper performance diagnosis.
      what_remains_open: Alignment of these proxy metrics with downstream user decisions
        is unverified; cross-model and cross-task stability of UQ rankings is weak;
        metrics are mostly validated on single-step grounding, not multi-step trajectories.
    consensus:
    - Realistic application scenarios and rule-based or automated evaluation are essential
      for reproducible GUI agent benchmarking.
    - Current models exhibit significant weaknesses in dynamic interfaces, long-horizon
      tasks, and non-click interactions such as drag.
    - Fine-grained metrics reveal performance differences that aggregate success rates
      hide, and uncertainty quantification can improve action reliability when properly
      calibrated.
    disagreements:
    - 'Evaluation scope: some benchmarks focus on single-step GUI grounding, while
      others assess multi-step task completion across applications.'
    - 'Interaction coverage: existing work separately addresses desktop CLI+GUI, short-video
      dynamic content, mobile long-horizon, and drag-based manipulation, with no single
      benchmark integrating all these modalities.'
    - 'Metric emphasis: sub-goal completion, cost-accuracy, and uncertainty quantification
      are proposed as complementary diagnostics, but there is no agreement on which
      metric best predicts real-world agent utility.'
    open_questions:
    - Can a unified cross-platform benchmark be built that covers desktop, mobile,
      web, and drag interactions while maintaining environment fidelity and reproducibility?
    - How well do fine-grained diagnostic metrics (sub-goal completion, cost-accuracy,
      UQ) correlate with actual user satisfaction and task success in deployment?
    - What is the effectiveness of post-hoc uncertainty quantification methods in
      multi-step agent trajectories, given current evidence is limited to single-step
      grounding?
    - How should agent efficiency, skill reuse, and data efficiency be standardized
      as evaluation dimensions in future benchmarks?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实多平台GUI代理基准构建
      解决的问题: 提供多样化、真实的任务和环境，评估GUI代理在桌面、移动、动态网页和拖拽交互上的能力，超越简化的纯点击设置。
      尚未覆盖: 任务分布可能未完全覆盖真实用户工作流；环境保真度与可重复性之间的权衡；缺乏统一的跨平台基准；拖拽和动态内容的覆盖范围仍然较窄。
    - 路线: 细粒度诊断指标与可靠性评估
      解决的问题: 超越总体成功率，通过测量子目标完成度、成本-准确性权衡和GUI基础的不确定性量化，实现更深层的性能诊断。
      尚未覆盖: 这些代理指标与下游用户决策的一致性未经验证；UQ排名的跨模型和跨任务稳定性较弱；指标主要在单步基础上验证，而非多步轨迹。
    共识:
    - 真实应用场景和基于规则或自动化的评估对于可复现的GUI代理基准测试至关重要。
    - 当前模型在动态界面、长时域任务和非点击交互（如拖拽）中表现出显著弱点。
    - 细粒度指标揭示了总体成功率所掩盖的性能差异，经过适当校准的不确定性量化可以提高动作可靠性。
    分歧:
    - 评估范围：部分基准聚焦于单步GUI基础，而其他基准评估跨应用的多步任务完成。
    - 交互覆盖：现有工作分别处理桌面CLI+GUI、短视频动态内容、移动长时域和拖拽操作，尚无单一基准整合所有这些模态。
    - 指标侧重：子目标完成度、成本-准确性和不确定性量化被提出作为互补诊断，但对于哪个指标最能预测真实世界代理效用尚无共识。
    开放问题:
