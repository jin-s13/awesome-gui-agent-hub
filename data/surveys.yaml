  literature_review_zh:
    研究路线矩阵:
    - 路线: 可运行流水线与部署栈
      解决的问题: 提供GUI代理训练和评估的端到端基础设施，包括在真实网站上的在线强化学习、弱监督视觉接地以及长期真实世界任务基准。
      尚未覆盖: 在真实用户流量下的外部部署可靠性、跨平台泛化，以及对超出精选基准的流式或动态变化界面的鲁棒性。
    - 路线: 实时与交互式服务
      解决的问题: 通过识别用户敏感状态和评估浏览器及编码领域中对提示注入攻击的抵抗力，确保GUI自动化过程中的安全和隐私感知交互。
      尚未覆盖: 安全加固在浏览器表面之外的泛化、不增加延迟的实时监控，以及当前审计中未复现的优化攻击字符串的覆盖。
    - 路线: 工件与可复现工程
      解决的问题: 通过结构化多模态技能库和动作接地视觉记忆提升代理性能和可复用性，减少对全图像上下文和大规模标注数据集的依赖。
      尚未覆盖: 技能工件的跨应用和跨领域迁移、在极长周期下记忆检索的可扩展性，以及在不同基础设施环境中的独立复现。
    共识:
    - GUI代理受益于视觉和文本信息的结合，纯文本技能或全图像记忆各自引入不同的失败模式。
    - 长期真实世界任务仍然极具挑战性，即使最强模型在专业工作流上也仅达到20–30%的成功率。
    - 数据效率至关重要；弱监督和在线强化学习方法可以使用极少标注数据达到或超越全监督方法。
    - 安全性是领域条件的：在浏览器任务中观察到的加固不会迁移到编码环境，手工制作的攻击不足以探测前沿模型的漏洞。
    - 存储动作相关视觉裁剪或多模态技能图形的记忆机制优于朴素全图像记忆，减少了接地错误和隐藏操作盲区。
    分歧:
    - 代理知识的表示方式：保留视觉图形的分层多模态技能库 vs. 动作接地图像裁剪 vs. 纯文本技能描述。
    - 监督范式：基于未标注截图的弱监督课程学习 vs. 在真实网站上的在线多轮强化学习 vs. 基于少量专家轨迹的监督微调。
    - 评估目标：具有步骤级指标的短期浏览器任务 vs. 以数百步后二元任务完成度衡量的长期端到端专业工作流。
    - 交互模式：基于浏览器的网页代理 vs. 操作专业软件的桌面GUI代理 vs. 开发环境中的编码代理。
    - 部署设置：为可复现性和社区扩展设计的开源框架 vs. 通过API访问评估的专有前沿模型。
    开放问题:
    - 在浏览器任务上展示的安全加固能否扩展到编码和其他应用领域而不牺牲任务性能？
    - 代理如何在动态环境中数百次连续工具调用中维持工作流一致性并避免目标漂移？
    - 什么方法能够实现多模态技能工件跨不同应用和操作系统的迁移，而无需逐应用重新编写？
    - 动作接地视觉记忆在大规模下的计算和延迟成本如何，能否为实时交互服务降低？
    - 弱监督和在线强化学习方法在精选基准任务之外的真实世界噪声和分布偏移下表现如何？
