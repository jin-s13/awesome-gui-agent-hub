        click accuracy.
      what_remains_open: Coverage of highly dynamic or adversarial interfaces; alignment
        between benchmark scores and real-world user satisfaction; integration of
        multi-modal interaction (e.g., CLI+GUI) evaluation; and the extent to which
        benchmark training data leaks into agent pre-training.
    - line: Agent skill and knowledge augmentation
      what_it_solves: Improves GUI agent performance and efficiency by equipping policies
        with retrievable multimodal skill libraries, history-aware visual critics,
        or compiler-based replay of successful trajectories, reducing per-step LLM
        calls and mitigating short-sighted errors.
      what_remains_open: Cross-application and cross-platform transfer of acquired
        skills; automated lifecycle management of skill libraries; robustness to UI
        changes that invalidate stored state-machine programs; and the trade-off between
        augmentation overhead and generalization.
    - line: Safety-critical GUI agent deployment
      what_it_solves: Adapts GUI agents to tasks where incorrect actions carry high
        risk, such as SMS-to-webpage fraud detection, by suppressing reputation shortcuts
        and forcing agents to rely on visual and textual content for judgment.
      what_remains_open: Real-world adversarial robustness when attackers can manipulate
        visual layout; agent interpretability for decision justification; privacy
        preservation during webpage exploration; and generalization beyond the ten
        service scenarios and 699 cases tested.
    consensus:
    - Current GUI agents still fall short of human-level performance on complex, real-world
      tasks, with failure modes often rooted in inadequate observation control or
      short-sighted planning.
    - Fine-grained, multi-dimensional evaluation (sub-goal completion, cost-accuracy,
      information efficiency) reveals capability gaps that aggregate success rates
      alone hide.
    - Augmenting agents with external memory, skills, or critics consistently improves
      performance, but the design and maintenance of these augmentations remain open
      challenges.
    - Benchmarks are expanding from static, single-platform setups to include dynamic
      content, multimodal interaction, and domain-specific operations (drag, video-guided
      steps).
    disagreements:
    - 'Representation of agent knowledge: some works store multimodal skill artifacts
      with visual figures (VISUALSKILL), while others compile trajectories into abstract
      state machines (PreAct) or summarize past actions as macro-action history (HiViG).'
    - 'Evaluation target: works like LivingScreen emphasize observation control and
      cost-accuracy, while MacAgentBench focuses on deterministic rule-based scoring
      and capability annotations; DragOn addresses a specific interaction primitive
      (drag) often overlooked in prior benchmarks.'
    - 'Interaction mode: MacAgentBench includes both GUI and CLI, whereas most other
      benchmarks assume purely visual-GUI interaction; VG-GUIBench bridges video understanding
      and GUI actions, mixing modalities differently.'
    - 'Deployment setting: some studies use real macOS environments or browser-based
      simulators, while others rely on offline static datasets; the degree of environment
      fidelity varies and affects the generalizability of findings.'
    open_questions:
    - How can GUI agents robustly control the frequency and granularity of observation
      in environments where content changes autonomously, as exposed by LivingScreen?
    - To what extent do skill libraries and compiled state machines transfer across
      different applications, platforms, or even different underlying agent models?
    - What are the failure modes of GUI agents when faced with adversarial UI layouts
      designed to mislead visual grounding or trigger fallback mechanisms?
    - Can the efficiency gains demonstrated by methods like PreAct (8.5–13x speedup)
      be maintained in safety-critical scenarios where fallback errors are unacceptable?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 跨域GUI代理基准测试与评估
      解决的问题: 提供标准化任务和指标，评估GUI代理在桌面套件、动态短视频平台、拖拽交互和视频引导任务等真实应用中的能力，超越简单点击准确性。
      尚未覆盖: 对高度动态或对抗性界面的覆盖；基准分数与真实用户满意度之间的一致性；多模态交互（如CLI+GUI）评估的整合；基准训练数据泄露到代理预训练的程度。
    - 路线: 代理技能与知识增强
      解决的问题: 通过可检索的多模态技能库、历史感知视觉评判或基于编译器的成功轨迹重放，提升GUI代理的性能和效率，减少每步语言模型调用，缓解短视规划错误。
      尚未覆盖: 已获得技能的跨应用和跨平台迁移；技能库的自动化生命周期管理；对使存储状态机程序失效的UI变化的鲁棒性；增强开销与泛化能力之间的权衡。
    - 路线: 安全关键型GUI代理部署
      解决的问题: 将GUI代理适配到错误动作风险高的任务（如短信到网页欺诈检测），通过抑制信誉捷径，迫使代理依赖视觉和文本内容进行判断。
      尚未覆盖: 攻击者可操纵视觉布局时的真实世界对抗鲁棒性；代理决策的可解释性；网页探索过程中的隐私保护；在十个服务场景和699个案例之外的泛化能力。
    共识:
    - 当前GUI代理在复杂真实任务上仍远未达到人类水平，失败模式常源于观察控制不足或短视规划。
    - 细粒度、多维度的评估（子目标完成度、成本-准确性、信息效率）揭示了仅凭总体成功率无法发现的差距。
    - 通过外部记忆、技能或评判模型增强代理能持续提升性能，但这些增强组件的设计和维护仍是开放挑战。
    - 基准测试正从静态、单平台设置扩展到包含动态内容、多模态交互和领域特定操作（拖拽、视频引导步骤）。
    分歧:
    - 代理知识的表示方式：有的保留多模态技能工件及视觉图形（VISUALSKILL），有的将轨迹编译为抽象状态机（PreAct），有的将过去动作总结为宏观动作历史（HiViG）。
    - 评估目标：LivingScreen强调观察控制和成本-准确性，MacAgentBench侧重确定性规则评分和能力注释，DragOn则针对此前基准中常被忽略的拖拽交互原语。
    - 交互模态：MacAgentBench同时包含GUI和CLI，而多数基准假设纯视觉GUI交互；VG-GUIBench桥接视频理解与GUI动作，以不同方式混合模态。
    - 部署设置：一些研究使用真实macOS环境或基于浏览器的模拟器，另一些依赖离线静态数据集；环境保真度的差异影响研究结论的泛化性。
    开放问题:
    - 在内容自主变化的环境中，GUI代理如何鲁棒地控制观察频率和粒度，如LivingScreen所揭示的问题？
    - 技能库和编译状态机在不同应用、平台甚至不同底层代理模型之间的迁移能力如何？
    - 当面对旨在误导视觉接地或触发回退机制的对抗性UI布局时，GUI代理的失败模式是什么？
    - 像PreAct这样的方法取得的效率提升（8.5–13倍加速）能否在回退错误不可接受的安全关键场景中保持？
