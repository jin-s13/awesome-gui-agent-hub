  related_work_outline:
  - 'Mainstream direction: Constructing real-world, long-horizon, multi-application
    GUI automation benchmarks with diverse interaction modalities (click, drag, CLI)
    and dynamic content, evaluated via fine-grained diagnostic metrics beyond task
    success rates.'
  - 'Shared research pattern: Most works build benchmarks on real or simulated environments,
    employ vision-language model agents, and introduce multi-dimensional evaluation
    metrics (sub-goal scores, uncertainty quantification, cost-accuracy) to probe
    agent capabilities.'
  - 'Key differences: Benchmarks differ in platform focus (desktop, mobile, short-video),
    interaction coverage (drag, GUI+CLI), evaluation granularity (UQ, sub-goal completion,
    observation control), and data construction paradigm (fully manual annotation
    vs. weak supervision/skill libraries).'
  - 'Trend evolution: From 2024 to 2026, the field shifts from static single-step
    tasks to dynamic, long-horizon, multimodal interactions, with evaluation evolving
    from aggregate accuracy to fine-grained diagnostics and a growing interest in
    data-efficient agent training approaches.'
  - 'Open questions: Whether benchmark distributions cover the full breadth of real-world
    user tasks, alignment of proxy metrics with downstream user decisions, generalizability
    of UQ and diagnostic metrics across model classes and interfaces, and transferability
    of weak-supervision methods to benchmark creation itself.'
  related_work_outline_zh:
  - 主流方向：构建真实世界、长时域、多应用的GUI自动化基准，覆盖拖拽、GUI+CLI等多样化交互模态和动态内容，并通过细粒度诊断指标（如子目标评分、不确定性量化、成本-准确性）评估代理能力。
  - 研究共性：多数工作基于真实或模拟环境构建基准，采用视觉语言模型作为代理，并引入超越任务成功率的多维度评估指标，以探测代理的深层次能力。
  - 关键差异：基准在平台焦点（桌面、移动、短视频）、交互覆盖（拖拽、GUI+CLI）、评估粒度（UQ、子目标完成、观察控制）及数据构建范式（全人工标注 vs.
    弱监督/技能库）上存在分化。
  - 趋势演进：2024至2026年间，领域从静态单步任务转向动态、长时域、多模态交互，评估从聚合准确率演变为细粒度诊断，同时对数据高效训练方法的兴趣日益增长。
  - 开放问题：基准分布是否覆盖真实用户任务的全部广度，代理指标与下游用户决策的一致性，诊断指标在不同模型类别和接口间的泛化力，以及弱监督方法能否直接用于基准创建本身。
  literature_review:
    line_of_work_matrix:
    - line: Real-world GUI automation benchmark design
      what_it_solves: Creates long-horizon, multi-application tasks and environments
        spanning desktop, mobile, and dynamic interfaces to evaluate agent capabilities
        beyond simple single-step operations.
      what_remains_open: Platform coverage is still fragmentary (macOS, short-video
        apps); tasks may not represent the full distribution of real user intents;
        dynamic content handling and cross-platform generalization are underexplored.
    - line: Fine-grained evaluation and diagnostic metrics
      what_it_solves: Provides multi-dimensional assessment—sub-goal scores, uncertainty
        quantification, cost-accuracy, observation control—to diagnose agent failure
        modes and reliability, moving beyond aggregate success rates.
      what_remains_open: Uncertainty quantification is largely limited to single-step
        grounding, not multi-step trajectories; alignment between these proxy metrics
        and actual user-perceived utility is unverified; metric ranking stability
        across model tiers and interfaces is weak.
    - line: Comparable baselines and data-efficient training paradigms
      what_it_solves: Establishes standardized baselines, skill libraries, and weak-supervision
        training recipes that reduce annotation cost and enable fairer comparison
        across agents on existing benchmarks.
      what_remains_open: Whether such training paradigms can be directly applied to
        constructing new benchmarks rather than just training agents; stability of
        conclusions under varying implementation details and compute budgets; coverage
        of the skill library or weak-supervision data across diverse applications.
    consensus:
    - All works recognize that real-world GUI automation demands benchmarks with complex,
      multi-step tasks and dynamic environments.
    - There is a shared shift toward evaluation metrics that go beyond end-to-end
      success rate, adopting fine-grained or diagnostic measures (e.g., sub-goal completion,
      uncertainty, cost-accuracy).
    - Vision-language models are the default agent architecture, and their grounding
      and reasoning capabilities are the primary evaluation targets.
    disagreements:
    - 'Benchmark scope differs substantially: some target static desktop or mobile
      GUIs, others focus on dynamic video-based interfaces, and some cover specific
      interaction primitives like drag.'
    - 'Evaluation granularity varies: some emphasize uncertainty quantification and
      spatial safety, others prioritize observation control or hierarchical skill
      composition.'
    - Data construction philosophy splits between fully manually annotated benchmarks
      and approaches that leverage unannotated screenshots or authored skill libraries
      to reduce human effort.
    open_questions:
    - How can uncertainty quantification be extended to multi-step agent trajectories
      and closed-source models where internal states are inaccessible?
    - Do the task distributions in current benchmarks align with the workflows and
      decision-making processes that real users care about?
    - Can weak-supervision and skill-library methods be repurposed to automatically
      generate new benchmarks, rather than only training agents on existing ones?
    - How stable are benchmark conclusions across different implementations of baselines
      and varying compute budgets, especially when fine-grained metrics are used?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实世界GUI自动化基准设计
      解决的问题: 创建长时域、多应用的任务与环境，覆盖桌面、移动及动态界面，评估代理在复杂真实场景下的能力，超越简单单步操作。
      尚未覆盖: 平台覆盖仍碎片化（macOS、短视频应用）；任务可能无法代表真实用户意图的完整分布；动态内容处理和跨平台泛化尚待探索。
    - 路线: 细粒度评估与诊断指标
      解决的问题: 通过子目标评分、不确定性量化、成本-准确性、观察控制等多维度指标，诊断代理的失败模式和可靠性，超越聚合成功率。
      尚未覆盖: 不确定性量化主要限于单步基础，未覆盖多步轨迹；代理指标与用户实际感知效用的对齐未经验证；指标排名在不同模型层级和接口间的稳定性较弱。
    - 路线: 可比基线与数据高效训练范式
      解决的问题: 建立标准化基线、技能库和弱监督训练方案，降低标注成本，并促进在现有基准上更公平的跨代理比较。
      尚未覆盖: 此类训练范式能否直接用于构建新基准，而非仅训练代理；在不同实现细节和算力预算下结论的稳定性；技能库或弱监督数据在不同应用中的覆盖度。
    共识:
    - 所有工作均认识到真实世界GUI自动化需要包含复杂多步任务和动态环境的基准。
    - 普遍转向超越端到端成功率的评估指标，采用细粒度或诊断性度量（如子目标完成度、不确定性、成本-准确性）。
    - 视觉语言模型是默认代理架构，其基础定位和推理能力是主要评估目标。
    分歧:
    - 基准范围差异显著：部分聚焦静态桌面或移动GUI，部分关注动态视频界面，还有部分覆盖拖拽等特定交互原语。
    - 评估粒度各异：有的强调不确定性量化和空间安全，有的侧重观察控制，有的则关注分层技能组合。
    - 数据构建理念分化：全人工标注的基准与利用未标注截图或编写技能库以降低人工成本的方法并存。
    开放问题:
