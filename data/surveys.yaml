    研究路线矩阵:
    - 路线: 面向GUI代理的基准测试与评估框架（含不确定性量化）
      解决的问题: 在不同界面条件（桌面、动态视频、拖拽、不确定性）下衡量代理能力、覆盖范围和可靠性。
