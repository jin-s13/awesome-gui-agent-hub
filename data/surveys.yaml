  related_work_outline:
  - 'Mainstream direction: Building realistic, multi-application GUI benchmarks that
    go beyond static screenshots—covering desktop OS, mobile, dynamic short-video
    feeds, drag interactions, and video-guided tasks—with fine-grained, multi-dimensional
    evaluation.'
  - 'Shared research pattern: Every paper constructs or extends a benchmark/suite
    and then evaluates frontier vision-language agents, revealing that simple pass/fail
    scores hide critical capability differences such as sub-goal completion, observation
    control, or uncertainty calibration.'
  - 'Key differences: Researchers disagree on whether to use real native environments
    (macOS, mobile) versus browser-based simulators, whether to focus on single-step
    UI grounding or multi-step trajectories, and whether to rely on human annotations,
    weak supervision, or multi-modal skill libraries to boost agent performance.'
  - 'Trend evolution: Within the 2026 frontier, the field is moving from static web/app
    tasks to long-horizon, dynamic, and multi-modal interactions, with a clear shift
    toward efficiency-aware metrics (cost-accuracy, observation count) and data-efficient
    training (0.1% of prior data).'
  - 'Open questions: Can a single unified benchmark cover desktop, mobile, and dynamic
    content while remaining reproducible? Do fine-grained sub-goal metrics align with
    real user satisfaction? How can uncertainty quantification transfer across model
    families and deployment interfaces without re-calibration?'
  related_work_outline_zh:
  - 主流方向：构建超越静态截图的真实多应用GUI基准，覆盖桌面系统、移动端、动态短视频、拖拽交互和视频引导任务，并采用细粒度、多维度的评估方式。
  - 研究共性：每项工作都构建或扩展一个基准/套件，然后评估前沿视觉语言代理，发现简单的通过/失败分数掩盖了子目标完成度、观察控制、不确定性校准等关键能力差异。
  - 关键差异：研究者在使用真实原生环境（macOS、移动端）还是浏览器模拟器，聚焦单步UI定位还是多步轨迹，以及依赖人工标注、弱监督还是多模态技能库来提升代理性能上存在分歧。
  - 趋势演进：在2026年前沿中，领域正从静态Web/App任务转向长时程、动态和多模态交互，并明显转向效率感知指标（成本-准确率、观察次数）和数据高效训练（仅需此前数据的0.1%）。
  - 开放问题：能否设计一个统一的基准，同时覆盖桌面、移动和动态内容并保持可重复性？细粒度子目标指标是否与真实用户满意度一致？不确定性量化如何在模型家族和部署接口间迁移而无需重新校准？
  literature_review:
    line_of_work_matrix:
    - line: Comprehensive GUI benchmark task and environment design
      what_it_solves: Creates shared tasks and datasets across diverse platforms (macOS,
        mobile, short-video, drag-based) and interaction types to make agent capabilities
        comparable beyond narrow web or click tasks.
      what_remains_open: Whether the task distribution covers safety-critical scenarios,
        multi-language interfaces, accessibility contexts, and long-tail creative
        user tasks; current environments are mostly single-platform and may not generalize
        to all real-world use cases.
    - line: Fine-grained evaluation metrics and stress-test design
      what_it_solves: Probes prediction, efficiency, and reliability beyond aggregate
        success rates by introducing multi-checkpoint scores, cost-accuracy trade-offs,
        observation control metrics, and uncertainty quantification rankings.
      what_remains_open: Alignment between these proxy metrics and the downstream
        decisions users actually care about; stability of metric rankings across different
        model families, deployment interfaces, and distribution shifts; coverage of
        conformal prediction under calibration-test mismatch.
    - line: Agent learning strategies and data-efficient skill acquisition
      what_it_solves: Reduces reliance on expensive human annotations via weak supervision
        from unannotated screenshots, multi-modal skill libraries that retain visual
        figures, and proactive context management for long-horizon tasks, improving
        agent success rates on complex benchmarks.
      what_remains_open: Robustness of these methods to out-of-distribution applications
        and alternative base models; computational cost of skill construction and
        retrieval; whether gains from weak supervision hold in safety-critical settings
        where annotation errors could be costly.
    consensus:
    - Evaluating GUI agents requires moving beyond simple click-based tasks and static
      screenshots to include dynamic content, multi-step workflows, and diverse interaction
      primitives such as drag, CLI, and video comprehension.
    - A single overall success rate is insufficient; fine-grained metrics like sub-goal
      completion, observation efficiency, and uncertainty calibration are necessary
      to reveal true capability differences among agents.
    - Multi-modal information (visual screenshots, UI figures, and text) is critical
      for successful UI grounding, and purely text-based interfaces or skills degrade
      performance.
    - Realistic environments or high-fidelity simulators are essential for meaningful
      benchmarking, as synthetic or overly simplified tasks fail to capture the complexity
      of practical computer-use scenarios.
    - Uncertainty quantification and context management are emerging as key mechanisms
      to improve agent reliability, especially in long-horizon and dynamic tasks.
    disagreements:
    - 'Benchmarking environments: real native OS desktops (MacAgentBench) versus browser-based
      simulators (LivingScreen) – the former offers fidelity but platform lock-in,
      the latter allows cross-platform and reproducible experiments but may miss OS-level
      interactions.'
    - 'Task granularity: single-step executable UI grounding evaluations (Argus) versus
      multi-step trajectory-based benchmarks (MemGUI-Agent, MacAgentBench) – single-step
      allows systematic UQ analysis, while multi-step captures planning and context
      management.'
    - 'Supervision and data: manually annotated high-quality data (MacAgentBench,
      DragOn) versus weak supervision from massive unannotated screenshots (GUICrafter)
      – manual annotation ensures correctness but limits scale, weak supervision enables
      scale but risks label noise and safety issues.'
    - 'Skill representation: text-only skill libraries versus multi-modal skill artifacts
      that retain embedded visual figures (VISUALSKILL) – pure text is lighter but
      misses visual cues, multi-modal skill improves accuracy but adds complexity.'
    - 'Evaluation focus: pure task success metrics versus efficiency-aware metrics
      (cost-accuracy, observation count) – efficiency metrics reveal hidden costs
      of over-observation, but their correlation with user-perceived task quality
      is not yet established.'
    open_questions:
    - How can we design a unified, cross-platform benchmark that covers desktop, mobile,
      and dynamic content while maintaining reproducibility and low maintenance overhead?
    - Do fine-grained proxy metrics (sub-goal completion, cost-accuracy, UQ rank)
      actually align with real user satisfaction and task success in deployed systems?
    - Why does uncertainty quantification ranking transfer poorly across model families
      and deployment interfaces, and how can we build a universal UQ evaluation protocol
      that works without per-target re-calibration?
    - To what extent do current benchmarks reflect the full distribution of real-world
      user tasks, especially long-tail, creative, or safety-critical scenarios?
    - Can weak supervision and data-efficient training methods (like GUICrafter) achieve
      the same safety and correctness guarantees as fully human-annotated training
      in production systems?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 综合性GUI基准任务与环境设计
      解决的问题: 创建跨平台（macOS、移动端、短视频、拖拽）和不同交互类型的共享任务与数据集，使代理能力在狭窄的Web/点击任务之外具有可比性。
      尚未覆盖: 任务分布是否覆盖安全关键场景、多语言界面、无障碍上下文以及长尾创造性任务；当前环境多为单平台，可能无法泛化到所有真实使用场景。
    - 路线: 细粒度评估指标与压力测试设计
      解决的问题: 通过引入多检查点得分、成本-准确率权衡、观察控制指标和不确定性量化排名，在总分之外检验预测、效率和可靠性。
      尚未覆盖: 这些代理指标与用户真正关心的下游决策之间的一致性；指标排名在不同模型家族、部署接口和分布偏移下的稳定性；共形预测在校准-测试不匹配下的覆盖度。
    - 路线: 代理学习策略与数据高效技能获取
      解决的问题: 通过未标注截图的弱监督、保留视觉图形的多模态技能库以及长时程任务的主动上下文管理，降低对昂贵人工标注的依赖，提升代理在复杂基准上的成功率。
      尚未覆盖: 这些方法在分布外应用和不同基础模型上的鲁棒性；技能构建与检索的计算成本；弱监督的收益在标注错误可能代价高昂的安全关键场景中是否仍然成立。
    共识:
    - 评估GUI代理需要超越简单点击和静态截图，纳入动态内容、多步工作流以及拖拽、CLI、视频理解等多样化交互原语。
    - 单一整体成功率不够；需要子目标完成度、观察效率、不确定性校准等细粒度指标，才能揭示代理之间真正的能力差异。
    - 多模态信息（视觉截图、UI图形和文本）对于成功的UI定位至关重要，纯文本接口或技能会导致性能下降。
    - 真实环境或高保真模拟器对有意义基准测试不可或缺，合成或过度简化的任务无法捕捉实际计算机使用场景的复杂性。
    - 不确定性量化和上下文管理正成为提高代理可靠性的关键机制，尤其是在长时程和动态任务中。
    分歧:
    - 基准环境：真实原生操作系统桌面（MacAgentBench）与基于浏览器的模拟器（LivingScreen）——前者提供高保真度但存在平台锁定，后者允许跨平台和可重复实验，但可能遗漏操作系统级交互。
    - 任务粒度：单步可执行UI定位评估（Argus）与基于多步轨迹的基准测试（MemGUI-Agent、MacAgentBench）——单步便于系统化不确定性分析，多步则能捕捉规划与上下文管理能力。
    - 监督与数据：人工标注的高质量数据（MacAgentBench、DragOn）与来自海量未标注截图的弱监督（GUICrafter）——人工标注确保正确性但限制规模，弱监督可实现规模但存在标签噪声和安全风险。
    - 技能表示：纯文本技能库与保留嵌入视觉图形的多模态技能工件（VISUALSKILL）——纯文本更轻量但丢失视觉线索，多模态技能提升准确性但增加复杂性。
    - 评估焦点：纯粹的任务成功率指标与效率感知指标（成本-准确率、观察次数）——效率指标揭示了过度观察的隐藏成本，但它们与用户感知任务质量的相关性尚未建立。
    开放问题:
    - 如何设计一个统一、跨平台的基准，既能覆盖桌面、移动和动态内容，又能保持可重复性和低维护成本？
    - 细粒度代理指标（子目标完成度、成本-准确率、不确定性排名）在部署系统中是否与真实用户满意度和任务成功对齐？
    - 为什么不确定性量化排名在模型家族和部署接口之间迁移性差，以及如何构建无需针对每个目标重新校准的通用UQ评估协议？
    - 当前基准在多大程度上反映真实世界用户任务的全分布，尤其是长尾、创造性或安全关键场景？
    - 弱监督和数据高效训练方法（如GUICrafter）能否在生产系统中达到与完全人工标注训练相同的安全性和正确性保证？
