  - 'Mainstream direction: Building comprehensive benchmarks and evaluation protocols
    for GUI agents, covering video-guided tasks, uncertainty quantification, safety,
    fraud detection, and long-horizon compositions, while simultaneously developing
    methods to improve agent robustness, context management, and learning from human
    demonstrations or autonomous rewards.'
  - 'Shared research pattern: All works adopt vision-language models as the core agent
    backbone and measure success via task completion rates; they identify failure
    modes related to context length, safety vulnerabilities, or evaluation noise,
    and propose either new benchmarks or training/inference techniques to mitigate
    them.'
  - 'Key differences: Evaluation settings diverge sharply—single-step vs. multi-step,
    browser vs. desktop vs. mobile, and hand-crafted vs. optimized attacks—leading
    to incompatible conclusions about agent capabilities; training paradigms range
    from supervised fine-tuning to RL with noisy rewards, and context handling varies
    from passive history to proactive structured management.'
  - 'Trend evolution: Within the 2024–2026 frontier, the field is shifting from isolated
    capability benchmarks toward integrated assessments that combine task completion
    with safety, uncertainty, and long-horizon reliability; there is a growing emphasis
    on autonomous evaluation and learning from human experience to reduce manual labeling.'
  - 'Open questions: Can safety hardening transfer across application domains, or
    is it inherently domain-conditioned? How can uncertainty estimates be operationally
    integrated into agent decision loops? What protocols enable fair comparison across
    heterogeneous benchmarks and interaction modalities?'
  related_work_outline_zh:
  - 主流方向：构建覆盖视频引导、不确定性量化、安全、欺诈检测和长时程组合的综合基准与评估协议，同时开发提升代理鲁棒性、上下文管理和从人类演示或自主奖励中学习的方法。
  - 研究共性：所有工作均以视觉语言模型为核心代理骨干，以任务完成率衡量成功；识别出与上下文长度、安全漏洞或评估噪声相关的失败模式，并提出新的基准或训练/推理技术来缓解。
  - 关键差异：评估设置在单步与多步、浏览器与桌面与移动、手工与优化攻击之间差异显著，导致关于代理能力的结论不可通约；训练范式从监督微调到带噪奖励的强化学习不等，上下文处理从被动历史到主动结构化管理各异。
  - 趋势演进：在2024–2026前沿窗口内，领域正从孤立的能力基准转向结合任务完成、安全、不确定性和长时程可靠性的综合评估；越来越强调自主评估和从人类经验中学习以减少人工标注。
