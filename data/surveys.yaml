  literature_review_zh:
    研究路线矩阵:
    - 路线: 针对动态和上下文感知GUI代理的形式化定义与假设
      解决的问题: 为动作间内容变化的动态界面以及作为一等公民动作的上下文管理提供操作性定义，从而精确评估观察控制和长时域记忆。
      尚未覆盖: 形式化条件（如动态屏幕原生假设、结构化上下文字段）是否与未见应用中的经验代理行为匹配，以及是否改善评估平台之外的泛化能力。
    - 路线: 面向数据高效代理训练的缩放规律与保证
      解决的问题: 通过可验证任务合成用于在线RL，或利用大规模未标注截图的弱监督，将模型训练与数据效率关联，旨在降低人工标注成本并维持或提升任务成功率。
      尚未覆盖: 直接验证所提出的缩放方法（Frontier Sampling、视觉定位预训练）能否可靠预测分布外任务上的代理失败，以及性能增益是否随模型规模扩大而按比例保持。
    - 路线: 交互模态与可靠性技术的概念分类与边界
      解决的问题: 将碎片化的GUI交互类型（拖拽、多模态技能检索）和后验不确定性量化方法组织为框架，澄清代理能做什么和不能做什么，以及如何评估其置信度。
      尚未覆盖: 这些分类是否改变研究者设计或评估代理的方式；例如，UQ排名跨模型类别的迁移性弱，拖拽交互覆盖可能无法扩展到所有真实世界GUI范式。
    共识:
    - 所有工作一致认为GUI代理必须处理超越简单点击的动作，需要更丰富的交互抽象，如拖拽、动态内容观察和主动上下文管理。
    - 视觉信息（截图、图形）始终被视为关键，多模态技能工件或视觉定位被用于改善UI元素识别。
    - 评估可信度是共同关注点：引入细粒度指标、多检查点评分和不确定性量化，以超越粗粒度的任务成功率。
    - 普遍认识到当前前沿模型缺乏某些能力，特别是动态界面中的观察控制和可靠的置信度估计，这推动了新基准的构建。
    分歧:
    - 代理知识的表示方式：层次化多模态技能库 vs. 结构化上下文字段及显式上下文管理动作 vs. 从未标注数据的视觉定位。
    - 监督与训练：可验证任务合成的在线RL与未标注截图弱监督，以及带上下文标注的监督微调形成对比。
    - 评测目标：任务成功率与子目标完成度 vs. 信息效率（成本-准确性） vs. 不确定性估计的校准。
    - 交互范式：动作间内容变化的动态屏幕原生界面 vs. 基于拖拽的交互 vs. 传统点击GUI，对环境稳定性的假设不同。
    - 部署场景：macOS桌面应用、基于浏览器的短视频平台和移动环境，分别导致不同的界面约束和评估协议。
    开放问题:
    - 能否通过将UQ训练集成到代理学习过程中，而非依赖后验方法，来改善UQ排名的跨模型层级迁移性？
    - 形式化上下文管理策略（如ConAct）能否泛化到工作流结构截然不同的应用，其失败模式是什么？
    - 拖拽交互分类是否足以覆盖真实世界GUI操作的全部范围，应如何扩展？
    - 可验证任务合成如何在避免基准污染的同时，扩展到真实计算机使用场景的多样性？
