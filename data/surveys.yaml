    benchmarks toward finer-grained interaction modalities (drag, dynamic screens)
    and toward agent efficiency/reliability methods, all within the current frontier
    of frontier VLMs.'
  - 'Open questions: How to unify evaluation across heterogeneous interaction modalities
    and platforms, whether skill and knowledge transfers across applications, how
    agents can control observation in dynamically changing interfaces, and how to
    close the gap between benchmark performance and real-world deployment.'
  related_work_outline_zh:
  - 主流方向：构建面向特定领域的基准测试与增强方法，以评估和提升GUI代理在桌面、移动、网页、动态界面和拖拽等真实任务上的能力。
  - 研究共性：多数工作围绕特定应用场景构建任务集或基准，然后评测前沿视觉语言模型，揭示性能差距，这些差距通常归因于观察控制不足、交互模态覆盖不全或对视觉历史的推理薄弱。
  - 关键差异：目标平台/应用（macOS桌面、短视频平台、拖拽交互、视频引导任务、欺诈检测）和提升策略（多模态技能库、执行编译、历史感知评判、关键帧提取）存在显著差异。
  - 趋势演进：2024至2026年，焦点从宽泛的桌面/点击基准转向更细粒度的交互模态（拖拽、动态屏幕）以及代理效率与可靠性方法，演变处于当前前沿视觉语言模型的探索阶段。
  - 开放问题：如何统一异构交互模态与平台下的评测，技能与知识能否跨应用迁移，代理如何在动态变化界面中控制观察，以及如何缩小基准性能与真实部署之间的差距。
  literature_review:
    line_of_work_matrix:
    - line: Domain-specific benchmark suites and evaluation frameworks
      what_it_solves: Systematically assesses GUI agent capabilities on real-world
        tasks from office automation, dynamic video platforms, drag interactions,
        and fraud detection, revealing performance gaps and failure modes.
      what_remains_open: No unified benchmark across platforms and interaction modalities;
        benchmarks are mostly static snapshots lacking continuous alignment with evolving
        real-world environments; evaluation cost and reproducibility remain concerns.
    - line: Agent efficiency and reliability enhancement methods
      what_it_solves: Improves agent speed on repeated tasks via execution compilation,
        planning accuracy via history-aware visual critics, and task success via multimodal
        skill libraries that retain visual figures.
      what_remains_open: Cross-application transfer of skills and compiled programs;
        dynamic updating when UIs or workflows change; robustness of critics to unseen
        task distributions and edge cases.
    - line: Multimodal interaction expansion beyond click-based paradigms
      what_it_solves: Extends GUI agents to drag-based operations, dynamic content
        that changes between actions, and video-guided tasks, addressing missing observation
        control and interaction grounding.
      what_remains_open: Generalization across combinations of interaction modalities
        (e.g., drag + dynamic screen); human-level cost-accuracy trade-offs; robustness
        to real-world streaming and latency constraints.
    - line: Safety-critical application of GUI agents
      what_it_solves: Tests agentic reasoning for fraud detection without reputation
        shortcuts, revealing that current models over-rely on suspicious cues and
        struggle with benign recall under sanitized evidence.
      what_remains_open: Limited to SMS-to-webpage fraud with 699 cases; no evaluation
        of adversarial robustness, other scam types, or real-time deployment; explainability
        of agent decisions remains unaddressed.
    consensus:
    - Current GUI agents, even advanced VLMs, exhibit significant performance gaps
      when applied to real-world, domain-specific tasks beyond simplified click-based
      benchmarks.
    - Visual grounding and history-aware reasoning are critical for improving agent
      performance, yet most models lack effective observation control and long-horizon
      planning.
    - Benchmarks that capture diverse interaction types (e.g., drag, dynamic content,
      CLI+GUI) and fine-grained metrics are necessary to reveal hidden weaknesses
      that single-pass metrics obscure.
    - Enhancing agents with external knowledge (skills, compiled programs, critics)
      yields consistent gains, but the generalizability of these enhancements across
      platforms and task distributions is unproven.
    disagreements:
    - 'Task scope: some works focus on static desktop productivity (e.g., macOS apps),
      others on dynamic, entertainment-oriented interfaces (short-video apps), and
      still others on high-stakes safety tasks (fraud detection), leading to different
      evaluation priorities and success criteria.'
    - 'Improvement strategy: methods diverge into pre-computed skill libraries (VISUALSKILL),
      runtime compilation of execution traces (PreAct), and critic models that intervene
      before action execution (HiViG), each with different assumptions about task
      repetition and agent architecture.'
    - 'Efficiency vs. success: PreAct emphasizes speedup on repeated tasks, while
      most benchmarks optimize for task success rate, indicating a trade-off between
      computational cost and accuracy that is not jointly addressed.'
    - 'Evaluation realism: FraudSMSWalker deliberately suppresses URL and reputation
      cues to test pure reasoning, whereas other benchmarks retain all real-world
      information, reflecting different positions on whether shortcuts should be removed
      or leveraged.'
    open_questions:
    - Can a single agent architecture handle the full spectrum of interaction modalities
      (click, drag, dynamic content, video guidance) without task-specific modifications?
    - How can skills and compiled programs be updated or transferred when the underlying
      application UI or workflow changes, without requiring full re-training or re-compilation?
    - What is the right balance between observation frequency and task completion
      cost in dynamic interfaces, and can agents learn to adaptively control their
      own observation rate?
    - Are current benchmarks sufficient to predict real-world deployment success,
      especially for safety-critical applications like fraud detection where the cost
      of false positives and false negatives is highly asymmetric?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 领域特定基准与评估体系
      解决的问题: 系统评估GUI代理在办公自动化、动态视频平台、拖拽交互和欺诈检测等真实任务上的能力，揭示性能差距与失败模式。
      尚未覆盖: 缺乏跨平台与跨交互模态的统一基准；现有基准多为静态快照，未与真实环境持续对齐；评估成本与可复现性仍存顾虑。
    - 路线: 代理效率与可靠性增强方法
      解决的问题: 通过执行编译提升重复任务速度，借助历史感知视觉评判改善规划准确性，并利用保留视觉图形的多模态技能库提升任务成功率。
      尚未覆盖: 技能与编译程序的跨应用迁移；UI或工作流变化时的动态更新；评判模型对未见任务分布与边缘情况的鲁棒性。
    - 路线: 超越点击范式的多模态交互扩展
      解决的问题: 将GUI代理扩展到拖拽操作、操作间内容变化的动态界面以及视频引导任务，弥补观察控制与交互基础能力的不足。
      尚未覆盖: 交互模态组合（如拖拽+动态界面）的泛化；人类水平的成本-准确性权衡；对真实世界流式传输与延迟约束的鲁棒性。
    - 路线: 安全关键应用中的GUI代理
      解决的问题: 测试代理在无信誉捷径下的欺诈检测推理能力，揭示当前模型过度依赖可疑线索、在净化证据下难以保持良性召回的问题。
      尚未覆盖: 仅限于短信到网页欺诈的699个案例；未评估对抗鲁棒性、其他诈骗类型或实时部署；决策可解释性尚未涉及。
    共识:
    - 当前GUI代理，即使是先进的视觉语言模型，在应用于真实、领域特定任务时仍表现出显著性能差距，远非简化点击基准所能反映。
