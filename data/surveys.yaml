  - 研究共性：提出新任务或交互类型（如macOS桌面、拖拽、动态屏幕），设计细粒度评分基准，评估多个前沿模型揭示能力差距，然后提出方法（技能库、强化学习、弱监督、上下文管理）提升该缺口上的表现。
  - 关键差异：工作聚焦的交互模态不同（点击 vs. 拖拽，仅GUI vs. GUI+CLI，静态 vs. 动态屏幕），监督信号不同（未标注截图的弱监督 vs.
    可验证RL任务 vs. 专家演示SFT），以及是否通过不确定性量化或代理上下文管理来解决可靠性问题。
  - 趋势演进：2024至2026年间，前沿从基本GUI定位基准转向更复杂的多模态、长时程设置，2026年明显强调可验证RL用于规模化、多模态技能复用以及主动上下文管理以克服观察限制和会话长度。
  - 开放问题：当前后验不确定性估计在模型家族和界面间的迁移程度如何，能否保证安全部署？弱监督或RL训练的代理能否在未见应用上匹配手工技能库的鲁棒性？动态内容界面需要哪些最小观察控制能力？
  literature_review:
    line_of_work_matrix:
    - line: Benchmarking new interaction modalities and dynamic environments
      what_it_solves: Defines tasks and metrics for under-explored GUI interaction
        types (drag, GUI+CLI, living-screen content) to measure agent capabilities
        beyond static click-based web tasks.
      what_remains_open: Whether findings from a single platform (e.g., short-video,
        macOS) generalize to other dynamic interfaces, and whether the proposed fine-grained
        metrics predict real-world user satisfaction remains unverified.
    - line: Scaling agent training via verifiable or weak supervision
      what_it_solves: Reduces dependence on costly human annotations by generating
        verifiable RL tasks or using unannotated screenshots for visual grounding,
        enabling larger-scale training of GUI agents.
      what_remains_open: The generalization of weakly supervised or RL-trained agents
        to out-of-distribution applications and tasks, especially under distribution
        shift, has not been rigorously characterized against strong skill-library
        baselines.
    - line: Enhancing agent reliability through uncertainty quantification
      what_it_solves: Provides post-hoc confidence measures for GUI grounding predictions,
        enabling selective reject or spatial safety margins for high-risk actions.
      what_remains_open: Cross-model and cross-interface UQ ranking transfer is weak,
        and conformal coverage degrades under distribution shift, leaving deployment-time
        safety guarantees unresolved.
    - line: Structured knowledge and context management for long-horizon tasks
      what_it_solves: Improves performance on multi-step, long-horizon tasks by encoding
        multimodal skill libraries or by letting agents actively manage context history
        to retain critical information.
      what_remains_open: It is unclear whether hand-crafted skill libraries or learned
        context management policies are more robust to unseen application updates,
        and whether the added complexity is necessary for shorter tasks.
    consensus:
    - Fine-grained evaluation (sub-goal completion, multi-checkpoint scoring, cost-accuracy)
      reveals capability differences that pass@1 or success rate alone masks.
    - Current frontier models still lack robust observation control, leading to over-
      or under-observation in dynamic interfaces.
    - Multimodal information (visual figures, screenshots) is essential for UI element
      identification and state verification, and removing it hurts performance.
    - Training or fine-tuning with task-specific data (RL, SFT, or weak supervision)
      can lift performance beyond strong zero-shot baselines.
    disagreements:
    - Whether to invest in hand-designed skill libraries (VISUALSKILL) versus learned
      policies from RL or weak supervision (ScaleCUA, GUICrafter) for generalizing
      across applications.
    - Whether agent context management should be passive (full history) or proactive
      (ConAct), and whether structured context fields outperform simple compaction.
    - 'What constitutes a safe agent: some works focus on spatial uncertainty (conformal
      regions), while others address task-level verification (RL with verifiable tasks)
      without explicit safety margins.'
    open_questions:
    - How can uncertainty quantification be integrated into multi-step agent trajectories,
      given that current UQ benchmarks only cover single-step grounding?
    - Do the gains from weakly supervised or RL-trained agents persist when tested
      on truly unseen application ecosystems, or are they primarily fitting to the
      training benchmark distribution?
    - What is the minimal set of observation control primitives needed for agents
      to handle living-screen interfaces without over- or under-observation?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 新交互模态与动态环境的基准构建
      解决的问题: 为尚未充分探索的GUI交互类型（拖拽、GUI+CLI、短视频动态内容）定义任务和度量，以衡量代理超越静态点击式网页任务的能力。
      尚未覆盖: 单一平台（如短视频、macOS）的发现能否推广到其他动态界面，以及所提出的细粒度指标是否预测真实用户满意度，尚未得到验证。
    - 路线: 通过可验证或弱监督信号扩展代理训练
      解决的问题: 通过生成可验证RL任务或利用未标注截图进行视觉定位，减少对昂贵人工标注的依赖，实现更大规模的GUI代理训练。
      尚未覆盖: 弱监督或RL训练代理在分布外应用和任务上的泛化能力，尤其是在分布偏移下，尚未与强技能库基线进行严格对比。
    - 路线: 通过不确定性量化增强代理可靠性
      解决的问题: 为GUI定位预测提供后验置信度度量，支持高风险动作的选择性拒绝或空间安全裕度。
      尚未覆盖: 跨模型和跨界面的UQ排名迁移较弱，分布偏移下共形覆盖度下降，使得部署时的安全保证仍然悬而未决。
    - 路线: 面向长时程任务的结构化知识与上下文管理
      解决的问题: 通过编码多模态技能库或让代理主动管理上下文历史以保留关键信息，提升多步长时程任务的性能。
      尚未覆盖: 手工技能库与学习到的主动上下文管理策略在面对未见过的应用更新时哪个更鲁棒，以及这种额外复杂性对于短任务是否必要，尚不清楚。
    共识:
    - 细粒度评估（子目标完成率、多检查点评分、成本-准确性）揭示出仅靠通过率或成功率无法反映的能力差异。
    - 当前前沿模型仍缺乏可靠的观察控制，在动态界面中会出现过度观察或观察不足。
    - 多模态信息（视觉图形、截图）对于UI元素识别和状态验证至关重要，移除它们会降低性能。
    - 使用任务特定数据（RL、SFT或弱监督）进行训练或微调，能够超越强零样本基线。
    分歧:
    - 是投资于手工设计的技能库（如VISUALSKILL），还是依赖RL或弱监督学习到的策略（如ScaleCUA、GUICrafter）来实现跨应用泛化。
    - 代理上下文管理应采用被动方式（完整历史）还是主动方式（ConAct），以及结构化上下文字段是否优于简单压缩。
    - 什么构成安全代理：有些工作关注空间不确定性（共形区域），另一些则通过可验证任务解决任务级验证，但未明确引入安全裕度。
    开放问题:
    - 当前UQ基准仅覆盖单步定位，如何将不确定性量化集成到多步代理轨迹中？
    - 弱监督或RL训练代理的收益在真正未见过的应用生态中是否持续，还是主要拟合于训练基准分布？
    - 代理处理动态视频界面所需的最小观察控制原语集是什么，以避免过度观察或观察不足？
