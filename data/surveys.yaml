  related_work_outline:
  - 'Mainstream direction: Building realistic, long-horizon benchmarks and agent frameworks
    for GUI automation, with growing emphasis on safety, uncertainty quantification,
    and learning from human experience.'
  - 'Shared research pattern: Researchers construct new datasets or evaluation protocols
    exposing specific agent weaknesses (context drift, low benign recall, domain-conditioned
    safety), then propose interventions such as active context management, noise-corrected
    RL, or keyframe extraction.'
  - 'Key differences: Evaluation protocols differ—single-turn vs. multi-turn—leading
    to different failure profiles (artifact precision vs. session management). Safety
    scope varies (browser vs. coding), and reward signals come from either autonomous
    evaluators or human demonstrations.'
  - 'Trend evolution: Within 2024–2026, the frontier has moved from isolated atomic
    tasks to composed long-horizon workloads, and from ignoring safety to auditing
    it. Papers also show a shift toward reproducibility concerns and scaling agent
    learning with minimal human annotation.'
  - 'Open questions: How to design safety hardening that generalizes across domains;
    how to manage session state in multi-turn tasks without losing progress; whether
    UQ ranking transfers across model tiers; and how to detect fraud when reputation
    shortcuts are unavailable.'
  related_work_outline_zh:
  - 主流方向：构建真实、长时程的GUI自动化基准与代理框架，并在安全、不确定性量化和从人类经验中学习方面投入更多关注。
  - 研究共性：研究者通过构建新数据集或评估协议来暴露代理的特定弱点（如上下文漂移、良性召回低、领域条件安全），然后提出主动上下文管理、噪声校正强化学习或关键帧提取等干预措施。
  - 关键差异：评估协议不同（单轮 vs 多轮），导致不同的失败模式（工件精度 vs 会话管理）。安全评估范围不同（浏览器 vs 编码），奖励信号来源也不同（自主评估器
    vs 人类演示）。
  - 趋势演进：在2024-2026年期间，前沿从孤立原子任务转向组合长时程工作负载，从忽视安全转向主动审计，并开始关注可复现性和最小化人工标注的代理学习。
  - 开放问题：如何设计跨领域泛化的安全加固；如何在多轮任务中管理会话状态而不丢失进度；UQ排名能否跨模型层级迁移；在缺少信誉捷径时如何检测欺诈。
  literature_review:
    line_of_work_matrix:
    - line: Benchmarking and evaluation frameworks for GUI agents
      what_it_solves: Provides standardized tasks and metrics to measure agent performance
        on real-world desktop/mobile/web tasks, including long-horizon compositions,
        safety attacks, and fraud detection.
      what_remains_open: Existing benchmarks are often restricted to one domain (desktop,
        browser) and use inconsistent evaluation protocols (single-turn vs. multi-turn).
        Some artificially suppress real-world cues (e.g., URL reputation), limiting
        ecological validity. Cross-platform unification and protocol compatibility
        remain open.
    - line: Long-horizon task execution and context management
      what_it_solves: Addresses context window overflow and information loss in tasks
        spanning dozens of steps, using proactive context actions (ConAct) or task-chain
        composition to improve completion rates.
      what_remains_open: Proactive context management is validated on a single model
        size; generalizability is unknown. Even with composition, maximum chain completion
        is only 31%, and multi-turn session management problems (fragmented progress,
        disengagement) persist.
    - line: Safety and robustness auditing
      what_it_solves: Evaluates agent vulnerability to prompt injection and SMS-to-webpage
        fraud, revealing domain-conditioned safety and the limits of hand-crafted
        attack templates.
      what_remains_open: Safety hardening does not transfer across domains (browser-safe
        agents fail on coding tasks). Fraud detection models suffer low benign recall
        when reputation shortcuts are removed. Optimized RL attack strings are not
        reproduced, leaving published ASR claims unverifiable.
    - line: Learning from human demonstrations and autonomous improvement
      what_it_solves: Leverages human screen recordings or autonomous VLM evaluators
        to improve agent policy and planning, reducing the need for manual reward
        design.
      what_remains_open: Autonomous evaluators introduce noise that must be corrected;
        the evaluator's own imperfection caps the learning ceiling. Generated tutorials
        and agent generalization are validated on limited datasets, and the gap between
        human-authored and generated tutorials is not fully characterized.
    - line: Uncertainty quantification for GUI grounding
      what_it_solves: Provides post-hoc confidence scores for agent decisions to enable
        safe operation, and benchmarks 27 UQ methods across models and datasets to
        assess ranking stability.
      what_remains_open: UQ ranking transfers poorly across model tiers (open-weight
        to closed-source), necessitating target-specific re-evaluation. Coverage of
        conformal prediction degrades under distribution shift. Only single-step grounding
        is considered; multi-step trajectory UQ remains unexplored.
    consensus:
    - GUI agents struggle with long-horizon tasks due to context management and coherent
      multi-step execution, with success rates remaining low across all evaluated
      protocols.
    - Safety is a critical but domain-dependent property; a model hardened on browser
      tasks may remain vulnerable to simple skill-injection attacks on coding tasks.
    - Learning from human experience—whether through screen recordings or autonomous
      evaluation—consistently improves agent performance and generalization, but the
      quality of the supervision signal is a limiting factor.
    - Standardized benchmarks are essential to measure progress, and there is a shift
      toward including real-world complexity (long horizons, safety, missing reputation
      cues) to expose hidden failure modes.
    - Uncertainty quantification can add reliability to agent actions, but its effectiveness
      is sensitive to model architecture and distribution shifts, requiring careful
      calibration per deployment context.
    disagreements:
    - 'Evaluation protocol: single-turn prompting stresses artifact precision, while
      multi-turn sequential revelation exposes session management failures; no consensus
      on which protocol better reflects real-world usage.'
    - 'Safety scope: Some work focuses on browser-based prompt injection and finds
      high resistance, while others demonstrate that coding-domain agents fail catastrophically,
      indicating that safety is not a monolithic property.'
    - 'Reputation shortcuts in fraud detection: one benchmark suppresses URL/host
      cues to test pure content reasoning, but real-world systems often have access
      to such signals—creating a tension between controlled evaluation and practical
      applicability.'
    - 'UQ transferability: Within-model ranking is stable, but cross-model transfer
      is near-zero, suggesting that benchmarking results from open-weight models cannot
      be directly applied to closed-source systems without re-validation.'
    - 'Context management strategy: passive accumulation of history vs. proactive
      context actions (ConAct) represent fundamentally different approaches to handling
      long trajectories, and evidence on which is superior under different memory
      budgets is not yet conclusive.'
    open_questions:
    - Can safety hardening be designed to generalize across GUI domains (browser,
      desktop, coding) without sacrificing performance on benign tasks?
    - How can multi-turn session management be improved to avoid fragmented progress
      and later-turn disengagement in long-horizon tasks?
    - Is it possible to transfer UQ rankings from open-weight to closed-source models
      without repeating the full benchmark, and what calibration methods can bridge
      the gap?
    - What level of reputation cue suppression is appropriate for a realistic fraud
      detection benchmark, and how can we avoid overfitting to artificial absence
      of shortcuts?
    - How can autonomous evaluator noise be further reduced to close the gap between
      RL-fine-tuned agents and those trained with human-verified rewards?
  literature_review_zh:
    研究路线矩阵:
    - 路线: GUI代理的基准测试与评估框架
      解决的问题: 提供标准化任务和指标，衡量代理在真实桌面/移动/网页任务上的表现，包括长时程组合、安全攻击和欺诈检测。
      尚未覆盖: 现有基准通常局限于单一领域，评估协议不一致（单轮/多轮）。部分基准人为抑制真实世界线索（如URL信誉），生态效度有限。跨平台统一和协议兼容性仍未解决。
    - 路线: 长时程任务执行与上下文管理
      解决的问题: 解决数十步任务中上下文窗口膨胀和信息丢失问题，通过主动上下文动作（ConAct）或任务链组合提高完成率。
      尚未覆盖: 主动上下文管理仅在单一模型尺寸上验证，泛化性未知。即使组合任务，最高链完成率仅31%，多轮会话管理问题（进度碎片化、脱离）持续存在。
    - 路线: 安全与鲁棒性审计
      解决的问题: 评估代理在提示注入和短信到网页欺诈中的脆弱性，揭示领域条件安全以及手工攻击模板的局限性。
      尚未覆盖: 安全加固不能跨领域迁移（浏览器安全的代理在编码任务上失败）。去除信誉捷径后，欺诈检测模型良性召回低。优化的RL攻击字符串未被复现，导致已发表的攻击成功率无法验证。
    - 路线: 从人类演示与自主改进中学习
      解决的问题: 利用人类屏幕录制或自主VLM评估器来改善代理策略和规划，减少对手工奖励设计的依赖。
      尚未覆盖: 自主评估器引入噪声，必须校正；评估器本身的不完美限制了学习上限。生成的教程和代理泛化仅在有限数据集上验证，人工编写与生成教程之间的差距未充分表征。
    - 路线: GUI基础的不确定性量化
      解决的问题: 为代理决策提供事后置信度，以支持安全操作，并基准测试27种UQ方法在不同模型和数据集上的排名稳定性。
      尚未覆盖: UQ排名跨模型层级迁移差（开源到闭源），需要针对目标重新评估。共形预测的覆盖度在分布偏移下下降。仅考虑单步基础，多步轨迹的UQ尚未探索。
    共识:
    - GUI代理在处理长时程任务时因上下文管理和连贯的多步执行而挣扎，各项评估协议下的成功率均很低。
    - 安全是一个关键但领域依赖的属性；在浏览器任务上加固的模型在编码任务上可能仍然容易受到简单的技能注入攻击。
    - 从人类经验中学习（无论是通过屏幕录制还是自主评估）都能持续改善代理的性能和泛化能力，但监督信号的质量是一个限制因素。
    - 标准化基准对于衡量进展至关重要，且正向包含真实世界复杂性（长时程、安全、缺失信誉线索）的方向转变，以暴露隐藏的失败模式。
    - 不确定性量化可以增加代理动作的可靠性，但其有效性对模型架构和分布偏移敏感，需要针对每个部署场景仔细校准。
    分歧:
    - 评估协议：单轮提示强调工件精度，而多轮顺序揭示暴露会话管理失败；尚未就哪种协议更贴近真实使用达成共识。
    - 安全范围：部分工作关注浏览器提示注入并发现高抵抗力，而其他工作显示编码领域代理会灾难性失败，表明安全并非单一属性。
    - 欺诈检测中的信誉捷径：一个基准抑制URL/主机线索以测试纯粹内容推理，但现实系统通常可获取此类信号，造成受控评估与实际应用之间的张力。
    - UQ可迁移性：模型内排名稳定，但跨模型迁移几乎为零，提示开源模型的基准测试结果不能直接应用于闭源系统，需重新验证。
