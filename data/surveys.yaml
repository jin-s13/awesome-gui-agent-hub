    interaction into discrete capabilities, then evaluating frontier VLMs on task
    completion and sub-goal metrics under controlled assumptions.'
  - 'Key differences: Task granularity (single-step grounding vs. long-horizon trajectories),
    interaction modality (click, drag, GUI+CLI), supervision signal (weakly-supervised
    from screenshots vs. verifiable RL rewards), and environment dynamics (static,
    rule-based, or living-screen).'
  - 'Trend evolution: Within 2024–2026, the frontier is shifting from static click-based
    benchmarks toward dynamic, multi-modal, and multi-app settings, with an emerging
    emphasis on reliability framing via uncertainty quantification and context management.'
  - 'Open questions: Whether uncertainty rankings transfer across agents and interfaces,
    how to define verifiable safety properties for GUI agents, and whether current
    capability decompositions hold under real-world distribution shifts.'
  related_work_outline_zh:
  - 主流方向：以经验基准测试和技能增强为核心的GUI代理研究，逐步关注多步任务分解、观察控制与不确定性量化。
  - 研究共性：提出一个基准或方法，将GUI交互分解为离散能力，然后在受控假设下用任务完成度及子目标指标评估前沿VLM。
  - 关键差异：体现在任务粒度（单步定位 vs. 长时域轨迹）、交互模态（点击、拖拽、GUI+CLI）、监督信号（弱监督截图 vs. 可验证RL奖励）以及环境动态性（静态规则
    vs. 动态短视频界面）。
  - 趋势演进：2024–2026年间，前沿从静态的点击式基准转向动态、多模态、多应用场景，并开始通过不确定性量化和上下文管理引入可靠性框架。
  - 开放问题：不确定性排名是否跨代理和界面迁移，如何为GUI代理定义可验证的安全属性，当前能力分解在真实世界分布偏移下是否仍然成立。
  literature_review:
    line_of_work_matrix:
    - line: Capability-granularity benchmarking and interaction-space decomposition
      what_it_solves: Reveals where agents fail by splitting GUI tasks into sub-goals,
        interaction types (drag, click, GUI+CLI), and dynamic vs. static screens,
        exposing performance cliffs beyond aggregate pass rates.
      what_remains_open: No formal mapping from decomposition to safety guarantees;
        benchmarks are limited to specific platforms or app sets, and transfer of
        capability profiles across benchmarks is not systematically validated.
    - line: Skill augmentation and multimodal knowledge retrieval
      what_it_solves: Improves task completion by equipping agents with hierarchically
        organized, visually grounded skill libraries that reduce reliance on model-internal
        knowledge and improve UI element identification.
      what_remains_open: Skills are authored per application and may not generalize
        to unseen interfaces; the approach assumes a static skill base, and the failure
        modes when skills are outdated or conflicting are not studied.
    - line: Uncertainty quantification and reliability framing for GUI grounding
      what_it_solves: Provides post-hoc confidence scores for GUI actions, enabling
        selective execution, human-in-the-loop fallback, and conformal prediction-based
        spatial safety regions.
      what_remains_open: UQ ranking transfer across model families and interfaces
        is weak; conformal coverage degrades under distribution shift, and the link
        to end-to-end task success or safety in multi-step trajectories is not established.
    - line: Context management and long-horizon agent architectures
      what_it_solves: Addresses performance degradation in long tasks by treating
        context management as a first-class action, preserving critical information
        while keeping the context window compact.
      what_remains_open: The approach is validated on a specific 8B model; the interaction
        between proactive context actions and safety-critical state tracking is not
        examined, and the design assumes a fixed context structure that may not suit
        all tasks.
    - line: Weakly-supervised and RL-based training for GUI agents
      what_it_solves: Reduces the need for expensive human annotations by leveraging
        unannotated screenshots or automatically generated verifiable tasks, enabling
        scalable training of GUI agents.
      what_remains_open: The quality of learned visual grounding from weak signals
        under adversarial UI changes is not guaranteed; RL reward shaping may introduce
        unintended behaviors, and safety constraints are not part of the training
        objective.
    consensus:
    - GUI agents still lag behind human performance on complex, multi-step tasks,
      and aggregate success rates mask significant variance in sub-goal completion.
    - Incorporating visual information (screenshots, figures) is critical for UI element
      identification and workflow verification, beyond text-only representations.
    - Task verifiability, whether through rule-based checks or execution feedback,
      is a key enabler for scalable training and evaluation.
    - Observation control—the ability to balance information gathering with efficiency—is
      a missing capability in current agents, leading to over- or under-observation.
    disagreements:
    - Whether GUI agent capabilities should be assessed via single-step grounding
      tasks or long-horizon trajectory benchmarks, with different papers advocating
      one or the other.
    - 'How to represent agent skills: some works propose multimodal skill libraries
      with visual figures, while others rely on text-only or model-internal knowledge.'
    - 'The role of uncertainty quantification: some treat it as a standalone post-hoc
      layer for grounding, while others integrate it into action selection or spatial
      safety regions, with no unified framework.'
    - 'The optimal training signal: weakly-supervised learning from unlabeled screenshots
      vs. online RL with verifiable task synthesis, with each claiming data efficiency
      or performance advantages under different assumptions.'
    open_questions:
    - Can uncertainty quantification rankings transfer reliably across different VLM
      families and GUI environments without per-target recalibration?
    - How do proactive context management actions affect the safety and correctness
      of GUI agents in security-critical tasks?
    - What are the formal conditions under which skill libraries or weak supervision
      fail under adversarial UI changes or distribution shifts?
    - Is there a unified framework that connects capability decomposition, uncertainty,
      and long-horizon context management to derive verifiable reliability guarantees
      for GUI agents?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 能力粒度基准测试与交互空间分解
      解决的问题: 通过将GUI任务拆分为子目标、交互类型（拖拽、点击、GUI+CLI）和动态/静态屏幕，暴露代理在聚合通过率之外的能力短板。
      尚未覆盖: 缺乏从分解到安全保证的形式化映射；基准测试局限于特定平台或应用集，能力剖面在不同基准间的迁移未经验证。
    - 路线: 技能增强与多模态知识检索
      解决的问题: 通过为代理配备分层组织、视觉基础化的技能库，减少对模型内部知识的依赖，提升UI元素识别和工作流验证能力。
      尚未覆盖: 技能按应用编写，可能无法泛化到未见界面；假设技能库是静态的，对技能过时或冲突时的失效模式缺乏研究。
    - 路线: GUI定位的不确定性量化与可靠性框架
      解决的问题: 为GUI动作提供事后置信度分数，支持选择性执行、人机协同回退以及基于共形预测的空间安全区域。
      尚未覆盖: UQ排名跨模型家族和接口的迁移性弱；共形覆盖度在分布偏移下下降，且与多步轨迹端到端任务成功或安全的联系尚未建立。
    - 路线: 上下文管理与长时域代理架构
      解决的问题: 通过将上下文管理作为一等动作，在保持上下文窗口紧凑的同时保留关键信息，缓解长任务中的性能退化。
      尚未覆盖: 方法仅在特定8B模型上验证；主动上下文动作与安全关键状态跟踪的交互未被考察；设计假设固定上下文结构，可能不适用于所有任务。
    - 路线: 弱监督与基于强化学习的GUI代理训练
      解决的问题: 通过利用未标注截图或自动生成的可验证任务，减少对昂贵人工标注的依赖，实现GUI代理的可扩展训练。
      尚未覆盖: 在对抗性UI变化下，弱信号学习到的视觉定位质量缺乏保证；RL奖励塑形可能引入非预期行为，且安全约束未纳入训练目标。
    共识:
    - GUI代理在复杂的多步任务上仍落后于人类水平，聚合成功率掩盖了子目标完成度的显著差异。
    - 融入视觉信息（截图、图形）对UI元素识别和工作流验证至关重要，优于纯文本表示。
    - 任务可验证性（通过基于规则的检查或执行反馈）是实现可扩展训练和评估的关键因素。
    - 观察控制——平衡信息收集与效率的能力——是当前代理中缺失的能力，导致过度观察或观察不足。
    分歧:
    - GUI代理能力应通过单步定位任务还是长时域轨迹基准来评估，不同论文各自主张其一。
    - 如何表示代理技能：部分工作提出包含视觉图形的多模态技能库，而其他工作依赖纯文本或模型内部知识。
    - 不确定性量化的角色：有的将其视为定位的独立事后层，有的则将其融入动作选择或空间安全区域，尚无统一框架。
    - 最优训练信号：利用未标注截图的弱监督学习与基于可验证任务合成的在线RL，各自在特定假设下声称数据效率或性能优势。
    开放问题:
    - 不确定性量化排名能否在不需要逐目标重新校准的情况下，可靠地跨不同VLM家族和GUI环境迁移？
