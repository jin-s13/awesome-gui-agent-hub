  literature_review:
    line_of_work_matrix:
    - line: Structured memory and skill libraries for GUI agents
      what_it_solves: Reduces state-level confusion and action grounding errors by
        providing agents with visual or multimodal memories of past interactions and
        task-specific workflows.
      what_remains_open: Skill construction is per-application and labor-intensive;
        the memory representations have not been shown to transfer across diverse
        applications or survive UI updates.
    - line: Data-efficient training through weak supervision and curriculum learning
      what_it_solves: Lowers the need for expensive human-annotated GUI trajectories
        by leveraging massive unlabeled screenshots and contextual signals, then fine-tuning
        with a small curated set.
      what_remains_open: Effectiveness on long-horizon, multi-step professional tasks
        is unverified; the quality of weak supervision signals may degrade under domain
        shift to specialized software.
    - line: Online multi-turn reinforcement learning for web agents
      what_it_solves: Trains agents on live websites with trajectory-level rewards,
        enabling adaptive behavior in realistic, interactive environments and closing
        the gap to proprietary systems.
      what_remains_open: Safety constraints during online exploration, reproducibility
        across different website infrastructures, and scaling to tasks beyond the
        evaluated e-commerce and web benchmarks.
    - line: Safety evaluation and domain-conditioned vulnerability analysis
      what_it_solves: Provides rigorous benchmarks and audits for prompt injection
        resistance in computer-using agents, revealing hardening in browser tasks
        but fragility in coding domains.
      what_remains_open: Defense against RL-optimized injection strings is not measured;
        safety hardening does not generalize across domains, and the audit covers
        only a limited set of attack surfaces.
    - line: Long-horizon benchmarking of professional GUI workflows
      what_it_solves: Creates realistic, multi-step tasks with streaming interaction,
        dynamic environments, and implicit state, giving a more accurate picture of
        agent capabilities and failure modes.
      what_remains_open: Current agents achieve only ~20–30% success; the benchmarks
        themselves are not yet standardized for independent reproduction, and the
        identified failure modes (constraint tracking, mid-task information processing)
        lack targeted solutions.
    consensus:
    - Agents benefit from explicit memory or skill representations that go beyond
      naive full-screen history, improving state understanding and action precision.
    - Training on real or realistic interactive environments (live websites, professional
      software) is essential for closing the gap between research benchmarks and deployment.
    - Long-horizon tasks expose systematic failures—constraint forgetting, error propagation,
      objective drift—that short-step benchmarks miss.
    - 'Safety is domain-conditioned: hardening seen in browser-focused agents does
      not transfer to coding or other tool-use contexts, and existing audits underestimate
      the risk from optimized attacks.'
    disagreements:
    - 'Memory granularity: VISUALSKILL keeps full visual figures in a central index,
      while AGMem stores only local action-grounded image crops, pointing to different
      trade-offs between completeness and precision.'
    - 'Training paradigm: GUICrafter uses offline weak supervision with a small calibration
      step, whereas OpenWebRL relies on online multi-turn RL with live interaction,
      leading to different data requirements and safety profiles.'
    - 'Evaluation scope: OSWorld2.0 and Workflow-GYM emphasize long-horizon professional
      workflows with implicit state, while the safety audit focuses on attacker-injected
      prompts during browser tasks, leaving the intersection of safety and long-horizon
      workflow largely unexplored.'
    open_questions:
    - Can skill libraries like VISUALSKILL be constructed automatically for new applications
      without the two-stage authoring pipeline, and do they remain robust after UI
      redesign?
    - What is the minimal annotation budget and domain coverage needed for weak supervision
      methods to match or exceed online RL on long-horizon benchmarks?
    - How can online RL frameworks incorporate safety constraints without sacrificing
      the exploration benefits that drive their performance gains?
    - Why do models hardened against browser prompt injection remain vulnerable to
      skill injection in coding environments, and what architectural changes would
      close this gap?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 面向GUI代理的结构化记忆与技能库
      解决的问题: 通过为代理提供过去交互和任务特定工作流的视觉或多模态记忆，减少状态级混淆和动作接地错误。
      尚未覆盖: 技能构建是每个应用单独进行的，劳动密集；记忆表示尚未证明能跨不同应用迁移或适应UI更新。
    - 路线: 通过弱监督和课程学习实现数据高效训练
      解决的问题: 利用海量未标注截图和上下文信号，降低对昂贵人工标注GUI轨迹的依赖，然后用少量精选数据微调。
      尚未覆盖: 在长期、多步专业任务上的有效性未经验证；当领域转移到专用软件时，弱监督信号的质量可能会下降。
    - 路线: 面向网页代理的在线多轮强化学习
      解决的问题: 在真实网站上以轨迹级奖励训练代理，使其在现实交互环境中自适应，缩小与专有系统的差距。
      尚未覆盖: 在线探索期间的安全约束、跨不同网站基础设施的可复现性，以及扩展到评估的电子商务和网页基准之外的任务。
    - 路线: 安全评估与领域条件脆弱性分析
      解决的问题: 为计算机使用代理提供严格的提示注入抵抗基准和审计，揭示浏览器任务中的加固但在编码领域中的脆弱性。
      尚未覆盖: 未测量对RL优化注入字符串的防御；安全加固不能跨领域泛化，审计仅覆盖有限的攻击面。
    - 路线: 专业GUI工作流的长期基准测试
      解决的问题: 创建具有流式交互、动态环境和隐式状态的真实多步任务，更准确地反映代理能力和失败模式。
      尚未覆盖: 当前代理仅达到约20-30%的成功率；基准本身尚未标准化以实现独立复现，已识别的失败模式（约束跟踪、任务中途信息处理）缺乏针对性解决方案。
    共识:
    - 代理受益于超出朴素全屏历史的显式记忆或技能表示，提高了状态理解和动作精度。
    - 在真实或逼真的交互环境（实时网站、专业软件）中训练对于缩小研究基准与部署之间的差距至关重要。
    - 长期任务暴露出系统性的失败——约束遗忘、错误传播、目标漂移——这些是短步基准所遗漏的。
    - 安全是领域条件的：在浏览器代理中所见的加固不会转移到编码或其他工具使用上下文，现有审计可能低估了优化攻击的风险。
    分歧:
    - 记忆粒度：VISUALSKILL在中央索引中保留完整视觉图形，而AGMem仅存储局部动作接地图像裁剪，指向完整性与精确性之间的不同权衡。
    - 训练范式：GUICrafter使用离线弱监督加小步校准，而OpenWebRL依赖在线多轮RL和实时交互，导致不同的数据需求和安全特性。
    - 评估范围：OSWorld2.0和Workflow-GYM强调带有隐式状态的长期专业工作流，而安全审计侧重于浏览器任务期间的攻击者注入提示，安全与长期工作流的交集在很大程度上未被探索。
    开放问题:
    - 诸如VISUALSKILL的技能库能否在不依赖两阶段编写流水线的情况下为新应用自动构建，并且在UI重新设计后是否仍保持稳健？
    - 弱监督方法在长期基准上匹配或超越在线RL所需的最小标注预算和领域覆盖范围是多少？
    - 在线RL框架如何在不过度牺牲探索收益的情况下纳入安全约束，以维持其性能提升？
    - 为什么针对浏览器提示注入加固的模型在编码环境中仍然容易受到技能注入的影响，需要哪些架构改变来弥合这一差距？
