  related_work_outline_zh:
  - 主流方向：构建覆盖多种GUI交互（点击、拖拽、动态内容）的综合基准与代理架构，并通过细粒度指标和不确定性量化评估可靠性。
  - 研究共性：引入新数据集或基准并进行多模型评估，然后提出一种方法（技能库、弱监督、上下文管理或程序编译）来改善基准揭示的特定能力差距。
  - 关键差异：交互范围（静态桌面 vs. 动态短视频 vs. 移动长时域）、评估目标（任务成功率 vs. 成本-准确性 vs. 不确定性校准）以及改进策略（数据效率
