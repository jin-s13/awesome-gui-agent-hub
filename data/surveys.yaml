  literature_review:
    line_of_work_matrix:
    - line: Formal definitions and assumptions
      what_it_solves: Clarifies what a GUI agent must represent under dynamic interfaces
        and how to quantify prediction uncertainty, providing a foundation for reliability
        claims.
      what_remains_open: Whether the formal conditions (e.g., observation control,
        conformal coverage) match empirical agent behavior under realistic distribution
        shifts and multi-step trajectories.
    - line: Scaling laws and guarantees
      what_it_solves: Connects data scale and weak supervision to agent performance,
        showing that massive unannotated screenshots can replace expensive human annotations
        while maintaining competitiveness.
      what_remains_open: Direct validation that the observed data-efficiency gains
        predict failure modes or transfer across different GUI domains and agent architectures.
    - line: Conceptual taxonomy and boundaries
      what_it_solves: Organizes fragmented GUI interaction types (click, drag, dynamic
        content) and task categories into structured benchmarks, enabling systematic
        capability comparison.
      what_remains_open: Whether these taxonomies influence how researchers design
        agents or merely serve as evaluation checklists without guiding architectural
        innovation.
    consensus:
    - Fine-grained metrics (sub-goal completion, cost-accuracy, uncertainty calibration)
      reveal model differences that aggregate success rates hide.
    - Visual information (screenshots, figures in skill artifacts) is essential for
      GUI grounding, and removing it degrades performance significantly.
    - Current agents lack robust observation control, leading to over- or under-observation
      failures in dynamic environments.
    - Compiling successful runs or building skill libraries can substantially improve
      efficiency and accuracy on repeated or structured tasks.
    disagreements:
    - Some works prioritize safety via uncertainty quantification with conformal prediction,
      while others optimize for runtime speed via program compilation, reflecting
      a tension between reliability and efficiency.
    - 'Evaluation settings diverge: single-step grounding vs. multi-step trajectories,
      desktop vs. mobile vs. short-video platforms, making cross-benchmark generalization
      claims uncertain.'
    - 'Interaction modality coverage varies: most benchmarks focus on click-based
      actions, while DragOn argues that drag interactions are a critical missing piece,
      and LivingScreen emphasizes dynamic content changes between actions.'
    open_questions:
    - How can uncertainty quantification methods designed for single-step grounding
      be extended to multi-step agent trajectories without losing calibration guarantees?
    - Do the formal assumptions about dynamic screen behavior (e.g., content changes
      between actions) hold when agents are deployed on real-world platforms with
      non-stationary layouts?
    - Can data-efficient training paradigms like weak supervision from unannotated
      screenshots generalize to long-horizon tasks where sparse rewards complicate
      curriculum design?
    - Will the introduction of drag-based and dynamic-screen benchmarks lead to new
      agent architectures, or will existing click-focused models adapt with minimal
      changes?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 形式化定义与假设
