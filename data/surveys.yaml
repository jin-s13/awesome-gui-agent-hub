  related_work_outline_zh:
  - 主流方向：构建超越静态点击任务的GUI代理基准，覆盖跨平台（桌面、移动、短视频）的动态、多模态和长时域交互。
  - 研究共性：引入细粒度评估指标（多检查点评分、成本-准确性、不确定性校准），揭示被总体成功率掩盖的能力差异。
  - 关键差异：评估环境从真实macOS桌面到模拟浏览器和特定应用；交互原语涵盖点击、拖拽、CLI和动态内容；监督信号从弱监督（未标注截图）到全监督（标注轨迹）。
  - 趋势演进：所有证据均来自2026年，显示研究前沿集中推动更丰富的交互覆盖、上下文管理和以不确定性量化为代表的安全导向指标。
  - 开放问题：代理能力的跨平台泛化、动态界面中的鲁棒观察控制、基准结论在不同实现间的稳定性，以及代理指标与真实用户效用的一致性。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creating shared tasks and datasets that cover diverse GUI interaction
        types (click, drag, CLI, dynamic content) and platforms, making agent capabilities
        comparable beyond narrow settings.
      what_remains_open: Whether task distributions fully represent real-world long-horizon
        workflows, cross-application dependencies, and dynamic interfaces where content
        changes between actions.
    - line: Metric and stress-test design
      what_it_solves: Probing agent robustness, efficiency, and safety through fine-grained
        scoring, cost-accuracy trade-offs, and post-hoc uncertainty quantification,
        beyond aggregate success rates.
      what_remains_open: Alignment between these proxy metrics and the downstream
        decisions users actually care about; transferability of metric rankings across
        model classes and deployment interfaces.
    - line: Comparable baselines and reporting
      what_it_solves: Enabling auditable comparisons through common benchmarks, deterministic
        evaluation protocols, and artifact release, reducing reliance on single-point
        success metrics.
      what_remains_open: Stability of benchmark conclusions across different agent
        frameworks, compute budgets, and implementation details; reproducibility when
        code or environment setup is incomplete.
    consensus:
    - Aggregate task success rates are insufficient; fine-grained capability breakdowns
      (sub-goal completion, action type accuracy, observation efficiency) are necessary
      to differentiate models.
    - GUI agent evaluation must expand beyond static click-based tasks to include
      drag interactions, CLI commands, and dynamic content that changes without explicit
      agent action.
    - Context management and observation control are critical for long-horizon tasks,
      as passive history accumulation leads to degraded performance.
    - Uncertainty quantification is emerging as a key requirement for safe deployment,
      with post-hoc methods showing promise but limited cross-model transferability.
    disagreements:
    - 'Evaluation environments differ substantially: some use real operating systems
      with full application access, others use simulated browsers or single-platform
      apps, affecting realism and reproducibility.'
    - 'Interaction modality coverage varies: some benchmarks focus on click-only or
      click-plus-drag, while others require mixed GUI and CLI interactions, leading
      to incomparable capability profiles.'
    - 'Supervision paradigms diverge: methods like GUICrafter leverage massive unannotated
      screenshots for weak supervision, while others rely on fully annotated expert
      trajectories, creating different cost and scalability trade-offs.'
    - 'Metric priorities conflict: some works optimize for task success (Pass@1),
      others for cost-accuracy or speedup on repeated tasks, and still others for
      uncertainty calibration, with no unified evaluation framework.'
    open_questions:
    - How well do agent capabilities transfer across platforms (desktop, mobile, web)
      and interface paradigms (static vs. dynamic), given that current benchmarks
      are platform-specific?
    - Can observation control be formalized and evaluated systematically, as current
      agents exhibit over- and under-observation failures in dynamic environments?
    - How robust are uncertainty quantification methods under distribution shifts
      between calibration and deployment interfaces, and what recalibration strategies
      are needed?
    - To what extent do benchmark rankings remain stable when the same tasks are executed
      with different agent frameworks or model versions, given the sensitivity to
      prompt wording and runtime guardrails?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 创建覆盖多种GUI交互类型（点击、拖拽、CLI、动态内容）和平台的共享任务与数据集，使代理能力在狭窄设定之外具备可比性。
      尚未覆盖: 任务分布是否充分代表真实的长时域工作流、跨应用依赖以及内容在操作间变化的动态界面。
    - 路线: 指标与压力测试设计
      解决的问题: 通过细粒度评分、成本-准确性权衡和后验不确定性量化，在总体成功率之外检验代理的鲁棒性、效率与安全性。
      尚未覆盖: 这些代理指标与用户真正关心的下游决策之间的一致性；指标排名在不同模型类别和部署接口间的可迁移性。
    - 路线: 可比基线与报告规范
      解决的问题: 通过统一基准、确定性评估协议和工件发布，使比较可审计，减少对单点成功指标的依赖。
      尚未覆盖: 基准结论在不同代理框架、算力预算和实现细节下的稳定性；当代码或环境设置不完整时的可复现性。
    共识:
    - 总体任务成功率不足够；需要细粒度的能力分解（子目标完成度、动作类型准确率、观察效率）来区分模型。
    - GUI代理评估必须从静态点击任务扩展到包括拖拽交互、CLI命令以及无需代理显式操作即发生变化的动态内容。
    - 上下文管理和观察控制对于长时域任务至关重要，被动历史累积会导致性能下降。
    - 不确定性量化正成为安全部署的关键需求，后验方法显示出潜力，但跨模型迁移性有限。
    分歧:
    - 评估环境差异显著：部分使用真实操作系统并开放完整应用访问，其他使用模拟浏览器或单一平台应用，影响真实性与可复现性。
