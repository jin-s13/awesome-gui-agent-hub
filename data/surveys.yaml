  - 'Mainstream direction: Building more realistic, dynamic GUI agent benchmarks (macOS
    desktop, short-video platforms, drag-based interactions) and developing fine-grained
    evaluation metrics that go beyond task success rate to reveal weaknesses in reliability,
    information efficiency, and interaction diversity.'
  - 'Shared research pattern: All works adopt vision-language models as agent backbones,
    evaluate on newly constructed or existing benchmarks, and emphasize the gap between
    surface-level success and deeper capability profiles (sub-goal completion, cost-accuracy,
    uncertainty calibration).'
  - 'Key differences: Evaluation protocols differ (deterministic rule-based versus
    model-based scoring); some benchmarks cover multi-step trajectories while others
    are limited to single-step grounding; interaction scope varies (click-only vs.
    drag, static vs. dynamic content); and uncertainty quantification methods show
    weak transferability across model tiers and interfaces.'
  - 'Trend evolution: Within the 2024-2026 frontier, benchmarks are rapidly moving
    from static desktop tasks to dynamic, living-screen environments and underexplored
    interaction types (drag, video-guided tasks). Metrics are evolving from accuracy-only
    to include cost-accuracy, fine-grained checkpoint scores, and post-hoc uncertainty
    quantification.'
  - 'Open questions: How to generalize across platforms and model families; how to
    equip agents with observation control in dynamic interfaces; whether uncertainty
    quantification methods remain effective in multi-step trajectories; and whether
    benchmark conclusions are stable under different implementations and compute budgets.'
  related_work_outline_zh:
  - 主流方向：构建更真实、动态的GUI代理基准（如macOS桌面、短视频平台、拖拽交互），并发展细粒度评估指标，超出任务成功率以揭示代理在可靠性、信息效率和交互多样性上的不足。
  - 研究共性：全部工作采用视觉语言模型作为代理骨干，在新构建或现有基准上评估，强调表面成功率与深层能力轮廓（子目标完成度、成本-准确性、不确定性校准）之间的差距。
  - 关键差异：评估协议不同（确定性规则评分 vs. 模型评判）；部分基准覆盖多步轨迹，另一些仅限于单步基础；交互范围不同（仅点击 vs. 拖拽，静态 vs. 动态内容）；不确定性量化方法在不同模型层级和接口间迁移性弱。
  - 趋势演进：在2024-2026前沿期内，基准从静态桌面任务迅速扩展到动态、实时屏幕环境以及未充分探索的交互类型（拖拽、视频引导任务）。指标从仅关注准确率演进到包含成本-准确性、细粒度检查点分数以及后验不确定性量化。
  - 开放问题：如何跨平台和跨模型族泛化；如何在动态界面中赋予代理观察控制能力；不确定性量化方法在多步轨迹中是否依然有效；基准结论在不同实现和算力预算下是否稳定。
  literature_review:
    line_of_work_matrix:
    - line: Real-world GUI task and environment benchmarks
      what_it_solves: Provides diverse, dynamic, and fine-grained task suites that
        mirror actual application usage, moving beyond simplified click-only static
        interfaces to include macOS desktop, short-video platforms, drag interactions,
        and video-guided tasks.
      what_remains_open: Cross-platform generalization, observation control mechanisms
        in dynamic interfaces, comprehensive coverage of interaction types beyond
        the introduced ones, and evaluation stability for long-horizon multi-step
        trajectories.
    - line: Fine-grained evaluation metrics and stress tests
      what_it_solves: Reveals agent weaknesses that are hidden by aggregate success
        rates, using sub-goal checkpoints, cost-accuracy scores, and post-hoc uncertainty
        quantification to assess reliability, information efficiency, and calibration.
      what_remains_open: Applicability of uncertainty quantification to multi-step
        agent trajectories, robustness of metric rankings under distribution shift,
        and alignment between proxy metrics and real user decision-making or satisfaction.
    - line: Reproducible baselines and training recipes for agent capability
      what_it_solves: Establishes strong baselines and clarifies contribution factors
        (skill libraries, verifiable task synthesis, weakly-supervised visual grounding)
        that improve agent performance on standardized benchmarks, enabling controlled
        comparisons.
      what_remains_open: Stability of conclusions across diverse implementations and
        compute budgets; limited reporting of limitations and failure modes in method
        papers; and the extent to which these baselines overfit to the specific benchmarks
        used for evaluation.
    consensus:
    - The community is converging on the need for benchmarks that reflect real-world
      application complexity, including dynamic content, diverse interaction types,
      and multi-application workflows.
    - 'Fine-grained evaluation beyond task success is recognized as essential: sub-goal
      completion, observation cost, and uncertainty calibration all provide complementary
      insights into agent reliability.'
    - Vision-language models serve as the universal backbone for GUI agents, and all
      works evaluate by comparing multiple models or frameworks on a shared task suite.
    disagreements:
    - 'Evaluation protocols differ: some benchmarks use deterministic rule-based scoring
      while others rely on model-based or heuristic checks, which affects reproducibility
      and cross-benchmark comparability.'
    - Uncertainty quantification methods show strong within-model transfer but weak
      cross-tier transfer to closed-source models, indicating that the choice of UQ
      method depends heavily on model access and interface type.
    - 'Benchmarks vary in trajectory length: single-step grounding evaluation (e.g.,
      for click or drag) cannot capture the observation-control and planning failures
      observed in multi-step dynamic environments.'
    open_questions:
    - How can future benchmarks incorporate observation control as a first-class evaluation
      dimension, given the over- and under-observation failures identified in dynamic
      interfaces?
    - To what extent do current fine-grained metrics correlate with downstream user
      satisfaction or task completion in real deployments?
    - Can uncertainty quantification methods be extended to operate reliably in multi-step
      agent trajectories and under distribution shifts between calibration and deployment
      interfaces?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实世界 GUI 任务与环境基准
      解决的问题: 提供多样化、动态、细粒度的任务套件，反映实际应用使用情况，超越简化的仅点击静态界面，涵盖macOS桌面、短视频平台、拖拽交互和视频引导任务。
      尚未覆盖: 跨平台泛化，动态界面中的观察控制机制，除已引入类型外的交互类型全覆盖，以及长时程多步轨迹的评估稳定性。
    - 路线: 细粒度评估指标与压力测试
      解决的问题: 揭示被总体成功率掩盖的代理弱点，使用子目标检查点、成本-准确性评分和后验不确定性量化来评估可靠性、信息效率和校准度。
      尚未覆盖: 不确定性量化对多步代理轨迹的适用性，分布偏移下指标排名的鲁棒性，以及代理指标与真实用户决策或满意度之间的一致性。
    - 路线: 可复现基线及代理能力训练方法
      解决的问题: 建立强基线并明确贡献因素（技能库、可验证任务合成、弱监督视觉定位），在标准化基准上提升代理性能，实现可控比较。
      尚未覆盖: 结论在不同实现和算力预算下的稳定性；方法论文对局限性和失败模式的报告有限；这些基线在多大程度上过度拟合于评估所用的特定基准。
    共识:
    - 社区正趋向于需要反映真实世界应用复杂性的基准，包括动态内容、多样化交互类型和多应用工作流。
    - 超越任务成功率的细粒度评估被认为是必要的：子目标完成度、观察成本和不确定性校准都为代理可靠性提供互补视角。
    - 视觉语言模型是GUI代理的通用骨干，所有工作都通过在共享任务套件上比较多个模型或框架来评估。
    分歧:
    - 评估协议不同：部分基准使用确定性规则评分，另一些依赖模型评判或启发式检查，这影响可复现性和跨基准可比性。
    - 不确定性量化方法在模型内迁移强，但在跨层级向闭源模型迁移时弱，表明UQ方法的选择高度依赖模型可访问性和接口类型。
    - 基准在轨迹长度上存在差异：单步基础评估（如点击或拖拽）无法捕捉在动态环境中观察到的多步场景下观察控制与规划失败。
    开放问题:
    - 未来的基准如何将观察控制作为一级评估维度，鉴于在动态界面中已发现的过度观察和观察不足失败？
    - 当前的细粒度指标在多大程度上与实际部署中的下游用户满意度或任务完成度相关？
