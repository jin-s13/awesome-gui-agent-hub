    detection.'
  related_work_outline_zh:
  - 主流方向：构建覆盖桌面、移动、网页、短视频等真实应用场景的高保真细粒度GUI代理基准，并通过外部技能、历史感知评判或执行优化来增强代理的可靠性与效率。
  - 研究共性：均以多模态视觉语言模型为核心代理，识别真实任务中的失败模式（如短视规划、观察控制不足），并引入辅助组件（技能库、状态机编译、视觉基础评判、关键帧提取）加以弥补。
  - 关键差异：基准针对的界面动态性（静态桌面 vs. 动态短视频 vs. 视频引导）、交互模态（点击、拖拽、命令行）和任务类型（自动化、欺诈检测）不同；改进策略分为知识注入、轨迹复用、执行监督和感知增强，仅部分工作关注效率或安全约束。
  - 趋势演进：在2024–2026前沿期内，领域从静态、仅点击的基准转向动态、多模态、多交互的评估，从纯粹评估转向提出代理增强方法，并开始关注重复任务效率和安全导向场景。
  - 开放问题：跨平台跨交互泛化、动态界面的观察控制机制、技能的自动构建与迁移、状态机在任务变化下的鲁棒性、评判模型的跨模型迁移、欺诈检测中信誉线索与独立推理的平衡。
  literature_review:
    line_of_work_matrix:
    - line: Real-world GUI agent benchmarking
      what_it_solves: Provides diverse tasks and fine-grained metrics across desktop,
        mobile, web, and short-video platforms to reveal capability boundaries of
        GUI agents in authentic environments.
      what_remains_open: Benchmarks are mostly platform- or interaction-specific;
        cross-platform generalization is unevaluated; alignment between fine-grained
        metrics and real user task success is unverified; coverage of dynamic interfaces
        and long-horizon tasks is limited.
    - line: Skill-based knowledge augmentation for agents
      what_it_solves: Enhances computer-use agent performance by supplying pre-built
        multimodal skill libraries that retain visual figures, reducing reliance on
        in-context reasoning.
      what_remains_open: Automatic skill construction, cross-app transfer, and dynamic
        updating are not addressed; maintenance cost and applicability beyond desktop
        environments are unknown.
    - line: Agent execution optimization and error correction
      what_it_solves: Speeds up repeated tasks via state-machine compilation of successful
        runs, and intercepts planning/execution errors through history-aware, visually
        grounded critics.
      what_remains_open: State-machine robustness under task variation; cross-model
        generalization of the critic and its training data requirements; combination
        of replay speedup with critic-based error correction.
    - line: Video-guided GUI interaction
      what_it_solves: Extracts task-relevant keyframes from videos or interprets dynamic
        content to support video question answering and video-guided GUI operations.
      what_remains_open: Real-time video stream processing; keyframe extraction accuracy
        in complex scenes; deep integration of video understanding with GUI action
        execution.
    consensus:
    - GUI agent evaluation must go beyond simple success rates and adopt fine-grained,
      multi-dimensional metrics such as sub-goal completion and cost-accuracy trade-offs.
    - Multimodal vision-language models are the core of current GUI agents, but model
      reasoning alone is insufficient for complex, dynamic real-world tasks.
    - Agents commonly suffer from inadequate observation control, short-sighted planning,
      and execution errors in real applications.
    - External knowledge (skill libraries, action histories) and runtime verification
      (visual grounding, screen state checks) can substantially improve agent performance.
    disagreements:
    - 'Interface dynamics: some benchmarks target static desktop/mobile UIs, while
      others focus on live short-video feeds or video-guided tasks, imposing different
      requirements for handling temporal change.'
    - 'Interaction modality coverage: most benchmarks emphasize click and text input;
      DragOn specifically addresses drag interactions, and MacAgentBench includes
      CLI, reflecting different priorities in covering the full interaction space.'
    - 'Improvement strategy: VISUALSKILL relies on pre-built multimodal skill libraries,
      PreAct on trajectory compilation, HiViG on a trained critic model, and TASKER
      on a keyframe extraction algorithm—representing knowledge injection, trajectory
      reuse, execution supervision, and perceptual enhancement respectively.'
    - 'Efficiency vs. accuracy trade-off: PreAct explicitly optimizes speed for repeated
      tasks, while other works focus primarily on success rates without systematic
      efficiency analysis.'
    - 'Safety-oriented constraints: FraudSMSWalker deliberately suppresses reputation
      shortcuts in fraud detection, contrasting with other benchmarks'' pursuit of
      realism, revealing unique demands on agent reasoning in security scenarios.'
    open_questions:
    - How can a unified cross-platform, cross-interaction evaluation framework be
      built to measure GUI agent generalization?
    - What observation control mechanisms can prevent over- and under-observation
      in dynamic interfaces?
    - Can multimodal skill libraries be automatically constructed from application
      documentation or live exploration and transferred across applications?
    - How robust are compiled state-machine programs when task parameters or environments
      change?
    - Can a trained critic generalize across different underlying agent models without
      retraining?
    - In security tasks like fraud detection, how should reputation information be
      balanced with independent agent reasoning?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实场景GUI代理基准构建
      解决的问题: 提供覆盖桌面、移动、网页、短视频等平台的多样化任务和细粒度指标，揭示代理在真实环境中的能力边界。
      尚未覆盖: 基准多限于特定平台或交互类型，跨平台泛化未评估；细粒度指标与用户实际任务成功的对齐未验证；动态界面和长周期任务的覆盖有限。
    - 路线: 基于技能库的代理知识增强
      解决的问题: 通过提供保留视觉图形的预构建多模态技能库，提升计算机使用代理的表现，减少对即时推理的依赖。
      尚未覆盖: 技能的自动构建、跨应用迁移和动态更新未解决；维护成本及桌面环境之外的适用性未知。
    - 路线: 代理执行优化与纠错
      解决的问题: 通过将成功运行编译为状态机加速重复任务，并通过历史感知、视觉基础的评判模型拦截规划与执行错误。
