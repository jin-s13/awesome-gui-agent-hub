  - 'Open questions: How to unify evaluation across platforms and task types; whether
    uncertainty and safety findings transfer across model families and interfaces;
    how to scale training without overfitting to synthetic task distributions; and
    how to incorporate human experience into agent learning loops without introducing
    new failure modes.'
  related_work_outline_zh:
  - 主流方向：通过标准化基准、可扩展训练范式和安全评估构建与评测GUI智能体，重点是基于VLM/LLM的智能体在多样化数字环境中的表现。
  - 研究共性：所有论文均提出新基准或训练方法，在有限任务集上评估，常报告相对少数基线的SOTA；评估是任务特定的，通常为单步或短视界，跨设定泛化评估有限。
  - 关键差异：工作针对不同评测场景（视频引导、欺诈检测、浏览器安全、编码安全）和训练信号（合成任务RL、自主评估器RL、人类演示），并侧重不同的可信度维度（不确定性量化、提示注入、领域条件安全）。
  - 趋势演进：2024-2026年显示从孤立基准提案向将训练、安全与可靠性整合进单一智能体管线的转变；最新论文（2026年）强调可验证任务合成、长视界上下文管理和领域特定安全分析。
  - 开放问题：如何跨平台和任务类型统一评测；不确定性与安全发现能否跨模型家族和接口迁移；如何在不拟合合成任务分布的前提下扩展训练；如何将人类经验纳入智能体学习循环而不引入新的失效模式。
  literature_review:
    line_of_work_matrix:
    - line: Benchmarking and evaluation frameworks for GUI agents
      what_it_solves: Provides standardized testbeds to assess agent capabilities
        in video-guided, fraud-detection, and safety-critical scenarios, often with
        controlled information access (e.g., masked URLs, hand-crafted attacks).
      what_remains_open: Benchmarks are scenario-specific and their results may not
        transfer across platforms or attack types; real-world representativeness and
        evaluation metric alignment with deployment risk are not yet validated.
    - line: Scalable training and context management for long-horizon GUI tasks
      what_it_solves: Improves sample efficiency and long-horizon performance via
        verifiable task synthesis with online RL, autonomous evaluator rewards, and
        proactive context management.
      what_remains_open: Robustness to environment and task distribution shift is
        unverified; deployments on real devices and across diverse GUI ecosystems
        are not demonstrated.
    - line: Safety, reliability, and uncertainty quantification for GUI agents
      what_it_solves: Quantifies grounding uncertainty, benchmarks prompt injection
        resistance, and audits domain-conditioned safety to reveal where and when
        agents are trustworthy.
      what_remains_open: Cross-model and cross-interface transfer of uncertainty rankings
        is weak; safety hardening is domain-specific and may fail under RL-optimized
        attacks or in unseen application domains.
    - line: Learning from human demonstrations and experience
      what_it_solves: Transforms raw human screen recordings and interaction logs
        into structured multimodal tutorials that improve both human learning and
        GUI agent planning.
      what_remains_open: Automated tutorial quality and coverage are not evaluated
        across diverse software; the loop from human experience to agent training
        without manual curation is not closed.
    consensus:
    - All works rely on vision-language models or large language models as the core
      agent backbone.
    - Evaluation is conducted on newly proposed or existing benchmarks, and results
      are reported as success rates or accuracy improvements over a small set of baselines.
    - Papers acknowledge that standalone task success is insufficient and that safety,
      reliability, or uncertainty dimensions must be addressed for real-world deployment.
    - There is a shared assumption that increasing task scale and complexity (long-horizon,
      multi-step) requires new training paradigms beyond static supervised fine-tuning.
    disagreements:
    - 'Evaluation targets: video-guided interactive tasks, SMS-to-webpage fraud detection,
      browser security, coding safety, and general computer-use tasks—each with distinct
      assumptions about information availability.'
    - 'Training signal: some use RL with synthetic verifiable tasks, others use autonomous
      VLM evaluation as reward, and one leverages human-recorded demonstrations without
      RL.'
    - 'Safety focus: one line quantifies grounding uncertainty, another audits prompt
      injection resistance, and a third reveals domain-conditioned safety failures—no
      unified safety framework is proposed.'
    - 'Interaction modality: agents operate on screenshots, video frames, or structured
      SMS-webpage chains, leading to different perception and action representations.'
    open_questions:
    - How can evaluation benchmarks be designed to guarantee cross-platform and cross-task
      transfer, given that current findings show weak transfer (e.g., uncertainty
      ranking ρ only +0.08 across closed models)?
    - What is the minimum set of safety dimensions that must be simultaneously assessed
      to certify a GUI agent for deployment?
    - Can long-horizon training with synthetic tasks avoid overfitting to the generator's
      distribution, and how can we measure the gap?
    - How can human experience be continuously incorporated into agent training loops
      without relying on static, manually curated tutorial datasets?
  literature_review_zh:
    研究路线矩阵:
    - 路线: GUI智能体基准与评测框架
      解决的问题: 提供标准化测试平台，评估智能体在视频引导、欺诈检测、安全关键场景下的能力，常通过受控信息访问（如屏蔽URL、手工攻击）实现。
      尚未覆盖: 基准是场景特定的，其结果可能无法跨平台或攻击类型迁移；真实世界代表性与评测指标与部署风险的对齐尚未验证。
    - 路线: 长视界GUI任务的可扩展训练与上下文管理
      解决的问题: 通过可验证任务合成与在线RL、自主评估器奖励和主动上下文管理，提升样本效率与长视界性能。
      尚未覆盖: 对环境和任务分布偏移的鲁棒性未经验证；在真实设备及多样化GUI生态系统上的部署尚未展示。
    - 路线: GUI智能体的安全、可靠性与不确定性量化
      解决的问题: 量化基础不确定性，基准测试提示注入抵抗力，并审计领域条件安全性，揭示智能体在何种条件下可信。
      尚未覆盖: 不确定性排名跨模型和接口迁移能力弱；安全加固是领域特定的，在RL优化攻击或未见应用领域下可能失效。
    - 路线: 从人类演示与经验中学习
      解决的问题: 将原始人类屏幕录制和交互日志转化为结构化多模态教程，提升人类学习和GUI智能体规划。
      尚未覆盖: 自动生成教程的质量和覆盖范围未在多样化软件中评估；从人类经验到智能体训练的无人工闭环尚未实现。
    共识:
    - 所有工作均依赖视觉语言模型或大语言模型作为智能体核心。
    - 评估在新提出或现有基准上进行，结果以成功率或准确率提升相对于少量基线报告。
    - 论文承认单一任务成功不足，须解决安全、可靠或不确定性维度才能实现真实部署。
    - 共享假设：增加任务规模和复杂度（长视界、多步）需要超越静态监督微调的新训练范式。
    分歧:
    - 评测目标：视频引导交互任务、短信到网页欺诈检测、浏览器安全、编码安全及通用计算机使用任务，各自对信息可用性有不同假设。
    - 训练信号：有的使用合成可验证任务的RL，有的用自主VLM评估作为奖励，另一项利用人类录制的演示而不使用RL。
    - 安全关注点：一条路线量化基础不确定性，另一条审计提示注入抵抗力，第三条揭示领域条件安全失效——未提出统一安全框架。
    - 交互模态：智能体在截图、视频帧或结构化短信-网页链上操作，导致感知和动作表示不同。
    开放问题:
    - 鉴于当前发现跨模型迁移弱（如不确定性排名ρ仅+0.08），如何设计评测基准以保证跨平台、跨任务迁移？
    - 为认证GUI智能体可部署，需同时评估的最小安全维度集合是什么？
    - 使用合成任务的长视界训练能否避免对生成器分布的过拟合，且如何衡量该差距？
    - 如何将人类经验持续纳入智能体训练循环，而不依赖静态、人工整理的教程数据集？
