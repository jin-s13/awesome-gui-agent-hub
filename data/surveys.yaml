  related_work_outline:
  - 'Mainstream direction: Building and evaluating GUI agents on realistic, diverse,
    and dynamic benchmarks, with a focus on grounding, planning, and data-efficient
    training using vision-language models.'
  - 'Shared research pattern: Most works adopt a VLM backbone, design task-specific
    benchmarks or training recipes, and measure task completion with fine-grained
    metrics beyond simple pass rates.'
  - 'Key differences: Works diverge in interaction modality (click, drag, dynamic
    screens), supervision signal (weakly supervised, fully annotated, or programmatic),
    and deployment context (desktop, mobile, short-video platforms).'
  - 'Trend evolution: The frontier is shifting from static single-step grounding to
    long-horizon, dynamic-interface, and repeated-task settings, with growing attention
    to uncertainty quantification and context management.'
  - 'Open questions: How to achieve robust observation control in dynamic UIs, transfer
    uncertainty calibration across model tiers, and balance replay efficiency with
    generalization in repeated tasks.'
  related_work_outline_zh:
  - 主流方向：在真实、多样和动态的基准上构建和评估GUI智能体，重点是基于视觉语言模型的grounding、规划与数据高效训练。
  - 研究共性：多数工作采用VLM骨干，设计特定任务的基准或训练配方，并使用超越简单通过率的细粒度指标衡量任务完成度。
  - 关键差异：工作在交互模态（点击、拖拽、动态屏幕）、监督信号（弱监督、全标注或程序化）和部署场景（桌面、移动、短视频平台）上存在分歧。
  - 趋势演进：前沿正从静态单步grounding转向长时域、动态界面和重复任务设置，对不确定性量化和上下文管理的关注日益增加。
  - 开放问题：如何在动态UI中实现鲁棒的观察控制，跨模型层级迁移不确定性校准，以及在重复任务中平衡重放效率与泛化性。
  literature_review:
    line_of_work_matrix:
    - line: Method representation and objective design
      what_it_solves: Transforms GUI agent capabilities into concrete training objectives,
        representations, and data strategies, such as weakly-supervised visual grounding
        from unannotated screenshots (GUICrafter), proactive context management as
        first-class actions (MemGUI-Agent), and task-driven keyframe extraction for
        video-guided tasks (TASKER).
      what_remains_open: Whether these representation and objective choices transfer
        across platforms and interaction modalities, and how to combine them without
        conflicting optimization signals.
    - line: Planning and action-interface methods
      what_it_solves: Connects learned GUI dynamics to efficient execution through
        compiled state-machine replay (PreAct), drag-based interaction grounding (DragOn),
        and observation-control mechanisms for dynamic interfaces (LivingScreen).
      what_remains_open: How much of the efficiency gain comes from the planning/compilation
        strategy versus the underlying model, and whether these methods degrade under
        distribution shift or novel task compositions.
    - line: Method evidence and ablation protocol
      what_it_solves: Isolates method contributions from benchmark, metric, and implementation
        effects via fine-grained multi-checkpoint scoring (MacAgentBench), cross-dataset
        uncertainty quantification rankings (Argus), and cost-accuracy trade-off analysis
        (LivingScreen).
      what_remains_open: Whether current evaluation protocols adequately capture real-world
        deployment robustness, and how to design ablation that disentangles model
        capability from framework or skill-library effects.
    consensus:
    - Vision-language models serve as the de facto backbone for GUI agents, with performance
      heavily influenced by grounding quality and task-specific fine-tuning.
    - Fine-grained evaluation metrics (sub-goal completion, cost-accuracy, uncertainty
      calibration) reveal agent weaknesses that aggregate pass rates hide.
    - Data efficiency is a critical bottleneck; leveraging unlabeled or weakly labeled
      data can match or surpass fully supervised approaches with far fewer annotations.
    - Long-horizon and dynamic-interface tasks expose fundamental limitations in current
      agents' memory and observation control, motivating structured context management.
    disagreements:
    - 'Supervision paradigm: GUICrafter advocates weak supervision from massive unannotated
      screenshots, while MemGUI-Agent relies on curated trajectory annotations with
      explicit context actions, and PreAct uses successful execution traces as implicit
      supervision.'
    - 'Interaction scope: DragOn focuses exclusively on drag-based actions, whereas
      most benchmarks assume click/type primitives; LivingScreen targets dynamic content
      that changes between actions, contrasting with static screenshot benchmarks.'
    - 'Evaluation target: MacAgentBench emphasizes Pass@1 and sub-goal completion,
      LivingScreen introduces cost-accuracy, and Argus evaluates uncertainty calibration
      rather than task success, leading to different conclusions about model ranking.'
    - 'Deployment setting: Mobile (MemGUI-Agent), desktop (MacAgentBench), and short-video
      platforms (LivingScreen) impose distinct constraints on latency, screen resolution,
      and action space, making direct comparison difficult.'
    open_questions:
    - Can observation-control strategies developed for dynamic short-video interfaces
      generalize to other real-time GUI environments without retraining?
    - How do we design uncertainty quantification methods that transfer reliably from
      open-weight research models to closed-source commercial APIs where internal
      states are inaccessible?
    - What is the trade-off between compiling agent runs into fast state machines
      and maintaining adaptability to slight UI variations or task drift?
    - Do fine-grained sub-goal metrics correlate with user-perceived task success
      in interactive deployments, and how should they inform agent design?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 方法表示与目标设计
      解决的问题: 将GUI智能体能力转化为具体的训练目标、表示和数据策略，例如从无标注截图中进行弱监督视觉定位（GUICrafter）、将主动上下文管理作为第一类动作（MemGUI-Agent）、以及面向视频引导任务的任务驱动关键帧提取（TASKER）。
      尚未覆盖: 这些表示和目标选择能否跨平台和交互模态迁移，以及如何在不冲突的优化信号下组合它们。
    - 路线: 规划与动作接口方法
      解决的问题: 通过编译状态机重放（PreAct）、基于拖拽的交互定位（DragOn）和动态界面的观察控制机制（LivingScreen），将学习到的GUI动力学连接到高效执行。
      尚未覆盖: 效率提升有多少来自规划/编译策略而非底层模型，以及这些方法在分布偏移或新任务组合下是否会退化。
    - 路线: 方法证据与消融协议
      解决的问题: 通过细粒度多检查点评分（MacAgentBench）、跨数据集不确定性量化排名（Argus）和成本-准确性权衡分析（LivingScreen），将方法贡献与基准、指标和实现效果隔离开来。
      尚未覆盖: 当前评估协议是否充分捕捉真实部署的鲁棒性，以及如何设计消融实验以解开模型能力与框架或技能库效应。
    共识:
    - 视觉语言模型是GUI智能体的事实骨干，性能严重受grounding质量和任务特定微调的影响。
    - 细粒度评估指标（子目标完成度、成本-准确性、不确定性校准）揭示了聚合通过率所掩盖的智能体弱点。
    - 数据效率是关键瓶颈；利用无标签或弱标签数据可以在极少标注的情况下匹配或超越全监督方法。
    - 长时域和动态界面任务暴露了当前智能体在记忆和观察控制上的根本局限，推动了结构化上下文管理的研究。
    分歧:
    - 监督范式：GUICrafter主张从海量无标注截图中进行弱监督，而MemGUI-Agent依赖带有显式上下文动作的精选轨迹标注，PreAct则将成功执行轨迹作为隐式监督。
    - 交互范围：DragOn专注于拖拽动作，而多数基准假设点击/输入原语；LivingScreen针对动作间内容变化的动态界面，与静态截图基准形成对比。
    - 评估目标：MacAgentBench强调Pass@1和子目标完成度，LivingScreen引入成本-准确性，Argus评估不确定性校准而非任务成功率，导致模型排名结论不同。
    - 部署场景：移动端（MemGUI-Agent）、桌面端（MacAgentBench）和短视频平台（LivingScreen）对延迟、屏幕分辨率和动作空间施加不同约束，难以直接比较。
    开放问题:
    - 为动态短视频界面开发的观察控制策略能否在无需重新训练的情况下泛化到其他实时GUI环境？
    - 如何设计不确定性量化方法，使其从开放权重研究模型可靠迁移到内部状态不可访问的闭源商业API？
    - 将智能体运行编译为快速状态机与保持对轻微UI变化或任务漂移的适应性之间存在怎样的权衡？
    - 细粒度子目标指标是否与交互部署中用户感知的任务成功相关，以及应如何据此指导智能体设计？
