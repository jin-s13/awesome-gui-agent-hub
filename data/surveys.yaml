    研究路线矩阵:
    - 路线: 任务抽象与交互基准
      解决的问题: 定义涵盖多样化GUI交互（拖拽、动态内容、多应用）的评估任务，并通过细粒度指标量化代理性能。
      尚未覆盖: 这些抽象是否捕捉到真实工作流的全部复杂性，以及如何跨平台和交互模式迁移发现。
    - 路线: 基于技能和上下文管理的代理能力增强
      解决的问题: 通过注入多模态技能库或主动上下文管理，在长时域任务中保留关键信息，提高任务完成度。
      尚未覆盖: 技能的理论基础，以及如何确保技能使用不引入不安全行为或偏见。
    - 路线: 不确定性量化与可靠性评估
      解决的问题: 提供后验UQ方法估计GUI基础中的代理置信度，通过共形预测实现更安全的空间预测。
      尚未覆盖: 将UQ集成到多步代理策略中，并验证校准是否在部署环境和交互类型间迁移。
    - 路线: 可扩展训练与数据效率
      解决的问题: 通过未标注截图的弱监督或可验证RL任务合成，减少对人工标注的依赖，以有限数据达到顶尖性能。
      尚未覆盖: 缺乏从数据规模预测代理行为的缩放定律，且高效训练方法是否保留安全约束缺乏保证。
    共识:
    - GUI代理在动态界面和长时域任务上仍面临挑战，需要更好的上下文管理和观察控制。
    - 视觉信息对于准确的UI基础至关重要，技能库或多模态表示一致地提升性能。
    - 现有基准在交互多样性上有限，促使了针对拖拽、短视频和多应用场景的新数据集。
    - 不确定性校准是构建更安全代理的有前景的方向，但当前方法仅在单步基础上评估。
    分歧:
    - 交互焦点：有的工作针对静态桌面环境，有的关注动态视频流或拖拽交互，导致任务定义不兼容。
    - 评估方法：确定性基于规则的评分与人类判断，以及是否应将信息效率（成本-准确性）纳入指标。
    - 训练范式：使用精心设计的技能进行监督微调，对比使用合成任务的在线RL，或利用未标注数据的弱监督，各有不同的可扩展性和可靠性权衡。
    - 不确定性的角色：只有少数工作显式建模UQ；其他工作假设代理输出可信，缺乏置信度估计，与新兴的安全导向观点形成对比。
    开放问题:
    - 能否用一个统一的任务抽象覆盖所有GUI交互模式（点击、拖拽、动态内容）而不简化每种模式？
    - UQ排名从单步基础迁移到多步轨迹时表现如何，以及需要何种校准以确保安全自主操作？
    - 在线RL和弱监督所暗示的缩放定律是否在不同代理架构和界面类型上成立？
    - 需要哪些形式化保证来确保技能库和上下文管理机制不会在长时域任务中引入微妙的失败模式？
