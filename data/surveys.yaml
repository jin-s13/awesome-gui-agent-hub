  literature_review:
    line_of_work_matrix:
    - line: Domain-specific GUI agent benchmarking
      what_it_solves: Provides standardized evaluation for GUI agents in specific
        applications (macOS desktop, short-video platforms, drag interactions, SMS-to-web
        fraud), revealing capability gaps such as observation control, action grounding,
        and benign recall.
      what_remains_open: Whether these benchmarks generalize across platforms and
        user workflows, and whether they capture real-world deployment challenges
        like dynamic content and adversarial scenarios.
    - line: Agent execution enhancement and optimization
      what_it_solves: Improves task success rate, efficiency, and robustness by augmenting
        agents with multimodal skill libraries, action-grounded visual memory, history-aware
        critics, or compiling successful runs into state-machine programs for fast
        replay.
      what_remains_open: Transferability of these enhancements across different base
        models and application domains, and the combined effect of multiple augmentations.
    - line: Failure analysis and diagnosis of GUI agents
      what_it_solves: Systematically categorizes failure modes (cognitive, visual
        misunderstanding, hidden operation blindness, grounding error) and proposes
        targeted remedies like action-grounded memory to reduce action-level errors.
      what_remains_open: Whether failure distributions are consistent across domains,
        and how to automate diagnosis and recovery without human annotation.
    consensus:
    - GUI agents rely on vision-language models to interpret screenshots and generate
      actions, but current models exhibit significant shortcomings in complex or dynamic
      interfaces.
    - Multimodal information, including visual figures and interaction history, is
      critical for improving UI element identification and workflow state verification.
    - Fine-grained evaluation metrics beyond pass/fail are necessary to distinguish
      agent capabilities, as similar success rates can mask large differences in sub-goal
      completion.
    - 'Efficiency matters: repeated task execution and per-step model calls incur
      high latency and cost, motivating caching, compilation, or memory mechanisms.'
    disagreements:
    - 'Application domains vary widely: office automation on macOS, entertainment
      on short-video platforms, drag-based manipulation, and security-critical fraud
      detection, each imposing different interaction patterns and evaluation criteria.'
    - 'Improvement strategies diverge: some inject pre-built multimodal skills, others
      add a critic to intercept errors, compile past runs for speed, or redesign visual
      memory to be action-grounded.'
    - 'Interaction modalities differ: most benchmarks focus on click and type, while
      DragOn targets drag-based actions and LivingScreen addresses dynamic content
      that changes between actions.'
    - 'Evaluation targets differ: some optimize for task success (Pass@1), others
      for cost-accuracy trade-off, execution speedup, or benign recall in fraud detection.'
    open_questions:
    - How can GUI agents maintain robust performance when interface layouts, content,
      or interaction rules change dynamically?
    - Can skill libraries, memory, and critic modules trained on one domain transfer
      to others without extensive re-engineering?
    - What is the optimal balance between agent autonomy and efficiency, especially
      for repetitive enterprise tasks?
    - How can we ensure reliability and safety when deploying GUI agents in adversarial
      or high-stakes environments like fraud detection?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 领域特定GUI代理基准构建
      解决的问题: 为特定应用场景（macOS桌面、短视频平台、拖拽交互、短信到网页欺诈）提供标准化评估，揭示观察控制、动作接地和良性召回等能力缺口。
      尚未覆盖: 这些基准能否跨平台和用户工作流泛化，以及是否捕捉到动态内容和对抗场景等真实部署挑战。
    - 路线: 代理执行增强与优化
      解决的问题: 通过多模态技能库、动作接地视觉记忆、历史感知评判或将成功运行编译为状态机程序以快速重放，提升任务成功率、效率和鲁棒性。
      尚未覆盖: 这些增强方法在不同基础模型和应用领域间的可迁移性，以及多种增强组合使用的效果。
    - 路线: GUI代理失败分析与诊断
      解决的问题: 系统分类失败模式（认知、视觉误解、隐藏操作盲区、接地错误），并提出针对性补救措施，如动作接地记忆以减少动作级错误。
      尚未覆盖: 失败分布是否跨领域一致，以及如何在没有人工标注的情况下自动诊断和恢复。
    共识:
    - GUI代理依赖视觉语言模型解释截图并生成动作，但当前模型在复杂或动态界面上表现出显著不足。
    - 多模态信息（包括视觉图形和交互历史）对于改善UI元素识别和工作流状态验证至关重要。
    - 超越通过/失败的细粒度评估指标对于区分代理能力是必要的，因为相似的成功率可能掩盖子目标完成度的巨大差异。
    - 效率很重要：重复任务执行和每步模型调用带来高延迟和成本，促使缓存、编译或记忆机制的发展。
    分歧:
    - 应用领域差异大：macOS办公自动化、短视频平台娱乐、拖拽操作和安全关键的欺诈检测，各自施加不同的交互模式和评估标准。
    - 改进策略不同：有的注入预构建多模态技能，有的添加评判以拦截错误，有的编译过去运行以提速，或重新设计视觉记忆使其动作接地。
    - 交互模态不同：多数基准聚焦点击和输入，而DragOn针对拖拽动作，LivingScreen处理在动作之间变化的动态内容。
    - 评估目标不同：有的优化任务成功率（Pass@1），有的优化成本-准确性权衡、执行加速或欺诈检测中的良性召回。
    开放问题:
    - 当界面布局、内容或交互规则动态变化时，GUI代理如何保持鲁棒性能？
    - 在一个领域上训练的的技能库、记忆和评判模块能否在无需大量重新工程的情况下迁移到其他领域？
