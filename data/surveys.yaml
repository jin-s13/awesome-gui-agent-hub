  literature_review:
    line_of_work_matrix:
    - line: Skill library and artifact systems
      what_it_solves: Encoding reusable multi-modal skills (text + visual figures)
        into structured artifacts that GUI agents retrieve on-demand, reducing re-discovery
        of UI patterns and improving action grounding.
      what_remains_open: Skills are currently hand-crafted per application; automatic
        construction, cross-app generalization, and robustness to UI evolution over
        time remain untested.
    - line: Weakly-supervised data-efficient training pipelines
      what_it_solves: Leveraging massive unannotated screenshots to pre-train visual
        grounding, then fine-tuning with minimal annotated data, drastically lowering
        the cost of building GUI agents.
      what_remains_open: Validation is on static screenshots; effectiveness on dynamic,
        real-time interactive environments and long-horizon tasks is unclear.
    - line: Online multi-turn reinforcement learning frameworks
      what_it_solves: Providing open-source infrastructure for training visual web
        agents on live websites via online RL, achieving competitive performance with
        proprietary systems while enabling systematic study of RL design choices.
      what_remains_open: Extension to non-web GUI (desktop, mobile) and integration
        of safety constraints during RL training are not addressed.
    - line: Long-horizon real-world benchmarking suites
      what_it_solves: Creating realistic multi-step tasks requiring streaming interaction,
        cross-source reasoning, and implicit state inference, and revealing failure
        modes of current agents at scale.
      what_remains_open: Benchmarks are not yet standardized across frameworks; insights
        are not fed back into training loops to directly improve agent capabilities.
    - line: Safety auditing and failure-mode analysis
      what_it_solves: Systematically probing agent vulnerabilities to prompt injection,
        user-sensitive states, and visual memory errors, and proposing defenses like
        domain-conditioned safety or action-grounded memory.
      what_remains_open: Safety hardening is domain-specific and breaks outside the
        browser; RL-optimized attacks are not reproducible; integrating safety analysis
        into the agent development cycle remains an open challenge.
    consensus:
    - All systems target end-to-end deployment of GUI agents on real-world tasks,
      moving beyond isolated model evaluation.
    - They share a focus on long-horizon, multi-step interactions and the need for
      open-source frameworks, benchmarks, or artifacts to enable reproducible research.
    - Visual grounding and memory management are recognized as critical for agent
      performance, and cost-efficient data usage is a common concern.
    disagreements:
    - 'Training paradigms diverge: some systems use behavioral cloning from static
      data, others online RL on live sites, and still others rely on curated skill
      libraries.'
    - Evaluation settings vary from static screenshots and web browser tasks to full
      desktop environments, leading to incomparable success metrics and agent capabilities.
    - 'Safety approaches differ: post-hoc auditing reveals domain-conditioned robustness,
      in-process memory mechanisms aim to reduce errors, and pre-deployment exploration
      targets sensitive states.'
    - Memory representation splits between full-image storage and action-grounded
      crops, with contrasting effects on error types (state-level vs. action-level
      failures).
    open_questions:
    - How can online RL, skill libraries, and weak supervision be combined to achieve
      strong generalization with minimal labeled data?
    - Can safety hardening be made domain-agnostic and resilient to optimized attacks,
      and how can it be integrated into the training loop?
    - What is the optimal representation of visual memory for long-horizon tasks,
      and can it be learned automatically from agent interactions?
    - How can benchmark-derived failure insights (e.g., objective drift, constraint
      forgetting) be systematically fed back into agent training to improve robustness?
