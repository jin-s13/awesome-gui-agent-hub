    - 在单步定位上排名良好的不确定性量化方法，能否在包含多个动作的完整智能体轨迹上保持校准？
    - 如何将观察控制集成到GUI智能体中，以防止在动态界面上的过度观察和观察不足？
    - 从成功运行中编译的状态机程序能否迁移到具有轻微视觉或工作流变化的任务，还是需要重新编译？
    - 弱监督方法需要多少最低标注预算，才能在复杂的多应用工作流上匹敌全监督智能体？
