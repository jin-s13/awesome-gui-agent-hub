  related_work_outline:
  - 'Mainstream direction: Building benchmarks and methods to capture richer GUI interactions
    (drag, dynamic content, multi-app) and enhance agent reliability via uncertainty
    quantification and skill libraries.'
  - 'Shared research pattern: Most works introduce a new dataset or benchmark to expose
    limitations of current agents, then propose a method (skill injection, context
    management, or RL) to improve task completion.'
  - 'Key differences: Interaction modes studied diverge—static desktop, dynamic short-video,
    drag-based, and mobile long-horizon—each requiring distinct task abstractions
    and evaluation metrics.'
  - 'Trend evolution: The 2026 evidence shows a shift from pure benchmark creation
    toward integrating reliability (UQ, conformal prediction) and data efficiency
    (weak supervision, online RL) into GUI agent design.'
  - 'Open questions: How to unify task abstractions across interaction modes, validate
    that UQ and formal guarantees hold in multi-step agent trajectories, and verify
    scaling laws predict real-world failures.'
  related_work_outline_zh:
  - 主流方向：构建基准和方法来捕捉更丰富的GUI交互（拖拽、动态内容、多应用），并通过不确定性量化和技能库提升代理可靠性。
  - 研究共性：多数工作引入新数据集或基准以暴露当前代理的局限性，然后提出方法（技能注入、上下文管理或强化学习）来提升任务完成度。
  - 关键差异：所研究的交互模式不同——静态桌面、动态短视频、拖拽操作和移动端长时域——每种都需要不同的任务抽象和评估指标。
  - 趋势演进：2026年的证据显示从单纯的基准创建转向将可靠性（UQ、共形预测）和数据效率（弱监督、在线RL）融入GUI代理设计。
  - 开放问题：如何统一不同交互模式的任务抽象，验证UQ和形式化保证在多步代理轨迹中是否成立，以及验证缩放定律能否预测真实世界的失败。
  literature_review:
    line_of_work_matrix:
    - line: Task abstraction and interaction benchmarks
      what_it_solves: Defines evaluation tasks covering diverse GUI interactions (drag,
        dynamic content, multi-app) and quantifies agent performance with fine-grained
        metrics.
      what_remains_open: Whether these abstractions capture the full complexity of
        real-world workflows and how to transfer findings across platforms and interaction
        modes.
    - line: Agent capability enhancement via skill and context management
      what_it_solves: Improves long-horizon task completion by injecting multimodal
        skill libraries or proactive context management to retain critical information.
      what_remains_open: Theoretical grounding for what constitutes a 'skill' and
        how to ensure skill use does not introduce unsafe behaviors or biases.
    - line: Uncertainty quantification and reliability assessment
      what_it_solves: Provides post-hoc UQ methods to estimate agent confidence in
        GUI grounding, enabling safer spatial predictions via conformal prediction.
      what_remains_open: Integration of UQ into multi-step agent policies and validation
        that calibration transfers across deployment environments and interaction
        types.
    - line: Scalable training and data efficiency
      what_it_solves: Reduces reliance on human annotations through weak supervision
        from unlabeled screenshots or verifiable RL task synthesis, achieving state-of-the-art
        with limited data.
      what_remains_open: Lack of scaling laws that predict agent behavior from data
        scale, and absence of guarantees that efficient training methods preserve
        safety constraints.
    consensus:
    - GUI agents still struggle with dynamic interfaces and long-horizon tasks, requiring
      better context management and observation control.
    - Visual information is critical for accurate UI grounding, and skill libraries
      or multimodal representations consistently improve performance.
    - Existing benchmarks are limited in interaction diversity, motivating new datasets
      for drag, short-video, and multi-app scenarios.
    - Uncertainty calibration is a promising direction for building safer agents,
      but current methods are evaluated only on single-step grounding.
    disagreements:
    - 'Interaction focus: some works target static desktop environments, while others
      address dynamic video feeds or drag-based interactions, leading to incompatible
      task definitions.'
    - 'Evaluation methodology: deterministic rule-based scoring versus human judgment,
      and whether metrics should include information efficiency (cost-accuracy) alongside
      task success.'
    - 'Training paradigm: supervised fine-tuning with curated skills versus online
      RL with synthetic tasks versus weak supervision from unlabeled data, each with
      different scalability and reliability trade-offs.'
    - 'Role of uncertainty: only a few works explicitly model UQ; others assume agent
      outputs are trustworthy without confidence estimates, contrasting with the emerging
      safety-focused view.'
    open_questions:
    - Can a unified task abstraction cover all GUI interaction modes (click, drag,
      dynamic content) without over-simplifying each?
    - How does UQ ranking transfer from single-step grounding to multi-step trajectories,
      and what calibration is needed for safe autonomous operation?
    - Do the scaling laws implied by online RL and weak supervision hold across different
      agent architectures and interface types?
    - What formal guarantees are needed to ensure skill libraries and context management
      mechanisms do not introduce subtle failure modes in long-horizon tasks?
