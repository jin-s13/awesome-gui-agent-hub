  related_work_outline:
  - 'Mainstream direction: Designing diverse, fine-grained GUI agent benchmarks spanning
    desktop, drag, and dynamic interfaces, paired with methods for skill augmentation,
    data-efficient training, and uncertainty quantification to improve agent performance.'
  - 'Shared research pattern: Reliance on realistic simulated environments, evaluation
    beyond pass-rate with fine-grained metrics, and use of large-scale unannotated
    or synthetic data to reduce annotation cost.'
  - 'Key differences: Benchmarks target static multi-application tasks vs. dynamic
    content evolving between actions; training approaches range from external multimodal
    skills to end-to-end online RL or weak supervision; evaluation metrics split between
    success rate, cost-accuracy, and uncertainty calibration.'
  - 'Trend evolution: Movement from single-app tasks toward multi-app, hybrid CLI+GUI,
    and short-video platforms; evaluation shifting from coarse success to sub-goal,
    efficiency, and uncertainty metrics; methods increasingly emphasize data efficiency
    and scalable training.'
  - 'Open questions: Observation control in dynamic UIs, cross-platform and cross-application
    generalization, multi-step uncertainty propagation, and quality assurance of synthetic
    task generation.'
  related_work_outline_zh:
  - 主流方向：构建覆盖桌面、拖拽、动态界面等交互模式的细粒度GUI代理基准，并探索技能增强、数据高效训练和不确定性量化方法来提升代理能力。
  - 研究共性：依赖真实模拟环境，超越通过率的细粒度评估，以及利用大规模未标注或合成数据降低标注成本。
  - 关键差异：基准设计聚焦静态多应用任务与动态内容变化界面；训练方法在外部多模态技能、端到端在线RL和弱监督之间选择；评估指标分为成功率、成本-准确性和不确定性校准。
  - 趋势演进：从单一应用到多应用、混合CLI+GUI和短视频平台，评估从粗粒度成功率转向子目标、效率和不确定性，方法上追求数据效率和可扩展训练。
  - 开放问题：动态界面中的观察控制、跨平台和跨应用泛化、多步不确定性传播、合成任务生成的质量保证。
  literature_review:
    line_of_work_matrix:
    - line: Static and hybrid-modality GUI agent benchmarking
      what_it_solves: Provides diverse tasks covering desktop, drag, and CLI interactions,
        enabling fine-grained sub-goal evaluation of multi-application agent capabilities.
      what_remains_open: Tasks do not capture dynamic content changes between actions;
        cross-platform generalizability of benchmark conclusions is unverified.
    - line: Dynamic and video-guided GUI agent benchmarking
      what_it_solves: Introduces tasks where interface content evolves over time,
        testing agents' observation control and information efficiency.
      what_remains_open: Limited to short-video or specific platforms; the observed
        lack of observation control is identified but not yet solved.
    - line: Skill-augmented and data-efficient agent training
      what_it_solves: Improves agent performance through hierarchical multimodal skills,
        weak supervision from unannotated screenshots, and verifiable synthetic task
        generation with online RL.
      what_remains_open: Skill transfer across applications and resilience to UI distribution
        shift are unaddressed; synthetic task quality and diversity may introduce
        biases.
    - line: Uncertainty quantification and safety evaluation for agent grounding
      what_it_solves: Benchmarks post-hoc uncertainty quantification methods for GUI
        grounding, offering calibrated confidence and conformal prediction regions
        for spatial safety.
      what_remains_open: Evaluation is restricted to single-step grounding; multi-step
        trajectory uncertainty propagation and robustness under distribution shift
        are not covered.
    consensus:
    - GUI agent evaluation must go beyond task success rate, incorporating fine-grained
      sub-goal completion, information efficiency, or uncertainty calibration.
    - Realistic simulated environments are essential, covering diverse interaction
      modalities such as click, drag, CLI, and dynamic content.
    - Large-scale data, whether unannotated screenshots, synthetic tasks, or skill
      libraries, is critical for improving agent capabilities.
    disagreements:
    - 'Benchmark focus: static multi-application tasks (desktop, drag) vs. dynamic
      interfaces where content changes between actions, leading to different task
      designs and evaluation protocols.'
    - 'Training paradigm: embedding external multimodal skills vs. end-to-end online
      RL with synthetic tasks vs. weak supervision from unannotated data, reflecting
      different assumptions about the role of prior knowledge and interaction data.'
    - 'Primary evaluation metric: success rate (Pass@1) vs. cost-accuracy vs. uncertainty-aware
      measures, making benchmark rankings difficult to compare across studies.'
    open_questions:
    - How can GUI agents acquire observation control to decide when to re-observe
      in dynamic environments?
    - To what extent do benchmark rankings remain stable across different compute
      budgets, implementations, and unseen applications?
    - Can uncertainty quantification be extended to multi-step trajectories to enable
      safe autonomous operation?
    - How can synthetic task generation guarantee diversity and coverage without introducing
      spurious correlations that inflate benchmark scores?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 静态和混合交互模态的GUI代理基准测试
      解决的问题: 提供覆盖桌面、拖拽和CLI交互的多样化任务，实现对多应用代理能力的细粒度子目标评估。
      尚未覆盖: 任务未涵盖操作间动态内容变化，基准结论的跨平台泛化性未经验证。
    - 路线: 动态和视频引导的GUI代理基准测试
      解决的问题: 引入界面内容随时间变化的任务，测试代理的观察控制和信息效率。
      尚未覆盖: 局限于短视频或特定平台；观察控制不足已被识别但尚未解决。
    - 路线: 技能增强与数据高效的代理训练
      解决的问题: 通过分层多模态技能、未标注截图的弱监督和可验证合成任务在线RL，提升代理性能。
      尚未覆盖: 跨应用技能迁移和UI分布偏移下的鲁棒性未解决；合成任务的质量和多样性可能引入偏差。
    - 路线: 代理定位的不确定性量化与安全评估
      解决的问题: 基准测试后验不确定性量化方法，为GUI定位提供校准置信度和共形预测区域，提高空间安全性。
      尚未覆盖: 评估仅限于单步定位；多步轨迹的不确定性传播和分布偏移下的鲁棒性未覆盖。
    共识:
    - GUI代理评估必须超越任务成功率，纳入细粒度子目标完成度、信息效率或不确定性校准。
    - 真实模拟环境至关重要，需涵盖点击、拖拽、CLI和动态内容等多种交互模式。
    - 大规模数据（未标注截图、合成任务或技能库）对提升代理能力起关键作用。
    分歧:
    - 基准焦点：静态多应用任务（桌面、拖拽）与动态内容变化界面，导致不同的任务设计和评估协议。
    - 训练范式：嵌入外部多模态技能 vs. 端到端在线RL与合成任务 vs. 来自未标注数据的弱监督，反映了对先验知识和交互数据角色的不同假设。
    - 主要评估指标：成功率（Pass@1） vs. 成本-准确性 vs. 不确定性感知度量，导致不同基准之间的排名难以比较。
    开放问题:
    - GUI代理如何获得观察控制能力，以决定在动态环境中何时重新观察？
    - 基准排名在多大程度上能在不同计算预算、实现和未见应用上保持稳定？
    - 不确定性量化能否扩展到多步轨迹，以实现安全的自主操作？
    - 合成任务生成如何保证多样性和覆盖面，同时避免引入虚假相关性从而抬高基准分数？
