  - 'Mainstream direction: Building runnable GUI agent systems that reduce reliance
    on human annotation through weak supervision or online reinforcement learning,
    while integrating multimodal skills and memory mechanisms to improve long-horizon
    task performance.'
  - 'Shared research pattern: Multi-stage training pipelines (pretraining or supervised
    fine-tuning followed by RL calibration), end-to-end evaluation on real or simulated
    environments, and a focus on GUI-specific visual grounding and action localization.'
  - 'Key differences: Memory representation (full-image vs. action-grounded crops),
    skill representation (text-only vs. multimodal with visual figures), training
    data source (unannotated static screenshots vs. online interactive trajectories),
    and safety evaluation scope (browser tasks vs. coding tasks, revealing domain-conditioned
    robustness).'
  - 'Trend evolution: From 2024 to 2026 the evidence shows a shift from short simulated
    tasks toward long-horizon real-world deployment, with growing attention to safety
    auditing, reproducibility, and failure-mode analysis in professional GUI workflows.'
  - 'Open questions: How to achieve cross-domain safety generalization without sacrificing
    task performance; how to mitigate error propagation and objective drift in tasks
    exceeding one hour; how to balance the exploration cost of online training against
    performance gains; and how to effectively leverage large-scale unannotated screenshots
    across diverse applications.'
  related_work_outline_zh:
  - 主流方向：构建可运行的GUI代理系统，通过弱监督或在线强化学习减少对人工标注的依赖，同时集成多模态技能与记忆机制以提升长期任务表现。
  - 研究共性：采用多阶段训练流水线（预训练或监督微调后接强化学习校准），在真实或模拟环境中进行端到端评估，并聚焦于GUI特有的视觉定位与动作接地。
  - 关键差异：记忆表示方式（全图像 vs 动作接地裁剪）、技能表示方式（纯文本 vs 保留视觉图形的多模态）、训练数据来源（未标注静态截图 vs 在线交互轨迹）、安全评估范围（浏览器任务
    vs 编码任务，揭示领域条件鲁棒性）。
  - 趋势演进：2024至2026年证据显示，研究从短任务模拟环境向长期真实世界部署转变，安全性审计、可复现性以及专业GUI工作流中的失败模式分析日益受到关注。
  - 开放问题：如何在不牺牲任务性能的前提下实现跨领域安全泛化；如何缓解超过一小时任务中的错误传播与目标漂移；如何平衡在线训练的探索成本与性能收益；以及如何有效利用跨应用的大规模未标注截图。
  literature_review:
    line_of_work_matrix:
    - line: GUI agent training frameworks with data-efficient supervision
      what_it_solves: Reducing dependence on expensive human-annotated trajectories
        by leveraging weak supervision from unannotated screenshots or online RL with
        minimal seed data, enabling competitive performance with orders of magnitude
        less labeled data.
      what_remains_open: The cost and safety risks of online interaction during training,
        whether the learned policies generalize across applications and domains, and
        how to prevent catastrophic forgetting when fine-tuning with limited calibration
        data.
    - line: Multimodal memory and skill libraries for GUI agents
      what_it_solves: Improving long-horizon task execution by equipping agents with
        persistent, retrievable knowledge artifacts—either as hierarchical multimodal
        skill files with visual figures or as action-grounded image crops stored in
        a working memory—to reduce state misunderstanding and grounding errors.
      what_remains_open: Memory bloat as the skill library grows, transfer of skills
        across different applications and UI paradigms, and whether retaining visual
        figures introduces privacy or security risks when the memory contains sensitive
        screen content.
    - line: Safety evaluation and red-teaming for computer-using agents
      what_it_solves: Characterizing the vulnerability of deployed GUI agents to prompt
        injection and skill-injection attacks, and auditing whether published safety
        claims are reproducible under controlled hand-crafted attack templates rather
        than unreleased RL-optimized strings.
      what_remains_open: The finding that safety hardening is domain-conditioned (robust
        on browser tasks, brittle on coding tasks) raises the question of how to build
        unified safety across all interaction surfaces; current benchmarks cover only
        a narrow slice of possible attack modalities and application domains.
    - line: Long-horizon real-world GUI benchmarks
      what_it_solves: Providing standardized evaluation environments with tasks that
        require hundreds of tool calls and span over an hour of human completion time,
        capturing real-world phenomena such as streaming interaction, cross-source
        reasoning, and implicit-state inference that earlier benchmarks omitted.
      what_remains_open: Current agents plateau at 20–30% task completion, with failure
        modes concentrated in constraint maintenance, mid-task information integration,
        and verification; benchmarks remain limited to specific OS and application
        configurations, and independent reproduction across teams has not yet been
        demonstrated.
    consensus:
    - Multimodal input (screenshots or visual elements along with text) is essential
      for GUI understanding and action grounding, and purely text-based representations
      degrade performance.
    - Multi-stage training pipelines—starting from supervised or weakly supervised
      pretraining and then calibrating with reinforcement learning—are more effective
      than single-stage approaches.
    - Long-horizon real-world tasks remain far from solved, with the strongest current
      agents achieving only 20–30% success on professional-grade benchmarks.
    - Online interaction with live environments provides a critical training signal
      that static datasets cannot fully replace, but it introduces infrastructure
      complexity and safety concerns.
    disagreements:
    - 'Memory representation: one line advocates storing full screenshots as visual
      memory, while another shows that full-image memory worsens action-level errors
      and proposes action-grounded image crops instead.'
    - 'Skill representation: some systems encode skills as text-only documentation,
      while others demonstrate that retaining visual figures within skill artifacts
      yields a significant absolute improvement in UI element identification.'
    - 'Training data source: one approach scales up unannotated static screenshots
      for visual grounding, while another relies on live-browser interaction trajectories
      collected online; the trade-off between data scale and interaction fidelity
      is unresolved.'
    - 'Safety evaluation target: audits reveal that prompt-injection resistance observed
      on browser tasks does not transfer to coding tasks, indicating that safety claims
      are domain-conditioned and should not be generalized without cross-domain testing.'
    open_questions:
    - What mechanisms would enable unified safety hardening across all interaction
      surfaces—browser, coding, terminal—so that robustness in one domain is not lost
      in another?
    - How can GUI agents maintain task constraints and integrate mid-task information
      over hundreds of steps without objective drift, given that current systems fail
      most on these challenges?
    - What is the minimum amount of high-quality annotated data and online interaction
      needed to train a deployable GUI agent, and how does this threshold vary across
      application domains?
    - Under what conditions do multimodal skill libraries and memory systems become
      a privacy or security liability, and how should access to stored visual artifacts
      be governed?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 数据高效监督的GUI代理训练框架
      解决的问题: 通过利用未标注截图的弱监督或最小种子数据的在线强化学习，减少对昂贵人工标注轨迹的依赖，以少几个数量级的标注数据达到竞争性能。
      尚未覆盖: 训练期间在线交互的成本和安全风险，学习到的策略是否跨应用和领域泛化，以及用少量校准数据微调时如何防止灾难性遗忘。
    - 路线: GUI代理的多模态记忆与技能库
      解决的问题: 通过为代理配备持久可检索的知识工件——分层多模态技能文件（含视觉图形）或动作接地图像裁剪——来改善长期任务执行，减少状态误解和接地错误。
      尚未覆盖: 技能库增长导致的内存膨胀，跨不同应用和UI范式的技能迁移，以及当记忆包含敏感屏幕内容时保留视觉图形是否引入隐私或安全风险。
    - 路线: 计算机使用代理的安全评估与红队测试
      解决的问题: 刻画已部署GUI代理对提示注入和技能注入攻击的脆弱性，并审计已发布的安全声明在受控手工攻击模板下是否可复现，而非依赖未发布的RL优化字符串。
      尚未覆盖: 安全加固是领域条件的（浏览器任务鲁棒、编码任务脆弱），这一发现提出了如何构建跨所有交互面统一安全的问题；当前基准覆盖的攻击模态和应用领域仍很狭窄。
    - 路线: 长期真实世界GUI基准测试
      解决的问题: 提供标准化评估环境，任务需要数百次工具调用且人类完成时间超过一小时，捕捉先前基准遗漏的真实世界现象，如流式交互、跨源推理和隐式状态推断。
      尚未覆盖: 当前代理任务完成率停滞在20–30%，失败集中于约束维持、任务中途信息整合和验证；基准仍限于特定操作系统和应用配置，跨团队独立复现尚未得到验证。
    共识:
    - 多模态输入（截图或视觉元素与文本结合）对GUI理解和动作接地至关重要，纯文本表示会降低性能。
    - 多阶段训练流水线——从监督或弱监督预训练开始，然后用强化学习校准——比单阶段方法更有效。
    - 长期真实世界任务远未解决，最强当前代理在专业级基准上仅达到20–30%的成功率。
    - 与真实环境的在线交互提供了静态数据集无法完全替代的关键训练信号，但引入了基础设施复杂性和安全顾虑。
    分歧:
    - 记忆表示：一个路线主张存储完整截图作为视觉记忆，而另一个路线表明全图像记忆会加剧动作级错误，提出用动作接地图像裁剪替代。
    - 技能表示：有些系统将技能编码为纯文本文档，而另一些证明在技能工件中保留视觉图形可在UI元素识别上带来显著绝对提升。
    - 训练数据来源：一种方法扩展未标注静态截图用于视觉定位，另一种依赖在线收集的实时浏览器交互轨迹；数据规模与交互保真度之间的权衡尚未解决。
    - 安全评估目标：审计揭示在浏览器任务上观察到的提示注入抵抗力不能迁移到编码任务，表明安全声明是领域条件的，不应在缺乏跨领域测试的情况下泛化。
    开放问题:
    - 什么机制能实现跨所有交互面——浏览器、编码、终端——的统一安全加固，使得一个领域的鲁棒性不会在另一个领域丧失？
    - GUI代理如何在数百步中维持任务约束并整合任务中途信息而不发生目标漂移，鉴于当前系统在这些挑战上失败最多？
    - 训练一个可部署GUI代理所需的高质量标注数据和在线交互的最小量是多少，这个阈值如何随应用领域变化？
    - 在什么条件下多模态技能库和记忆系统会成为隐私或安全负担，应如何管理对存储的视觉工件的访问？
