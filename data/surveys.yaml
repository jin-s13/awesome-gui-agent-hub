  related_work_outline:
  - 'Mainstream direction: Building GUI agent benchmarks on real operating systems
    (macOS, Android, web) and complementing aggregate success rates with fine-grained,
    diagnostic, and uncertainty-aware metrics.'
  - 'Shared research pattern: Papers emphasize real-world task diversity across multiple
    applications, treat visual grounding as a core capability, and measure performance
    beyond binary pass/fail.'
  - 'Key differences: Benchmarks differ in environment fidelity (real device vs. simulator),
    interaction primitives (click, drag, dynamic content), evaluation target (end-to-end
    completion vs. sub-goal vs. uncertainty), and data source (annotated, unlabeled,
    synthetic).'
  - 'Trend evolution: The frontier is moving from static desktop benchmarks toward
    dynamic, multimodal interaction benchmarks (short-video, drag) and from coarse
    completion rates to diagnostic and uncertainty-aware metrics, with training loops
    that directly use benchmarks.'
  - 'Open questions: How well do benchmark tasks approximate long-horizon user workflows;
    can uncertainty metrics remain calibrated across unseen interfaces; and how to
    maintain reproducibility while incorporating dynamic content.'
  related_work_outline_zh:
  - 主流方向：在真实操作系统上构建GUI代理基准，并在总体成功率之外补充细粒度、诊断性和不确定性感知的评估指标。
  - 研究共性：强调跨应用的真实任务多样性，将视觉定位视为核心能力，并衡量超越二元通过/失败的性能。
  - 关键差异：基准在环境保真度（真机vs模拟器）、交互原语（点击、拖拽、动态内容）、评估目标（端到端完成vs子目标vs不确定性）以及数据来源（标注、未标注、合成）上存在分歧。
  - 趋势演进：前沿正在从静态桌面基准向动态、多模态交互基准（短视频、拖拽）扩展，评估指标从粗粒度完成率向诊断性和不确定性感知演进，并出现直接利用基准的训练闭环。
  - 开放问题：基准任务在多大程度上近似长期用户工作流；不确定性指标能否在未见界面上保持校准；以及如何在纳入动态内容的同时保持可复现性。
  literature_review:
    line_of_work_matrix:
    - line: Real-world OS-level GUI agent benchmarks
      what_it_solves: Provide tasks across diverse applications and interaction types
        (click, drag, dynamic content) to evaluate agent capability in realistic environments.
      what_remains_open: Coverage of long-horizon, multi-app workflows; reproducibility
        across OS versions; maintenance cost of live environments.
    - line: Fine-grained evaluation and uncertainty quantification
      what_it_solves: Diagnose sub-goal completion and model confidence, moving beyond
        aggregate success to support safer agent deployment.
      what_remains_open: Alignment between proxy metrics and user satisfaction; robustness
        of uncertainty methods under distribution shift and across model tiers.
    - line: Scalable data and training integration with benchmarks
      what_it_solves: Synthesize or leverage weakly labeled data to train GUI agents,
        using benchmarks as both training signal and evaluation.
      what_remains_open: Distribution gap between synthetic/unlabeled data and real
        user tasks; risk of overfitting to benchmark-specific environments.
    - line: Multimodal skill augmentation and evaluation
      what_it_solves: Enhance agent performance via external multimodal skill libraries,
        testing retrieval and application of procedural knowledge.
      what_remains_open: Cost of skill creation and maintenance; generalization of
        skill libraries to unseen applications and interfaces.
    consensus:
    - Real-world GUI environments are necessary for meaningful agent evaluation, as
      synthetic or simplified setups miss critical interaction challenges.
    - Visual grounding with screenshots is a fundamental requirement for GUI agents;
      models that retain visual artifacts perform better.
    - Aggregate success rate alone is insufficient; fine-grained, multi-step, or uncertainty-aware
      metrics reveal capability gaps hidden by similar pass rates.
    - Current agents struggle with dynamic content and complex interaction primitives
      such as drag or observation control, leaving a clear gap to human-level performance.
    disagreements:
    - 'Environment fidelity: some benchmarks use real devices and live applications,
      while others rely on browser-based simulators, trading off realism for reproducibility.'
    - 'Interaction coverage: existing benchmarks emphasize different primitives—click-focused
      tasks versus those that explicitly require drag, slide, or observation control
      on dynamic screens.'
    - 'Evaluation philosophy: works differ in whether they prioritize task completion,
      sub-goal progress, cost-accuracy trade-offs, or post-hoc uncertainty calibration.'
    - 'Training data source: methods diverge on using human-annotated screenshots,
      massive unlabeled web data, or verifiable synthetic tasks generated through
      agent interaction.'
    open_questions:
    - How can benchmarks incorporate long-horizon, multi-session tasks that reflect
      real user workflows without sacrificing reproducibility?
    - Can uncertainty quantification methods remain calibrated across different model
      families and unseen interfaces, or will they require target-specific re-evaluation?
    - What is the trade-off between environment realism and maintenance cost, and
      how should the community balance these in evolving benchmark suites?
    - How well do synthetic and weakly supervised training signals transfer to real-world
      GUI tasks, and what are the detection and mitigation strategies for benchmark
      overfitting?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实操作系统级GUI代理基准
      解决的问题: 提供跨应用、跨交互类型（点击、拖拽、动态内容）的任务，在真实环境中评估代理能力。
      尚未覆盖: 长期、多应用协作工作流的覆盖；跨OS版本的可复现性；活环境的维护成本。
    - 路线: 细粒度评估与不确定性量化
      解决的问题: 诊断子目标完成度和模型置信度，在总体成功率之外支持更安全的代理部署。
      尚未覆盖: 代理指标与用户满意度的对齐；不确定性方法在分布偏移和跨模型层级下的鲁棒性。
    - 路线: 可扩展数据与基准联合训练
      解决的问题: 合成或利用弱标注数据训练GUI代理，以基准同时作为训练信号和评估手段。
      尚未覆盖: 合成/未标注数据与真实用户任务的分布差异；对基准特定环境的过拟合风险。
    - 路线: 多模态技能增强与评估
      解决的问题: 通过外部多模态技能库提升代理性能，测试代理对过程性知识的检索与应用能力。
      尚未覆盖: 技能库构建与维护的成本；技能库对未见应用和界面的泛化。
    共识:
    - 真实GUI环境是有意义的代理评估的必要条件，简化或合成环境会遗漏关键交互挑战。
    - 基于截图的视觉定位是GUI代理的基础需求，保留视觉构件的模型表现更好。
    - 仅凭总体成功率不够；细粒度、多步骤或不确定性感知的指标能揭示相似成功率背后的能力差异。
    - 当前代理在动态内容和复杂交互原语（如拖拽、观察控制）上表现不佳，与人类水平存在明显差距。
    分歧:
    - 环境保真度：部分基准使用真机和活应用，其他则依赖基于浏览器的模拟器，在真实性与可复现性之间取舍。
    - 交互覆盖：现有基准侧重不同原语——有的聚焦点击任务，有的明确要求拖拽、滑动或在动态屏幕上的观察控制。
    - 评估哲学：作品在优先任务完成、子目标进度、成本-准确性权衡或事后不确定性校准上存在差异。
    - 训练数据来源：方法在人工标注截图、海量未标注网络数据或通过代理交互生成的可验证合成任务上各有侧重。
    开放问题:
    - 如何在不牺牲可复现性的前提下，将反映真实用户工作流的长期、多会话任务纳入基准？
    - 不确定性量化方法能否在不同模型家族和未见界面上保持校准，还是需要针对特定目标重新评估？
    - 环境真实性与维护成本之间的权衡是什么，社区应如何在不断演进的基准套件中平衡二者？
    - 合成和弱监督训练信号在真实世界GUI任务上的迁移效果如何，有哪些检测和缓解基准过拟合的策略？
