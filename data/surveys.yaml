  related_work_outline:
  - 'Mainstream direction: Scaling GUI agent training with online RL, weak supervision,
    and proactive context management, while benchmarking new interaction modalities
    (drag, dynamic screens, video guidance) and uncertainty quantification.'
  - 'Shared research pattern: Vision-language model backbones are fine-tuned to map
    screenshots and task instructions to grounded actions, using synthetic data generation,
    curriculum learning, or RL to reduce annotation cost and handle long-horizon tasks.'
  - 'Key differences: Training paradigm—online RL with verifiable tasks vs. weak supervision
    from unlabeled screenshots vs. SFT with context-as-action; evaluation focus—fine-grained
    task completion vs. cost-accuracy vs. uncertainty calibration; action space—click-only
    vs. drag, scroll, and observation control.'
  - 'Trend evolution: Over 2024–2026, the field moved from static desktop benchmarks
    to dynamic, multimodal, and long-horizon environments, with increasing emphasis
    on data efficiency, online RL, and proactive state management, while emerging
    benchmarks reveal new capability gaps (drag, living screens, video guidance).'
  - 'Open questions: How to disentangle contributions of RL, data synthesis, and context
    management; whether UQ methods transfer across model families and interfaces;
    how to design agents with adaptive observation control for dynamic UIs.'
  related_work_outline_zh:
  - 主流方向：通过在线强化学习、弱监督和主动上下文管理扩展GUI智能体训练，同时围绕拖拽、动态屏幕、视频引导等新交互模态及不确定性量化构建基准。
  - 研究共性：以视觉语言模型为骨干，将截图与任务指令映射为接地动作，利用合成数据、课程学习或强化学习降低标注成本并处理长程任务。
  - 关键差异：训练范式不同——可验证任务的在线RL vs. 未标注截图的弱监督 vs. 将上下文管理作为动作的SFT；评测焦点不同——细粒度任务完成 vs. 成本-准确率
    vs. 不确定性校准；动作空间不同——仅点击 vs. 拖拽、滑动及观察控制。
  - 趋势演进：2024–2026年，领域从静态桌面基准转向动态、多模态和长程环境，越来越强调数据效率、在线RL和主动状态管理，新基准揭示了拖拽、动态屏幕、视频引导等能力缺口。
  - 开放问题：如何分离RL、数据合成与上下文管理的贡献；UQ方法能否跨模型家族和接口迁移；如何为动态界面设计自适应观察控制的智能体。
  literature_review:
    line_of_work_matrix:
    - line: Training objective design and weakly-supervised methods
      what_it_solves: Developing efficient training recipes (online RL, weak supervision,
        curriculum learning) that reduce reliance on expensive human annotations and
        scale to many tasks via verifiable task synthesis.
      what_remains_open: Which components—reward design, task generation, or curriculum
        scheduling—contribute most to generalization beyond the training environments,
        and whether the learned policies transfer to unseen interface types.
    - line: Action-interface and context management for long-horizon tasks
      what_it_solves: Extending agent capabilities to handle dynamic content, long
        sequences, and complex interactions (drag, CLI, video-guided) by integrating
        context-as-action, keyframe extraction, or structured history fields.
      what_remains_open: How much performance gain stems from the action representation
        versus the underlying planner or controller, and how to maintain robustness
        when the observation space changes rapidly.
    - line: Benchmarking and method evaluation protocols
      what_it_solves: Providing rigorous evaluation of GUI agents through fine-grained
        metrics, uncertainty quantification, and coverage of under-explored interaction
        types (drag, dynamic screens, multi-app workflows), thus isolating method
        contributions.
      what_remains_open: Whether current benchmarks and UQ rankings transfer across
        architectures and deployment settings, and the absence of standardized evaluation
        for multi-step reasoning and observation control.
    consensus:
    - Vision-language models are the dominant backbone for grounding and action prediction.
    - Data efficiency is a central challenge; synthetic data generation and weak supervision
      are promising directions.
    - Existing agents still lack reliable observation control and fail on dynamic
      or long-horizon interfaces.
    - Fine-grained evaluation beyond binary success reveals critical differences hidden
      by aggregate metrics.
    - Uncertainty quantification is necessary for safe deployment, but its cross-model
      transfer is limited.
    disagreements:
    - 'Training strategy: one line uses online RL with verifiable task synthesis,
      another uses weak supervision from unlabeled screenshots, and a third relies
      on SFT with manual context management actions.'
    - 'Action space representation: some works treat context pruning as a first‑class
      action, while others keep it implicit; some cover only click operations, while
      others introduce drag, scroll, and video‑guided interactions.'
    - 'Evaluation target: fine‑grained task‑completion vs. cost‑accuracy trade‑offs
      vs. uncertainty calibration—each captures different aspects of agent capability
      and may not be directly comparable.'
    - 'Deployment assumption: some methods assume static screenshots, others assume
      dynamic content that changes between actions, leading to incompatible observation
      models.'
    open_questions:
    - Can the gains from online RL and verifiable task synthesis be replicated when
      the task distribution shifts to real‑world, uncurated environments?
    - How to design agents that dynamically decide when to observe, scroll, or wait,
      avoiding over‑ and under‑observation failures?
    - What is the minimal set of UQ methods that transfers reliably from open‑weight
      to closed‑source models without re‑ranking?
    - How to unify training for discrete (click, drag) and continuous (scroll, slider)
      actions while preserving sample efficiency?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 训练目标设计与弱监督方法
      解决的问题: 开发高效训练配方（在线RL、弱监督、课程学习），减少对昂贵人工标注的依赖，并通过可验证任务合成实现规模化。
      尚未覆盖: 哪些组件（奖励设计、任务生成、课程调度）对训练环境之外的泛化贡献最大，以及学习到的策略能否迁移到未见过的界面类型。
    - 路线: 动作接口与长程任务的上下文管理
      解决的问题: 通过将上下文管理作为动作、关键帧提取或结构化历史字段，扩展智能体处理动态内容、长序列和复杂交互（拖拽、CLI、视频引导）的能力。
      尚未覆盖: 性能提升有多少来自动作表示，而非底层规划器或控制器；当观察空间快速变化时如何保持鲁棒性。
    - 路线: 基准测试与方法评估协议
      解决的问题: 通过细粒度指标、不确定性量化和覆盖尚未充分探索的交互类型（拖拽、动态屏幕、多应用工作流），对GUI智能体进行严格评估，从而隔离方法贡献。
      尚未覆盖: 当前基准和UQ排名能否跨架构和部署环境迁移，以及多步推理和观察控制缺乏标准化评估。
    共识:
    - 视觉语言模型是接地与动作预测的主要骨干。
    - 数据效率是核心挑战；合成数据生成和弱监督是富有前景的方向。
    - 现有智能体仍然缺乏可靠的观察控制，在动态或长程界面上失败。
    - 超越二元成功的细粒度评估揭示了聚合指标隐藏的关键差异。
    - 不确定性量化对安全部署是必要的，但其跨模型迁移受限。
    分歧:
    - 训练策略：一条路线采用可验证任务合成的在线RL，另一条采用未标注截图的弱监督，第三条依赖带有手动上下文管理动作的SFT。
    - 动作空间表示：部分工作将上下文修剪视为第一类动作，其他工作则保持隐式；部分仅覆盖点击操作，而其他工作引入拖拽、滚动和视频引导交互。
    - 评估目标：细粒度任务完成 vs. 成本-准确率权衡 vs. 不确定性校准——各自捕捉智能体能力的不同侧面，且可能不可直接比较。
    - 部署假设：部分方法假设静态截图，其他方法假设动作间内容变化的动态环境，导致观察模型不兼容。
    开放问题:
    - 当任务分布转移到真实世界非策划环境时，在线RL和可验证任务合成带来的提升能否重现？
    - 如何设计能够动态决定何时观察、滚动或等待的智能体，以避免过度观察和观察不足的失败？
    - 能够从开源模型可靠迁移到闭源模型而不需要重新排序的最小UQ方法集合是什么？
    - 如何在保持样本效率的同时统一离散动作（点击、拖拽）和连续动作（滚动、滑块）的训练？
