  related_work_outline:
  - 'Mainstream direction: The field is expanding from point-and-click GUI agents
    to agents that handle richer action spaces (drag, video-frame selection, CLI),
    longer horizons, and safety-critical deployment, driven by new benchmarks that
    expose current models'' failure modes such as observation control deficits and
    lack of uncertainty awareness.'
  - 'Shared research pattern: Most works first build a targeted benchmark (desktop,
    short-video, drag, video-guided) to quantify a specific capability gap, then propose
    a method (weakly supervised training, online RL, context management, UQ) to close
    that gap, and finally evaluate on the same benchmark to demonstrate improvement.'
  - 'Key differences: Papers differ in evaluation targets (single-step grounding vs.
    multi-step tasks, static vs. dynamic interfaces), interaction modes (click, drag,
    CLI, keyframe extraction), training supervision (weak annotation, synthetic RL
    tasks, unannotated screenshots), and whether they address UQ, context management,
    or action-space expansion.'
  - 'Trend evolution: Within the 2024–2026 frontier, benchmarks have rapidly diversified
    from desktop/mobile to dynamic video and drag interactions. Training methods are
    shifting from fully supervised to data-efficient paradigms (weak supervision,
    task synthesis, online RL), and reliability mechanisms (UQ, proactive context
    management) are gaining attention.'
  - 'Open questions: How to build a unified evaluation across platforms and interaction
    types; whether data-efficient methods generalize to complex multi-step tasks;
    how to safely integrate proactive context management; how to achieve cross-model
    UQ transfer; and how to integrate multiple action spaces into a single end-to-end
    agent.'
  related_work_outline_zh:
  - 主流方向：领域从点击式 GUI 代理向支持拖拽、视频帧选择、CLI 等丰富动作空间、长时域和安全关键部署的代理扩展，新基准暴露了当前模型在观察控制不足和缺乏不确定性意识等失败模式。
  - 研究共性：多数工作先构建针对性基准（桌面、短视频、拖拽、视频引导）量化能力缺口，然后提出方法（弱监督、在线 RL、上下文管理、UQ）来弥补缺口，并在同一基准上评估改进。
  - 关键差异：评估目标（单步定位 vs. 多步任务，静态 vs. 动态界面）、交互模式（点击、拖拽、CLI、关键帧提取）、训练监督（弱标注、合成 RL 任务、未标注截图）以及是否涉及
    UQ、上下文管理或动作空间扩展等方面存在差异。
  - 趋势演进：在 2024–2026 前沿内，基准从桌面/移动端迅速扩展到动态视频和拖拽交互；训练方法从完全监督转向数据高效范式（弱监督、任务合成、在线 RL）；可靠性机制（UQ、主动上下文管理）获得关注。
  - 开放问题：如何构建跨平台和交互类型的统一评估；数据高效方法能否泛化到复杂多步任务；如何安全集成主动上下文管理；如何实现跨模型 UQ 迁移；如何将多个动作空间集成到单个端到端代理中。
  literature_review:
    line_of_work_matrix:
    - line: GUI agent benchmarking and task design
      what_it_solves: Provides diverse evaluation environments (desktop, dynamic video,
        drag, video-guided) that measure agent capabilities across interaction modes,
        task horizons, and interface complexity, exposing failure modes such as over-
        and under-observation and lack of action-space coverage.
      what_remains_open: No benchmark unifies multi-step tasks across platforms and
        dynamic interfaces; fine-grained sub-goal metrics are not yet standardized;
        out-of-distribution generalization of benchmarks is unverified.
    - line: Data-efficient and weakly-supervised training
      what_it_solves: Reduces reliance on expensive human annotations by leveraging
        unannotated screenshots, verifiable task synthesis, and online RL with frontier
        sampling, achieving competitive performance with far less labeled data.
      what_remains_open: Distribution gap between synthesized and real-world tasks
        can cause performance degradation; scalability to complex multi-step interactions
        is unclear; reward design and safe exploration in RL remain open.
    - line: Long-horizon context management and planning
      what_it_solves: Addresses context-window limits in long trajectories by treating
        context management as a first-class action (ConAct), preserving critical information
        while discarding noise, improving long-horizon task success.
      what_remains_open: Strategy generalization from mobile to desktop or dynamic
        interfaces is unknown; optimal context retention policies are not learned
        automatically; context management actions may introduce new errors.
    - line: Uncertainty quantification for safe GUI interaction
      what_it_solves: Enables agents to estimate their own prediction confidence,
        supporting rejection, conformal click regions, and safer human-in-the-loop
        deployment, with some methods reducing click region radii by 40–60% after
        calibration.
      what_remains_open: Multi-step UQ propagation is not studied; cross-model and
        cross-interface transfer of UQ rankings is weak (average +0.08 Spearman ρ
        to closed-source); conformal coverage degrades under distribution shift.
    - line: Expanding action spaces beyond point-and-click
      what_it_solves: Incorporates drag, keyframe selection, and CLI commands so that
        agents can perform complex real-world tasks (text highlighting, resizing,
        video-guided interaction) that click-only agents cannot handle.
      what_remains_open: No unified representation or training framework for diverse
        action types exists; new action types suffer from data scarcity; multi-action
        coordination error accumulation is unaddressed.
    - line: Ablation and evidence isolation
      what_it_solves: Separates the contribution of proposed components from framework
        choices, baseline implementations, and evaluation metrics, as seen in one
        finding that skill library, not framework design, drove the best result.
      what_remains_open: Most papers lack full ablation studies and explicit limitation
        reporting; this makes it difficult to attribute gains to the core method and
        limits cross-paper evidence accumulation.
    consensus:
    - Richer interaction modes (drag, CLI, dynamic video) are necessary for real-world
      GUI agents, and existing click-focused agents are insufficient.
    - Data-efficient training paradigms (weak supervision, task synthesis, online
      RL) are a promising direction to scale agents without prohibitive annotation
      costs.
    - Uncertainty quantification and context management are critical for reliability
      in long-horizon and safety-critical deployments.
    - Benchmarking is the primary driver of method development, and fine-grained metrics
      reveal capability differences that aggregate success rates hide.
    disagreements:
    - 'Evaluation settings: single-step grounding tasks vs. multi-step trajectories;
      static web/desktop vs. dynamic short-video platforms.'
    - 'Interaction modes: point-and-click vs. drag, keyframe-based video navigation,
      and hybrid GUI/CLI commands.'
    - 'Training supervision: weakly supervised from unannotated screenshots vs. fully
      online RL with synthetic tasks vs. fine-tuning on curated action-specific datasets.'
    - 'UQ applicability: open-weight models allow access to hidden states and logits,
      but closed-source vendors require different method families, and cross-tier
      transfer is poor.'
    open_questions:
    - Can a single benchmark or evaluation protocol cover click, drag, video, and
      CLI interactions across desktop and mobile platforms?
    - Do data-efficient methods (weak supervision, synthetic RL) hold up in complex
      multi-step tasks with high state-action variance?
    - How should proactive context management be integrated into existing agents without
      introducing new failure modes from incorrect context actions?
    - What is the practical deployment path for UQ methods given their weak cross-model
      and cross-interface transfer?
    - How can multiple action spaces be unified into a single end-to-end training
      pipeline without losing performance on each action type?
    - The lack of comprehensive ablation and limitation reporting across the majority
      of papers creates a verification gap that hinders reliable evidence synthesis.
  literature_review_zh:
    研究路线矩阵:
    - 路线: GUI 代理基准与任务设计
      解决的问题: 提供多样化的评估环境（桌面、动态视频、拖拽、视频引导），跨交互模式、任务时长和界面复杂度测量代理能力，揭示过度观察、观察不足和动作空间覆盖不足等失败模式。
      尚未覆盖: 尚无统一基准覆盖跨平台多步任务和动态界面；细粒度子目标指标未标准化；基准的分布外泛化未经验证。
    - 路线: 数据高效与弱监督训练
      解决的问题: 通过利用未标注截图、可验证任务合成和带前沿采样的在线 RL，减少对昂贵人工标注的依赖，以远少于标注数据量达到竞争性能。
      尚未覆盖: 合成任务与现实任务的分布差异可能导致性能下降；复杂多步交互的可扩展性不明确；RL 的奖励设计与安全探索仍是开放问题。
    - 路线: 长时域上下文管理与规划
      解决的问题: 通过将上下文管理视为第一类动作（ConAct），在长轨迹中处理上下文窗口限制，保留关键信息并丢弃噪声，提升长时域任务成功率。
      尚未覆盖: 策略从移动端到桌面或动态界面的泛化性未知；最优上下文保留策略未被自动学习；上下文管理动作可能引入新错误。
    - 路线: 安全交互的不确定性量化
      解决的问题: 使代理能够估计自身预测的置信度，支持拒答、共形点击区域和更安全的人机协同部署，校准后方法可将点击区域半径缩小 40–60%。
      尚未覆盖: 多步 UQ 传播未被研究；跨模型和跨接口的 UQ 排名迁移很差（对闭源模型平均仅 +0.08 Spearman ρ）；分布偏移下共形覆盖度下降。
    - 路线: 扩展点击以外的动作空间
      解决的问题: 引入拖拽、关键帧选择和 CLI 命令，使代理能够执行纯点击代理无法处理的复杂真实任务（文本高亮、调整大小、视频引导交互）。
      尚未覆盖: 缺乏不同动作类型的统一表示和训练框架；新动作类型数据稀缺；多动作协同的错误累积未解决。
    - 路线: 消融与证据隔离
      解决的问题: 分离所提模块的贡献与框架选择、基线实现和评估指标的影响，例如发现最佳结果主要来自技能库而非框架设计。
      尚未覆盖: 多数论文缺乏完整的消融实验和明确的局限性报告，导致难以将收益归因于核心方法，并限制了跨论文证据的积累。
    共识:
    - 更丰富的交互模式（拖拽、CLI、动态视频）对真实世界 GUI 代理是必要的，现有纯点击代理不足。
    - 数据高效训练范式（弱监督、任务合成、在线 RL）是扩展代理能力而不依赖高昂标注成本的有前景方向。
    - 不确定性量化和上下文管理对长时域和安全关键部署的可靠性至关重要。
    - 基准测试是方法论发展的主要驱动力，细粒度指标揭示了聚合成功率所掩盖的能力差异。
    分歧:
    - 评估设置：单步定位任务 vs. 多步轨迹；静态网页/桌面 vs. 动态短视频平台。
    - 交互模式：点击 vs. 拖拽、基于关键帧的视频导航以及混合 GUI/CLI 命令。
    - 训练监督：基于未标注截图的弱监督 vs. 完全在线 RL 与合成任务 vs. 在精心构建的动作特定数据集上微调。
    - UQ 适用性：开源权重模型可访问隐藏状态和 logits，但闭源供应商需要不同的方法族，且跨层级迁移很差。
    开放问题:
    - 能否用单一基准或评估协议覆盖桌面和移动端的点击、拖拽、视频和 CLI 交互？
    - 数据高效方法（弱监督、合成 RL）在状态-动作方差大的复杂多步任务中能否保持有效？
    - 如何将主动上下文管理集成到现有代理中，而不因错误的上下文动作引入新的失败模式？
    - 鉴于 UQ 方法的跨模型和跨接口迁移性很弱，实际部署路径是什么？
    - 如何将多个动作空间统一到单一的端到端训练流程中，且不在每种动作类型上损失性能？
    - 多数论文缺乏全面的消融和局限性报告，形成验证缺口，阻碍了可靠的证据综合。
