  related_work_outline:
  - 'Mainstream direction: Shift from static, single-step GUI tasks to dynamic, long-horizon,
    multi-modal interactions, with growing emphasis on data efficiency via weak supervision
    and on deployment efficiency through compilation and replay.'
  - 'Shared research pattern: All works aim to improve GUI agent capability by redesigning
    representations, context management, or action interfaces, while acknowledging
    that current models lack observation control and robustness across diverse interfaces.'
  - 'Key differences: Focus varies across data efficiency (weakly supervised grounding),
    inference speed (state-machine compilation), long-horizon context (proactive management),
    interaction type coverage (drag, video-guided), and safety (uncertainty quantification).'
  - 'Trend evolution: Within 2024–2026, the frontier moved from building comprehensive
    benchmarks (MacAgentBench, DragOn, LivingScreen) to proposing methods that address
    specific failure modes, such as observation control, context overflow, and high
    inference cost.'
  - 'Open questions: How to unify observation control across static and dynamic interfaces,
    generalize compiled programs to novel tasks, transfer uncertainty rankings across
    model families, and combine weak supervision with active context management in
    a single agent.'
  related_work_outline_zh:
  - 主流方向：从静态单步 GUI 任务转向动态、长时域、多模态交互，越来越重视通过弱监督提高数据效率，以及通过编译与重放提高部署效率。
  - 研究共性：所有工作都试图通过重新设计表示、上下文管理或动作接口来提升 GUI 代理能力，同时承认当前模型缺乏观察控制，且在不同界面上的鲁棒性不足。
  - 关键差异：关注点分别集中在数据效率（弱监督定位）、推理速度（状态机编译）、长时域上下文（主动管理）、交互类型覆盖（拖拽、视频引导）和安全性（不确定性量化）。
  - 趋势演进：在 2024–2026 年期间，前沿从构建全面基准（MacAgentBench、DragOn、LivingScreen）转向提出针对特定失败模式的方法，例如观察控制、上下文溢出和高推理成本。
  - 开放问题：如何统一静态与动态界面的观察控制，将编译程序泛化到新任务，跨模型家族迁移不确定性排名，以及将弱监督与主动上下文管理结合到单一代理中。
  literature_review:
    line_of_work_matrix:
    - line: Weakly supervised and data-efficient grounding
      what_it_solves: Reduces reliance on expensive human annotations by learning
        GUI grounding from large-scale unannotated screenshots and webpages, then
        calibrating with minimal high-quality data.
      what_remains_open: Whether the learned visual grounding transfers to drastically
        different application domains, and how robust the RL calibration stage is
        under distribution shift.
    - line: Proactive context management for long-horizon tasks
      what_it_solves: Prevents context overflow and loss of critical information in
        episodic mobile tasks by treating context management as first-class actions
        that compact history and UI state.
      what_remains_open: The architecture's dependence on structured context fields
        and whether the same proactive strategy generalizes to desktop or web-based
        agent environments.
    - line: Compilation and replay for efficient repeated execution
      what_it_solves: Eliminates per-step language model calls on repeated tasks by
        compiling successful trajectories into state-machine programs with runtime
        screen-checking and fallback to the agent on mismatch.
      what_remains_open: Robustness of screen-checking under dynamic content changes
        and the ability to store and reuse programs across tasks that are semantically
        similar but visually distinct.
    - line: Observation and interaction adaptation for dynamic or specialized interfaces
      what_it_solves: Addresses missing observation control in dynamic interfaces
        (short-video platforms) and expands action coverage to drag-based interactions,
        providing benchmarks and training data.
      what_remains_open: How to design general observation policies that balance information
        gain and cost, and whether fine-tuned drag grounding transfers to arbitrary
        drag scenarios outside the collected domains.
    - line: Uncertainty quantification for GUI action safety
      what_it_solves: Evaluates post-hoc UQ methods to produce calibrated confidence
        and conformal click regions, reducing spatial uncertainty and improving safety
        in single-step grounding.
      what_remains_open: Cross-model and cross-interface UQ ranking transfer is weak;
        deployment-grade UQ requires target-specific reranking, and extension to multi-step
        trajectories is unexplored.
    consensus:
    - Current GUI agents universally suffer from observation control deficiencies,
      either over-observing or under-observing dynamic content, which limits task
      success.
    - Human annotation is a major bottleneck; leveraging unlabeled or weakly labeled
      data is a promising direction to scale agent training.
    - Fine-grained evaluation beyond pass/fail, such as sub-goal completion and cost-accuracy
      trade-offs, reveals hidden performance differences among models with similar
      aggregate scores.
    - Compilation, caching, or skill reuse can drastically reduce inference cost for
      repeated tasks, indicating a shift toward deployment-aware agent design.
    disagreements:
    - 'The primary bottleneck targeted differs: some methods focus on data scarcity,
      others on inference latency, and others on context window limits, leading to
      divergent optimization objectives.'
    - Evaluation settings and interaction modalities vary widely (mobile vs. desktop
      vs. browser, click vs. drag vs. CLI), making direct comparison of proposed methods
      difficult and causing ranking instability across benchmarks.
    - 'Approaches to uncertainty differ: some advocate conformal prediction for spatial
      safety, while others rely on hidden-state density or verbalized confidence,
      with no consensus on which UQ family transfers across model architectures.'
    open_questions:
    - How can observation control be learned generically across static and dynamic
      interfaces without task-specific tuning?
    - Can compiled or cached action programs be composed and transferred to novel
      tasks, moving beyond exact replay of previously seen tasks?
    - What is the minimal supervision signal needed to ground a GUI agent in a new
      application domain, and does weak supervision alone suffice for complex multi-step
      workflows?
    - How can uncertainty quantification be made robust across model tiers and interfaces,
      enabling reliable deployment of GUI agents in safety-critical settings?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 弱监督与数据高效定位
      解决的问题: 通过大规模未标注截图和网页学习 GUI 定位，减少对昂贵人工标注的依赖，再以少量高质量数据校准。
      尚未覆盖: 学习的视觉定位能否迁移到完全不同的应用领域，以及 RL 校准阶段在分布偏移下的鲁棒性。
    - 路线: 面向长时域任务的主动上下文管理
      解决的问题: 将上下文管理视为第一类动作，结构化压缩历史与 UI 状态，防止情景式移动任务中的上下文溢出与关键信息丢失。
      尚未覆盖: 架构对结构化上下文字段的依赖，以及相同的主动策略是否能泛化到桌面或网页代理环境。
    - 路线: 面向重复任务高效执行的编译与重放
      解决的问题: 将成功轨迹编译为带屏幕检查的状态机程序，重放时无需每步调用语言模型，不匹配时回退到代理，从而消除重复任务的推理成本。
      尚未覆盖: 动态内容变化下屏幕检查的鲁棒性，以及能否在语义相似但视觉不同的任务间复用已存储的程序。
    - 路线: 面向动态或特殊界面的观察与交互适配
      解决的问题: 解决动态界面（短视频平台）中观察控制的缺失，并将动作覆盖范围扩展到拖拽式交互，同时提供基准与训练数据。
      尚未覆盖: 如何设计平衡信息增益与成本的通用观察策略，以及微调后的拖拽定位能否泛化到收集领域之外的任意拖拽场景。
    - 路线: 面向 GUI 动作安全的不确定性量化
      解决的问题: 评估事后 UQ 方法以产生校准置信度和共形点击区域，从而降低单步定位中的空间不确定性并提升安全性。
      尚未覆盖: 跨模型和跨接口的 UQ 排名迁移性较弱；部署级 UQ 需要针对特定目标重新排名，且尚未扩展到多步轨迹。
    共识:
    - 当前 GUI 代理普遍存在观察控制缺陷，对动态内容要么过度观察要么观察不足，限制了任务成功率。
    - 人工标注是主要瓶颈；利用无标注或弱标注数据是扩展代理训练规模的有前景方向。
    - 超越通过/失败粒度的细粒度评估（如子目标完成度与成本-精度权衡）揭示了具有相似总体分数的模型之间的隐藏性能差异。
    - 编译、缓存或技能复用可以大幅降低重复任务的推理成本，表明代理设计正转向关注部署效率。
    分歧:
    - 所针对的主要瓶颈不同：有的方法聚焦数据稀缺，有的聚焦推理延迟，有的聚焦上下文窗口限制，导致优化目标各异。
    - 评估设置和交互模态差异很大（移动端 vs. 桌面端 vs. 浏览器，点击 vs. 拖拽 vs. 命令行），使所提方法难以直接比较，并导致跨基准的排名不稳定。
    - 不确定性处理方法存在分歧：有的主张用共形预测实现空间安全，有的依赖隐藏状态密度或口头化置信度，尚未就哪种 UQ 家族能跨模型架构迁移达成共识。
    开放问题:
    - 如何在静态和动态界面上通用地学习观察控制，而无需针对特定任务调优？
    - 编译或缓存的动作程序能否被组合并迁移到新任务中，从而超越对已见任务的精确重放？
    - 在新应用领域中定位 GUI 代理所需的最小监督信号是什么，仅靠弱监督是否足以应对复杂的多步工作流？
    - 如何使不确定性量化跨模型层级和接口保持鲁棒，从而支持在安全关键场景中可靠部署 GUI 代理？
