  related_work_outline:
  - 'Mainstream direction: Constructing specialized benchmarks and task abstractions
    that formalize what GUI agents must handle—ranging from multi-app workflows, dynamic
    content, drag interactions, to safety-critical grounding—and using these benchmarks
    to diagnose capability gaps such as observation control, uncertainty calibration,
    and long-horizon context management.'
  - 'Shared research pattern: Each contribution defines a new interaction space (e.g.,
    macOS desktop, short-video platforms, drag-based UIs) and couples it with a structured
    evaluation protocol, moving beyond simple click accuracy to fine-grained metrics
    like cost-accuracy, sub-goal completion, and conformal safety regions.'
  - 'Key differences: Some works prioritize operational efficiency (e.g., compiling
    successful runs into replayable state machines, hierarchical skill libraries),
    while others target reliability (e.g., post-hoc uncertainty quantification with
    conformal prediction). Interaction modes differ sharply: click-only vs. drag;
    static vs. live-screen; single-step grounding vs. long-horizon trajectories.'
  - 'Trend evolution: Within the 2024-2026 frontier, the field is shifting from single-task
    accuracy benchmarks toward multi-dimensional evaluations that jointly measure
    speed, cost, safety, and adaptability. Emerging emphasis on data efficiency (learning
    from unannotated screenshots) and proactive context management suggests a move
    toward agents that self-regulate their internal state and knowledge access.'
  - 'Open questions: Whether the formal conditions and guarantees proven in isolated
    settings (e.g., single-step UQ, replay verification) transfer to open-ended, multi-step
    agent trajectories; how to unify the fragmented interaction taxonomies (drag,
    live screen, CLI+GUI) under a common theoretical framework; and whether efficiency
    optimizations such as skill compilation preserve robustness when faced with task
    distribution shifts.'
  related_work_outline_zh:
  - 主流方向：构建专门化的基准测试和任务抽象，形式化 GUI 代理需要处理的内容——从多应用工作流、动态内容、拖拽交互到安全关键的定位——并利用这些基准诊断能力缺口，如观察控制、不确定性校准和长时域上下文管理。
  - 研究共性：每项工作都定义一个新的交互空间（例如 macOS 桌面、短视频平台、拖拽式 UI），并配合结构化的评估协议，从简单的点击准确率转向细粒度指标，如成本-准确性、子目标完成度和共形安全区域。
  - 关键差异：部分工作侧重操作效率（如将成功运行编译为可重放状态机、分层技能库），另一些则关注可靠性（如以共形预测为支撑的后验不确定性量化）。交互模式差异显著：仅点击与拖拽、静态与动态屏幕、单步定位与长时域轨迹。
  - 趋势演进：在 2024-2026 年的前沿中，领域正从单任务准确率基准转向多维度评估，同时衡量速度、成本、安全性和适应性。对数据效率（利用未标注截图学习）和主动上下文管理的日益重视，暗示着代理正朝着自我调节内部状态和知识访问的方向发展。
  - 开放问题：在孤立环境（如单步不确定性量化、重放验证）中证明的形式条件和保证能否迁移到开放式的多步代理轨迹；如何将碎片化的交互分类（拖拽、动态屏幕、CLI+GUI）统一在一个共同的理论框架下；以及当任务分布变化时，技能编译等效率优化是否仍能保持鲁棒性。
  literature_review:
    line_of_work_matrix:
    - line: Task abstraction and benchmark formalization
      what_it_solves: Defines the action space, interaction modes, and evaluation
        protocols for GUI agents, moving beyond ad-hoc testing to systematic capability
        measurement across diverse applications and dynamic interfaces.
      what_remains_open: Benchmarks are often platform- or interaction-specific; it
        is unclear whether rankings and failure modes transfer across environments,
        or whether benchmark design itself shapes the capabilities that are optimized.
    - line: Interaction theory and representation
      what_it_solves: Formalizes underrepresented interaction types (drag, live-screen
        content, multimodal skill artifacts) and proposes structured representations
        (hierarchical skill libraries, context-as-action) to expand agent competence
        beyond simple click-based navigation.
      what_remains_open: No unified framework exists to compare or compose these representations;
        the theoretical benefits of retaining visual figures or structured context
        management are evaluated only on limited benchmarks, with no evidence of robustness
        to distribution shift.
    - line: Reliability and safety framing
      what_it_solves: Introduces post-hoc uncertainty quantification and conformal
        prediction for GUI grounding, enabling agents to express confidence and fall
        back safely when unsure, and to construct spatial safety regions around predicted
        actions.
      what_remains_open: Current UQ evaluation is limited to single-step executable
        grounding; multi-step trajectory-level safety guarantees, cross-model transferability,
        and robustness to interface mismatch remain unverified.
    - line: Efficiency and context management theory
      what_it_solves: Optimizes agent inference cost and long-horizon success by compiling
        successful trajectories into reusable programs, proactively managing context
        to prevent information loss, or learning from unannotated screenshots to reduce
        annotation dependency.
      what_remains_open: These methods assume task stationarity or similarity; the
        trade-off between efficiency and adaptability when task distributions change,
        and the theoretical limits of proactive context management, are not yet characterized.
    consensus:
    - A systematic evaluation protocol is essential for progress, and single-score
      metrics such as Pass@1 are insufficient to capture nuanced agent behavior; fine-grained,
      multi-dimensional measurement is necessary.
    - Current GUI agents lack robust observation control, leading to over- or under-observation,
      and require explicit mechanisms for managing attention, memory, and confidence.
    - Data efficiency and the ability to leverage unannotated or weakly supervised
      signals are emerging as critical requirements for scalable agent training.
    disagreements:
    - 'The primary dimension of improvement differs: some works prioritize raw accuracy
      and state-of-the-art benchmark scores, while others target cost-accuracy trade-offs,
      inference speed, or safety margins.'
    - 'Interaction coverage is fragmented: one line of work focuses on click-based
      static screens, another on drag operations, and a third on dynamic live-screen
      content, with no consensus on which interaction modes are most critical or how
      to combine them.'
    - 'Evaluation settings diverge: real-world desktop environments, browser-based
      simulators, and single-step grounding datasets are used interchangeably, making
      it difficult to compare the generalization of theoretical claims across deployment
      contexts.'
    open_questions:
    - Can the formal guarantees derived from single-step uncertainty quantification
      or state-machine replay be extended to multi-step agent trajectories without
      assuming stationarity?
    - How do the specific interaction taxonomies (drag, live screen, CLI+GUI) and
      evaluation protocols interact with the claimed theoretical properties, and do
      they inadvertently constrain the space of agent designs?
    - What is the trade-off surface between operational efficiency (e.g., skill compilation,
      proactive context management) and robustness to novel or out-of-distribution
      tasks, and can it be formally characterized?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 任务抽象与基准形式化
      解决的问题: 定义 GUI 代理的动作空间、交互模式和评估协议，从临时测试转向跨不同应用和动态界面的系统能力测量。
      尚未覆盖: 基准测试通常是平台或交互特定的；尚不清楚排名和失败模式是否跨环境迁移，以及基准设计本身是否塑造了被优化的能力。
    - 路线: 交互理论与表示
      解决的问题: 形式化未被充分代表的交互类型（拖拽、动态屏幕内容、多模态技能工件），并提出结构化表示（分层技能库、上下文即动作），以扩展代理能力超越简单的点击导航。
      尚未覆盖: 尚无统一框架来比较或组合这些表示；保留视觉图形或结构化上下文管理的理论优势仅在有限基准上评估，缺乏对分布变化鲁棒性的证据。
    - 路线: 可靠性与安全框架
      解决的问题: 引入后验不确定性量化和共形预测用于 GUI 定位，使代理能够表达置信度并在不确定时安全回退，并围绕预测动作构建空间安全区域。
      尚未覆盖: 当前不确定性量化评估仅限于单步可执行定位；多步轨迹级别的安全保证、跨模型可迁移性以及对界面不匹配的鲁棒性仍未验证。
    - 路线: 效率与上下文管理理论
      解决的问题: 通过将成功轨迹编译为可重用程序、主动管理上下文以防止信息丢失，或从未标注截图学习以减少标注依赖，优化代理推理成本和长时域成功率。
      尚未覆盖: 这些方法假设任务平稳性或相似性；当任务分布变化时效率与适应性之间的权衡，以及主动上下文管理的理论极限尚未被刻画。
    共识:
    - 系统化的评估协议对进步至关重要，单一分数指标（如 Pass@1）不足以捕捉微妙的代理行为；细粒度的多维度测量是必要的。
    - 当前 GUI 代理缺乏稳健的观察控制，导致过度观察或观察不足，需要显式的机制来管理注意力、记忆和置信度。
    - 数据效率以及利用未标注或弱监督信号的能力正成为可扩展代理训练的关键需求。
    分歧:
    - 主要改进维度不同：一些工作优先追求原始准确率和最先进的基准分数，另一些则侧重于成本-准确性权衡、推理速度或安全边际。
    - 交互覆盖范围碎片化：一条路线聚焦于基于点击的静态屏幕，另一条专注于拖拽操作，还有一条针对动态屏幕内容，对于哪种交互模式最关键或如何组合它们尚未达成共识。
    - 评估环境存在分歧：真实桌面环境、基于浏览器的模拟器和单步定位数据集被交替使用，使得难以比较理论主张在不同部署环境下的泛化能力。
    开放问题:
    - 从单步不确定性量化或状态机重放中得出的形式化保证能否在不假设平稳性的情况下扩展到多步代理轨迹？
    - 特定的交互分类（拖拽、动态屏幕、CLI+GUI）和评估协议如何与所声称的理论属性相互作用，它们是否无意中限制了代理设计的空间？
    - 操作效率（如技能编译、主动上下文管理）与对新任务或分布外任务的鲁棒性之间的权衡面是什么，能否被形式化刻画？
