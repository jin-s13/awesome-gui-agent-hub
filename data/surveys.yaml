  related_work_outline:
  - 'Mainstream direction: Scaling GUI agent training through data-efficient methods
    that reduce human annotation via task synthesis, online RL, and weakly-supervised
    visual grounding.'
  - 'Shared research pattern: End-to-end training pipelines that augment limited labeled
    data with unannotated screenshots or verifiable synthetic tasks, often combined
    with curriculum learning or context management.'
  - 'Key differences: Works optimize different bottlenecks—some expand action space
    (drag), others compress context (proactive management or keyframe extraction),
    while others focus on training signals (RL vs. weak supervision).'
  - 'Trend evolution: Within 2024–2026, the frontier moves from static click-based
    benchmarks to dynamic, long-horizon, and multi-interaction environments, with
    growing emphasis on observation control and uncertainty quantification.'
  - 'Open questions: How to transfer training gains across platforms, integrate uncertainty
    into agent loops, and balance observation efficiency with task-critical information
    in dynamic interfaces.'
  related_work_outline_zh:
  - 主流方向：通过任务合成、在线强化学习和弱监督视觉定位，减少人工标注依赖，实现数据高效的GUI智能体训练。
  - 研究共性：利用未标注截图或可验证的合成任务扩充有限标注数据，并常结合课程学习或上下文管理，构建端到端训练流程。
  - 关键差异：不同工作优化的瓶颈不同——有的扩展动作空间（如拖拽），有的压缩上下文（主动管理或关键帧提取），有的则侧重训练信号（强化学习 vs. 弱监督）。
  - 趋势演进：2024–2026年间，前沿从静态点击式基准转向动态、长时域、多交互环境，越来越重视观察控制与不确定性量化。
  - 开放问题：训练成果如何跨平台迁移，如何将不确定性集成到智能体回路中，以及在动态界面中如何平衡观察效率与任务关键信息保留。
  literature_review:
    line_of_work_matrix:
    - line: Data-efficient training for GUI agents
      what_it_solves: Scaling agent training by reducing reliance on costly human
        annotations through task synthesis, online RL, and weakly-supervised visual
        grounding.
      what_remains_open: Whether these training gains transfer to dynamic, long-horizon
        interfaces and whether the reward signals are sufficiently rich for complex
        tasks.
    - line: Context management and efficient observation
      what_it_solves: Handling long-horizon tasks and dynamic content by proactive
        context compression, keyframe selection, and observation control to improve
        agent performance.
      what_remains_open: Generalizability across diverse applications and platforms,
        and the optimal balance between context compactness and task-critical information
        retention.
    - line: Grounding reliability and interaction diversity
      what_it_solves: Expanding beyond click-based actions to drag, scroll, and other
        modalities, and quantifying model confidence in grounding to improve safety
        and robustness.
      what_remains_open: Cross-model transfer of uncertainty estimates, and integration
        of uncertainty quantification into multi-step agent loops for corrective actions.
    consensus:
    - Current GUI agents suffer from observation inefficiency, either consuming excessive
      context or missing critical information, which limits performance on dynamic
      and long-horizon tasks.
    - Scalable training methods that leverage unannotated data or verifiable synthetic
      tasks are essential to improve agent capabilities without prohibitive annotation
      costs.
    - Evaluation remains fragmented across different environments and interaction
      types, necessitating benchmarks that cover diverse apps, dynamic content, and
      multi-modal actions.
    disagreements:
    - 'Training paradigm: Some works adopt online RL with task synthesis, while others
      use weakly-supervised curriculum learning from static screenshots, leading to
      different supervision signals and sample efficiency trade-offs.'
    - 'Optimization target: Some methods focus on expanding the action space (drag
      interactions), while others optimize context management (proactive compression)
      or keyframe extraction, reflecting different assumptions about the primary performance
      bottleneck.'
    - 'Evaluation setting: Benchmarks range from macOS desktops to short-video platforms
      and mobile devices, making it difficult to compare the transferability of method
      improvements across domains.'
    open_questions:
    - How can agents be trained to balance observation and action in highly dynamic
      interfaces where content changes between actions?
    - What is the minimal amount of supervised data required to achieve robust grounding,
      and can uncertainty quantification reliably indicate when a model is likely
      to fail?
    - How do improvements in one aspect (e.g., context management) interact with other
      components (e.g., training efficiency) when deployed in end-to-end agents?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 数据高效的GUI智能体训练
      解决的问题: 通过任务合成、在线RL和弱监督视觉定位，减少对昂贵人工标注的依赖，扩展智能体训练规模。
      尚未覆盖: 这些训练收益能否迁移到动态、长时域界面，以及奖励信号是否足够丰富以应对复杂任务。
    - 路线: 上下文管理与高效观察
      解决的问题: 通过主动上下文压缩、关键帧选择和观察控制，处理长时域任务和动态内容，以提升智能体性能。
      尚未覆盖: 跨不同应用和平台的泛化能力，以及上下文紧凑性与任务关键信息保留之间的最佳平衡。
    - 路线: 定位可靠性与交互多样性
      解决的问题: 将动作空间从点击扩展到拖拽、滚动等模态，并量化模型在定位中的置信度，以提升安全性和鲁棒性。
      尚未覆盖: 不确定性估计的跨模型迁移，以及将不确定性量化集成到多步智能体回路中以实现纠正动作。
    共识:
    - 当前GUI智能体普遍存在观察效率问题，要么消耗过多上下文，要么遗漏关键信息，限制了在动态和长时域任务上的表现。
    - 利用未标注数据或可验证的合成任务进行可扩展训练，是避免高昂标注成本并提升智能体能力的必要手段。
    - 评估环境与交互类型碎片化，需要覆盖多样化应用、动态内容和多模态动作的基准测试。
    分歧:
    - 训练范式：部分工作采用任务合成的在线RL，其他工作则从静态截图进行弱监督课程学习，导致监督信号和样本效率的权衡不同。
    - 优化目标：一些方法聚焦于扩展动作空间（如拖拽交互），另一些则优化上下文管理（主动压缩）或关键帧提取，反映出对主要性能瓶颈的不同假设。
    - 评估场景：基准涵盖macOS桌面、短视频平台和移动设备，难以比较方法改进在不同领域的可迁移性。
    开放问题:
    - 如何训练智能体在内容动态变化的界面中主动平衡观察与动作？
    - 实现鲁棒定位所需的最少监督数据量是多少，不确定性量化能否可靠指示模型可能失败的时刻？
    - 当上下文管理等某一方面的改进部署到端到端智能体时，会如何与其他组件（如训练效率）相互作用？
