  related_work_outline:
  - 'Mainstream direction: Building real-world, interactive GUI agent benchmarks that
    move beyond static screenshots to dynamic, multimodal, and long-horizon tasks,
    while simultaneously developing methods for efficient grounding, context management,
    and uncertainty quantification.'
  - 'Shared research pattern: Introducing a new benchmark or dataset that captures
    a specific under-explored interaction mode (e.g., drag, dynamic short-video, long-horizon
    mobile) and pairing it with a model or training method that reveals a fundamental
    capability gap (e.g., observation control, UI element identification, or context
    retention).'
  - 'Key differences: Papers differ in the interaction primitives they target (click
    vs. drag vs. live content), the sensory modality they emphasize (screenshots,
    video, multimodal skill artifacts), the supervision paradigm (weakly-supervised
    from unannotated data vs. full fine-tuning on curated trajectories), and the evaluation
    lens (task success, cost-accuracy, sub-goal completion, or uncertainty calibration).'
  - 'Trend evolution: Within the 2024–2026 window, the field is shifting from static
    single-step GUI grounding to dynamic, multi-step, and real-application benchmarks.
    Recent work adds layers of observation control, skill libraries, and post-hoc
    reliability metrics, suggesting a maturing focus on deployment safety and data
    efficiency.'
  - 'Open questions: Whether benchmarks designed on one platform (macOS, mobile, short-video)
    transfer to others; how to evaluate observation policies and agent initiative
    in dynamic environments; whether post-hoc uncertainty estimates remain reliable
    across model tiers and distribution shifts; and how to scale agent training without
    prohibitive human annotation costs.'
  related_work_outline_zh:
  - 主流方向：构建真实、交互式的 GUI 代理基准，超越静态截图，涵盖动态、多模态和长时域任务，同时发展高效的基础定位、上下文管理和不确定性量化方法。
  - 研究共性：引入捕捉特定交互模式（如拖拽、动态短视频、长时域移动）的新基准或数据集，并结合模型或训练方法揭示根本能力缺口（如观察控制、UI 元素识别或上下文保持）。
  - 关键差异：论文在目标交互原语（点击、拖拽、动态内容）、侧重感官模态（截图、视频、多模态技能工件）、监督范式（未标注数据的弱监督 vs. 轨迹精调）以及评估视角（任务成功率、成本-准确率、子目标完成度、不确定性校准）上存在差异。
  - 趋势演进：在 2024–2026 年窗口内，领域从静态单步 GUI 定位转向动态、多步和真实应用基准。近期工作增加了观察控制、技能库和后验可靠性指标，表明对部署安全性和数据效率的关注日益成熟。
  - 开放问题：在一个平台（macOS、移动端、短视频）上设计的基准是否可迁移到其他平台；如何评估动态环境中的观察策略和代理主动性；后验不确定性估计在不同模型层级和分布偏移下是否保持可靠；以及如何在不依赖高昂人工标注成本的情况下扩展代理训练。
  literature_review:
    line_of_work_matrix:
    - line: Real-environment GUI agent benchmarks spanning multiple applications and
        interaction modes
      what_it_solves: Provides ecologically valid tasks that combine GUI and CLI,
        drag-based interactions, or dynamic short-video interfaces, moving beyond
        simplified web form-filling to measure progress on realistic computer-use
        scenarios.
      what_remains_open: Transferability of findings across operating systems and
        application domains; whether task suites faithfully represent the distribution
        of real user workflows; and the absence of standard protocols for observation
        control and cost-accuracy trade-offs.
    - line: Multimodal skill libraries and visual grounding for computer-use agents
      what_it_solves: Improves UI element identification and workflow completion by
        retaining visual figures alongside textual instructions, and pre-training
        grounding from large-scale unannotated screenshots.
      what_remains_open: Scaling skill construction to rapidly changing interfaces;
        verifying that the grounding learned from weak supervision holds under distribution
        shift; and the reliance on proprietary frontier models for skill execution.
    - line: Uncertainty quantification and reliability metrics for GUI grounding
      what_it_solves: Enables deployable agents to estimate their own confidence on
        single-step grounding actions, and builds conformal click regions to enforce
        spatial safety.
      what_remains_open: Extending uncertainty awareness to multi-step trajectories;
        the poor transfer of UQ rankings across model tiers when internal states are
        inaccessible; and the degradation of conformal coverage under interface mismatches.
    - line: Long-horizon mobile GUI agents with proactive context management
      what_it_solves: Addresses context window overload and information loss in long
        mobile tasks by treating context management as a first-class action, preserving
        critical facts while folding redundant history.
      what_remains_open: Generalization to desktop or web environments where UI dynamics
        differ; the need for ConAct-style annotations on diverse task sets; and whether
        the approach scales to multi-app workflows with interleaved context dependencies.
    consensus:
    - Current GUI agents, even state-of-the-art models, still substantially underperform
      humans on real-world tasks, particularly when tasks require careful observation
      strategies or involve rare interaction types.
    - Fine-grained evaluation beyond pass/fail (e.g., sub-goal completion, cost-accuracy,
      calibration error) provides strictly more diagnostic signal than aggregate success
      rates and reveals hidden failure modes.
    - Multi-modal context, whether visual figures in skill libraries or video frames,
      consistently improves agent performance over text-only baselines, suggesting
      that purely textual representations of GUIs are insufficient.
    - 'Data efficiency is a shared concern: methods that leverage unannotated screenshots
      or weak supervision can match or surpass heavily annotated approaches, pointing
      toward a common interest in reducing annotation costs.'
    disagreements:
    - 'Interaction scope: some benchmarks target static click-based tasks, while others
      specifically require drag, dynamic content, or joint GUI-CLI operations, leading
      to complementary but non-overlapping capability evaluations.'
    - 'Evaluation protocol: works differ on whether to report task success, cost-accuracy,
      sub-goal scores, or uncertainty calibration, making cross-benchmark comparisons
      difficult without a unified metric framework.'
    - 'Supervision paradigm: GUICrafter relies on weak supervision from unannotated
      screenshots, whereas MemGUI-Agent uses fully curated trajectory annotations,
      creating a tension between scalability and ground-truth fidelity.'
    - 'Deployment readiness: uncertainty quantification work assumes single-step grounding
      and warns against cross-tier generalization, while skill-library and benchmark
      papers implicitly assume the agent will operate reliably over multi-step sessions
      without explicit confidence signals.'
    open_questions:
    - How can observation control be formalized and evaluated as a first-class agent
      capability, given that existing benchmarks reveal both over- and under-observation
      as dominant failure modes?
    - To what extent do the UQ rankings and conformal safety guarantees derived on
      single-step grounding transfer to full agent trajectories and to closed-source
      models where internal states are hidden?
    - Can the trends from MacAgentBench, DragOn, and LivingScreen be combined into
      a unified cross-platform benchmark that covers the full interaction spectrum,
      or do platform-specific constraints make such unification impractical?
    - What is the minimal annotation budget needed to achieve robust generalization
      in long-horizon GUI tasks, and can weakly-supervised pretraining paired with
      lightweight RL calibration reliably close the gap to fully-supervised approaches?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 真实环境下的 GUI 代理基准，涵盖多应用与多交互模式
      解决的问题: 提供跨越 GUI 与 CLI、拖拽、动态短视频等具有生态效度的任务，超越简化的表单填写，衡量真实计算机使用场景中的进展。
      尚未覆盖: 结论在不同操作系统和应用领域间的可迁移性；任务套件是否忠实反映真实用户工作流分布；以及缺乏观察控制和成本-准确率权衡的标准协议。
    - 路线: 面向计算机使用代理的多模态技能库与视觉定位
      解决的问题: 通过在文本指令旁保留视觉图形，以及从大规模未标注截图中预训练定位能力，改善 UI 元素识别和工作流完成度。
      尚未覆盖: 将技能构建扩展到快速变化的界面；弱监督学到的定位能力在分布偏移下是否保持；以及技能执行对专有前沿模型的依赖。
    - 路线: GUI 定位中的不确定性量化与可靠性指标
      解决的问题: 使可部署代理能够估计自身在单步定位动作上的置信度，并构建共形点击区域以增强空间安全性。
      尚未覆盖: 将不确定性感知扩展到多步轨迹；当内部状态不可访问时，UQ 排名在不同模型层级间的迁移性差；以及界面不匹配下共形覆盖的退化。
    - 路线: 具备主动上下文管理的长时域移动 GUI 代理
      解决的问题: 通过将上下文管理视为第一类动作，在折叠冗余历史的同时保留关键事实，解决长任务中上下文窗口过载和信息丢失问题。
      尚未覆盖: 向桌面或 Web 环境的泛化，其 UI 动态不同；在不同任务集上需要 ConAct 风格的标注；以及该方法能否扩展到具有交错上下文依赖的多应用工作流。
    共识:
    - 当前 GUI 代理，即使是前沿模型，在真实任务上仍显著低于人类水平，尤其在需要仔细规划观察策略或涉及罕见交互类型时。
    - 超越通过/失败的细粒度评估（如子目标完成度、成本-准确率、校准误差）比聚合成功率提供更多诊断信号，并揭示隐藏的失败模式。
    - 多模态上下文，无论是技能库中的视觉图形还是视频帧，始终能提升代理性能，表明纯文本的 GUI 表示不够充分。
    - 数据效率是共同关注点：利用未标注截图或弱监督的方法能够匹配或超越大量标注的方法，反映出减少标注成本的共同兴趣。
    分歧:
    - 交互范围：部分基准针对静态基于点击的任务，而另一些专门要求拖拽、动态内容或 GUI-CLI 联合操作，导致互补但不重叠的能力评估。
    - 评估协议：各工作在使用任务成功率、成本-准确率、子目标得分还是不确定性校准上存在差异，使得跨基准比较在没有统一指标框架的情况下难以进行。
    - 监督范式：GUICrafter 依赖未标注截图的弱监督，而 MemGUI-Agent 使用完全人工整理的轨迹标注，在可扩展性和真值保真度之间形成张力。
    - 部署准备：不确定性量化工作假定单步定位并警告跨层级泛化风险，而技能库和基准论文隐含假设代理能在多步会话中可靠运行，无需显式置信度信号。
    开放问题:
    - 如何将观察控制形式化并作为第一类代理能力进行评估，因为现有基准表明过度观察和观察不足是主要失败模式？
    - 从单步定位推导出的 UQ 排名和共形安全保证在多大程度上能迁移到完整的代理轨迹，以及在内部状态隐藏的闭源模型上是否仍然成立？
    - MacAgentBench、DragOn 和 LivingScreen 的趋势能否整合为一个覆盖全交互谱系的统一跨平台基准，或者平台特定限制使得这种统一不可行？
    - 在长时域 GUI 任务中实现鲁棒泛化所需的最小标注预算是多少？弱监督预训练配合轻量级 RL 校准能否可靠地弥合与全监督方法的差距？
