  related_work_outline:
  - 'Mainstream direction: Building runnable GUI agent systems that can execute long-horizon,
    multi-step real-world computer-use tasks, with emphasis on scalable training pipelines,
    multimodal skill libraries, and safety-aware deployment frameworks.'
  - 'Shared research pattern: All papers treat the GUI agent as a perception-reasoning-action
    pipeline that operates on visual screens and produces tool calls; they share a
    focus on bridging the gap between model capability and real-world deployment through
    better memory, training data efficiency, and benchmark-driven evaluation.'
  - 'Key differences: Papers diverge on how to represent agent skills—hierarchical
    multimodal skill libraries versus action-grounded visual memory crops—and on training
    paradigms—weakly supervised learning from unannotated screenshots versus online
    multi-turn reinforcement learning on live websites. Evaluation scope also differs:
    some target short-term task completion, while others push toward hour-scale professional
    workflows with hundreds of tool calls.'
  - 'Trend evolution: Within the 2024–2026 frontier, the topic is shifting from single-turn
    GUI grounding toward long-horizon, multi-turn, real-world task execution, with
    a rising emphasis on safety hardening, reproducibility audits, and benchmarks
    that capture dynamic environments, implicit state, and cross-source reasoning.'
  - 'Open questions: Long-horizon task completion rates remain below 20–30% for the
    strongest models; safety hardening appears domain-conditioned and does not transfer
    across modalities; and the optimal trade-off between learning from unannotated
    data versus online experience is unresolved.'
  related_work_outline_zh:
  - 主流方向：构建可运行的GUI智能体系统，能够执行长期、多步骤的真实世界计算机使用任务，重点是可扩展的训练流水线、多模态技能库和具备安全意识的部署框架。
  - 研究共性：所有论文都将GUI智能体视为在视觉屏幕上运行并生成工具调用的感知-推理-动作流水线；它们共同关注通过更好的记忆机制、训练数据效率和基准驱动的评估来弥合模型能力与真实世界部署之间的差距。
  - 关键差异：论文在智能体技能的表示方式上存在分歧——分层多模态技能库与动作接地视觉记忆裁剪；在训练范式上也有差异——从未标注截图的弱监督学习与在真实网站上的在线多轮强化学习。评估范围也不同：有些针对短期任务完成，而另一些则推进到需要数百次工具调用的小时级专业工作流。
  - 趋势演进：在2024–2026年前沿范围内，该主题正从单轮GUI定位转向长期、多轮、真实世界任务执行，并日益重视安全加固、可复现性审计以及捕捉动态环境、隐式状态和跨源推理的基准测试。
  - 开放问题：最强模型的长期任务完成率仍低于20–30%；安全加固表现为领域条件性的，且无法跨模态迁移；从未标注数据学习与在线经验学习之间的最优权衡尚未解决。
  literature_review:
    line_of_work_matrix:
    - line: Multimodal skill and memory architectures for GUI agents
      what_it_solves: Organizing task-specific knowledge and past experience so that
        agents can reuse skills, recover from failures, and ground actions in visual
        context.
      what_remains_open: Whether hierarchical skill indices with visual figures generalize
        across applications, and whether action-grounded memory crops scale to hundreds
        of distinct GUI environments without retrieval interference.
    - line: Data-efficient training pipelines for GUI grounding
      what_it_solves: Reducing the need for expensive human-annotated demonstrations
        by leveraging unannotated screenshots, curriculum learning, and reinforcement
        learning with limited supervision.
      what_remains_open: The relative sample efficiency of weakly supervised pretraining
        versus online multi-turn RL on live websites, and whether gains on web benchmarks
        transfer to desktop applications with different UI toolkits.
    - line: Long-horizon benchmark construction and failure analysis
      what_it_solves: Providing realistic evaluation surfaces that capture dynamic
        environments, hidden state, cross-source reasoning, and multi-step constraints
        that short-horizon benchmarks miss.
      what_remains_open: Current agents achieve only 20–30% completion on these benchmarks;
        failure modes such as objective drift, stage omission, and error propagation
        are cataloged but not yet systematically addressed in agent design.
    - line: Safety and robustness for deployed computer-use agents
      what_it_solves: Identifying and mitigating risks such as prompt injection, user-sensitive
        screen exposure, and unsafe tool calls in real-world agent execution.
      what_remains_open: Safety hardening is domain-conditioned—agents resistant to
        browser-based attacks remain vulnerable to coding-domain skill injection—and
        the reproducibility of published red-teaming results is compromised by unreleased
        optimized attack strings.
    consensus:
    - Visual grounding is essential for GUI agents, but full-image input alone is
      insufficient and can worsen action-level errors such as grounding mistakes and
      hidden-operation blindness.
    - Long-horizon, multi-step real-world tasks remain far from solved, with the strongest
      proprietary and open models achieving only 20–30% completion on benchmarks that
      require hundreds of sequential tool calls.
    - Training GUI agents benefits from combining offline pretraining with online
      fine-tuning, though the optimal balance between data scale, annotation quality,
      and environment interaction is still being explored.
    - Safety evaluation must move beyond static attack taxonomies toward dynamic,
      multi-turn, domain-specific threat models, because agent behavior under adversarial
      prompts varies dramatically across task domains.
    disagreements:
    - 'Skill representation: hierarchical multimodal libraries that store full visual
      figures alongside text (e.g., VISUALSKILL) versus action-grounded memory that
      stores only local image crops tied to successful actions (e.g., AGMem).'
    - 'Training regime: weakly supervised visual grounding from massive unannotated
      screenshots followed by RL calibration (GUICrafter) versus online multi-turn
      RL directly on live websites with supervised warm-start (OpenWebRL).'
    - 'Evaluation scope: benchmarks that test short-term, single-domain task completion
      versus those that push toward hour-long professional workflows spanning multiple
      applications and requiring implicit-state reasoning.'
    - 'Safety strategy: hardening agent weights against hand-crafted injection templates
      versus building explorer agents that proactively identify user-sensitive screens
      and trigger human handover.'
    open_questions:
    - Can the 20–30% success rate on long-horizon benchmarks be substantially improved
      without fundamentally new agent architectures that explicitly model workflow
      constraints and state recovery?
    - How does domain-conditioned safety hardening generalize when agents are deployed
      across browser, coding, and desktop application domains simultaneously?
    - What is the minimal supervision signal required to train a GUI agent that matches
      the performance of a fully supervised counterpart, and does the answer depend
      on the diversity of UI toolkits and platforms?
    - Are the failure modes identified in long-horizon benchmarks—objective drift,
      stage omission, error propagation—addressable through better memory and planning
      alone, or do they require new training objectives?
  literature_review_zh:
    研究路线矩阵:
    - 路线: GUI智能体的多模态技能与记忆架构
      解决的问题: 组织形式化的任务知识和过往经验，使智能体能够复用技能、从失败中恢复，并在视觉上下文中接地动作。
      尚未覆盖: 带有视觉图形的分层技能索引能否跨应用泛化，以及动作接地记忆裁剪能否在数百个不同GUI环境中扩展而不产生检索干扰。
    - 路线: GUI定位的数据高效训练流水线
      解决的问题: 通过利用未标注截图、课程学习和有限监督的强化学习，减少对昂贵人工标注演示的依赖。
      尚未覆盖: 弱监督预训练与在真实网站上进行在线多轮强化学习之间的相对样本效率，以及在网页基准上的收益是否能迁移到具有不同UI工具包的桌面应用。
    - 路线: 长期基准构建与失败分析
      解决的问题: 提供逼真的评估表面，捕捉动态环境、隐式状态、跨源推理以及短期基准所遗漏的多步骤约束。
      尚未覆盖: 当前智能体在这些基准上仅完成20–30%的任务；目标漂移、阶段遗漏和错误传播等失败模式已被编目，但尚未在智能体设计中得到系统性解决。
    - 路线: 部署级计算机使用智能体的安全性与鲁棒性
      解决的问题: 识别并减轻真实世界智能体执行中的风险，如提示注入、用户敏感屏幕暴露和不安全的工具调用。
      尚未覆盖: 安全加固是领域条件性的——对浏览器攻击有抵抗力的智能体在编码领域仍然容易受到技能注入攻击——而已发表的红队测试结果的可复现性因未发布优化的攻击字符串而受到损害。
    共识:
    - 视觉接地对GUI智能体至关重要，但仅靠全图像输入是不够的，并且可能加剧动作级错误，如接地错误和隐藏操作盲区。
    - 长期、多步骤的真实世界任务远未解决，最强的专有和开源模型在需要数百次顺序工具调用的基准上仅完成20–30%的任务。
    - 训练GUI智能体受益于将离线预训练与在线微调相结合，但数据规模、标注质量和环境交互之间的最优平衡仍在探索中。
    - 安全评估必须超越静态攻击分类法，转向动态、多轮、领域特定的威胁模型，因为智能体在对抗性提示下的行为在不同任务领域间差异显著。
    分歧:
    - 技能表示：在文本旁保留完整视觉图形的分层多模态技能库，与仅存储与成功动作相关的局部图像裁剪的动作接地记忆。
    - 训练范式：从海量未标注截图中进行弱监督视觉定位后再进行强化学习校准，与在真实网站上直接进行在线多轮强化学习并使用监督热身。
    - 评估范围：测试短期、单领域任务完成的基准，与推进到跨多个应用、需要隐式状态推理的小时级专业工作流的基准。
    - 安全策略：针对手工制作的注入模板加固智能体权重，与构建主动识别用户敏感屏幕并触发人工接管的探索智能体。
    开放问题:
    - 如果不引入显式建模工作流约束和状态恢复的全新智能体架构，长期基准上20–30%的成功率能否大幅提升？
    - 当智能体同时部署在浏览器、编码和桌面应用领域时，领域条件安全加固如何泛化？
    - 训练一个性能与全监督同类相当的GUI智能体所需的最小监督信号是什么？答案是否取决于UI工具包和平台的多样性？
    - 长期基准中识别的失败模式——目标漂移、阶段遗漏、错误传播——能否仅通过更好的记忆和规划来解决，还是需要新的训练目标？
