  related_work_outline:
  - 'Mainstream direction: GUI agent methods are shifting from single-action static
    benchmarks to multi-action, dynamic environments with fine-grained evaluation
    and training strategies that reduce reliance on human annotations, such as weakly
    supervised learning and verifiable task synthesis.'
  - 'Shared research pattern: Papers consistently identify data efficiency and complex
    interaction as bottlenecks; they propose richer action spaces (drag, CLI), context
    management, and evaluation metrics beyond pass@1 to capture sub-goal completion
    and cost–accuracy trade-offs.'
  - 'Key differences: Training paradigms diverge between weakly supervised curriculum
    learning, online RL with synthetic tasks, and video-driven keyframe extraction;
    evaluation targets span static desktops, dynamic short-video platforms, and specialized
    drag-based interactions; context handling is either proactive (explicit actions)
    or implicit.'
  - 'Trend evolution: Within the 2024–2026 frontier, the field rapidly moved from
    click-only desktop benchmarks toward multi-application, long-horizon, and dynamic-interface
    settings, incorporating safety-oriented UQ and training scalability.'
  - 'Open questions: Observation control, synthetic-to-real distribution coverage,
    unified action representation, optimal context management, cross-model uncertainty
    quantification robustness, and translation of benchmark gains to real-world deployment
    remain unresolved.'
  related_work_outline_zh:
  - 主流方向：GUI代理方法正从单一动作和静态基准向多动作、动态环境、细粒度评估和减少人工标注依赖的训练策略（如弱监督和可验证任务合成）转变。
  - 研究共性：各论文一致将数据效率和复杂交互视为瓶颈，并引入更丰富的动作空间（拖拽、CLI）、上下文管理，以及超越pass@1的评估指标（如子目标完成、成本-准确性权衡）。
  - 关键差异：训练范式在弱监督课程学习、在线RL与合成任务、以及视频驱动关键帧提取之间分化；评估场景涵盖静态桌面、动态短视频平台和专用拖拽交互；上下文处理分为主动（显式动作）或隐式。
  - 趋势演进：2024至2026年间，领域从仅限点击的桌面基准迅速转向多应用、长时程和动态界面设置，并纳入面向安全的不确定性量化和训练可扩展性。
  - 开放问题：观察控制、合成到真实分布覆盖、统一动作表示、最优上下文管理、跨模型不确定性量化鲁棒性，以及基准成果向实际部署的转化，均未解决。
  literature_review:
    line_of_work_matrix:
    - line: Training paradigm and representation design
      what_it_solves: Improves data efficiency and generalization of GUI agents by
        using unannotated screenshots, verifiable synthetic task generation, online
        RL, and task-aware visual representations.
      what_remains_open: Distribution shift between synthetic and real tasks, generalization
        boundaries of weak supervision, and whether visual representation gains transfer
        to unseen dynamic interfaces.
    - line: Action space and interaction protocol
      what_it_solves: Extends agent capabilities beyond clicks to drag, CLI, and context
        management actions, enabling long-horizon and complex multi-step tasks.
      what_remains_open: Unified modeling of heterogeneous action types, optimal observation
        control policies, and error recovery strategies in extended trajectories.
    - line: Evaluation methodology and evidence standards
      what_it_solves: Provides fine-grained, multi-dimensional metrics (sub-goal completion,
        cost-accuracy, uncertainty calibration) to isolate method contributions and
        diagnose agent behaviors.
      what_remains_open: Cross-benchmark consistency, correlation between offline
        metrics and online deployment success, and integration of safety-oriented
        UQ into standard evaluation protocols.
    consensus:
    - Fine-grained evaluation beyond pass@1 is necessary to reveal capability differences
      masked by aggregate success rates.
    - Reducing reliance on expensive human annotations through weakly supervised,
      self-supervised, or synthetic data generation is a critical direction.
    - Realistic GUI agent tasks require handling diverse interaction types (drag,
      CLI) and dynamic content, not just static click-based screens.
    - Context management is a bottleneck for long-horizon tasks, and structured or
      proactive approaches are beneficial.
    disagreements:
    - 'Training signal: some methods use weak supervision from unlabeled screenshots,
      others use online RL with verifiable synthetic tasks, and others rely on video-based
      keyframe extraction, reflecting different assumptions about data availability
      and task verifiability.'
    - 'Evaluation target: static desktop benchmarks, dynamic short-video platforms,
      and drag-specific benchmarks represent conflicting priorities for what constitutes
      a ''general'' GUI agent.'
    - 'Context handling: proactive context management treated as a first-class action
      versus implicit reliance on long-context language models, differing in architectural
      complexity and control.'
    - 'Uncertainty quantification: one line of work positions UQ as essential for
      safe deployment, while most methods do not incorporate it, suggesting disagreement
      on its practical necessity in agent pipelines.'
    open_questions:
    - How can agents learn when to request new observations in dynamic environments
      without explicit supervision?
    - Do verifiable synthetic tasks cover the distribution of real-world user goals,
      and what are the failure modes under distribution shift?
    - What is a unified representation and training scheme for heterogeneous actions
      (click, drag, type, CLI) that generalizes across applications?
    - What is the optimal context management strategy that balances information retention
      with inference cost in long-horizon tasks?
    - How can uncertainty quantification be made robust across model tiers and interface
      types, given the observed weak transfer?
    - To what extent do current benchmark improvements translate to reliable deployment
      on real desktop and mobile systems?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 训练范式与表示设计
      解决的问题: 通过利用未标注截图、可验证合成任务生成、在线强化学习和任务感知视觉表示，提升GUI代理的数据效率与泛化能力。
      尚未覆盖: 合成任务与真实任务之间的分布偏移、弱监督方法的跨应用泛化边界，以及视觉表示增益能否迁移到未见动态界面。
    - 路线: 动作空间与交互协议
      解决的问题: 将代理能力从点击扩展到拖拽、CLI和上下文管理动作，以支持长时程和复杂多步任务。
      尚未覆盖: 异质动作类型的统一建模、最优观察控制策略，以及长轨迹中的错误恢复策略。
    - 路线: 评估方法论与证据标准
      解决的问题: 提供细粒度、多维度指标（子目标完成、成本-准确性、不确定性校准），以分离方法贡献并诊断代理行为。
      尚未覆盖: 跨基准评估一致性、离线指标与在线部署成功之间的关联，以及将面向安全的不确定性量化纳入标准评估协议。
    共识:
    - 超越pass@1的细粒度评估对于揭示被总体成功率掩盖的能力差异是必要的。
    - 通过弱监督、自监督或合成数据生成来减少对昂贵人工标注的依赖是一个关键方向。
    - 真实的GUI代理任务需要处理多样的交互类型（拖拽、CLI）和动态内容，而不仅仅是静态点击屏幕。
    - 上下文管理是长时程任务的瓶颈，结构化或主动的方法是有益的。
    分歧:
    - 训练信号：部分方法使用来自未标注截图的弱监督，其他使用带可验证合成任务的在线RL，还有基于视频的关键帧提取，反映了对数据可用性和任务可验证性的不同假设。
    - 评估目标：静态桌面基准、动态短视频平台和拖拽专用基准，代表了对“通用”GUI代理的不同优先定义。
    - 上下文处理：将上下文管理视为第一类动作的主动方式，与依赖长上下文语言模型的隐式方式，在架构复杂性和控制上存在分歧。
    - 不确定性量化：一条工作线将UQ定位为安全部署的关键，而多数方法未纳入，表明对UQ在代理管线中的实际必要性存在不同看法。
    开放问题:
    - 代理如何在动态环境中学习何时请求新观察，而无需显式监督？
    - 可验证合成任务是否覆盖了真实世界用户目标的分布，分布偏移下的失败模式是什么？
    - 什么是能够跨应用泛化的异质动作（点击、拖拽、输入、CLI）的统一表示和训练方案？
    - 在长时程任务中，平衡信息保留与推理成本的最优上下文管理策略是什么？
    - 鉴于观察到的跨模型和跨接口迁移较弱，如何使不确定性量化在不同模型层级和接口类型上具有鲁棒性？
    - 当前基准上的改进在多大程度上能转化为真实桌面和移动系统上的可靠部署？
