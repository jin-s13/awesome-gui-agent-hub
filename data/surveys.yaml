    研究路线矩阵:
    - 路线: 技能库与工件系统
      解决的问题: 将可复用的多模态技能（文本+视觉图形）编码为结构化工件，供GUI代理按需检索，减少重复发现UI模式的需求，并改善动作接地。
      尚未覆盖: 技能目前按应用手工制作；自动构建、跨应用泛化以及随时间对UI变化的鲁棒性尚未测试。
    - 路线: 弱监督数据高效训练流水线
      解决的问题: 利用海量未标注截图预训练视觉接地，然后用少量标注数据微调，显著降低构建GUI代理的数据成本。
      尚未覆盖: 该方法在静态截图上验证；在动态、实时交互环境和长时程任务上的有效性尚不清楚。
    - 路线: 在线多轮强化学习框架
      解决的问题: 提供开源基础设施，用于在真实网站上通过在线RL训练视觉网页代理，在保持与专有系统竞争力的同时，使RL设计选择的系统研究成为可能。
      尚未覆盖: 扩展到非网页GUI应用（如桌面、移动）以及RL训练过程中安全约束的整合尚未解决。
    - 路线: 长期现实世界基准测试套件
      解决的问题: 创建需要流式交互、跨源推理和隐式状态推断的真实多步任务，并揭示大规模下当前代理的失败模式。
      尚未覆盖: 基准尚未在不同代理框架之间标准化；其发现尚未反馈到训练循环中以直接改进代理能力。
    - 路线: 安全审计与失败模式分析
      解决的问题: 系统性探测代理在提示注入、用户敏感状态和视觉记忆错误方面的脆弱性，并提出领域条件安全或动作接地记忆等防御机制。
      尚未覆盖: 安全加固是领域特定的，在浏览器外失效；RL优化的攻击不可复现；将安全分析集成到代理系统开发周期中仍是一个开放挑战。
    共识:
    - 所有系统都致力于将GUI代理端到端地部署在真实世界任务上，超越孤立的模型评估。
    - 它们共同关注长时程、多步交互，并重视开源框架、基准或工件，以实现可复现研究。
    - 视觉接地和记忆管理被公认为代理性能的关键，且成本高效的数据使用是普遍关注点。
    分歧:
    - 训练范式截然不同：一些系统依赖静态数据的行为克隆，另一些在真实网站上使用在线RL，还有的依赖精心策划的技能库。
    - 评估环境从静态截图和网页浏览器任务到完整桌面环境各不相同，导致成功率指标和代理能力无法直接比较。
    - 安全策略分歧：事后审计揭示领域条件鲁棒性，过程中记忆机制旨在减少错误，部署前探索则针对敏感状态。
    - 记忆表示分裂为全图存储和动作裁剪两种，对错误类型（状态级 vs 动作级失败）产生相反影响。
    开放问题:
    - 如何将在线RL、技能库和弱监督相结合，以在极少标注数据下实现强泛化？
    - 安全加固能否做到领域无关并抵御优化攻击，且如何将其集成到训练循环中？
    - 对于长时程任务，视觉记忆的最优表示是什么，能否从代理交互中自动学习？
    - 如何将基准测试中发现的失败模式（如目标漂移、约束遗忘）系统性地反馈到代理训练中以提升鲁棒性？
