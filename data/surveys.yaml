    研究路线矩阵:
    - 路线: 分类体系与路线图综合
      解决的问题: 将GUI智能体研究组织为基准测试、上下文管理、安全分析和学习范式等类别，识别里程碑和缺口。
      尚未覆盖: 所提出的分类法是否涵盖所有新兴子领域（如教程生成、欺诈检测），以及路线图是否基于系统证据而非选择性示例。
    - 路线: 对比评测综合
      解决的问题: 总结不同评测选择（单步 vs. 多轮、浏览器 vs. 桌面 vs. 移动、手工攻击 vs. RL优化攻击）如何影响关于智能体能力的结论。
      尚未覆盖: 不同设置下结果的可比性不确定；例如，浏览器任务中观察到的安全抵抗力不迁移到编码领域，UQ排名跨模型层级迁移弱。
    - 路线: 开放问题与缺口映射
      解决的问题: 将广泛文献覆盖转化为具体下一步研究问题，如长时域上下文管理、跨领域安全和噪声鲁棒的自主学习。
      尚未覆盖: 哪些缺口（如会话管理 vs. 工件精度）最严重地限制进展的优先级排序，以及如何设计同时覆盖多种失败模式的统一基准。
    共识:
    - 当前GUI智能体在长时域任务中因上下文退化和会话管理问题而表现挣扎。
    - 视觉-语言模型是主导骨干，但其可靠性因领域和评估协议而异。
    - 基准测试对于暴露失败模式至关重要，研究者普遍希望超越单步、简化的评估。
    - 安全和对齐被认为是重要的，但当前的加固是领域条件的，不能泛化。
    分歧:
    - 上下文管理策略：主动的上下文即动作 vs. 信号驱动的观察解耦 vs. 隐式依赖长上下文模型。
    - 评估协议：一次性给出所有任务的单轮提示 vs. 顺序揭示的多轮，导致不同的失败特征。
    - 安全评估：手工攻击在浏览器任务上成功率接近零，但在编码任务上成功率高，表明在安全应分领域衡量还是整体衡量上存在分歧。
    - 学习范式：基于人类演示的监督微调 vs. 使用自主噪声奖励的强化学习，对可扩展性和奖励质量有不同假设。
    开放问题:
    - 上下文管理如何扩展到极长时域而不丢失关键任务状态？
    - 安全加固能否做到领域无关，还是必须依赖于交互界面？
