  related_work_outline:
  - 'Mainstream direction: The dominant effort is building holistic, real-world benchmarks
    that capture the full complexity of GUI automation, moving beyond static web pages
    to desktop OS, dynamic short-video platforms, and diverse interaction modes such
    as drag and video-guided tasks.'
  - 'Shared research pattern: Most works share a structure of creating a new dataset
    or environment, evaluating a set of frontier vision-language models or specialized
    agents, and diagnosing specific capability gaps—often revealing that aggregate
    success rates mask critical weaknesses in sub-goal completion, observation efficiency,
    or reliability.'
  - 'Key differences: Works differ in evaluation realism (static vs. dynamic content),
    interaction modality (click, drag, video-guided), metric design (Pass@1 vs. cost-accuracy
    vs. uncertainty quantification), and the agent''s reliance on external skill libraries
    versus end-to-end learned policies.'
  - 'Trend evolution: From 2024 to 2026, benchmarks evolved from single-platform,
    click-only tasks to multi-platform, multi-modal scenarios with fine-grained diagnostics;
    methods increasingly emphasize data efficiency through weak supervision, verifiable
    task synthesis, and online RL, while evaluation frameworks begin to incorporate
    uncertainty and safety margins.'
  - 'Open questions: Cross-platform generalization of agent capabilities remains unproven;
    optimal observation-control strategies for dynamic interfaces are unknown; uncertainty
    estimates are not yet integrated into agent decision loops; and the alignment
    between benchmark metrics and real end-user utility is largely unvalidated.'
  related_work_outline_zh:
  - 主流方向：主要工作是构建全面的真实世界基准测试，以捕捉GUI自动化的全部复杂性，从静态网页扩展到桌面操作系统、动态短视频平台以及拖拽、视频引导等多样化交互模式。
  - 研究共性：大多数工作具有共同结构：创建新数据集或环境，评估一组前沿视觉语言模型或专用代理，并诊断特定能力差距——通常揭示总体成功率掩盖了子目标完成度、观察效率或可靠性方面的关键弱点。
  - 关键差异：工作之间的差异在于评估真实感（静态内容 vs. 动态内容）、交互模态（点击、拖拽、视频引导）、指标设计（Pass@1 vs. 成本-准确性 vs.
    不确定性量化），以及代理对外部技能库的依赖程度与端到端学习策略。
  - 趋势演进：从2024年到2026年，基准测试从单平台、仅点击任务发展为多平台、多模态场景，并带有细粒度诊断；方法越来越强调通过弱监督、可验证任务合成和在线强化学习实现数据效率，同时评估框架开始纳入不确定性和安全边际。
  - 开放问题：代理能力的跨平台泛化性尚未得到验证；动态接口的最优观察控制策略未知；不确定性估计尚未集成到代理决策循环中；基准指标与实际最终用户效用之间的一致性在很大程度上未经证实。
  literature_review:
    line_of_work_matrix:
    - line: Platform-specific real-world benchmark construction
      what_it_solves: Extends GUI agent evaluation beyond synthetic or web-only settings
        to real macOS desktop, dynamic short-video platforms, and live streaming interfaces,
        providing ecologically valid task suites.
      what_remains_open: These benchmarks are each tied to a single platform or interface
        type; cross-platform generalization of agent capabilities and the transferability
        of findings across platforms remain unexplored.
    - line: Expansion of interaction modality coverage
      what_it_solves: Addresses the click-dominant bias of prior benchmarks by introducing
        drag-based interactions, video-guided tasks, and continuous observation-control
        requirements, thus testing a broader set of agent motor skills and perception.
      what_remains_open: The coverage of real-world interaction modalities is still
        incomplete—gestures, multi-touch, and long-horizon physical tool use are absent—and
        it is unclear whether models strong on one modality can transfer to others.
    - line: Fine-grained diagnostic evaluation and uncertainty quantification
      what_it_solves: Decomposes agent performance into sub-goal completion, observation
        efficiency, cost-accuracy trade-offs, and per-example uncertainty estimates,
        enabling targeted improvement rather than relying on a single aggregate score.
      what_remains_open: The connection between these diagnostic metrics and downstream
        user trust or task success is not established; uncertainty estimates are not
        yet used for online decision-making or safety-gating, and their calibration
        degrades under distribution shift.
    - line: Data-efficient agent training and task synthesis
      what_it_solves: Reduces dependence on expensive human-annotated demonstration
        data by leveraging weak supervision from unlabeled screenshots, verifiable
        synthetic task generation in Docker environments, and online RL with efficient
        sampling.
      what_remains_open: Synthetic tasks may not cover the long-tail of real user
        behavior, and the distribution gap between training environments and live
        deployment introduces unquantified risks; the scalability of these methods
        to arbitrary applications is unverified.
    - line: Multimodal skill libraries for agent augmentation
      what_it_solves: Provides agents with reusable, application-specific knowledge
        in the form of visual-textual skill artifacts, significantly improving success
        rates by offloading the need to rediscover common workflows from scratch.
      what_remains_open: Skill library construction currently requires per-application
        authoring and live exploration, raising questions about maintenance cost,
        automatic updates, and the ability to transfer skills across similar applications
        without manual intervention.
    consensus:
    - Aggregate success rates alone are insufficient to capture agent capability;
      fine-grained metrics such as sub-goal completion, action efficiency, and reliability
      are necessary.
    - Current state-of-the-art models still fall short of human performance on complex,
      real-world GUI tasks, with observation-control and precise spatial manipulation
      being common failure modes.
    - There is a growing need for benchmarks that incorporate dynamic, temporally
      evolving content rather than static screens, as many real applications involve
      continuous updates.
    disagreements:
    - Some works evaluate agents in static or step-by-step reproducible environments,
      while others stress dynamic, live content where the agent must actively control
      the pace of observation.
    - 'Metric emphasis varies: several works optimize for task completion accuracy,
      whereas others introduce cost-accuracy or information-efficiency, implicitly
      trading off speed against precision.'
    - 'The role of external knowledge differs: one line supplies agents with pre-built
      multimodal skill libraries, while another uses end-to-end RL or weakly supervised
      fine-tuning, reflecting different assumptions about the need for reusable application-specific
      knowledge.'
    open_questions:
    - How can observation-control strategies be optimized for dynamic interfaces where
      content changes asynchronously, and what is the best way to evaluate such strategies?
    - Can uncertainty quantification be integrated into the agent's decision loop
      to enable safer, more reliable autonomous operation, and how should calibration
      be maintained across diverse platforms?
    - To what extent do the diagnostic metrics and fine-grained evaluations introduced
      in these benchmarks correlate with real user satisfaction and task completion
      in the wild?
    - What is the minimal amount of task-specific annotation or environment interaction
      needed to deploy a capable GUI agent on a completely new platform, and can synthetic
      data bridge the gap?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 特定平台真实世界基准构建
      解决的问题: 将GUI代理评估从合成环境或仅限网页的设置扩展到真实的macOS桌面、动态短视频平台和直播界面，提供生态有效的任务套件。
      尚未覆盖: 这些基准均绑定于单一平台或界面类型；代理能力的跨平台泛化性以及研究发现在不同平台间的可迁移性尚未探索。
    - 路线: 交互模态覆盖范围扩展
      解决的问题: 针对先前基准以点击为主的偏差，引入基于拖拽的交互、视频引导任务和连续的观察控制需求，从而测试更广泛的代理运动技能和感知能力。
      尚未覆盖: 真实世界交互模态的覆盖仍然不完整——手势、多点触控、长时间物理工具使用等缺失——且尚不清楚在一种模态上表现强劲的模型能否迁移到其他模态。
    - 路线: 细粒度诊断评估与不确定性量化
      解决的问题: 将代理性能分解为子目标完成度、观察效率、成本-准确性权衡和逐样本不确定性估计，从而支持针对性改进，而非依赖单一总分。
      尚未覆盖: 这些诊断指标与下游用户信任或任务成功之间的关联尚未建立；不确定性估计尚未用于在线决策或安全门控，且其校准在分布偏移下会退化。
    - 路线: 数据高效代理训练与任务合成
      解决的问题: 通过利用未标注截图的弱监督、Docker环境中的可验证合成任务生成以及高效采样的在线强化学习，减少对昂贵人工标注示范数据的依赖。
      尚未覆盖: 合成任务可能无法覆盖真实用户行为的长尾分布，训练环境与真实部署之间的分布差距引入了未量化的风险；这些方法对任意应用的可扩展性未经验证。
    - 路线: 用于代理增强的多模态技能库
      解决的问题: 以视觉-文本技能工件的形式为代理提供可复用的、特定于应用的知识，通过消除从头开始发现常见工作流的需求，显著提高成功率。
      尚未覆盖: 技能库构建目前需要逐应用编写和实时探索，这引发了维护成本、自动更新以及跨相似应用无人工干预迁移技能的能力等问题。
    共识:
    - 仅使用总体成功率不足以捕捉代理能力；需要子目标完成度、动作效率和可靠性等细粒度指标。
    - 当前最先进模型在复杂的真实世界GUI任务上仍不及人类表现，观察控制和精确的空间操作是常见失败模式。
    - 越来越需要纳入动态、时间演变内容的基准测试，而不是静态屏幕，因为许多真实应用涉及持续更新。
    分歧:
    - 一些工作在静态或逐步可复现的环境中评估代理，而另一些强调动态、实时内容，代理必须主动控制观察节奏。
    - 指标侧重点不同：多篇工作优化任务完成准确率，而其他工作引入成本-准确性或信息效率，隐含地在速度与精度之间权衡。
    - 外部知识的角色不同：一条路线为代理提供预建的多模态技能库，另一条路线使用端到端强化学习或弱监督微调，反映了对可复用应用特定知识需求的不同假设。
    开放问题:
    - 对于内容异步变化的动态界面，如何优化观察控制策略，以及评估此类策略的最佳方式是什么？
    - 不确定性量化能否集成到代理的决策循环中，以实现更安全、更可靠的自主操作，以及如何在不同平台上保持校准？
    - 这些基准中引入的诊断指标和细粒度评估在多大程度上与野外真实用户满意度和任务完成度相关？
    - 在全新平台上部署一个能力足够的GUI代理所需的最少任务特定标注量或环境交互量是多少，合成数据能否弥合这一差距？
