  related_work_outline:
  - 'Mainstream direction: The field is converging on runnable GUI agent systems that
    combine scalable training frameworks (online RL, weak supervision), structured
    memory (multimodal skills, action-grounded crops), and long-horizon real-world
    benchmarks to diagnose and improve agent performance.'
  - 'Shared research pattern: Papers consistently identify critical failure modes
    in current agents—constraint forgetting, verification skipping, state misunderstanding—and
    propose either memory/representation upgrades or real-world evaluation suites
    to expose them.'
  - 'Key differences: Works diverge on memory representation (full-image vs. action-grounded
    crops vs. multimodal skill artifacts), supervision signal (weak supervision from
    unannotated screenshots vs. online RL vs. authored documentation), and evaluation
    target (long-horizon professional workflows, safety across domains, or user-sensitive
    screen discovery).'
  - 'Trend evolution: Within 2024–2026, the focus shifted from single-turn GUI grounding
    to multi-turn, long-horizon task completion in professional and real-world settings,
    accompanied by a growing emphasis on safety, reproducibility, and the use of live-website
    interaction for training.'
  - 'Open questions: How to systematically convert long-horizon failure modes into
    training signals; whether memory and safety mechanisms generalize across applications
    and domains; and how to control safety risks during online RL on live environments.'
  related_work_outline_zh:
  - 主流方向：领域正汇聚于可运行的GUI智能体系统，结合可扩展的训练框架（在线强化学习、弱监督）、结构化记忆（多模态技能、动作接地裁剪）和长期真实世界基准，以诊断并提升智能体性能。
  - 研究共性：论文一致识别出当前智能体的关键失败模式——约束遗忘、跳过验证、状态误解——并提出通过记忆/表示升级或真实世界评估套件来暴露这些问题。
  - 关键差异：工作分歧在于记忆表示（全图 vs. 动作接地裁剪 vs. 多模态技能工件）、监督信号（未标注截图弱监督 vs. 在线RL vs. 编写文档）以及评测目标（长期专业工作流、跨领域安全、用户敏感屏幕发现）。
  - 趋势演进：2024–2026年间，焦点从单轮GUI定位转向真实世界专业场景的多轮长期任务完成，并越来越强调安全性、可复现性以及使用真实网站交互进行训练。
  - 开放问题：如何将长期失败模式系统性地转化为训练信号；记忆和安全机制是否跨应用和跨领域泛化；以及如何在真实环境的在线RL中控制安全风险。
  literature_review:
    line_of_work_matrix:
    - line: Multimodal skill libraries and action-grounded visual memory
      what_it_solves: GUI agent state understanding and action accuracy by structuring
        visual memory around task-relevant regions or skill artifacts
      what_remains_open: Cross-application and cross-domain generalization of stored
        skills; robustness to dynamic UI changes and real-time streaming interactions
    - line: Weakly supervised and data-efficient GUI agent training
      what_it_solves: Reducing reliance on expensive human annotations by leveraging
        large-scale unannotated screenshots and webpages
      what_remains_open: Performance stability under noisy or diverse unlabeled data;
        extension to multimodal and highly interactive GUI environments
    - line: Online multi-turn reinforcement learning frameworks for visual agents
      what_it_solves: Training agents through live website interaction with scalable
        infrastructure, trajectory-level judging, and policy optimization
      what_remains_open: Safety and robustness during deployment on uncontrolled live
        sites; portability across different hardware and cloud infrastructures
    - line: Long-horizon real-world and professional-domain benchmarks
      what_it_solves: Evaluating end-to-end agent capability on realistic workflows
        that require constraints, cross-source reasoning, and hidden state recovery
      what_remains_open: Translating benchmark failure modes into targeted training
        improvements; ensuring benchmarks do not leak sensitive user data or unsafe
        behaviors
    - line: Domain-conditioned safety and red-teaming evaluations
      what_it_solves: Auditing agent safety against prompt injection and skill injection
        in browser and coding environments
      what_remains_open: Cross-domain safety generalization; defense against RL-optimized
        injection strings beyond hand-crafted templates
    - line: Guided exploration for user-sensitive screen detection
      what_it_solves: Identifying GUI states that contain private user information
        to enable safe handover
      what_remains_open: Lack of experimental validation; unclear criteria for sensitivity
        classification; integration with real agent execution loops
    consensus:
    - Current GUI agents struggle with long-horizon tasks, frequently omitting workflow
      stages, propagating errors, and skipping verification steps.
    - Structured visual memory and action grounding improve task success rates compared
      to naive full-image memory.
    - Weak supervision and online RL can significantly reduce annotation needs and
      are effective training paradigms for GUI agents.
    - Safety hardening in browser-based agents is effective against hand-crafted attacks
      but does not transfer to coding agents, revealing domain-conditioned safety.
    - Real-world, long-horizon benchmarks are necessary to capture agent failures
      that are absent in short, single-turn evaluations.
    disagreements:
    - 'Memory representation: full-image visual memory can worsen action-level errors,
      while action-grounded crops or multimodal skill artifacts yield better grounding.'
    - 'Supervision signal: methods rely on distinct signals—unannotated screenshots
      with contextual cues, online RL with trajectory success, or authored multimodal
      documentation.'
    - 'Evaluation target: some works focus on generic desktop/OS tasks, others on
      professional software workflows, and yet others on browser safety or coding
      security.'
    - 'Interaction mode: training and evaluation occur in diverse settings—simulated
      environments, live websites, or exploratory query-space navigation for sensitive
      screens.'
    - 'Deployment philosophy: open-source RL frameworks enable reproducibility and
      community extension, while skill-library approaches assume a curated knowledge
      base per application.'
    open_questions:
    - How can the failure modes identified in long-horizon benchmarks be systematically
      fed back into agent training pipelines?
    - Can memory mechanisms that work on static GUI tasks generalize to dynamically
      changing interfaces and real-time streaming environments?
    - What is the safety risk when online RL frameworks interact with live, potentially
      malicious websites, and how can it be mitigated?
    - To what extent do weakly supervised approaches degrade when unannotated data
      contains misleading or inconsistent visual cues?
    - How can domain-conditioned safety be unified into a single agent architecture
      that remains robust across browsers, coding environments, and other tools?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态技能库与动作接地视觉记忆
      解决的问题: 通过围绕任务相关区域或技能工件构建视觉记忆，提升GUI智能体的状态理解与动作准确性
      尚未覆盖: 存储技能的跨应用与跨领域泛化；对动态UI变化和实时流式交互的鲁棒性
    - 路线: 弱监督与数据高效的GUI智能体训练
      解决的问题: 利用大规模未标注截图和网页减少对昂贵人工标注的依赖
      尚未覆盖: 噪声或多样化无标注数据下的性能稳定性；向多模态和强交互GUI环境的扩展
    - 路线: 在线多轮强化学习视觉智能体框架
      解决的问题: 通过可扩展的实时网站交互基础设施、轨迹级判定和策略优化训练智能体
      尚未覆盖: 在不受控真实网站上的部署安全与鲁棒性；跨硬件和云基础设施的可移植性
    - 路线: 长期真实世界与专业领域基准
      解决的问题: 评估智能体在需要约束、跨源推理和隐藏状态恢复的真实工作流上的端到端能力
      尚未覆盖: 将基准失败模式转化为针对性训练改进；确保基准不泄露用户敏感数据或产生不安全行为
    - 路线: 领域条件安全与红队评估
      解决的问题: 审计智能体在浏览器和编码环境中对提示注入和技能注入的安全性
      尚未覆盖: 跨领域安全泛化；对手工模板之外RL优化注入字符串的防御
    - 路线: 用户敏感屏幕的引导式探索
      解决的问题: 识别包含用户隐私信息的GUI状态以实现安全移交
      尚未覆盖: 缺乏实验验证；敏感分类标准不明确；与真实智能体执行循环的集成
    共识:
    - 当前GUI智能体在长期任务上表现挣扎，经常遗漏工作流阶段、传播错误并跳过验证步骤。
    - 结构化的视觉记忆和动作接地相比朴素全图记忆能提高任务成功率。
    - 弱监督和在线RL可以显著降低标注需求，是有效的GUI智能体训练范式。
    - 浏览器智能体的安全加固对手工攻击有效，但无法迁移至编码智能体，呈现领域条件安全性。
    - 真实世界的长期基准对于捕捉短程单轮评估中缺失的智能体失败是必要的。
    分歧:
    - 记忆表示：全图视觉记忆可能加剧动作级错误，而动作接地裁剪或多模态技能工件可实现更好的接地。
    - 监督信号：各方法依赖不同的信号——基于上下文线索的未标注截图、在线RL的轨迹成功判定，或人工编写的多模态文档。
    - 评测目标：部分工作关注通用桌面/OS任务，部分关注专业软件工作流，还有一些关注浏览器安全或编码安全。
    - 交互模式：训练与评估发生在多样化环境中——模拟环境、真实网站，或面向敏感屏幕的查询空间探索导航。
    - 部署理念：开源RL框架支持可复现性和社区扩展，而技能库方法假设每个应用有精心策划的知识库。
    开放问题:
    - 如何将长期基准中识别的失败模式系统性地反馈到智能体训练流水线中？
    - 在静态GUI任务上有效的记忆机制能否泛化到动态变化的界面和实时流式环境？
    - 在线RL框架与真实潜在恶意网站交互时的安全风险有多大，如何缓解？
    - 当无标注数据包含误导或不一致的视觉线索时，弱监督方法会退化到何种程度？
    - 如何将领域条件安全统一到一个能跨浏览器、编码环境和其他工具保持鲁棒性的单一智能体架构中？
