  - 开放问题：如何在动态环境中平衡观察频率与任务准确率；当前视觉-语言模型能否稳健处理拖拽等连续交互；技能库如何跨应用泛化；在无真实信誉信号时如何保证代理的安全决策。
  literature_review:
    line_of_work_matrix:
    - line: Real-world GUI agent benchmarks for specific interaction types and domains
      what_it_solves: Provides standardized evaluation for agents on desktops, dynamic
        video platforms, drag-based interfaces, video-guided tasks, and fraud detection,
        revealing concrete failure modes.
      what_remains_open: Benchmarks remain in controlled environments; cross-application
        generalization, long-horizon tasks, and robustness to real-world noise are
        not yet assessed.
    - line: Agent skill and knowledge augmentation
      what_it_solves: Injects application-specific multimodal knowledge (e.g., VISUALSKILL)
        to improve UI element identification and workflow verification, reducing reliance
        on general model priors.
      what_remains_open: Automated skill construction, cross-application transfer,
        and scalability remain unverified; the benefit may depend on the underlying
        agent's grounding ability.
    - line: Execution efficiency and reuse for repeated tasks
      what_it_solves: Compiles successful agent trajectories into state-machine programs
        for fast replay (PreAct), achieving 8.5–13× speedup without per-step model
        calls.
      what_remains_open: Adaptation to interface changes and non-repetitive tasks
        is limited; faulty program accumulation is mitigated by a store-time check
        but not eliminated.
    - line: Visually grounded planning and execution correction
      what_it_solves: Integrates a history-aware critic (HiViG) that summarizes past
        achievements and verifies execution coordinates against screenshots, intercepting
        short-sighted or erroneous actions.
      what_remains_open: Integration with diverse agent architectures and training
        data scarcity are unresolved; the approach has been tested only with a few
        backbone models.
    - line: Dynamic content and video-guided agent interaction
      what_it_solves: Formalizes living-screen-native agents and video-guided GUI
        tasks, evaluating observation control and information efficiency in environments
        where content changes between actions.
      what_remains_open: Optimal observation strategies and keyframe extraction methods
        for complex tasks are not established; benchmarks are limited to short-video
        platforms or specific video sources.
    consensus:
    - Agents are built on vision-language models that perceive GUI screens and execute
      actions via coordinates or UI element references.
    - Task success rate or a composite accuracy-efficiency metric is the primary evaluation
      criterion, with fine-grained sub-goal scoring increasingly adopted.
    - Current agents exhibit significant shortcomings in real-world applications,
      including over-observation, under-observation, inability to handle drag, and
      short-sighted planning.
    disagreements:
    - Interaction primitives covered vary from click and type to drag, scroll, and
      video scrubbing, leading to different evaluation protocols and agent capabilities.
    - 'Methods target orthogonal improvement axes: knowledge injection through skill
      libraries, speedup via trajectory compilation, planning correction through critics,
      and observation control through keyframe extraction.'
    - 'Evaluation settings differ: some use deterministic rule-based checks, while
      others rely on human evaluation or LLM judges, making cross-benchmark comparison
      difficult.'
    open_questions:
    - How can agents adaptively control observation frequency and content to maximize
      task accuracy while minimizing cost and time in dynamic interfaces?
    - Can current vision-language models reliably perform continuous drag interactions
      and complex gesture combinations across diverse applications?
    - What mechanisms enable skill libraries or compiled programs to generalize to
      unseen applications or interface updates without extensive retraining?
    - How should safety-critical GUI agents be evaluated when real-world reputation
      signals (URLs, domains) are unavailable, and what is the trade-off between detection
      accuracy and benign recall?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 面向特定交互类型和领域的真实场景GUI代理基准测试
      解决的问题: 为桌面、动态视频平台、拖拽界面、视频引导任务和欺诈检测等场景提供标准化评估，暴露代理的失败模式。
      尚未覆盖: 基准测试仍处于受控环境；跨应用泛化、长周期任务和真实世界噪声的鲁棒性尚未评估。
    - 路线: 代理技能与知识增强
      解决的问题: 注入应用特定的多模态知识（如VISUALSKILL），改善UI元素识别和工作流状态验证，减少对通用模型先验的依赖。
      尚未覆盖: 技能库的自动构建、跨应用迁移和可扩展性尚未验证；收益可能依赖于底层代理的视觉基础能力。
    - 路线: 重复任务的执行效率与重用
      解决的问题: 将成功代理轨迹编译为状态机程序以实现快速重放（PreAct），在不进行每步模型调用的条件下实现8.5–13倍加速。
      尚未覆盖: 对界面变化和非重复任务的适应性有限；存储时检查可缓解错误程序积累但无法完全消除。
    - 路线: 视觉基础规划与执行纠正
      解决的问题: 集成历史感知评判模型（HiViG），总结已完成成就并对照截图验证执行坐标，截断短视或错误动作。
      尚未覆盖: 与多样化代理架构的集成方式以及训练数据稀缺问题尚未解决；仅在少数骨干模型上测试。
    - 路线: 动态内容与视频引导代理交互
      解决的问题: 形式化动态屏幕原生代理和视频引导GUI任务，评估在内容变化环境中的观察控制与信息效率。
      尚未覆盖: 复杂任务的最优观察策略和关键帧提取方法尚未确立；基准测试局限于短视频平台或特定视频源。
    共识:
    - 代理均基于视觉-语言模型，感知GUI屏幕并通过坐标或UI元素引用执行动作。
    - 任务成功率或准确率-效率复合指标是主要评估标准，细粒度子目标评分逐渐被采用。
    - 当前代理在真实应用中暴露出显著不足，包括过度观察、观察不足、无法处理拖拽操作和短视规划。
    分歧:
    - 覆盖的交互原语从点击、输入到拖拽、滚动和视频搜索不等，导致评估协议和所需能力不同。
    - 方法提升的维度彼此正交：通过技能库注入知识、通过轨迹编译加速、通过评判模型纠正规划、通过关键帧提取控制观察。
    - 评估设置各异：部分使用确定性规则检查，部分依赖人工评估或LLM评判，难以进行跨基准比较。
    开放问题:
    - 代理如何自适应地控制观察频率和内容，以在动态界面中最大化任务准确率并最小化成本与时间？
    - 当前视觉-语言模型能否可靠地执行跨应用拖拽操作和复杂手势组合？
    - 何种机制能使技能库或编译程序在未见应用或界面更新时泛化，而无需大量重训？
    - 在缺乏真实世界信誉信号（URL、域名）时，如何评估安全关键型GUI代理，并如何在检测准确率与良性召回之间权衡？
