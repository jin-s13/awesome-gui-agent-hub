  - 'Shared research pattern: All works augment vision-based agents with additional
    structures—skills, memory, training curricula, or benchmarks—to overcome failure
    modes like state misunderstanding, error propagation, and objective drift in complex
    workflows.'
  - 'Key differences: Training paradigms split between offline weak supervision from
    unlabeled screenshots and online multi-turn RL on live websites; memory designs
    diverge into full-image storage versus action-grounded local crops; safety evaluation
    reveals domain-conditioned robustness that fails to transfer across browser and
    coding contexts.'
  - 'Trend evolution: Within the 2024–2026 frontier, the focus shifts from single-step
    GUI grounding to long-horizon professional workflows, with growing emphasis on
    open-source reproducibility, safety auditing, and scaling down annotation requirements.'
  - 'Open questions: How to design memory and skill representations that generalize
    across applications without introducing grounding errors; how to achieve cross-domain
    safety guarantees; and how to benchmark agents on streaming, dynamic, and constraint-heavy
    real-world tasks.'
  related_work_outline_zh:
  - 主流方向：构建能执行长期真实计算机任务的GUI代理，通过融合多模态感知、记忆、技能库和在线强化学习提升性能，并开始关注安全与可靠性。
  - 研究共性：所有工作都通过额外结构（技能、记忆、训练课程或基准）增强基于视觉的代理，以克服复杂工作流中的状态误解、错误传播和目标漂移等失败模式。
  - 关键差异：训练范式分为利用未标注截图的离线弱监督和在真实网站上的在线多轮强化学习；记忆设计分为全图存储与动作接地的局部裁剪；安全评估揭示领域条件鲁棒性，无法在浏览器和编码场景间迁移。
  - 趋势演进：在2024–2026前沿期内，焦点从单步GUI定位转向长期专业工作流，越来越重视开源可复现性、安全审计和降低标注需求。
  - 开放问题：如何设计能跨应用泛化且不引入接地错误的记忆与技能表示；如何实现跨领域安全保障；如何针对流式、动态和约束密集的真实任务进行基准测试。
  literature_review:
    line_of_work_matrix:
    - line: Skill and memory augmentation for GUI agents
      what_it_solves: Improves task success by providing agents with retrievable multimodal
        skill artifacts or action-grounded visual memory, reducing state misunderstanding
        and grounding errors.
      what_remains_open: Whether these augmentations generalize to unseen applications
        and dynamic environments without manual per-app authoring, and how to balance
        memory granularity against action precision.
    - line: Data-efficient training paradigms
      what_it_solves: Reduces reliance on expensive human-annotated trajectories by
        leveraging unlabeled screenshots via weak supervision or by using online multi-turn
        RL with sparse reward signals on live websites.
      what_remains_open: Scalability to diverse domains beyond web and productivity
        apps, stability of online RL under distribution shift, and the minimal annotation
        budget needed for reliable initialization.
    - line: Safety and privacy auditing for computer-use agents
      what_it_solves: Identifies vulnerabilities such as prompt injection and unintended
        exposure of user-sensitive screens, and measures domain-conditioned robustness
        of safety hardening.
      what_remains_open: Cross-domain safety generalization (e.g., browser vs. coding),
        coverage of attack surfaces beyond hand-crafted templates, and integration
        of runtime safety monitors without breaking task performance.
    - line: Long-horizon, real-world benchmarking
      what_it_solves: Reveals failure modes of frontier agents on professional workflows,
        streaming interactions, and constraint-heavy tasks that prior short-horizon
        benchmarks missed.
      what_remains_open: Standardized evaluation protocols for partial progress, reproducibility
        across diverse OS and software environments, and alignment of benchmark difficulty
        with practical deployment requirements.
    consensus:
    - Current GUI agents, even the strongest proprietary models, achieve low success
      rates on long-horizon real-world tasks, often failing due to constraint violations,
      missed mid-task information, and error propagation.
    - Visual information is critical for GUI grounding, and purely text-based representations
      lose essential cues for UI element identification and workflow state verification.
    - Training data efficiency is a shared concern, with multiple works aiming to
      reduce or eliminate the need for large-scale human-annotated demonstration trajectories.
    - Safety evaluation is an emerging necessity, as agents gain the ability to operate
      in sensitive contexts, but current hardening is brittle and domain-specific.
    disagreements:
    - 'Memory design: full-image visual memory reduces state-level failures but increases
      action-level grounding errors, while action-grounded local crops improve action
      precision at the cost of global context.'
    - 'Skill representation: multimodal skill artifacts that retain visual figures
      outperform text-only skills, but require per-application authoring and may not
      scale to dynamic UIs.'
    - 'Training approach: offline weak supervision from massive unlabeled screenshots
      achieves competitive results with minimal annotation, whereas online multi-turn
      RL on live websites offers direct reward alignment but demands complex infrastructure.'
    - 'Safety scope: one line evaluates robustness against hand-crafted prompt injection
      on browser tasks and finds near-zero attack success, while another reveals that
      the same models remain vulnerable to skill-injection on coding tasks, questioning
      the generality of safety claims.'
    - 'Benchmark focus: some benchmarks target general computer-use tasks across diverse
      applications, while others specialize in professional domain workflows, leading
      to different failure profiles and evaluation criteria.'
    open_questions:
    - How can memory and skill mechanisms be designed to adapt automatically to novel
      applications without manual per-app engineering or retraining?
    - What training paradigm best balances data efficiency, task success, and safety
      in open-ended real-world environments?
    - Can safety hardening be made domain-agnostic, or must it be tailored to each
      interaction surface (browser, coding, OS)?
    - How should long-horizon agent evaluation account for partial progress, streaming
      feedback, and dynamic state changes that are absent in static benchmarks?
  literature_review_zh:
    研究路线矩阵:
    - 路线: GUI代理的技能与记忆增强
      解决的问题: 通过提供可检索的多模态技能工件或动作接地的视觉记忆，提升任务成功率，减少状态误解和接地错误。
      尚未覆盖: 这些增强能否在无需人工逐应用编写的情况下泛化到未见应用和动态环境，以及如何平衡记忆粒度与动作精度。
    - 路线: 数据高效的训练范式
      解决的问题: 通过弱监督利用未标注截图，或在真实网站上使用在线多轮强化学习与稀疏奖励，减少对昂贵人工标注轨迹的依赖。
      尚未覆盖: 向网页和生产力应用之外的多样化领域扩展的可扩展性，在线强化学习在分布偏移下的稳定性，以及可靠初始化所需的最小标注预算。
    - 路线: 计算机使用代理的安全与隐私审计
      解决的问题: 识别提示注入和用户敏感屏幕意外暴露等漏洞，并衡量安全加固的领域条件鲁棒性。
      尚未覆盖: 跨领域安全泛化（如浏览器与编码），手工模板之外的攻击面覆盖，以及在不破坏任务性能的情况下集成运行时安全监控。
    - 路线: 长期真实世界基准测试
      解决的问题: 揭示前沿代理在专业工作流、流式交互和约束密集任务上的失败模式，这些是先前短期基准所遗漏的。
      尚未覆盖: 部分进度的标准化评估协议，跨不同操作系统和软件环境的可复现性，以及基准难度与实际部署需求的对齐。
    共识:
    - 当前GUI代理，即使是最强的专有模型，在长期真实世界任务上成功率也很低，常因违反约束、遗漏任务中途信息和错误传播而失败。
    - 视觉信息对GUI接地至关重要，纯文本表示会丢失UI元素识别和工作流状态验证所需的关键线索。
    - 训练数据效率是共同关切，多项工作旨在减少或消除对大规模人工标注示范轨迹的需求。
    - 安全评估正成为新兴必要，因为代理获得了在敏感环境中操作的能力，但当前加固措施脆弱且领域特定。
    分歧:
    - 记忆设计：全图视觉记忆减少状态级失败但增加动作级接地错误，而动作接地的局部裁剪以牺牲全局上下文为代价提高动作精度。
    - 技能表示：保留视觉图形的多模态技能工件优于纯文本技能，但需要逐应用编写，可能无法扩展到动态UI。
    - 训练方法：从海量未标注截图的离线弱监督以极少标注取得竞争性能，而在真实网站上的在线多轮强化学习提供直接奖励对齐但需要复杂基础设施。
    - 安全范围：一项工作在浏览器任务上评估对手工提示注入的鲁棒性，发现攻击成功率接近零；另一项则揭示相同模型在编码任务上仍易受技能注入攻击，质疑安全声明的通用性。
    - 基准焦点：一些基准针对跨应用的通用计算机使用任务，另一些则专注于专业领域工作流，导致不同的失败剖面和评估标准。
    开放问题:
    - 如何设计能自动适应新应用的记忆和技能机制，而无需人工逐应用工程或重新训练？
    - 哪种训练范式能在开放的真实环境中最好地平衡数据效率、任务成功和安全性？
    - 安全加固能否做到领域无关，还是必须针对每个交互界面（浏览器、编码、操作系统）定制？
    - 长期代理评估应如何考虑部分进展、流式反馈和动态状态变化，这些在静态基准中是不存在的？
