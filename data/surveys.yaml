      尚未覆盖: 形式化条件（如观察控制、共形覆盖）在真实分布偏移和多步轨迹下是否与经验代理行为匹配。
    - 路线: 缩放规律与保证
      解决的问题: 将数据规模和弱监督与代理性能联系起来，表明海量未标注截图可以替代昂贵的人工标注并保持竞争力。
      尚未覆盖: 直接验证观察到的数据效率增益是否能预测失败模式或跨不同GUI领域和代理架构迁移。
    - 路线: 概念分类与边界
      解决的问题: 将碎片化的GUI交互类型（点击、拖拽、动态内容）和任务类别组织成结构化基准，实现系统化的能力比较。
      尚未覆盖: 这些分类是否影响研究者设计代理的方式，还是仅作为评估清单而不指导架构创新。
    共识:
    - 细粒度指标（子目标完成度、成本-准确性、不确定性校准）揭示了总体成功率隐藏的模型差异。
    - 视觉信息（截图、技能工件中的图形）对GUI基础至关重要，移除它会显著降低性能。
    - 当前代理缺乏鲁棒的观察控制，导致在动态环境中出现过度观察或观察不足的失败。
    - 将成功运行编译为程序或构建技能库可以显著提高重复或结构化任务的效率和准确性。
