  - repo: papers
    category: dataset
  notes: 'Derived from paper: Bridging VideoQA and Video-Guided Agentic Tasks via
    Generalized Keyframe Extraction'
  related_papers:
  - id: bridging-videoqa-and-video-guided-agentic-tasks-via-generali-2026
    title: Bridging VideoQA and Video-Guided Agentic Tasks via Generalized Keyframe
      Extraction
    url: https://arxiv.org/abs/2606.29445v1
    title_zh: 通过通用关键帧提取桥接视频问答与视频引导的智能体任务
  year: 2026
  preview: /assets/papers/bridging-videoqa-and-video-guided-agentic-tasks-via-generali-2026/teaser.png
  name_zh: 通过通用关键帧提取桥接视频问答与视频引导的智能体任务
  description_zh: 视频理解是多模态智能的基础能力，近年来多模态大语言模型（MLLMs）在视频问答（VideoQA）基准测试中取得了显著性能。然而，现有基准主要评估模型能否感知浅层视觉线索，很少检验MLLMs能否从视频教程中学习更深层的知识或程序性技能，并将其泛化到下游长周期智能体任务中。为填补这一空白，我们引入了VG-GUIBench（视频引导的GUI基准），这是一个新基准，旨在评估基于MLLM的GUI智能体能否跟随视频教程完成相应的GUI交互任务。此外，我们观察到模型在视频问答和视频引导的智能体任务上的性能关键取决于有效的关键帧提取。基于这一观察，我们提出了TASKER（任务驱动与场景感知的关键帧搜索器），一种联合考虑任务相关性和场景动态以识别信息帧的关键帧提取算法。实验结果表明，TASKER在视频问答和视频引导的智能体任务基准上均取得了显著的性能提升，在EgoSchema完整集上比最佳基线高出2.0%，在NExT-QA数据集上高出1.8%。这些结果进一步凸显了通用关键帧提取方法在视频理解任务中的潜力。我们的代码和数据可在https://github.com/VG-GUI-TASKER/VG-GUI-TASKER获取。
  notes_zh: 派生自论文：通过通用关键帧提取桥接视频问答与视频引导的智能体任务
