- id: paper-bridging-videoqa-and-video-guided-agentic-tasks-via-generali-2026
  name: Bridging VideoQA and Video-Guided Agentic Tasks via Generalized Keyframe Extraction
  description: Video understanding is a fundamental capability for multimodal intelligence,
    and recent Multimodal Large Language Models (MLLMs) have achieved remarkable performance
    on Video Question Answering (VideoQA) benchmarks. However, existing benchm...
  tags:
  - CV
  - AI
  links:
    paper: https://arxiv.org/abs/2606.29445v1
    code: https://github.com/VG-GUI-TASKER/VG-GUI-TASKER.
