  title_cn: 感知先于推理：面向高效可靠主动移动代理的预推理感知框架
  abstract_cn: 多模态大语言模型（MLLMs）显著推动了移动代理的发展，但主动移动辅助仍然具有挑战性，因为代理必须在决定*如何*协助之前先判断*何时*干预。现有系统通常将这两个决策统一在一个基于MLLM的流水线中，导致保守的干预过滤与全面的辅助生成之间的目标不一致，以及在代理应保持沉默时的冗余推理。为了解决这些限制，我们提出了**预推理感知框架（PRPF）**，这是一个基于感知先于推理的两阶段框架。PRPF引入了一个轻量级的多模态主动感知器（MPP）用于干预门控和上下文压缩，并仅在需要干预时激活主动代理推理器（PAR）。在ProactiveMobile基准上的实验表明，与ProactiveMobile基线相比，PRPF显著降低了误触发率（FTR），同时提高了成功率（SR）和推理效率。
  tldr_cn: 提出两阶段框架PRPF，包含轻量级感知器用于干预门控和推理器，减少误触发并提升效率。
