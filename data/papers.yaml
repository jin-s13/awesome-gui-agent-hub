  abstract_cn: 训练有能力的操作系统智能体需要同时捕捉结构化用户意图、多轮任务委派和基于执行的工具使用——这些属性在现有数据集中都不存在。我们提出ISE（意图-模拟-执行），一种三阶段合成范式，共同解决这些缺口。第一阶段通过一个4D框架（角色×领域×任务×复杂度）构建约50000个结构化意图；去重后，池中包含43956个独特意图，并在mpnet-base-v2嵌入（余弦核，q=1）上对整个池获得61.57的Vendi分数。第二阶段通过一个角色锁定的用户模拟器驱动多轮用户-智能体交互，该模拟器将每一轮用户交互基于实际执行结果，生成23132条完整轨迹，平均每个轨迹包含8.12个用户轮次和68.24个总对话轮次。第三阶段在实时、隔离的操作系统工作空间中执行每个工具调用，生成真实的故障恢复动态，而非模拟响应。在ISETrace上进行微调，使用标准协议在Qwen3-8B上，将ClawEval
    pass@1从19.3提升到37.7。该结果优于零样本GPT-4o和四倍大的Qwen3-32B基础模型。对第二阶段的消融实验证明，多轮模拟带来了大部分性能提升。我们在https://github.com/Valiere01/ISE-Trace发布所有源代码和数据集。
