  title_cn: LabOSBench：用于科学仪器控制的计算机使用代理基准测试
  abstract_cn: 当前的计算机使用基准测试主要关注虚拟化系统中的软件操作任务，而科学仪器场景需要协调控制复杂界面以及基于反馈的参数调整。然而，直接在物理高精度仪器上评估代理因成本高、安全风险、可访问性有限以及难以确保可重复评估而不可行。这促使需要一个模拟但真实的测试平台，既能保留科学仪器的操作挑战，又能实现可扩展且安全的基准测试。为此，我们引入了LabOSBench，这是一个基于一套基于网络的科学仪器模拟器构建的多模态GUI代理的挑战性基准测试。LabOSBench直接通过浏览器运行，避免了资源密集型的操作系统虚拟化，同时支持灵活的任务配置和基于执行的评估。具体来说，LabOSBench在八个仪器模拟器上构建了96个子任务，涵盖了从样品加载、对准、参数调整、数据采集到结果检查的工作流程。我们在子任务和端到端两个层面上评估了通用视觉语言模型、专用GUI代理模型以及高级代理框架。我们的实验表明，尽管现有代理可以完成许多结构化的GUI子任务，但它们仍然在基于反馈的操作和长周期工作流执行方面存在困难。总体而言，LabOSBench为推进计算机使用代理向科学仪器控制发展提供了一个可重复、低成本的测试平台。
  tldr_cn: LabOSBench是一个通过基于网络的模拟器评估计算机使用代理在科学仪器控制上的模拟基准测试。
  analysis_cn:
    innovations:
    - 引入了LabOSBench，这是一个基于网络科学仪器模拟器的多模态GUI代理基准测试，避免了资源密集型的操作系统虚拟化。
    - 在8个仪器模拟器上构建了96个子任务，涵盖了从样品加载、对准、参数调整、数据采集到结果检查的工作流程。
    - 在子任务和端到端层面上评估了通用视觉语言模型、专用GUI代理模型以及高级代理框架。
    methodology: LabOSBench提供了一套基于浏览器的科学仪器模拟器，支持灵活的任务配置和基于执行的评估。它在八个模拟器上定义了96个子任务，涵盖完整的实验工作流程。该基准测试通过让代理与这些网络界面交互来评估其性能，衡量其在结构化GUI操作和长周期任务上的表现。
    key_results: 现有代理可以完成许多结构化的GUI子任务，但在基于反馈的操作和长周期工作流执行方面存在困难。
    limitations:
    - 该基准测试使用基于网络的模拟仪器，可能无法完全复现真实高精度科学仪器的物理约束、安全风险和操作细节。
