  title_cn: CAPED：面向移动GUI代理的上下文感知隐私暴露防御
  abstract_cn: 基于截图的移动GUI代理可以通过与人类用户相同的视觉界面操作普通智能手机应用，但这种能力也将每一次屏幕观察变成了隐私边界。在正常任务执行过程中，截图可能暴露联系人、消息、照片、文件、推荐、健康提示等与用户请求无关的敏感上下文。我们将此问题称为偶然的视觉隐私暴露。现有防御措施难以解决这一问题：文本匿名化会遗漏许多视觉和推断线索，而通用隐私掩码可能移除GUI代理完成任务所需的证据和控件。本文提出了CAPED，一种面向移动GUI代理的上下文感知上传前暴露控制层。CAPED被设计为手机端保护层：在截图被释放到远程多模态代理之前，它提取任务需求，利用屏幕上下文作为隐私先验，解析可见UI元素，并选择性仅暴露当前任务所需的内容，同时掩盖偶然的私有内容。我们在AndroidWorld上评估CAPED的广泛任务实用性，并使用一个受控的28任务种子隐私评估作为测量工具，评估轨迹级别的偶然泄露。在该种子评估中，完整CAPED将成功条件下的加权种子泄露从原始截图下的0.766降低到0.268，同时保持高任务实用性。更广泛的AndroidWorld运行显示仍存在原型级别的实用性成本，但结果表明，任务驱动的选择性暴露可以在截图释放到远程GUI代理之前减少偶然的视觉泄露。
  tldr_cn: CAPED是一种上下文感知隐私防御方法，选择性暴露截图中的任务相关内容。
  analysis_cn:
    innovations:
    - 面向移动GUI代理的上下文感知上传前暴露控制层（CAPED），用于防止偶然的视觉隐私暴露
    - 任务驱动的选择性暴露方法，利用屏幕上下文作为隐私先验，仅掩盖偶然的隐私内容，同时保留任务相关的UI元素
    methodology: CAPED是一个手机端保护层，提取任务需求，利用屏幕上下文作为隐私先验，解析可见UI元素，并选择性仅暴露当前任务所需的内容。在AndroidWorld上评估任务实用性，并通过一个受控的28任务种子隐私评估来衡量轨迹级别的偶然泄露。
    key_results: 完整CAPED将成功条件下的加权种子泄露从原始截图下的0.766降低到0.268，同时保持高任务实用性；更广泛的AndroidWorld运行显示仍存在原型级别的实用性成本。
    limitations:
    - 在更广泛的AndroidWorld评估中仍存在原型级别的实用性成本，表明该方法可能尚未对所有任务完全优化。
    tech_stack: []
