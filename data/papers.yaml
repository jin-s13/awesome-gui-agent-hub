  title_cn: MIRAGE：面向Web代理漏洞检测的隐蔽视觉提示注入
  abstract_cn: 基于多模态大语言模型（MLLM）的Web代理为视觉浏览器自动化提供了实用且高精度的解决方案，然而它们固有地扩大了攻击面，引入了新型基于视觉的漏洞。现有的针对这些代理的对抗性评估通常依赖于宽松的威胁模型和视觉上明显的伪影。在本文中，我们研究了一种受限的漏洞检测场景：一个可信的Web平台，评估者仅作为无特权的第三方（如商家或广告商），控制一个语义合法且空间受限的区域（如广告位、赞助卡片或局部小部件）。在此现实约束下，我们提出了MIRAGE，一种新颖的视觉间接提示注入框架，用于定向下一步动作劫持。我们的方法利用扩散模型生成感知上良性的对抗图像，严格限制在可信服务提供商允许的攻击者控制边界内。为了在这种限制性设置中最大化攻击效果，我们引入了一种鲁棒优化技术，结合了曲率感知对抗扩散引导与稀疏暗像素残差扰动。针对主流MLLM
    Web代理框架（具体为SeeAct和OpenClaw）的全面评估，实证证明了我们提出的MIRAGE的有效性、真实性和隐蔽性。
