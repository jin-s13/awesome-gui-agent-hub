  title_cn: 'MIRAGE: 具有隐式推理和生成式世界模型的移动智能体'
  abstract_cn: 移动智能体日益需要从截图和语言目标操作日常应用，可靠的控制需要对屏幕可操作性、多步导航和未来状态变化进行推理。然而，许多智能体将这种计算外部化为冗长的文本推理链，这减慢了交互速度，增加了监督成本，并使部署复杂化。我们提出MIRAGE，一个从可见的文本推理轨迹中学习连续潜在推理表示的框架。MIRAGE将显式推理压缩为紧凑的隐藏状态，使智能体无需解码冗长的推理过程即可进行内部推理。它还引入了一个生成式世界模型目标：潜在推理向量与未来截图对齐，鼓励智能体在行动前预测即将出现的界面状态。这将隐藏计算同时转化为压缩的思维表示和前瞻性的环境动态模型。在推理时，MIRAGE在连续潜在空间中推理，减少了令牌生成，同时提高了执行效率。在AndroidWorld上，MIRAGE在4B消融实验中与显式思维链监督微调性能相当，但解码令牌预算降低了3-5倍，并比可比的指令微调基线提高了10.2个点；在AndroidControl上，它改进了动作定位，同时生成了超过75%更少的令牌。
  tldr_cn: MIRAGE从显式轨迹学习连续潜在推理，使移动智能体具备世界模型，高效减少令牌生成。
  analysis_cn:
    innovations:
    - 从可见的文本推理轨迹中学习连续潜在推理表示，使智能体无需解码冗长推理过程即可进行内部推理。
    - 引入生成式世界模型目标，将潜在推理向量与未来截图对齐，鼓励智能体预测即将出现的界面状态。
    - 在连续潜在空间中进行推理，大幅减少令牌生成，同时保持或提升任务性能。
    methodology: MIRAGE利用监督轨迹将显式思维链推理蒸馏为紧凑的连续潜在向量，并联合训练一个生成式世界模型，从这些向量预测未来截图。推理时，智能体在潜在空间中隐式推理，无需生成冗长的文本推理过程即可产生动作。
    key_results: 在AndroidWorld上，MIRAGE与显式思维链微调性能相当，解码令牌减少3-5倍，并比可比的指令微调基线提高10.2个点；在AndroidControl上，改进了动作定位，同时生成了超过75%更少的令牌。
