  title_cn: HANSEL：从Web智能体轨迹中提取面包屑以实现交互式验证
  abstract_cn: AI Web智能体可以执行复杂的多步骤任务，例如代表用户搜索产品、比较选项和进行购买。然而，验证智能体输出的正确性仍然困难。现有的透明度机制，包括完整的轨迹日志、源链接、屏幕截图和LLM生成的摘要，将验证视为被动阅读任务，使用户要么在大量日志中筛选，要么信任可能不忠实的解释。我们提出HANSEL（Highlighting
    Agent Navigation Steps as Evidence Links），一个从Web智能体轨迹中提取交互式、可验证证据的系统。给定一个智能体轨迹，HANSEL提取证据页面和片段，并将其呈现为可导航的交互式视图，同时保留相关页面状态（例如，应用的筛选条件、搜索查询和滚动位置），使用户能够验证智能体如何得出其答案。当智能体的答案无法追溯到任何访问过的页面时，HANSEL明确标记这一缺口。在AssistantBench和Online-Mind2Web的45个任务上的技术评估显示，HANSEL在识别证据页面方面达到了83.7%的精确率和88.8%的召回率，同时将轨迹体积减少了61.6%。在一项包含14名参与者的受控用户研究中，与标准智能体界面相比，HANSEL显著减少了任务完成时间和感知努力，同时参与者在可用性、验证便捷性和错误识别方面的评分显著更高。我们的结果表明，将验证重新定义为交互式活动，而非被动消费智能体解释，能够更高效地实现人类对AI智能体的监督。
  tldr_cn: HANSEL从Web智能体轨迹中提取交互式可验证证据，减少验证工作量并提升可用性。
  analysis_cn:
    innovations:
    - 从Web智能体轨迹中提取交互式、可验证的证据页面和片段，作为可导航的面包屑
    - 在交互式视图中保留相关页面状态（应用的筛选条件、搜索查询和滚动位置）以提供上下文
    - 当智能体的答案无法追溯到任何访问过的页面时，明确标记这一缺口
    methodology: HANSEL是一个系统，它处理Web智能体轨迹以提取证据页面和片段，并将其呈现为具有保留状态的交互式视图。该系统在AssistantBench和Online-Mind2Web的45个任务上进行了技术评估，使用了精确率、召回率和轨迹体积缩减指标，并在一个包含14名参与者的受控用户研究中，将HANSEL与标准智能体界面在任务完成时间、感知努力、可用性、验证便捷性和错误识别方面进行了比较。
    key_results: 技术评估显示精确率为83.7%，召回率为88.8%，轨迹体积缩减61.6%；用户研究表明任务完成时间和感知努力显著减少，在可用性、验证便捷性和错误识别方面的评分显著更高。
