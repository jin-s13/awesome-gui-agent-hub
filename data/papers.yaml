  abstract_cn: 当前操作系统提供的界面针对人类用户优化，而非人工智能代理。人类受益于像素、图标、窗口、视觉分组、鼠标移动和键盘快捷键；而人工智能代理则需要紧凑的语义状态、基于基础的操作和可靠的反馈。因此，许多计算机使用代理被迫解释截图、OCR输出和视觉裁剪，导致高令牌成本、视觉模糊、延迟和坐标不确定性。本文介绍了LUMOS（语言模型统一机器可读操作系统语义），一种位于人工智能代理与操作系统之间的语义交互层。LUMOS将原生可访问性元数据和浏览器UI结构转换为机器可读的语义蓝图，包含稳定的标识符、角色、名称、值、边界和操作可供性。它还支持实时语义指针定位，通过操作系统自动化API查询光标下或附近的UI元素。然后，LLM通过基于可访问性的观察-行动循环进行操作，使用受限的可见UI原语，而非特定于应用程序的脚本。LUMOS并不声称取代视觉代理；相反，它在操作系统已提供语义结构时减少对截图的依赖。这些结果表明了一条通往AI原生操作系统和机器可读交互层的路径。
  tldr_cn: LUMOS引入了一个语义操作系统层，将可访问性元数据转换为AI代理的机器可读蓝图，减少了对截图的依赖。
  analysis_cn:
    innovations:
    - 从原生可访问性元数据和浏览器UI结构中提取语义蓝图，提供稳定的标识符、角色、名称、值、边界和操作可供性。
    - 通过操作系统自动化API查询光标下或附近的UI元素，实现实时语义指针定位。
    - 为LLM代理提供基于可访问性的观察-行动循环，使用受限的可见UI原语，而非特定于应用程序的脚本或截图解释。
    methodology: LUMOS是一个语义交互层，将可访问性元数据和浏览器UI结构转换为机器可读的蓝图，包含稳定的标识符、角色、名称、值、边界和操作可供性。它通过操作系统自动化API支持实时语义指针定位，以识别光标处的UI元素。然后，LLM通过基于可访问性的观察-行动循环进行操作，使用受限的可见UI原语。
    key_results: LUMOS通过利用操作系统中已有的语义结构减少对截图的依赖，表明了一条通往AI原生操作系统和机器可读交互层的可行路径。
    limitations:
    - LUMOS并不取代视觉代理；它仅在操作系统已提供语义结构时减少对截图的依赖。
    - 依赖于可访问性元数据和浏览器UI结构的可用性，而这些可能并非在所有应用程序或操作系统中都存在。
