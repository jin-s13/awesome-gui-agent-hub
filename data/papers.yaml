    methodology: 作者创建了ProCUA-SFT数据集，包含从自动流水线生成的93,000条合成轨迹中提炼出的310万步级SFT样本。该流水线在真实桌面环境中合成基于实际内容（电子表格、演示文稿、OSWorld配置）的任务，通过二元前置条件检查验证任务可行性，并使用单一视觉语言模型（Kimi-K2.5）进行目标生成、前置条件判断和轨迹执行。每条轨迹被扩展为与推理时上下文布局匹配的步级前缀样本，该数据集用于微调UI-TARS
