- id: mirage-stealthy-visual-prompt-injection-for-vulnerability-d-2026
  title: 'MIRAGE: Stealthy Visual Prompt Injection for Vulnerability Detection in
    Web Agents'
  authors:
  - Xuelong Dai
  - Jianyu Ma
  - Boyang Ma
  - Biwei Yan
  - Yijun Yang
  - Yue Zhang
  abstract: 'Multimodal Large Language Model (MLLM)-based web agents provide practical,
    high-precision solutions for visual browser automation; however, they inherently
    expand the attack surface, introducing novel vision-based vulnerabilities. Existing
    adversarial evaluations targeting these agents frequently rely on permissive threat
    models and visually conspicuous artifacts. In this paper, we investigate a constrained
    vulnerability detection setting: a trusted web platform where the evaluator acts
    solely as an unprivileged third party, such as a merchant or advertiser, controlling
    only a semantically legitimate, spatially constrained region, such as an ad slot,
    a sponsored card, or a localized widget. Operating under these realistic constraints,
    we propose MIRAGE, a novel visual indirect prompt injection framework for targeted
    next-action hijacking. Our approach leverages diffusion models to generate perceptually
    benign adversarial images strictly confined to the attacker-controlled boundaries
    permitted by the trusted service provider. To maximize attack efficacy within
    such a restrictive setting, we introduce a robust optimization technique combining
    curvature-aware adversarial diffusion guidance with sparse, dark-pixel residual
    perturbations. Comprehensive evaluations against prominent MLLM web agent frameworks,
    specifically SeeAct and OpenClaw, empirically demonstrate the potency, realism,
    and stealth of our proposed MIRAGE.'
