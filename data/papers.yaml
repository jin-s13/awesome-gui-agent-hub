  title_cn: 'ComAct: 通过COM即行动范式重构专业软件操作'
  abstract_cn: 现有的计算机使用智能体在专业软件操作方面仍然存在根本性局限：基于GUI的智能体受困于脆弱的视觉定位和长程错误累积，而基于API的方法则面临异构协议和不可访问的商业接口问题。在本工作中，我们将组件对象模型（COM）识别为一种统一的可执行抽象，提出COM即行动（COM-as-Action）这一新范式，将专业软件交互重新定义为确定性的程序合成而非顺序视觉控制。为了在最苛刻的环境中验证这一范式，我们引入了ComCADBench，这是首个针对操作真实工业CAD软件的智能体基准。我们的实验揭示了显著的范式差距：前沿专有模型在基于GUI的交互下成功率接近零，而基于COM的执行则带来了立竿见影的显著提升。为了弥合语法正确性与几何精度之间尚存的差距，我们开发了ComActor，一种通过渐进式三阶段框架训练的自校正智能体，以及ComForge，一个用于在Windows容器中进行大规模训练的可扩展平台。大量实验表明，ComActor在ComCADBench上取得了最先进的性能，在基线崩溃的长程任务中表现出强大的韧性，并能泛化到外部CAD基准。
  tldr_cn: 提出COM-as-Action范式，引入ComCADBench基准，开发ComActor智能体。
