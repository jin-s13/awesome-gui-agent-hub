  title_cn: OSGuard：计算机使用代理安全性的基准测试
  abstract_cn: 计算机使用代理越来越多地通过是否完成真实的桌面和网页任务来评估。然而，仅凭任务成功可能遗漏代理通过不安全捷径达到名义目标的失败情况。我们提出了OSGuard，一个双粒度基准测试套件，用于在良性、不变的用户指令下评估计算机使用代理的安全性。OSGuard包含一个用于局部护栏决策的动作级基准和一个用于端到端评估的风险增强执行套件。动作级基准由情境化的提议动作组成，这些动作根据原始指令和当前界面状态被标记为允许、无关或不安全。执行套件包含手动构建的源自OSWorld的任务变体，其中原始任务仍然可完成，但环境被修改以引入潜在危险，如破坏性覆盖等。每个变体配以增强评估器，保留原始任务成功标准，同时添加显式的基于状态的安全不变性，使我们能够区分安全完成和满足名义任务目标的不安全完成。我们在OSGuard上的实验结果表明，当前的多模态护栏在孤立动作判断上表现良好，而风险增强执行则暴露了局部监督与可靠端到端安全性之间的剩余差距。这种双粒度设计能够更精确地诊断模型是否既能识别不安全的提议动作，又能在作为护栏部署时提高全任务安全性。
  tldr_cn: OSGuard是评估计算机使用代理安全性的双粒度基准，包含动作级护栏测试和风险增强执行任务。
  analysis_cn:
    innovations:
    - 用于安全性评估的双粒度基准：动作级局部护栏决策和风险增强的端到端执行套件。
    - 风险增强执行套件，修改OSWorld任务引入潜在危险，同时保持原始任务可完成，并配以基于状态的安全不变性以区分安全完成与不安全完成。
    - 动作级基准，包含情境化的提议动作，根据指令和界面状态标记为允许、无关或不安全。
    methodology: OSGuard包含一个动作级基准，其中提议动作根据原始指令和当前界面状态进行判断，以及一个风险增强执行套件，该套件基于修改后的OSWorld任务构建，引入潜在危险。每个执行变体保留原始任务成功标准，并添加显式的基于状态的安全不变性，从而能够分别测量任务成功和安全性。多模态护栏在两个粒度上进行了评估。
    key_results: 当前的多模态护栏在孤立动作判断上表现良好，但风险增强执行揭示了局部监督与可靠端到端安全性之间的差距。
