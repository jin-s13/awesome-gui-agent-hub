  title_cn: MedCUA-Bench：面向临床计算机使用代理的纯截图基准测试
  abstract_cn: 计算机使用代理可以自动化重复性的基于屏幕的临床工作，但它们在医疗图形用户界面中的可靠性尚未得到充分验证。现有基准测试侧重于通用网页或桌面任务，对医疗软件的覆盖不足——医疗软件需要领域知识，其UI设计与主流应用显著不同，缺乏公开测试环境，并且需要超越任务完成的安全性验证。我们提出了MedCUA-Bench，一个用于临床计算机使用代理的交互式基准测试。它涵盖10个医学领域的18个临床场景，这些场景基于真实产品手册和开源医疗系统重建，以捕捉真实的临床界面，同时避免许可和隐私限制。每个任务都配有配对的意图级和步骤级目标，以将临床推理与UI执行分离，并通过确定性检查器在任务完成和五个临床安全维度上进行评估。在23个代理中，最佳闭源模型达到54.2%的严格成功率，而所有模型在真实OpenEMR上的得分均低于9%。开源代理平均成功率仅为2.5%，最佳模型达到16.2%。MedCUA-Bench揭示了当前代理与可靠临床软件使用之间的差距，为未来研究提供了可复现的测试平台。
  tldr_cn: 介绍MedCUA-Bench，纯截图基准，评估18个医疗场景的临床代理，揭示可靠性巨大差距。
  analysis_cn:
    innovations:
    - 首次提出MedCUA-Bench，这是首个专门针对临床计算机使用代理的纯截图交互式基准测试。
    - 涵盖10个医学领域的18个临床场景，基于真实产品手册和开源医疗系统重建，以避免许可和隐私限制。
    - 使用配对的意图级和步骤级目标，将临床推理与UI执行分离。
    - 通过确定性检查器评估代理的任务完成情况和五个临床安全维度。
    methodology: MedCUA-Bench是一个交互式纯截图基准测试，包含10个医学领域的18个临床场景，基于真实产品手册和开源系统构建。每个任务包含配对的意图级和步骤级目标，代理通过确定性检查器在任务完成和五个临床安全维度上进行评估。该基准测试在23个代理上进行了测试，包括闭源和开源模型。
    key_results: 最佳闭源代理在MedCUA-Bench上达到54.2%的严格成功率，而所有模型在真实OpenEMR系统上的得分均低于9%。开源代理平均成功率仅为2.5%，最佳开源模型达到16.2%。
    limitations:
    - 该基准测试依赖于重建的界面而非真实的专有临床软件，可能无法捕捉所有现实世界的复杂性。
    - 与实时环境相比，纯截图模式可能限制代理可以执行的交互类型。
