  analysis:
    innovations:
    - 'PageMem: a structured page representation deterministically constructed from
      the DOM, exposing each page as a hierarchy of semantic sections with short summaries.'
    - Divide-and-conquer observation pipeline that skims section summaries and extracts
      details only from task-relevant regions.
    - Lightweight exploration and memory system that traverses each website once to
      build a reusable map of pages and element behaviors.
    - Compound action workflows that collapse common multi-step interactions into
      single agent actions, handling partial state changes automatically.
    methodology: 'WebChallenger is a web agent framework built on PageMem, a DOM-derived
      hierarchical representation of pages with semantic sections and summaries. It
      incorporates three mechanisms: a divide-and-conquer observation pipeline for
      selective attention, a one-time exploration and memory system for persistent
      website structure, and compound action workflows for procedural fluency. The
      system uses off-the-shelf open-weight models without fine-tuning and is evaluated
      on four web navigation benchmarks.'
    key_results: WebChallenger achieves 56.3% on WebArena, 48.7% on VisualWebArena,
      51.0% on Online-Mind2Web, and 70.9% on WorkArena, approaching the performance
      of frontier proprietary systems while being more cost-efficient.
    limitations: []
  title_cn: WebChallenger：一个可靠且高效的通用型网络代理
  abstract_cn: 自主网络导航对LLM代理而言仍然具有挑战性，而最强的通用系统依赖于专有推理模型，其推理成本对于此类代理最有用处的重复性任务来说过于高昂。我们认为这一差距并非源于模型能力不足，而是代理架构未能复制人类的三种认知优势：对相关页面区域的选择性注意、对网站结构的持久记忆，以及对常见交互模式的程序化流畅性。我们提出了WebChallenger，一个通过架构设计而非模型规模来弥补上述差距的网络代理框架，其核心是PageMem：一种从DOM确定性构建的结构化页面表示，将每个页面呈现为带有简短摘要的语义层级结构。在此共享基础上，我们构建了三种机制来镜像上述三种认知优势：一种分治观察管道，允许代理浏览章节摘要并仅从任务相关区域提取细节；一个轻量级探索与记忆系统，对每个网站进行一次遍历以构建可复用的页面和元素行为地图；以及复合动作工作流，将常见的多步交互压缩为单个代理动作，自动处理部分状态变化。由于这三种机制都基于PageMem运行，该框架无需特定网站适配器即可跨网站泛化。使用未经微调的现成开源模型，我们的系统在WebArena上达到56.3%，在VisualWebArena上达到48.7%，在Online-Mind2Web上达到51.0%，在WorkArena上达到70.9%，以极低的成本接近前沿专有系统的性能。我们的代码已发布在https://github.com/jayoohwang1/webchallenger
  tldr_cn: WebChallenger利用结构化页面记忆和认知启发机制，无需专有模型提升效率。
  analysis_cn:
    innovations:
    - PageMem：一种从DOM确定性构建的结构化页面表示，将每个页面呈现为带有简短摘要的语义层级结构。
    - 分治观察管道，浏览章节摘要并仅从任务相关区域提取细节。
    - 轻量级探索与记忆系统，对每个网站进行一次遍历以构建可复用的页面和元素行为地图。
    - 复合动作工作流，将常见的多步交互压缩为单个代理动作，自动处理部分状态变化。
    methodology: WebChallenger是一个基于PageMem构建的网络代理框架，PageMem是一种从DOM派生的层级化页面表示，包含语义章节和摘要。它集成了三种机制：用于选择性注意的分治观察管道、用于持久网站结构的一次性探索与记忆系统，以及用于程序化流畅性的复合动作工作流。该系统使用未经微调的现成开源模型，并在四个网络导航基准上进行评估。
    key_results: WebChallenger在WebArena上达到56.3%，在VisualWebArena上达到48.7%，在Online-Mind2Web上达到51.0%，在WorkArena上达到70.9%，以更低的成本接近前沿专有系统的性能。
