  title_cn: 朴素视觉记忆不足：GUI代理的失败模式研究
  abstract_cn: 图形用户界面（GUI）代理越来越多地被用于跨应用程序、网站和操作系统的复杂计算机任务自动化。为了提高其可靠性，近期工作引入了经验记忆，即代理检索先前的轨迹以指导相似状态下的决策。更近的方法进一步将这一思想扩展到视觉记忆，通过存储和检索过去交互中的截图，为代理提供比纯文本记忆更丰富的上下文信息。然而，视觉记忆在GUI代理中的效果仍未被充分理解：不清楚视觉记忆缓解了哪些失败，又加剧了哪些失败。为了系统分析视觉记忆的影响，我们引入了一个包含四种GUI代理失败（即认知失败、视觉状态误解、隐藏操作盲区和接地错误）的分类法，这些失败映射到感知-推理-动作管道的不同阶段。我们发现，前置全图像记忆对失败分布产生了分化效应：它减少了状态级失败，但加剧了动作级失败，并增加了隐藏操作盲区和接地错误。受此发现启发，我们提出了动作接地视觉记忆（AGMem），一种用于GUI代理的动作接地记忆框架。AGMem的核心思想是存储与成功动作或恢复密切相关的局部GUI区域的图像裁剪，而非存储完整截图。在OSWorld上的实验表明，AGMem的任务成功率比全图像记忆提高了33.3%。这些结果证明AGMem是GUI代理中视觉记忆的有效表示。
  tldr_cn: GUI代理失败模式研究：全图像记忆加剧动作错误，催生动作接地记忆框架AGMem。
