    innovations:
    - 'Argus benchmark: first large-scale cross-regime evaluation of post-hoc uncertainty
      quantification for GUI grounding agents, spanning 27 open-weight and 8 closed-source
      methods across multiple models and datasets.'
    - 'Systematic analysis of UQ ranking transferability, revealing selective transfer:
      stable within-model across datasets but degraded across model classes and observable
      interfaces.'
    - Introduction of conformal click regions with locally weighted disks for spatial
      safety, demonstrating radius shrinkage of 40–60% when plug-in UQ is calibrated.
    - Public release of per-item records, calibration/test splits, UQ scores, and
      analysis scripts to enable regime-aware UQ selection.
    methodology: The benchmark evaluates 27 post-hoc UQ methods (logit-based, sampling/consistency,
      hidden-state/density, attention-based, verbalised confidence, split-conformal)
      on 4 open-weight VLM agents across 4 GUI grounding datasets, plus 8 methods
      on 3 closed-source frontier vendors where internal states are inaccessible.
      Ranking stability is measured via Spearman correlation across datasets, models,
      and interfaces, and conformal prediction constructs locally weighted click regions
      to assess spatial safety.
    key_results: Within-model UQ ranking transfer across datasets is strong (Spearman
      ρ up to 0.969), but cross-tier transfer to closed-source models averages only
      +0.08, necessitating target-specific reranking. Hidden-state and density methods
      are the most stable open-weight family; conformal click regions shrink radii
      by 40–60% with calibrated UQ but suffer coverage degradation under calibration-test
      or interface mismatch.
    limitations:
    - Benchmark is restricted to single-step executable GUI grounding, not multi-step
      agent trajectories.
    - Cross-model and cross-interface UQ ranking transfer is weak, so findings do
      not generalize across model classes without re-evaluation.
    - Conformal coverage degrades under distribution shift (calibration-test or interface
      mismatch), limiting deployment robustness.
    - Only post-hoc UQ methods are considered; training-based or hybrid approaches
      are not evaluated.
  title_cn: 计算机使用代理的不确定性量化：跨视觉语言模型和GUI基础数据集的基准测试
  abstract_cn: 计算机使用代理将视觉语言模型（VLM）的预测转化为可执行的GUI点击，因此可靠的 uncertainty 估计对于拒绝、校准、误严重性排序和空间安全区域至关重要。然而，关于这些代理的后验不确定性量化（UQ）的证据分散在孤立的模型和数据集对中，使得当代理、基准或可观察接口发生变化时，UQ排名是否保持稳定尚不清楚。我们提出了
    Argus，一个用于单步可执行GUI基础中后验UQ的跨体制基准测试：一个包含4个VLM代理和4个数据集的27种方法开源权重矩阵，以及一个跨3个前沿供应商的8种方法闭源矩阵，其中logits、隐藏状态和注意力图不可用。评估的方法涵盖基于logits的分数、采样和一致性度量、隐藏状态和密度估计器（Mahalanobis、SAPLMA）、基于注意力的分数、P(True)和口头化置信度提示，以及分裂共形预测。主要发现是选择性迁移：对于固定模型，UQ排名跨数据集稳定，但跨模型类别和可观察接口时下降。隐藏状态和密度方法是开源权重中最稳定的家族，而CoCoA-1MCA、Focus、基于采样的分数和口头化自我评估在特定体制中胜出。模型内排名迁移很强（Spearman
    rho高达0.969），但跨层级迁移到闭源供应商平均仅为+0.08，因此闭源UQ应在目标上重新排名而非外推。共形点击区域显示分数级区分不足以部署：当插件UQ被校准时，局部加权圆盘半径缩小40-60%，但在校准-测试或接口不匹配下覆盖度下降。我们发布了逐项记录、校准/测试分割、UQ分数和分析脚本，以支持GUI代理中基于体制的UQ选择。
  tldr_cn: Argus跨4个VLM代理和4个数据集评估GUI基础后验UQ，发现UQ排名选择性迁移。
  analysis_cn:
    innovations:
    - Argus基准测试：首个针对GUI基础代理的后验不确定性量化的大规模跨体制评估，涵盖跨多个模型和数据集的27种开源权重和8种闭源方法。
    - 系统分析UQ排名可迁移性，揭示选择性迁移：模型内跨数据集稳定，但跨模型类别和可观察接口时下降。
    - 引入带有局部加权圆盘的共形点击区域用于空间安全，证明当插件UQ校准时半径缩小40-60%。
    - 公开发布逐项记录、校准/测试分割、UQ分数和分析脚本，以支持基于体制的UQ选择。
    methodology: 该基准测试评估了27种后验UQ方法（基于logits、采样/一致性、隐藏状态/密度、基于注意力、口头化置信度、分裂共形）在4个开源权重VLM代理和4个GUI基础数据集上，以及8种方法在3个闭源前沿供应商上（内部状态不可访问）。通过Spearman相关性跨数据集、模型和接口测量排名稳定性，并使用共形预测构建局部加权点击区域以评估空间安全性。
    key_results: 模型内UQ排名跨数据集迁移很强（Spearman ρ高达0.969），但跨层级迁移到闭源模型平均仅为+0.08，需要目标特定重新排名。隐藏状态和密度方法是开源权重中最稳定的家族；共形点击区域在校准UQ下半径缩小40-60%，但在校准-测试或接口不匹配下覆盖度下降。
    limitations:
    - 基准测试仅限于单步可执行GUI基础，而非多步代理轨迹。
    - 跨模型和跨接口的UQ排名迁移较弱，因此发现不能在没有重新评估的情况下推广到不同模型类别。
    - 共形覆盖度在分布偏移（校准-测试或接口不匹配）下下降，限制了部署鲁棒性。
    - 仅考虑后验UQ方法，未评估基于训练或混合方法。
