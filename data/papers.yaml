      alone. Our approach leverages the fact that untrusted content typically flows
      through dedicated rendering paths (e.g., comment components, review widgets)
      that leave recognizable structural signatures in the DOM hierarchy, tag types,
      and class attributes. By analyzing these cues, the LLM outputs CSS selectors
      that identify untrusted regions. DOM sanitization.
