  title_cn: GUI vs. CLI：纯屏幕与技能中介的计算机使用代理中的执行瓶颈
  abstract_cn: 计算机使用代理可以通过图形界面或程序化命令界面执行软件任务，但现有评估将交互模态与任务、初始状态、验证器和允许操作的差异混为一谈。我们引入了一个匹配的执行层基准测试，包含18个应用和12个工作流类别的440个桌面任务，其中纯屏幕GUI代理和技能中介的CLI代理接收相同的目标、状态和最终状态验证器，同时限制使用模态原生操作。在此受控设置下，最强的GUI代理达到59.1%的完全通过率，优于最强的原始技能CLI代理（48.2%）；然而，验证器引导的技能增强将CLI成功率提升至69.3%，表明CLI的不足主要源于技能覆盖不完整，而非模型能力本身。这些结果表明GUI和CLI暴露了不同的执行瓶颈：GUI代理受限于长周期工作流中的可靠接地交互，而CLI代理受限于其技能接口的覆盖范围和可扩展性。
  tldr_cn: 受控基准测试显示GUI代理在桌面任务中优于CLI代理，但CLI通过技能增强提升，揭示了不同的执行瓶颈。
