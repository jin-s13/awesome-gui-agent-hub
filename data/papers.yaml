  title_cn: 'UI2App: 在可执行Web应用生成中基准测试视觉交互推理'
  abstract_cn: 大语言模型在网页生成方面展现出日益增强的能力。然而，现有文本驱动方法依赖复杂提示，对用户提出较高要求，且在页面布局和跨页面视觉连贯性方面表现有限。以图像为驱动的范式（将UI截图作为输入）更贴近实际开发流程。但当前基准主要关注视觉保真度，缺乏对生成产物交互能力的系统评估。为解决这一问题，我们提出UI2App——首个针对交互推理的基准测试，即仅从截图恢复应用行为的能力，无需任何文本或行为指导。UI2App包含327张截图，按45个状态连贯截图集分组，对应可运行的多路由Web应用。我们设计了一个端到端流水线，从四个维度评估每个产物：可执行性、导航可达性、视觉保真度和交互推理。交互指标根据功能正确性和状态管理复杂度评估推断的交互，奖励任何有效实现而非匹配单一参考。对六个前沿视觉-语言模型的实验揭示了视觉重建与交互实现之间的显著能力差距：视觉保真度领先者仅获得7.5的IIS分数，排名第四，落后于IIS领先者5.2倍。跨页面状态等高复杂度交互仍是普遍瓶颈，半数评估模型在此维度得分为零。总体而言，结果表明从静态截图推断完整交互行为对模型而言仍是一项关键挑战。
