  title_cn: OpenDevin：面向通用型AI软件开发者的开放平台
  abstract_cn: 软件是人类拥有的最强大的工具之一；它允许熟练的程序员以复杂而深刻的方式与世界互动。同时，得益于大型语言模型（LLMs）的改进，能够与其周围环境交互并产生影响的AI智能体也迅速发展。在本文中，我们介绍了OpenDevin，一个用于开发强大且灵活的AI智能体的平台，这些智能体以类似于人类开发者的方式与世界交互：编写代码、与命令行交互以及浏览网页。我们描述了该平台如何支持新智能体的实现、与沙盒环境的安全交互以执行代码、多个智能体之间的协调以及评估基准的整合。基于我们目前整合的基准，我们在15个具有挑战性的任务上对智能体进行了评估，包括软件工程（例如SWE-Bench）和网页浏览（例如WebArena）等。OpenDevin在宽松的MIT许可下发布，是一个跨越学术界和工业界的社区项目，拥有来自160多位贡献者的超过1300次贡献，并将持续改进。
  tldr_cn: OpenDevin：开放平台，构建通过代码、命令行和网页浏览交互的AI智能体，评估软件工程和网页任务。
  analysis_cn:
    innovations:
    - 用于AI智能体的开放平台，这些智能体像人类开发者一样交互：编写代码、使用命令行和浏览网页。
    - 支持安全的沙盒代码执行、多智能体协调以及评估基准的整合。
    methodology: 我们介绍了OpenDevin，一个使智能体能够通过代码、命令行和网页浏览与环境交互的平台，具有沙盒执行和多智能体支持。我们在来自SWE-Bench和WebArena等基准的15个任务上评估了智能体。
    key_results: 智能体在涵盖软件工程和网页浏览的15个具有挑战性的任务上进行了评估，展示了该平台的多功能性，但摘要中未提供具体的性能指标。
