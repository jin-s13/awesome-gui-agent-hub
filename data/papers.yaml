    - Introduction of FraudSMSWalker, a controlled benchmark for URL-masked SMS-to-webpage
      fraud judgment that suppresses reputation shortcuts (URLs, hosts, domains, IPs,
      redirects, reputation metadata).
    - Inclusion of hard benign cases containing login, payment, verification, or account-management
      elements that mimic scam flows but are legitimate.
    - Evaluation of web agents under masked browser-agent protocols with URL-visibility
      ablation studies.
    methodology: We construct FraudSMSWalker, a benchmark of 699 bilingual SMS-to-webpage
      chains (332 fraudulent, 367 benign) across ten service scenarios. Models receive
      only SMS context and sanitized webpage evidence, with all URL, host, domain,
      IP, redirect, and reputation metadata withheld. Nine web agents are evaluated
      under these masked protocols, and URL-visibility ablations are performed.
    key_results: Current agents detect suspicious cues but struggle to preserve benign
      recall and often produce positive predictions that are weakly supported by the
      observed webpage evidence.
    limitations:
    - The benchmark artificially suppresses URL and reputation cues, which may not
      reflect real-world detection where such shortcuts are available.
    - The dataset is limited to 699 cases and ten service scenarios, potentially restricting
      generalizability.
    - Only nine web agents are evaluated, which may not capture the full range of
      agentic LLM behaviors.
  title_cn: 'FraudSMSWalker: 面向短信到网页欺诈检测的智能体大型语言模型基准测试'
  abstract_cn: 短信欺诈日益跨渠道化：一条消息将用户引导至网页，最终风险取决于短信声明与页面内容及请求用户操作的一致性。然而，现有评估要么专注于仅消息的钓鱼短信分类，要么暴露URL和域名线索，使模型能够依赖信誉捷径。为填补这一空白，我们引入了FraudSMSWalker，一个用于URL掩码的短信到网页欺诈判断的受控基准。FraudSMSWalker包含699条双语链，包括332个欺诈案例和367个良性案例，涵盖十个服务场景。模型可见输入包括短信上下文和经过净化的网页证据，而原始URL、主机、域名、IP、重定向和信誉元数据均被隐藏。该基准进一步包含困难良性案例，其页面包含登录、支付、验证或账户管理元素，这些元素在服务上下文中是合理的，但也出现在诈骗流程中。我们在掩码浏览器-智能体协议下评估了九个网络智能体，并进行了URL可见性消融实验。结果表明，当前智能体能够检测可疑线索，但在保持良性召回方面存在困难，并且常常产生与观察到的网页证据支持较弱的正向预测。这些发现将FraudSMSWalker定位为一个基准，用于衡量网络智能体在直接信誉捷径被抑制时，能否做出既准确又有证据依据的欺诈判断。相关代码和数据集可在匿名链接
    https://anonymous.4open.science/w/FraudMessageWalker-Bench 获取。
  tldr_cn: 无信誉捷径下短信到网页欺诈检测基准，揭示智能体良性召回困难。
  analysis_cn:
    innovations:
    - 引入FraudSMSWalker，一个用于URL掩码的短信到网页欺诈判断的受控基准，抑制了信誉捷径（URL、主机、域名、IP、重定向、信誉元数据）。
    - 包含困难良性案例，这些案例包含登录、支付、验证或账户管理元素，这些元素模仿诈骗流程但却是合法的。
    - 在掩码浏览器-智能体协议下评估网络智能体，并进行URL可见性消融研究。
    methodology: 我们构建了FraudSMSWalker，一个包含699条双语短信到网页链（332条欺诈，367条良性）的基准，涵盖十个服务场景。模型仅接收短信上下文和经过净化的网页证据，所有URL、主机、域名、IP、重定向和信誉元数据均被隐藏。在掩码协议下评估了九个网络智能体，并进行了URL可见性消融实验。
    key_results: 当前智能体能够检测可疑线索，但在保持良性召回方面存在困难，并且常常产生与观察到的网页证据支持较弱的正向预测。
    limitations:
    - 该基准人为抑制了URL和信誉线索，这可能无法反映现实世界中这些捷径可用的检测情况。
    - 数据集仅限于699个案例和十个服务场景，可能限制了泛化能力。
    - 仅评估了九个网络智能体，可能无法涵盖智能体大型语言模型行为的全部范围。
