  title_cn: Demo2Tutorial：从人类体验到多模态软件教程
  abstract_cn: 数字环境中的人类体验提供了大量未经探索的、真实且未经修剪的交互资源，其中包含丰富的过程性知识。我们提出了Demo2Tutorial框架，该框架将通过屏幕录制和交互日志捕获的人类体验转化为结构化的多模态软件教程，用于教授人类和智能体。Demo2Tutorial首先通过专用记录器收集人类体验，然后使用多模态动作解析器解析原始体验，重建感知、动作和意图。接着，步骤规划器将这些步骤抽象为表示目标和步骤的层次化任务图。最后，教程合成器将解析后的体验转化为结构化的、可复用的图像-文本指令。我们在一个基于官方软件文档的新基准上评估了教程生成质量。我们进一步证明，这种精炼表示有益于（i）人类学习，通过自动生成多模态教程，以及（ii）智能体学习，通过改进下游GUI智能体的规划和泛化能力。实验表明，Demo2Tutorial生成的教程质量超越人工编写的教程，并显著优于基线方法，同时能够加快人类任务完成速度并提升GUI智能体规划能力，证明从人类经验中提炼的结构化教程可以作为有效的知识表示，促进人类学习和智能体能力的发展。代码和数据将在https://github.com/showlab/Demo2Tutorial上提供。
  tldr_cn: Demo2Tutorial将人类屏幕录制转化为结构化多模态教程，提升人类学习和GUI代理规划。
  analysis_cn:
    innovations:
    - 从原始人类屏幕录制和交互日志自动生成多模态软件教程的框架
