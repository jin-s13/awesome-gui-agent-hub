- id: macarena-benchmarking-computer-use-agents-on-an-online-maco-2026
  title: 'MacArena: Benchmarking Computer Use Agents on an Online macOS Environment'
  authors:
  - Victor Muryn
  - Maksym Shamrai
  - Sofiia Mazepa
  - Yehor Khodysko
  abstract: 'Computer-use agents (CUAs) operate graphical user interfaces (GUIs) through
    vision and control primitives, and their capabilities have advanced rapidly, driven
    in part by standardized online evaluation benchmarks such as OSWorld, which serve
    both as evaluation tools and as training environments for reinforcement learning.
    However, macOS remains underserved in this landscape: the only existing benchmark,
    macOSWorld, covers a narrow slice of first-party applications with simpler tasks,
    and runs on x86 virtual machines incompatible with Apple Silicon. We introduce
    MacArena, a benchmark of 421 manually verified tasks spanning 50 applications
    that combines a curated port of OSWorld tasks, content sourced from macOSWorld,
    and 49 new macOS-native tasks, all running on Apple''s native Virtualization framework
    on Apple Silicon. We argue that macOS presents distinct GUI challenges beyond
    what Linux-based benchmarks capture, and our evaluation supports this claim: strong
    model performance on existing benchmarks can reflect familiarity with task distributions
    rather than genuine cross-platform GUI competence. Notably, model rankings invert
    between ported and macOS-native tasks, with a leading model trailing by over 26%
    on the MacArena subset, suggesting that macOS poses a genuinely harder environment
    for current GUI agents.'
