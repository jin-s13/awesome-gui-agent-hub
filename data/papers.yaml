- id: plover-steering-gui-agents-through-plan-centric-interaction-2026
  title: 'Plover: Steering GUI Agents through Plan-Centric Interaction'
  authors:
  - Madhumitha Venkatesan
  - Shicheng Wen
  - Jiajing Guo
  - Jorge Piazentin Ono
  - Liu Ren
  - Dongyu Liu
  abstract: Graphical user interface (GUI) automation remains challenging in real-world
    environments, where dynamic layouts, unexpected dialogs, and evolving interface
    states can cause autonomous agents to drift from user intent. Recent vision-based
    multimodal agents improve flexibility by operating directly over screenshots and
    natural language instructions, but planning and adaptation often remain internal,
    limiting users' ability to inspect, supervise, or correct system behavior. We
    present Plover, a plan-centric vision-based GUI automation system that externalizes
    task plans and replanning as persistent, inspectable, and revisable artifacts.
    Through a planner--executor architecture, Plover supports explicit supervision
    of evolving execution, localized correction through editable plans, natural-language
    guidance, and screenshot-grounded interventions, while preserving prior progress
    during repair. A formative study with six participants informed the interaction
    design. We then evaluate Plover through benchmark failure-case repair and scenario-based
    workflow analyses. Our results show that many autonomous GUI-agent failures are
    structurally repairable when plans remain visible and interventions are localized,
    and that explicit replanning helps make GUI automation more transparent, controllable,
    and adaptable.
