    - 结合曲率感知对抗扩散引导与稀疏暗像素残差扰动的鲁棒优化技术
    methodology: MIRAGE利用扩散模型在可信Web平台上严格限于攻击者控制的区域内制作对抗图像。采用结合曲率感知引导和稀疏暗像素扰动的鲁棒优化方法以最大化攻击效果。该框架针对MLLM
