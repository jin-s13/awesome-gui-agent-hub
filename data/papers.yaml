    methodology: HiViG 是一个多模态评判模型，在真实 GUI 轨迹上训练，将过去的交互抽象为紧凑的宏观动作历史，并通过视觉基础评估动作。在测试时，它集成到策略决策循环中，提供历史摘要和视觉基础评判，在执行前拦截有缺陷的动作。
    key_results: HiViG 在网页、移动和桌面基准测试中，相比最强基线，将 Qwen3-VL-32B 的平均成功率提高了 5.8%，将 Gemini-3-Flash
      的平均成功率提高了 9.0%，消融实验表明宏观动作历史和视觉基础评判对性能都至关重要。
