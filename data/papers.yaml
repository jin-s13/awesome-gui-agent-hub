  abstract_cn: 计算机使用代理正逐渐成为能干的操作软件，但其与桌面应用的接口往往仍是一个脆弱的运动层：它们查看截图、预测坐标、点击，然后希望可见状态按预期改变。这会将目标定位、动作执行和结果验证合并为单一模糊操作。我们提出Tactile，一个开源工具层，为代理提供更可靠的“双手和双脚”以进行桌面操作。Tactile将异构UI证据——操作系统无障碍语义、基于OCR的文本和视觉回退区域——转换为基于动作的界面状态：紧凑的目标候选，包含来源标签、角色或文本、状态、几何、可执行功能以及验证线索。代理通过观察-定位-执行-验证循环操作，优先使用原生语义动作（当可用时），在可见文本为最佳证据时回退到基于OCR的坐标，并保留完整溯源以支持重放和故障归因。在macOSWorld风格的任务上，添加Tactile将Codex
