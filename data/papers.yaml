  abstract_cn: 隐藏状态探针——在冻结的视觉语言模型内部激活上训练的线性分类器——已成为一种有吸引力的评估工具，用于在多模态计算机使用代理发出受损动作之前标记间接提示注入（IPI）。我们通过一个单骨干警示性案例研究（Qwen2.5-VL-7B在Mind2Web上，教师强制回放）论证，在干净-攻击分割上的高探针AUC本身并不能作为恶意内容检测的证据。两种事后诊断方法——文本侧注入的配对构造标量基线，以及覆盖层上的同步骤干扰匹配视觉控制——并不允许对标题进行无条件的恶意内容解读，同时为部分语义解读留下空间。我们将这些诊断方法打包为一个候选控制集，并附上报告启发式方法，说明高干净-攻击AUC能证明什么、不能证明什么。标签指示的是注入表面的存在，而非攻击成功；超越此骨干和基准的泛化性仅为推测。
