  abstract_cn: 针对提示注入攻击提供安全保障的防御措施依赖于可信指令与不可信数据之间的严格隔离。在工具使用API等基于文本的环境中，这种分离自然存在：代理可以通过接口定义进行推理，而无需处理不可信内容。将这些保障扩展到Web代理面临一个根本性挑战：为了感知和交互，Web代理必须首先观察渲染后的页面，而页面中混合了可信与不可信内容。这种结构性纠缠消除了安全保证所依赖的信任边界，破坏了Web代理的可证明防御。在本文中，我们提出了不可信内容屏蔽（UCM），一种简单有效的方法，可在Web环境中恢复这一边界。我们利用一个关键的结构性洞察：网页的文档对象模型（DOM）编码了足够的信息，可以在不读取内容的情况下区分可信区域与不可信区域。我们的框架通过以下方式利用这一点：在代理接触到不可信区域之前将其屏蔽，并通过具有严格权限分离的沙箱接口路由交互，从而使代理能够观察和交互其环境，同时与对抗性内容隔离。代码已公开。
