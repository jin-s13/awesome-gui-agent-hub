  has_real_world: true
  title_cn: 'DeepSearch-World: 可验证环境中深度搜索代理的自蒸馏方法'
  abstract_cn: 训练工具使用型智能体从自身经验中改进仍然具有挑战性，因为监督式微调依赖于固定的教师蒸馏轨迹，而稀疏奖励强化学习为长程交互提供了弱监督。我们提出DeepSearch-Evolve，一个基于DeepSearch-World构建的网页智能体自蒸馏框架。DeepSearch-World是一个确定且可验证的环境，配备可复现的搜索和页面阅读工具。该环境包含42万个从实体级随机游走构建的多跳问答任务，并支持对自演化有用的关键智能体认知行为，包括进度验证、基于事实的反思和失败恢复。DeepSearch-Evolve通过迭代执行轨迹生成、过滤、数据混合和微调来训练更强的智能体。在未从更强模型蒸馏的情况下，DeepSearch-World-9B在开源智能体中取得了竞争力的表现：在BrowseComp上达到31.2%，在GAIA上达到61.5%，在HotpotQA上达到93.4%，这表明可验证环境能够支持长程网页智能体的可扩展自演化。我们将发布环境、42万训练池、验证集、模型和代码，以促进未来关于自改进深度搜索代理的研究。
  tldr_cn: 基于可验证环境与42万多跳问答的自蒸馏框架，使智能体在基准测试中表现优异。
