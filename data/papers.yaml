  analysis:
    innovations:
    - 'CUA-HandCrafted benchmark: 793 episodes, 24 multi-step web tasks, 56 hand-crafted
      attack templates, 8 attack families, 4 system-prompt configurations'
    - Reproducibility audit showing that hand-crafted prompt-injection templates fail
      against current frontier CUAs (0% ASR), with resistance traced to model weights
      via prompt ablation
    - 'Cross-domain comparison revealing domain-conditioned safety: browser-hardened
      models remain vulnerable to skill-injection in coding agents (up to 100% ASR)'
    - Argument that literature's high ASR stems from RL-optimized injection text rather
      than attack categories, and that unreleased optimized strings make published
      numbers unreproducible
    methodology: The authors construct a public benchmark of 793 browser-agent episodes
      combining 24 multi-step web tasks with 56 hand-crafted attack templates across
      8 families and 4 system-prompt configurations. They evaluate Claude Sonnet 4.6
      and GPT-5.4 on multi-step attack success rate, perform a prompt ablation to
      localize resistance, and cross-reference results on a coding-agent benchmark
      (SkillBench) to test domain generalization.
    key_results: Against frontier CUAs, hand-crafted multi-step attacks achieve 0/140
      success (Clopper-Pearson 95% upper bound 2.60%), with resistance residing in
      model weights; however, the same models fall to hand-crafted skill-injection
      on coding tasks at up to 100% success, demonstrating domain-conditioned safety.
    limitations:
    - Only hand-crafted attack templates were tested; RL-optimized injection strings
      from prior work were not reproduced, so the audit does not directly measure
      the impact of optimized text.
    - Safety hardening is domain-conditioned and does not generalize beyond the browser
      surface, as shown by high vulnerability in the coding domain.
    - Benchmark is limited to 24 web tasks and one coding-domain cross-reference,
      potentially missing other CUA modalities or attack surfaces.
  title_cn: 前沿计算机使用代理中的领域条件安全性：一个793轮次的浏览器基准测试、一个编码领域交叉参考以及近期红队测试的可重复性审计
  abstract_cn: 近期关于计算机使用代理（CUA）的红队测试论文报告了提示注入攻击成功率（ASR）为42-98%，但这些 headline 数字集中在已退役的模型以及每篇论文面板中最脆弱的模型上。我们询问这些技术（以手工制作的模板形式复现）是否仍然对当前前沿CUA有效。我们发布了CUA-HandCrafted，一个公开基准测试，包含793个轮次，涵盖24个多步骤网页任务、56个攻击模板、8个攻击家族和4个系统提示配置。针对Claude
    Sonnet 4.6和GPT-5.4，我们测量到0/140的多步骤攻击成功（Clopper-Pearson 95%置信上限2.60%）；提示消融表明这种抵抗力存在于模型权重中。然而，这并不泛化：在姊妹编码代理基准测试（SkillBench）上，相同的权重对手工制作的技能注入攻击成功率高达100%。我们认为文献中的高ASR主要归因于RL优化的注入文本而非攻击类别，并且前沿安全加固是领域条件的，特定于被重点攻击的浏览器表面。报告技术而不发布优化字符串，或将浏览器领域安全性外推到其他CUA模态，使得已发表的ASR数据不可重复。
  tldr_cn: 793轮次基准测试：前沿CUA在浏览器任务上抵抗手工提示注入，但在编码任务上失败，显示领域条件安全。
  analysis_cn:
    innovations:
    - CUA-HandCrafted基准测试：793个轮次、24个多步骤网页任务、56个手工制作的攻击模板、8个攻击家族、4个系统提示配置
    - 可重复性审计显示，手工制作的提示注入模板对当前前沿CUA无效（0% ASR），通过提示消融将抵抗力追溯到模型权重
    - 跨领域比较揭示了领域条件安全性：浏览器加固的模型在编码代理中仍然容易受到技能注入攻击（高达100% ASR）
    - 论证文献中的高ASR源于RL优化的注入文本而非攻击类别，并且未发布的优化字符串使得已发表的数据不可重复
    methodology: 作者构建了一个包含793个浏览器代理轮次的公开基准测试，结合了24个多步骤网页任务、56个手工制作的攻击模板（涵盖8个家族和4个系统提示配置）。他们评估了Claude
      Sonnet 4.6和GPT-5.4在多步骤攻击成功率上的表现，进行了提示消融以定位抵抗力，并在编码代理基准测试（SkillBench）上交叉引用结果以测试领域泛化能力。
    key_results: 针对前沿CUA，手工制作的多步骤攻击实现了0/140的成功率（Clopper-Pearson 95%置信上限2.60%），抵抗力存在于模型权重中；然而，相同的模型在编码任务上对手工制作的技能注入攻击成功率高达100%，展示了领域条件安全性。
    limitations:
    - 仅测试了手工制作的攻击模板；未复现先前工作中的RL优化注入字符串，因此审计未直接衡量优化文本的影响。
    - 安全加固是领域条件的，不能泛化到浏览器表面之外，如编码领域的高脆弱性所示。
    - 基准测试仅限于24个网页任务和一个编码领域交叉参考，可能遗漏了其他CUA模态或攻击面。
