  title_cn: 'SlimSearcher: 通过自适应奖励门控训练效率感知的网络代理'
  abstract_cn: 深度研究代理在复杂信息搜索任务中展现了卓越的能力，但这种能力伴随着高昂的计算成本。受以准确性为导向的训练范式驱动，当前模型采用蛮力策略，其特征是盲目依赖工具和表演性推理——生成长而冗余的轨迹，这些轨迹远非解决这些任务所必需，导致浪费的工具调用和过多的令牌消耗。为了克服这一效率陷阱，我们提出了SlimSearcher，一个原则性框架，它在监督微调（SFT）和强化学习（RL）两个阶段推动了准确性与计算成本之间的帕累托前沿。在SFT阶段，SlimSearcher采用帕累托高效过滤来提炼既成功又经济的轨迹，引导模型走向内在效率感知的搜索行为。在RL阶段，我们引入了自适应奖励门控，一种动态奖励塑造机制，它在采样队列中评估相对工具和令牌效率。通过将这些自适应效率指标与严格正确性门控级联，我们的方法有效避免了与绝对惩罚相关的简洁性偏差，并缓解了奖励黑客攻击。在包括GAIA、BrowseComp和XBenchDeepSearch在内的长时域基准上的大量实验表明，SlimSearcher将平均工具调用轮次减少了17%-58%，同时保持或提高了准确性。
  tldr_cn: SlimSearcher通过帕累托高效过滤和自适应奖励门控训练效率感知代理，减少工具调用并保持准确性。
