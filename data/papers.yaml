  title_cn: 从失败中学习：计算机使用代理的推理时自我改进
  abstract_cn: 计算机使用代理利用多模态大语言模型（MLLM）操作计算机并完成任务，因其实用性和多功能性而受到广泛关注。开发这些代理的一个主要挑战是收集大规模、高质量的轨迹数据。标准方法通过自我改进循环生成合成数据：将代理置于可验证环境中，并迭代地在其成功轨迹上进行微调。尽管有效，但这种范式仅利用成功轨迹而丢弃失败轨迹，尽管失败包含了模型弱点的丰富信息。在本工作中，我们探索了一种互补的失败驱动自我改进循环，这是一种以数据为中心的范式，将失败轨迹转化为代理改进。具体而言，我们使用LLM诊断失败模式、提出推理时解决方案并生成代码补丁——经人工轻度验证——以升级代理。我们使用最先进的OpenCUA-72B模型在OSWorld基准上验证了该方法，将成功率从42.3%提升至48.9%，提升了6.6个百分点，且无需额外训练成本，仅需适度的推理开销。我们的结果表明，失败驱动自我改进是成功驱动管道的可行补充，能够实现更高效的代理改进。
  tldr_cn: 失败驱动自我改进循环，用LLM诊断和代码补丁提升OSWorld成功率6.6个百分点。
