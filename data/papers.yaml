    - MemGUI-3K dataset with 2,956 trajectories annotated with ConAct actions for
      supervised training and offline analysis
    - MemGUI-Agent architecture integrating ConAct into an end-to-end long-horizon
      mobile GUI agent
    methodology: MemGUI-Agent uses Context-as-Action (ConAct) where the policy emits
      both UI actions and context management actions, maintaining three structured
      context fields instead of passive history accumulation. A dataset MemGUI-3K
      (2,956 trajectories) with ConAct annotations is constructed, and an 8B model
      is trained via supervised fine-tuning to produce MemGUI-8B-SFT. Evaluation is
      on MemGUI-Bench and the out-of-distribution MobileWorld benchmark.
    key_results: MemGUI-8B-SFT achieves the best open-data 8B performance on MemGUI-Bench
      and generalizes to the out-of-distribution MobileWorld benchmark.
