    Language Models）中查询文档优于整体阅读的见解，我们提出信号驱动观察（Signal-Driven Observation, SDO）：一个专门的子调用读取完整的DOM，但只返回与任务相关的元素及其选择器，并且仅在轻量级信号检测器触发时重新调用——触发条件包括URL转换、新出现的可交互元素、动作失败或外部浏览器事件。我们概述了SDO引入的开放问题，并呼吁社区将观察压缩视为Web智能体设计的核心架构决策。
