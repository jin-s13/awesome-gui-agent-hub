    methodology: 该方法使用LLM分析计算机使用代理的失败轨迹，诊断失败模式，并生成经人工轻度验证的代码补丁。这些补丁在推理时应用以提升代理性能，在OSWorld基准上使用OpenCUA-72B模型进行测试。
    key_results: 该方法将OpenCUA-72B在OSWorld上的成功率从42.3%提升至48.9%，提升了6.6个百分点，且无需额外训练，仅需适度的推理开销。
