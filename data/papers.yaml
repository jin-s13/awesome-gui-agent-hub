  title_cn: iOSWorld：面向个性化智能手机代理的基准测试
  abstract_cn: 一个有用的手机代理需要具备个性化智能。它应该基于设备上存在的用户身份、历史记录和偏好进行推理，而不仅仅是在非个性化的沙盒中执行孤立的指令。现有的移动代理基准测试缺乏这种个性化。我们提出了iOSWorld，这是首个交互式原生iOS模拟器基准测试，基于一个跨26个新构建的iOS应用的持久用户身份。这些应用包含连接的数据，如交易、消息、旅行记录、社交关系和金融活动。iOSWorld包含133个任务，分为三个难度递增的类别：单应用任务（27个）测试单个应用，多应用任务（60个）跨越2到8个应用，记忆与个性化任务（46个）要求代理从个人数据中推断模式。我们在纯视觉和特权视觉+XML设置下评估前沿和开源计算机使用模型。最佳配置整体达到52%，但在多应用任务上仅为37%。特权视觉+XML访问使前沿模型提升高达26个百分点，而较小模型未从增加的辅助功能树输入中受益。我们以开源基准测试形式发布iOSWorld，包含所有应用、种子数据、任务、评分标准和评估代码。
  tldr_cn: iOSWorld基准测试：26个iOS应用133个任务，评估个性化手机代理的前沿与开源模型。
  analysis_cn:
    innovations:
    - 首个面向个性化智能手机代理的交互式原生iOS模拟器基准测试，具有持久用户身份
    - 26个新构建的iOS应用，包含连接的个人数据（交易、消息、旅行、社交、金融）
    - 133个任务，分为单应用、多应用以及需要从个人数据推断的记忆与个性化三个类别
    - 在纯视觉和特权视觉+XML设置下评估前沿和开源模型
    methodology: 该基准测试包含一个交互式原生iOS模拟器，带有26个自定义应用，这些应用预填充了相互关联的用户数据。133个任务分为单应用（27个）、多应用（跨越2-8个应用，60个）和记忆/个性化（46个）类别。在纯视觉和视觉+XML（辅助功能树）配置下评估前沿和开源计算机使用模型。
    key_results: 最佳配置整体准确率达到52%，但在多应用任务上仅为37%。特权视觉+XML访问使前沿模型提升高达26个百分点，而较小模型未从增加的输入中受益。
    limitations:
    - 最佳模型在多应用任务上仅达到37%的准确率，表明仍有显著改进空间
    - 较小模型未从辅助功能树输入中受益，表明其利用结构化UI数据的能力有限
