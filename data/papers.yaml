    - 可执行场景中隐私违规的确定性评分
    methodology: 本文引入了AgentCIBench，这是一个具有可执行、确定性评分场景的评估框架，用于测试三种隐私故障模式。他们在这些场景上评估了15个前沿计算机使用代理，测量泄露率，并测试了代理在环境中端到端执行任务的情况。
    key_results: 15个代理中有11个在超过50%的场景中泄露，平均泄露率为67.9%，并且当代理端到端完成任务时，故障仍然存在。
