  title_cn: GUI-AC：增强GUI代理的持续学习能力
  abstract_cn: 图形用户界面（GUI）是人类与计算机交互的主要媒介，然而，构建能够像人类一样灵活且鲁棒地泛化到现实世界中各种界面环境的GUI代理仍然是一个未解决的问题。值得注意的是，GUI数据本质上是非平稳的：不断出现的前所未见的界面实例（例如，新的领域和分辨率）会导致持续的分布偏移，严重阻碍了现有GUI代理的持续学习。强化微调（RFT）作为一种有前景的方法引起了广泛关注。然而，RFT在其定位能力上表现出明显的不稳定性，表现为奖励的急剧不连续性和高方差振荡。展开结果的不平衡分布给优势估计引入了大量噪声，导致策略过度自信。固定的裁剪边界抑制了为适应新分布所需的策略概率增加，导致探索能力崩溃。为了解决这些挑战，我们提出了GUI-AC，一种增强GUI代理持续学习能力的方法。GUI-AC引入了定位确定性以支持两个核心机制：（i）自适应优势（Adaptive
    Advantage），它降低噪声优势估计的权重以防止策略过度自信；（ii）动态裁剪（Dynamic Clipping），它放松裁剪边界以鼓励探索范围。大量实验表明，这些机制共同提升了性能，使我们的方法超越了最先进的基线。代码匿名发布于https://anonymous.4open.science/r/GUI-AC。
  tldr_cn: 提出GUI-AC，通过定位确定性、自适应优势和动态裁剪解决强化微调不稳定性，增强GUI代理的持续学习。
