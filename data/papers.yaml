  title_cn: WebRetriever：面向高效Web智能体评估的大规模综合基准
  abstract_cn: 随着Web智能体在自动化任务执行中展现出日益增强的能力，开发用于评估其导航和任务完成性能的稳健评估框架已成为关键研究重点。然而，现有基准存在根本性局限。首先，它们规模不足且领域多样性有限，制约了对跨领域泛化能力的全面评估。其次，主流的LLM-as-Judge评估方法未能充分捕捉细粒度交互语义，尤其是在精确查询表述和过滤操作方面。第三，当前基准主要强调导航成功指标，而忽视了实际部署场景的关键需求。为解决这些局限，我们提出了WebRetriever，一个大规模基准，涵盖800个网站和1,550个任务，覆盖消费、专业和企业等多个领域，并全面包含用户意图模式。我们提出了NavEval（导航评估），一种新颖的LLM-as-Judge框架，利用超越视觉截图的丰富交互上下文，在多个评估数据集上实现了与人类判断的最先进对齐。此外，我们建立了三个互补的评估协议，共同提供对Web智能体能力的全面评估：导航熟练度、知识辅助交互以及带信息提取的端到端任务完成。大量实验分析揭示了不同评估协议之间的显著性能差异，表明仅凭导航成功不足以预测实际应用效果。WebRetriever提供了对智能体能力的细粒度诊断洞察，并为推进Web智能体研究与开发奠定了坚实基础。
