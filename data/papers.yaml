  title_cn: ProCUA-SFT技术报告
  abstract_cn: 训练计算机使用代理（CUA）——通过截图和键盘/鼠标操作与图形桌面交互的模型——需要在全桌面环境中收集的大规模、多样化的轨迹数据。最大的公开资源AgentNet（22.5K条人类轨迹）在用于监督微调（SFT）时会导致负迁移：在AgentNet上继续训练UI-TARS
    7B使得OSWorld成功率从26.3%降至8-10%。我们提出ProCUA-SFT，一个包含310万步级SFT样本的数据集，这些样本从93,000条合成轨迹中提炼而来，涵盖2,484种应用组合。该数据集由全自动流水线生成，该流水线（i）在真实桌面环境中合成基于实际内容的任务——包括来自SpreadsheetBench的912个电子表格、来自Zenodo10K的约10,000个宽松许可的演示文稿以及多应用OSWorld配置——并且（ii）在生成轨迹前通过二元前置条件检查验证每个任务的可行性。单一视觉语言模型（Kimi-K2.5）同时作为目标生成器、前置条件判断器和轨迹执行器，消除了规划器与执行器之间的能力差距。每条轨迹被扩展为步级前缀样本，精确复现推理时看到的上下文布局。在ProCUA-SFT上微调UI-TARS
    7B一个epoch，在OSWorld上达到45.0%——比基础模型提升18.7个百分点，比基于AgentNet训练的模型提升超过35%。ProCUA的一个子集被纳入Nemotron
    3 Nano Omni模型的训练数据，增强了其计算机使用能力。
  tldr_cn: ProCUA-SFT数据集包含310万步级SFT样本，源自9.3万合成轨迹，使UI-TARS 7B在OSWorld上提升18.7个百分点。
