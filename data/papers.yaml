    method_summary: As shown in Figure 2 , our framework consists of four components.
      We first introduce ATMem, which turns task-relevant data from passive interaction
      records into structured execution states that agents actively maintain and use
      to guide actions across interaction steps (Section 3.1 ). We then describe verified
