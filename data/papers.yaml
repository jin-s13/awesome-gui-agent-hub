  title_cn: 'ENVS: 环境原生验证搜索用于长程GUI智能体'
  abstract_cn: 随着多模态智能体从界面理解转向实际软件控制，在真实桌面环境中成功发现轨迹成为关键挑战。GUI任务需要长程的精确鼠标和键盘动作序列，而反馈稀疏、延迟，且通过虚拟机回滚获取成本高昂。我们提出环境原生验证搜索（ENVS），一种训练时搜索与过滤流水线，在策略优化前利用环境构建验证监督：它在实时OSWorld虚拟机中分支行为不同的GUI动作，验证成功叶节点，并从全局平衡的步骤级监督进行训练。为了评估在真实桌面中断下的鲁棒性，我们还引入了OSWorld-Noisy，一个用于可恢复桌面中断的动态基准，它保留原始任务，同时测试智能体在实时扰动下能否重新聚焦、忽略、等待或恢复。在300个任务的OSWorld池上，ENVS在原始评估中达到30.3
    pass@8，在OSWorld-Noisy上达到29.0，优于匹配的ARPO风格在线强化学习，同时将计算量从184-192 GPU小时减少到138-153
    GPU小时；即使仅使用30%的搜索数据，ENVS也达到27.0 pass@8，超过基于基础模型的ARPO。从噪声环境训练还能更好地保留辅助基准上的视觉推理能力，包括OSWorld-G
    Refusal（16.7 vs 1.9）和BLINK Functional Correspondence（26.2 vs 23.1）。
  tldr_cn: ENVS使用环境原生搜索与过滤训练长程GUI智能体，在OSWorld基准上优于在线强化学习。
