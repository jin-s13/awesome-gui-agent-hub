  title_cn: StainFlow：面向GUI智能体的实体污点追踪与证据链接过程奖励模型
  abstract_cn: 强化学习（RL）已成为在长周期、随机数字环境中改进GUI智能体的有前景方法，但轨迹级别的成功反馈过于稀疏，无法为中间探索步骤提供可靠的信用分配。为缓解此问题，近期研究引入了过程奖励模型（PRM），通过全局里程碑验证或局部步骤级评估提供更细粒度的训练反馈。然而，这些方法仍存在两个层级特有的局限性：全局里程碑分解具有主观性和单一性，难以适应真实GUI任务中多种有效的执行路径；而固定的局部判断窗口可能遗漏远程关键证据，或用无关帧稀释决策信号。受网络流分析中污点追踪机制的启发，我们提出StainFlow——一种面向GUI智能体的实体污点流过程奖励模型。为降低全局划分的主观性，我们引入全局实体污点追踪模块，提取视觉可验证的任务实体，并追踪其污点浓度和状态沿轨迹的演变，从而通过实体证据流的变化客观分离任务阶段。为提高局部验证的准确性，我们引入局部污点证据链接模块。该模块以每个候选关键节点的触发实体为中心，根据其污点浓度和状态变化检索相关步骤，并动态构建高密度证据窗口以验证真实关键节点。在AndroidWorld和OGRBench上的大量实验表明，StainFlow在在线RL成功率上相对提升3.2%，在轨迹完成判断准确率上相对提升1.8%。
  tldr_cn: StainFlow通过实体污点追踪与证据链接改进GUI智能体过程奖励模型。
  analysis_cn:
    innovations:
    - 全局实体污点追踪模块，提取视觉可验证的任务实体并追踪其污点浓度和状态，通过实体证据流的变化客观分离任务阶段
    - 局部污点证据链接模块，以候选关键节点的触发实体为中心，根据污点浓度和状态变化检索相关步骤，动态构建高密度证据窗口以验证真实关键节点
    methodology: StainFlow是一种面向GUI智能体的过程奖励模型，受网络流分析启发，采用实体污点追踪。它包含全局实体污点追踪模块，通过追踪实体证据流客观划分轨迹；以及局部污点证据链接模块，围绕候选关键节点动态构建证据窗口以实现准确的局部验证。
