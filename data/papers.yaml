      interaction, dynamic environments, cross-source reasoning, implicit-state inference,
      and visual-spatial precision.'
    - Grounding in authentic input artifacts and realistic stateful user profile data,
      with separate safety reports auditing safety-sensitive execution.
    - Revealing specific failure modes of frontier agents beyond basic GUI control,
      such as losing track of constraints, missing mid-task information, guessing,
      and skipping verification.
    methodology: OSWorld 2.0 comprises 108 end-to-end computer-use tasks that require
      an average of 318 tool calls with Claude Opus 4.7. Agents are evaluated under
      a primary binary-completion metric at 500 steps, with partial scores reported.
      The benchmark includes safety reports and targets challenge phenomena common
      in real workflows but underrepresented in prior benchmarks.
    key_results: Claude Opus 4.8 with maximum thinking and batched tool calls completes
      20.6% of tasks (54.8% partial score), while GPT-5.5 plateaus near 13%. Agents
      struggle most with constraints, mid-task information, guessing, verification,
      and hidden state recovery.
