  abstract: Recent years have witnessed the rapid evolution of AI agents toward handling
    increasingly complex, real-world tasks. However, existing benchmarks rarely evaluate
    whether agents can operate graphical user interfaces to complete long-horizon,
    high-value professional workflows across diverse domains. Current GUI benchmarks
    still predominantly focus on general-purpose software, relatively simple applications,
    and short-horizon tasks, leaving it largely unknown whether modern agents can
    follow user instructions to autonomously operate domain-specific professional
    software and accomplish economically valuable work in an end-to-end manner. To
    bridge this gap, we introduce Workflow-GYM, a benchmark for long-horizon GUI tasks
    centered on professional domains and specialized software environments. Through
    extensive experiments on state-of-the-art models, we find that even the strongest
    models achieve only slightly above 30% success rates, highlighting that professional
    long-horizon GUI workflows remain highly challenging for current GUI agents. Further
    analysis reveals that current agents struggle to maintain long-horizon workflow
    consistency, frequently exhibiting workflow stage omission, error propagation,
    objective drift, and insufficient understanding of professional software environments.
    Our findings provide important insights into the limitations of current agent
    systems and suggest key directions for the next generation of GUI-agent research.
