  title_cn: AliyunConsoleAgent：通过蒸馏和强化学习在真实云环境中训练网络代理
  abstract_cn: 我们提出了AliyunConsoleAgent，一个用于在真实云控制台中进行自动化文档验证的网络代理框架。主流云平台涵盖数百个产品，且功能迭代迅速，导致控制台用户界面频繁与相应文档产生偏差。验证文档流程是否准确反映当前控制台并能够端到端执行，每年估计需要400万次重复检查，而人工覆盖率仍低于1%。尽管基于前沿专有模型的代理系统取得了较高的成功率，但其高昂的成本和数据隐私限制阻碍了大规模部署。我们提出了一种两阶段训练范式：首先对蒸馏的前沿模型轨迹进行监督微调（SFT），然后在真实云环境中使用组相对策略优化（GRPO）和双通道结果奖励模型进行强化学习。为支持大规模强化学习训练，我们构建了一个高确定性的回滚系统，该系统采用基于Terraform的资源预置和LLM驱动的按需置备，有效隔离环境噪声与训练信号。我们还引入了一种基于后端审计日志的规则奖励评估协议，提供客观、抗奖励破解的结果判断。我们的模型从机械的指令遵循演变为具备云控制台和产品特定理解的自主决策。在最具挑战性的278任务基准测试中，最佳前沿模型仅达到65.34%的成功率，而AliyunConsoleAgent-32B实现了63.52%的平均成功率——相比基础模型提升了20.24个百分点，与最佳前沿专有模型的差距缩小至1.82个百分点（bootstrap
    95% CI [-1.27, 7.39]），同时推理成本降低了92%。
  tldr_cn: 通过蒸馏轨迹SFT和真实环境GRPO强化学习训练云控制台文档验证代理。
