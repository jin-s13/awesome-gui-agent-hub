  analysis:
    innovations:
    - Introduces MyPCBench, a benchmark specifically for personally intelligent computer-use
      agents, filling the gap between impersonal evaluations and real-world personal
      assistant deployment.
    - Creates a simulated Linux desktop environment populated with 17 real-world web
      applications and a full desktop stack, all seeded with a canonical persona (Michael
      Scott from The Office) to enable personalized task evaluation.
    - Defines 184 tasks inspired by real user requests from the OpenClaw community,
      ensuring practical relevance.
    - Benchmarks six closed and open-weight models using a uniform computer+bash tool
      surface, enabling direct comparison of personalization capabilities.
    methodology: The benchmark consists of a Linux desktop with 17 simulated real-world
      web applications and a full desktop stack, all personalized for a single persona.
      184 tasks were designed based on real requests from the OpenClaw community.
      Six models were evaluated using a uniform interface combining computer and bash
      tools, and performance was measured by full task completion rate.
    key_results: Claude Opus 4.6 achieved the highest full task completion rate at
      55.4%, the only model above 50%. Failures were concentrated on tasks spanning
      multiple applications and those with long trajectories, highlighting where personalization
      stresses agents most.
    limitations:
    - The environment uses simulated web applications rather than live websites, which
      may not capture the full complexity and variability of real-world web interactions.
    - Only a single persona (Michael Scott) is used, limiting the generalizability
      of findings to other user profiles and personalization needs.
    - Tasks are derived from a specific community (OpenClaw), potentially missing
      other types of personal assistant requests.
  title_cn: MyPCBench：面向个人智能计算机使用代理的基准测试
  abstract_cn: 当前的计算机使用代理基准测试在非个性化环境中评估模型，这导致评估与实际部署之间存在差距——个人助理需要跨用户的整个数字生活工作，包括其上下文、历史数据和已登录账户。这一差距在网络任务中最为明显，因为实时网络评估无法测试需要登录或个人信息的网站，而真正的个人助理必须操作这类网站。我们提出了MyPCBench，该基准测试在配备17个模拟真实世界网络应用和完整桌面栈的Linux桌面环境中测试作为个人助理的计算机使用代理，所有环境均以《办公室》中的Michael
    Scott这一典型角色进行初始化。我们在此环境中定义了184个任务，每个任务均源自OpenClaw社区的真实请求，并使用统一的计算机+bash工具界面评估了六个闭源和开源模型。我们发现，最佳模型Claude
    Opus 4.6完全解决了55.4%的任务，是唯一超过50%的模型。模型失败主要集中在跨多个应用的任务和长轨迹任务上，这些任务对个人化助理的要求最高。我们已在https://mypcbench.com发布环境、任务集和代理框架。
  tldr_cn: MyPCBench通过模拟网页应用和桌面环境测试个人化计算机使用代理，最佳模型完成率55.4%。
  analysis_cn:
    innovations:
    - 提出了MyPCBench，一个专门针对个人智能计算机使用代理的基准测试，填补了非个性化评估与真实个人助理部署之间的空白。
    - 创建了一个模拟Linux桌面环境，配备17个真实世界网络应用和完整桌面栈，并以典型角色（《办公室》中的Michael Scott）进行初始化，从而实现个性化任务评估。
    - 定义了184个源自OpenClaw社区真实用户请求的任务，确保实际相关性。
    - 使用统一的计算机+bash工具界面评估了六个闭源和开源模型，实现了个性化能力的直接比较。
    methodology: 该基准测试包含一个配备17个模拟真实世界网络应用和完整桌面栈的Linux桌面环境，所有环境均针对单一角色进行个性化。基于OpenClaw社区的真实请求设计了184个任务。使用结合计算机和bash工具的统一界面评估了六个模型，性能通过任务完全完成率来衡量。
    key_results: Claude Opus 4.6实现了最高的任务完全完成率55.4%，是唯一超过50%的模型。失败主要集中在跨多个应用的任务和长轨迹任务上，突显了个人化对代理的最大挑战。
    limitations:
    - 环境使用模拟网络应用而非真实网站，可能无法捕捉真实网络交互的全部复杂性和变异性。
    - 仅使用单一角色（Michael Scott），限制了研究结果对其他用户画像和个人化需求的泛化能力。
    - 任务源自特定社区（OpenClaw），可能遗漏其他类型的个人助理请求。
