    methodology: MemGUI-Agent采用Context-as-Action（ConAct），策略同时发出UI动作和上下文管理动作，维护三个结构化上下文字段而非被动历史累积。构建了包含2,956条轨迹的MemGUI-3K数据集，并标注了ConAct动作，通过监督微调训练8B参数模型得到MemGUI-8B-SFT。在MemGUI-Bench和分布外MobileWorld基准上进行评估。
