  analysis:
    innovations:
    - 'A three-stage pipeline for automatically generating SKILL.md files from GUI
      interaction trajectories: segmentation, clustering, and skill-aware policy training.'
    - A diagnostic study revealing that mined skill clusters can be highly readable
      (high purity against ground-truth labels) but do not reliably improve downstream
      policy performance, highlighting a gap between inspectability and transfer.
    methodology: The paper proposes a pipeline that segments GUI interaction trajectories,
      clusters the segments into candidate skills, and trains a skill-aware policy
      using the resulting cluster annotations. Evaluation is conducted on InteraSkill
      Workflows and BrowseComp+ benchmarks, using GRPO to fine-tune the policy and
      measuring skill-step accuracy and source-domain metrics.
    key_results: Five of eight mined clusters achieve at least 0.95 purity against
      InteraSkill Workflows labels, but GRPO improves skill-step accuracy only from
      18.5% to 20.5%, leaves BrowseComp+ unchanged, and underperforms trivial frequency
      priors on key source-domain metrics.
    limitations:
    - The current boundary detector is insufficient for reliable cross-domain policy
      improvement.
    - The orderless segment representation limits transferability.
    - The offline reward model is insufficient for policy improvement.
    - Readability of mined skills does not guarantee improved downstream policy performance.
  title_cn: 通过交互轨迹挖掘自动生成计算机使用代理的SKILL.md文件
  abstract_cn: 显式的技能库使计算机使用代理更易于检查，但目前尚不清楚是否可以从交互数据中挖掘出这样的技能库以改进下游策略。我们通过一个三阶段流水线研究这一问题：分割GUI轨迹、将片段聚类为候选技能、并从生成的标注中训练技能感知策略。挖掘出的聚类在源基准上具有可读性：八个聚类中有五个相对于InteraSkill
    Workflows标签的纯度至少达到0.95。然而，可读性并不意味着可迁移性。GRPO仅将IW技能步骤准确率从18.5%提升至20.5%，对BrowseComp+基本无影响，并且在关键源域指标上不如简单的频率先验。因此，我们将该方法作为一项诊断性研究：轨迹挖掘可以暴露可检查的技能结构，但当前的边界检测器、无序片段表示和离线奖励模型不足以实现可靠的跨域策略改进。
  tldr_cn: 一种从GUI轨迹中挖掘技能库的流水线，但策略改进效果甚微，作为诊断性研究。
