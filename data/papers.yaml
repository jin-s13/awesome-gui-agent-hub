- id: signal-driven-observation-for-long-horizon-web-agents-2026
  title: Signal-Driven Observation for Long-Horizon Web Agents
  authors:
  - Shubham Gaur
  - Ian Lane
  abstract: 'Web agents operating over long horizons ingest raw DOM and accessibility
    trees -- routinely tens of thousands of tokens -- at every action step, causing
    progressive context degradation that erodes reasoning well before tasks complete.
    We argue that this coupling of observation frequency to action frequency is an
    architectural mistake. Drawing on the insight from Recursive Language Models that
    querying a document outperforms reading it wholesale, we propose Signal-Driven
    Observation (SDO): a dedicated sub-call reads the full DOM but returns only task-relevant
    elements and their selectors, and is re-invoked only when a lightweight signal
    detector fires -- triggered by URL transitions, newly visible interactive elements,
    action failures, or exogenous browser events. We outline the open problems SDO
    introduces and call on the community to treat observation compression as a core
    architectural decision in web agent design.'
