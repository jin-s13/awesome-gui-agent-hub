- id: osworld2-0-benchmarking-computer-use-agents-on-long-horizon-2026
  title: 'OSWorld2.0: Benchmarking Computer Use Agents on Long-Horizon Real-World
    Tasks'
  authors:
  - Mengqi Yuan
  - Zilong Zhou
  - Xinzhuang Xiong
  - Weiming Wu
  - Jiayang Sun
  - Jiamin Song
  - Kaiqian Cui
