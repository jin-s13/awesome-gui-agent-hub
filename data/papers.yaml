  abstract_cn: 训练深度研究智能体需要长时域轨迹，这些轨迹交织了搜索、证据聚合和多步推理。然而，现有的数据收集流水线通常依赖专有网络API，使得大规模轨迹合成成本高昂、不稳定且难以复现。我们提出OpenResearcher，一个可复现的流水线，将一次性语料库引导与多轮轨迹合成解耦，并使用三个明确的浏览器原语（搜索、打开和查找）在包含1500万文档的语料库上完全离线执行搜索与浏览循环。使用GPT-OSS-120B作为教师模型，我们合成了超过9.7万条轨迹，其中包括大量具有100次以上工具调用的长时域尾部。在这些轨迹上对有30B参数、3B激活参数的骨干模型进行监督微调，在BrowseComp-Plus上达到了54.8%的准确率，相比基模型提升了34.0个百分点，同时在BrowseComp、GAIA和xbench-DeepSearch上保持竞争力。由于环境是离线且完全可检测的，它还支持可控分析，我们的研究揭示了深度研究流水线设计的实用见解，包括数据过滤策略、智能体配置选择以及检索成功与最终答案准确性之间的关系。我们在https://github.com/TIGER-AI-Lab/OpenResearcher
    上发布了该流水线、合成的轨迹、模型检查点以及离线搜索环境。
