  title_cn: OpenWebRL：揭秘视觉网页代理的在线多轮强化学习
  abstract_cn: 构建有能力的视觉网页代理需要长程推理、精确的定位以及与动态真实网站的稳健交互。尽管进展迅速，但最强大的系统仍然大多是专有的，而开源代理仍严重依赖于对大量精心策划的网页轨迹进行监督式后训练。这种依赖造成了严重的可扩展性瓶颈：高质量演示数据收集成本高昂，且静态数据集对多样且不断变化的开放网页的覆盖有限。虽然在线强化学习在文本代理中已显示出潜力，但其直接用于在真实网站上训练视觉网页代理的潜力仍未得到充分探索。本文介绍了OpenWebRL，一个用于在真实网站上通过在线多轮强化学习训练视觉网页代理的开源框架。OpenWebRL涵盖了完整的训练流程，包括可扩展的实时浏览器基础设施、监督初始化、多模态上下文管理、轨迹级成功判定以及高效的多轮策略优化。利用该框架，我们训练了OpenWebRL-4B，在具有挑战性的实时网页基准测试上建立了新的开源最优水平。仅使用0.4K初始化轨迹和2.2K开放式强化学习训练任务，OpenWebRL-4B在Online-Mind2Web上达到67.0%的成功率，在DeepShop上达到64.0%，优于先前类似或更大规模的开源代理，并与包括OpenAI
    CUA和Gemini CUA在内的专有系统保持竞争力。除了强大的基准性能外，我们系统性地研究了使在线强化学习对视觉网页代理有效的关键设计选择，并分析了强化学习如何改进代理推理。总体而言，我们的工作为构建更强大、可复现且成本效益更高的开源网页代理提供了一条实用路径。我们将发布训练数据、模型和代码以支持未来研究。
  tldr_cn: OpenWebRL是一个开源框架，利用在线多轮强化学习在真实网站上训练视觉网页代理，取得了最先进的结果。
  analysis_cn:
    innovations:
    - OpenWebRL：一个用于在真实网站上通过在线多轮强化学习训练视觉网页代理的开源框架，包括可扩展的实时浏览器基础设施、监督初始化、多模态上下文管理、轨迹级成功判定以及高效的多轮策略优化。
    - OpenWebRL-4B模型，仅使用0.4K初始化轨迹和2.2K强化学习任务，在实时网页基准测试上建立了新的开源最优水平。
    - 系统性地研究了使在线强化学习对视觉网页代理有效的设计选择，并分析了强化学习如何改进代理推理。
    methodology: 该框架在真实网站上使用在线多轮强化学习，首先在0.4K轨迹上进行监督微调，然后通过多轮策略优化和轨迹级成功判定训练一个4B参数的模型。评估在Online-Mind2Web和DeepShop基准上进行。
    key_results: OpenWebRL-4B在Online-Mind2Web上达到67.0%的成功率，在DeepShop上达到64.0%，优于先前类似或更大规模的开源代理，并与OpenAI
      CUA和Gemini CUA等专有系统保持竞争力。
