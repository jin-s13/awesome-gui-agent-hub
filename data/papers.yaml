  title_cn: 一种具有历史感知和视觉基础的计算机使用代理评判模型
  abstract_cn: 针对计算机使用代理（CUA）的各种测试时干预方法（包括评判模型）已被开发出来，通过在复杂的图形用户界面（GUI）环境中执行前评估动作来提升性能。然而，现有评判模型存在两个关键局限：（1）主要关注短视决策循环（例如，遗忘早期动作）；（2）缺乏检测有缺陷动作所需的视觉基础（例如，点击错误的UI元素）。为解决这些问题，我们提出了HiViG，一个具有历史感知和视觉基础的测试时框架，其核心是一个在真实GUI轨迹上训练的多模态评判模型，能够将过去的交互抽象为紧凑的记录，并通过视觉基础评估动作。在测试时，HiViG将评判模型集成到策略决策循环中，提供宏观动作历史（总结策略已完成的任务）和视觉基础评判（将原始执行坐标与当前截图比对，在执行前拦截错误）。在网页、移动和桌面基准测试中，HiViG始终优于现有的标量评判和语言评判模型，相比最强基线，将Qwen3-VL-32B的平均成功率提高了5.8%，将Gemini-3-Flash的平均成功率提高了9.0%，并展现出强大的跨平台泛化能力。消融实验表明，宏观动作历史缓解了短视规划，视觉基础评判减少了执行错误，这两个组件对于长周期GUI任务中的测试时扩展至关重要。
  tldr_cn: HiViG 引入历史感知、视觉基础的评判模型，通过解决短视规划和执行错误来改进计算机使用代理。
  analysis_cn:
