  title_cn: 'ChainWorld: 从原子OSWorld任务组合长时程桌面工作负载'
  abstract_cn: 计算机使用代理几乎仅在原子桌面任务上进行评估，但现实桌面工作需要在多个目标之间维持状态。我们通过ChainWorld研究这一差距，该框架通过方向性兼容性搜索将原子OSWorld任务组合成长时程桌面工作负载，同时保留源评估器。生成的工作负载包含347条长度为2至4的任务链，并比较同一任务序列的两种呈现方式。在单轮评估中，所有任务同时呈现在一个提示中。在多轮评估中，任务逐一揭示。在四种当前计算机使用代理中，最大链完成率为31%。多轮评估提高了三种模型的完成率，但两种协议仍然具有挑战性。两种协议还暴露了不同的失败模式：单轮失败集中在工件精度上，而多轮失败更常反映会话管理问题，如进度碎片化和后续轮次脱离。
  tldr_cn: ChainWorld将原子OSWorld任务组合成长时程桌面工作负载，通过单/多轮协议评估代理，最高完成率31%。
  analysis_cn:
    innovations:
    - ChainWorld框架，通过方向性兼容性搜索将原子OSWorld任务组合成长时程桌面工作负载
    - 引入长时程任务的单轮和多轮评估协议
    - 识别不同的失败模式：单轮中的工件精度问题 vs. 多轮中的会话管理问题
    methodology: ChainWorld通过方向性兼容性搜索将原子OSWorld任务组合成长度为2-4的任务链，同时保留源评估器，生成347条链。在两种协议下评估四种计算机使用代理：单轮（所有任务在一个提示中）和多轮（任务顺序揭示）。
    key_results: 四种代理的最大链完成率为31%；多轮评估提高了三种模型的完成率，但两种协议仍具挑战性。单轮失败集中在工件精度，多轮失败反映会话管理问题，如进度碎片化和后续轮次脱离。
    limitations:
    - 单轮和多轮协议对当前代理均具有挑战性
    - 评估代理的最大链完成率仅为31%
