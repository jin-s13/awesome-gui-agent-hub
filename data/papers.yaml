  title_cn: 小米GUI-0技术报告
  abstract_cn: 图形用户界面（GUI）智能体基于视觉语言模型，通过点击、滑动、文本输入和导航等界面操作，在真实应用中端到端地完成用户任务。然而，现有的GUI智能体主要是在离线轨迹、模拟环境和标准化基准上进行训练和评估。这些与真实应用在界面布局、交互逻辑和异常状态分布上存在显著差异，无法真实反映实际使用中的执行稳定性——在真实世界中，账户状态、权限对话框、支付认证和风险控制不断重塑状态分布，导致基准分数与实际可用性之间存在持续差距。为弥合这一差距，我们提出了Xiaomi-GUI-0，一个面向真实移动环境的原生多模态GUI智能体，在真实设备闭环中进行训练和评估。其核心是以真实设备为主的混合基础设施，物理设备作为主要执行环境，沙箱提供辅助支持，使得数据收集、训练、部署和评估共享接近真实部署的执行分布。我们构建了多源训练数据，涵盖高频头部任务、面向长尾意图的高泛化数据以及用于反思和记忆的能力增强数据，并引入了错误驱动的数据飞轮，将失败轨迹转化为纠正动作、反思解释和恢复演示。模型通过渐进式三阶段流程进行训练：监督微调、步骤级强化学习和智能体强化学习。在公开基准和内部RealMobile上的评估显示，Xiaomi-GUI-0在RealMobile上达到72.0%的成功率，在AndroidWorld上达到78.9%，同时在真实任务中显著提升了执行稳定性和异常状态识别能力。
  tldr_cn: Xiaomi-GUI-0是一个面向真实移动环境的原生多模态GUI智能体，通过真实设备闭环训练弥合基准与真实之间的差距。
  analysis_cn:
    innovations:
    - 以真实设备为主的混合基础设施，将物理设备作为主要执行环境，沙箱作为辅助支持，使数据收集、训练、部署和评估的分布与真实部署一致。
    - 多源训练数据，涵盖高频头部任务、面向长尾意图的高泛化数据以及用于反思和记忆的能力增强数据。
    - 错误驱动的数据飞轮，将失败轨迹转化为纠正动作、反思解释和恢复演示。
    - 渐进式三阶段训练流程：监督微调、步骤级强化学习和智能体强化学习。
    methodology: Xiaomi-GUI-0是一个原生多模态GUI智能体，在真实设备闭环中进行训练和评估。它采用以真实设备为主的混合基础设施，物理设备为主要环境，沙箱为辅助支持。训练数据来自多个来源，并通过错误驱动的数据飞轮进行增强，模型通过监督微调、步骤级强化学习和智能体强化学习的渐进式流程进行训练。
