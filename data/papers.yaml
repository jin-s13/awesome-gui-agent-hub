- id: skill-guided-continuation-distillation-for-gui-agents-2026
  title: Skill-Guided Continuation Distillation for GUI Agents
  authors:
  - Zhimin Fan
  - Hongwei Yu
  - Yeqing Shen
  - Haolong Yan
  - Guozhen Peng
  - Tianhao Peng
  - Yudong Zhang
  - Xiaowen Zhang
  - Kaijun Tan
  - Zheng Ge
  - Xiangyu Zhang
  - Daxin Jiang
  abstract: Improving GUI agents typically relies on behavior cloning on expert trajectories.
    However, as the current policy deviates from the expert policy, it inevitably
    encounters policy-induced off-trajectory states during closed-loop execution,
    i.e., states that fall outside the expert trajectories. Since expert trajectories
    provide no demonstrations for these unseen states, such states receive no effective
    supervision, leaving the policy unable to select the correct action. To close
    this supervision gap, we propose Skill-Guided Continuation Distillation (SGCD),
    an iterative self-improvement framework. SGCD first runs the plain policy without
    skill guidance for a few steps to reach realistic off-trajectory states. From
    these states, a skill-guided policy then completes the task and produces successful
    continuations, which are mixed with expert trajectories to supply supervision
    over policy-induced off-trajectory states. The skills are extracted from both
    successful and failed rollouts, consisting of Continuation Plans, Critical Targets,
    Failure Traps, and Success Criteria. On OSWorld-Verified, SGCD improves the success
    rate of three base models from the low-30\% range to over 50\%, demonstrating
    its effectiveness and generality.
