- id: perceive-before-reasoning-a-pre-reasoning-perception-framew-2026
  title: 'Perceive Before Reasoning: A Pre-Reasoning Perception Framework for Efficient
    and Reliable Proactive Mobile Agents'
  authors:
  - Zhijie Ding
  - Weinan Hong
  - Zicheng Zhu
  - Lei Li
  - Dezhi Kong
  - Hao Wang
  - Peng Zhou
  - Xuchu Jiang
  - Jiaming Xu
  abstract: Multimodal large language models (MLLMs) have substantially advanced mobile
    agents, yet proactive mobile assistance remains challenging because agents must
    decide \emph{when} to intervene before determining \emph{how} to assist. Existing
    systems often implement these two decisions within a unified MLLM-based pipeline,
    leading to goal misalignment between conservative intervention filtering and comprehensive
    assistance generation, as well as redundant inference when the agent should remain
    silent. To address these limitations, we propose the \textbf{Pre-Reasoning Perception
    Framework (PRPF)}, a two-stage framework built on perceiving before reasoning.
    PRPF introduces a lightweight Multimodal Proactive Perceptor (MPP) for intervention
    gating and context compression, and activates the Proactive Agent Reasoner (PAR)
    only when intervention is warranted. Experiments on the ProactiveMobile benchmark
    show that PRPF substantially reduces false trigger rates (FTR) while improving
    success rates (SR) and inference efficiency over the ProactiveMobile baseline.
  year: 2026
  venue: arXiv
  paper_type:
  - method
  - system
  tags:
