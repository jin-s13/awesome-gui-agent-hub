  title_cn: SkillHarness：为计算机使用代理驾驭安全技能
  abstract_cn: 计算机使用代理（CUAs）越来越多地部署在动态交互环境中，从而产生了在交互过程中持续学习技能的需求。近期的方法通过从成功轨迹中学习可复用技能来应对这一挑战。然而，这些技能学习方法大多假设静态且安全的环境，忽视了来自对抗性交互（如提示注入）和环境动态（如弹出窗口）的风险。在动态环境中，此类假设可能导致有风险的技能学习和脆弱的执行，损害CUAs的可靠性。这引出了一个问题：CUAs如何在动态环境中安全地学习和使用技能？为解决此问题，我们提出了SkillHarness，一个用于在动态环境中安全驾驭技能的框架。SkillHarness通过将技能学习和利用建模为安全约束的交互过程，超越了静态技能抽象。具体而言，我们引入了技能边界，利用多源监督信号从交互轨迹中识别安全技能，并在整个技能生命周期中构建自我改进的安全约束。此外，SkillHarness引入了选择性技能复用，其中任务根据上下文被引导分解，并通过技能子集的选择性激活来完成。我们的实验表明，SkillHarness将学习技能的不安全率降低了57.1%，并在动态环境变化下持续提高了执行稳定性，优于现有基线。
  tldr_cn: SkillHarness提出框架，通过技能边界和选择性复用，使计算机使用代理在动态环境中安全学习技能，不安全率降低57.1%。
  analysis_cn:
    innovations:
    - 利用多源监督信号识别安全技能并构建自我改进安全约束的技能边界
    - 具有上下文引导任务分解和技能子集选择性激活的选择性技能复用
    - 将技能学习和利用建模为安全约束的交互过程
    methodology: SkillHarness将技能学习和利用建模为安全约束的交互过程。它引入了技能边界，利用多源监督信号从轨迹中识别安全技能并构建自我改进的安全约束。它还采用了选择性技能复用，其中任务根据上下文分解，并通过技能子集的选择性激活来完成。
