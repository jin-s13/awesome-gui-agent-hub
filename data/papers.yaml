  title_cn: 通过自主经验探索与事后经验利用增强GUI代理的任务规划能力
  abstract_cn: 多模态网页代理可以协助人类操作重复的GUI任务，其中有效的任务规划对于将复杂任务分解为可执行动作至关重要。尽管小型开源MLLM相比商业大型模型具有成本效益和隐私保护优势，但它们存在规划能力弱和跨网站泛化能力有限的问题。为解决这些局限，我们提出了规划经验探索与利用（PEEU）方法，该方法自主探索环境以发现经验，并利用事后经验合成严格对齐的高层训练数据。为了定量分析驱动这一性能的泛化行为，我们提出了任务分解层次分析框架（TDHAF），系统研究跨低、中、高三个任务粒度的组合泛化。我们的分析表明，掌握低层原子技能并不能保证高层规划能力，而高层任务训练能产生更强的分布外泛化。在真实世界基准上的实验证明了PEEU的优越效果：我们的7B模型达到了30.6%的准确率，超越了更大的Qwen2.5-VL-32B模型。这些结果表明，构建事后高层任务并利用经验对于小型MLLM的分布外规划能力至关重要。
  tldr_cn: 提出PEEU方法，使小型MLLM自主探索并利用事后经验进行GUI任务规划，在真实基准上超越大型模型。
