  title_cn: Workflow-GYM：面向真实世界专业领域中计算机使用代理任务的长期评估
  abstract_cn: 近年来，AI代理在处理日益复杂的真实世界任务方面取得了快速发展。然而，现有基准很少评估代理能否操作图形用户界面以完成跨多个领域的长期、高价值专业工作流程。当前的GUI基准仍主要关注通用软件、相对简单的应用和短期任务，使得现代代理能否遵循用户指令自主操作领域特定专业软件并以端到端方式完成具有经济价值的工作仍基本未知。为填补这一空白，我们引入了Workflow-GYM，一个专注于专业领域和专用软件环境的长期GUI任务基准。通过对最先进模型的广泛实验，我们发现即使最强的模型也仅能达到略高于30%的成功率，这表明专业长期GUI工作流程对当前GUI代理仍极具挑战性。进一步分析揭示，当前代理难以维持长期工作流程的一致性，频繁出现工作流程阶段遗漏、错误传播、目标漂移以及对专业软件环境理解不足等问题。我们的发现为当前代理系统的局限性提供了重要见解，并为下一代GUI代理研究指明了关键方向。
  tldr_cn: 提出Workflow-GYM基准，评估专业领域长期图形界面任务，当前代理成功率仅约30%。
  analysis_cn:
    innovations:
    - 引入了Workflow-GYM，一个专门针对专业领域和专用软件环境中长期GUI任务的基准。
    - 识别并分析了当前GUI代理的关键失败模式，包括工作流程阶段遗漏、错误传播、目标漂移以及对专业软件环境理解不足。
    methodology: 作者构建了Workflow-GYM基准，包含需要操作领域特定软件图形用户界面的长期、端到端专业工作流程。随后，他们在该基准上评估了最先进的AI模型，以测量成功率并分析失败模式。
    key_results: 即使最强的模型在该基准上也仅达到略高于30%的成功率，表明专业长期GUI工作流程仍极具挑战性。
    limitations:
    - 当前代理难以维持长期工作流程的一致性。
