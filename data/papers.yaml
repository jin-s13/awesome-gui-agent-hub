  title_cn: 基于状态引导的动态检索的在线技能学习：面向Web智能体
  abstract_cn: 语言智能体越来越依赖可复用技能来改进跨相关任务的多步Web自动化。越来越多的研究关注在线技能学习，即智能体从先前的任务轨迹中持续归纳技能，并在未来任务中动态复用。然而，现有方法主要在任务级别复用技能：基于初始任务指令检索一组固定技能，并在执行过程中保持不变。这种静态策略与Web执行场景不匹配，因为合适的下一步动作不仅取决于任务目标，还取决于当前网页状态，而网页状态常常会过渡到初始技能无法覆盖的情况。为解决这一问题，我们提出状态引导的动态检索（SGDR），一种在线技能学习方法，使Web智能体能够逐步复用技能。SGDR包含三个组件：滑动窗口提取过程，将已完成轨迹转化为可在中间执行状态调用的可复用子程序；双文本-代码表示，连接技能检索与可执行动作；以及状态引导的动态检索机制，将技能与任务目标和当前网页状态相匹配。在WebArena五个领域的实验表明，SGDR持续优于强基线，使用GPT-4.1时平均成功率为37.5%，使用Qwen3-4B时为24.3%，分别比最强基线相对提升10.6%和10.0%。代码开源在https://github.com/plusnli/skill-dynamic-retrieval。
