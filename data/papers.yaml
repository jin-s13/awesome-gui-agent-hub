  abstract_cn: 使用多步强化学习训练视觉语言网页代理计算密集，存在两种主要的低效形式：同步强化学习中的GPU空闲，以及轨迹使用了比必要更多的步数和令牌。我们提出AsyncWebRL，它同时解决了这两个问题。在系统方面，异步设计将轨迹生成、梯度更新和策略刷新跨迭代重叠，并结合两种针对网页代理的特定适配，即永久轨迹池和轻量级截图处理，共同实现了相比此前最快的开源同步流水线（WebGym）高达2.9倍的端到端训练吞吐量加速。在算法方面，我们识别出多步GRPO中的每轨迹归一化因子1/|τ_i|是轨迹级和令牌级低效的根本原因：由于失败轨迹系统性地比成功轨迹更长，它降低了失败令牌上负梯度的权重，导致策略持续生成冗长的记忆模式。将1/|τ_i|替换为常数1/k打破了这种耦合，在保持总体成功率的同时缩短了轨迹。这些贡献共同在WebGym的分布外测试集上设立了新的开源最优水平（相对此前最佳42.9%提升5.8%），在更难的子集上提升最大（中等难度相对提升42%，困难难度相对提升48%）。
