- id: runagent-superbrowser-a-theory-of-autonomous-web-navigation-2026
  title: 'RunAgent SuperBrowser: A Theory of Autonomous Web Navigation Grounded in
    Human Browsing Behaviour'
  authors:
  - Radeen Mostafa
  - Sawradip Saha
  abstract: 'We present SUPERBROWSER, an autonomous web-navigation agent designed
    against a single guiding hypothesis: a web agent should browse the way a person
    browses. A human reading a page does not retain every pixel they have seen; they
    look at a few candidate targets, decide on one, and remember only what is needed
    to keep the goal alive. We operationalize this perception-cognition-action triad
    as three coupled mechanisms. First, a vision-first bounding-box pipeline labels
    candidate interactive regions on every screenshot and feeds them, asynchronously
    prefetched, to the language model so that the "eye" precedes the "hand". Second,
    a three-role brain -- an Orchestrator that classifies and routes, a Planner that
    evaluates progress every few steps, and a Worker that emits per-step actions --
    separates strategic from operational reasoning. Third, a structured Ledger stores
    only what a person would: the goal, the last three actions, a small set of facts
    and dead-ends, and a handful of checkpoints; a six-phase eviction loop systematically
    discards stale screenshots, state blobs, and reasoning traces from the live context.
    Action execution is a three-tier click cascade (Chrome DevTools Protocol to Puppeteer
    to scripted) with humanized Bezier motion, plus a chevron-aware bounding-box snapper
    that resolves the "small arrow beside a large label" ambiguity. On the Mind2Web
    Hard benchmark (66 tasks), SUPERBROWSER attains 89.47% success, placing third
    overall and ahead of every published open/research browser-agent baseline by a
    large margin. We argue that the gain comes not from any single trick but from
    the consistent application of a cognitive contract throughout the system.'
