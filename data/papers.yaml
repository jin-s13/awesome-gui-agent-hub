  title_cn: 在短视频平台上对动态屏幕原生GUI代理的基准测试
  abstract_cn: 当前的GUI代理假设屏幕是静态的，即两次操作之间世界是冻结的。然而，短视频应用等真实界面违反了这一假设，因为其内容持续播放，一个称职的用户必须决定观看什么以及观看多久。我们将此任务形式化为动态屏幕原生GUI代理，并引入LivingScreen——首个在短视频平台上实例化该任务的基准测试，包含一个忠实的基于浏览器的环境、一个三层任务套件以及同时评估准确性和信息效率的指标。评估了多种前沿模型后发现，没有模型能达到人类的成本-准确性表现，其主要失败模式是过度观察和观察不足，这表明观察控制是未来GUI代理缺失的能力维度。所有数据和代码将在https://github.com/BITHLP/LivingScreen提供。
  tldr_cn: 引入LivingScreen基准测试，评估动态短视频平台上的GUI代理，发现模型缺乏观察控制能力。
