    - 动态选择平台特定教师并通过平台条件蒸馏传递行为先验，同时保留先前能力
    methodology: UI-MOPD将多教师在线策略蒸馏融入持续学习：它根据当前环境动态选择平台特定教师，并通过平台条件蒸馏将平台特定的行为先验传递给共享策略，从而在保留现有平台能力的同时适应新平台。该方法在Uni-GUI数据集上，跨OSWorld和MobileWorld平台进行了评估。
