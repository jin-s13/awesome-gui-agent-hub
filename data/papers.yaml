  analysis:
    innovations:
    - Using autonomous vision-language evaluation as a scalable reward signal for
      RL fine-tuning of GUI agents, eliminating the need for handcrafted rewards or
      manual labels.
    - Modeling the evaluator's feedback as a noisy binary reward channel and deriving
      a noise-corrected reward estimator for Proximal Policy Optimization.
    - Demonstrating that noise-corrected evaluator rewards significantly outperform
      both zero-shot baselines and raw evaluator fine-tuning across multiple GUI benchmarks.
    methodology: The framework fine-tunes a GUI agent policy with RL using a Vision-Language
      Model (VLM) to judge task completion from a final screenshot and instruction,
      providing terminal binary feedback. Because the VLM evaluator is imperfect,
      its feedback is modeled as a noisy binary channel, and a noise-corrected reward
      estimator is derived for Proximal Policy Optimization (PPO). Experiments are
      conducted on macOSWorld, Windows Agent Arena, and OSWorld.
    key_results: Noise-corrected evaluator rewards improve success rates by an average
      of 12.6 percentage points over zero-shot baselines and 5.1 points over raw evaluator
      fine-tuning across the three benchmarks.
    limitations:
    - Autonomous evaluators are imperfect, introducing noise into the reward signal
      that must be explicitly modeled and corrected.
  title_cn: 基于自主评估的计算机使用代理的强化学习
  abstract_cn: 计算机使用代理（CUAs）通过直接感知和操作图形用户界面来执行高级用户目标。然而，针对CUAs的强化学习仍然困难，因为开放式的桌面环境很少提供可扩展的、机器可读的奖励信号：任务成功通常基于视觉，难以通过手工设计的奖励函数或密集的人工标签来指定。我们提出了一种RL微调框架，该框架使用自主视觉-语言评估作为GUI代理的可扩展监督信号。给定最终截图和原始指令，视觉-语言模型（VLM）判断任务完成情况并提供终端反馈，无需在策略优化过程中使用任务特定的启发式规则或人工标签。由于自主评估器不完美，我们将其反馈建模为有噪声的二元奖励通道，并推导出用于近端策略优化（PPO）的噪声校正奖励估计器。在macOSWorld、Windows
    Agent Arena和OSWorld上的实验表明，校正后的评估器奖励优于零样本基线和原始评估器奖励，在三个基准上平均成功率比零样本性能提高12.6个百分点，比原始评估器微调提高5.1个百分点。这些结果表明，当明确建模和校正评估器噪声时，自主评估可以作为GUI环境中RL的实用奖励信号。
  tldr_cn: 使用自主视觉-语言评估作为噪声奖励信号进行RL微调，噪声校正提升了三个基准的成功率。
  analysis_cn:
    innovations:
    - 使用自主视觉-语言评估作为GUI代理RL微调的可扩展奖励信号，无需手工设计奖励或人工标签。
    - 将评估器反馈建模为有噪声的二元奖励通道，并推导出用于近端策略优化的噪声校正奖励估计器。
    - 证明噪声校正后的评估器奖励在多个GUI基准上显著优于零样本基线和原始评估器微调。
    methodology: 该框架使用视觉-语言模型（VLM）根据最终截图和指令判断任务完成情况，提供终端二元反馈，并通过RL微调GUI代理策略。由于VLM评估器不完美，其反馈被建模为有噪声的二元通道，并推导出用于近端策略优化（PPO）的噪声校正奖励估计器。实验在macOSWorld、Windows
      Agent Arena和OSWorld上进行。
    key_results: 噪声校正后的评估器奖励在三个基准上平均成功率比零样本基线提高12.6个百分点，比原始评估器微调提高5.1个百分点。
