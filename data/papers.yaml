  abstract_cn: 长周期Web代理常常以最终答案评估所隐藏的方式失败：它们可能访问有用的页面，生成格式良好的答案，并自信地终止，但仍然遗漏字段、过度包含无依据的项目或依赖过时的证据。我们通过Parallel
    WebBench（一个包含1,679条已验证记录的并行Web探索基准：350个手动策划的并行任务和1,329条基于已验证URL轨迹的重建记录）来研究这些失败。我们在仅人类、平衡人类-合成以及合成密集型数据混合下，使用GRPO训练WebExplorer风格的代理。在16k上下文和16轮交互下，最佳GRPO模型将WebExplorer-8B的完成率从50.7%提升至96.0%，GPT-4.1-mini评估的逐元素F1从0.2489提升至0.4529，但二元准确率仍远低于完成率。轨迹级分析识别出三种持续失败模式：上下文受限的搜索循环、基于部分答案的过早终止，以及在已检索到相关证据后的综合崩溃。这些结果表明，合成数据GRPO减少了弃权并提高了部分正确性，但留下了完成-正确性差距，需要基于证据的覆盖和综合诊断。
