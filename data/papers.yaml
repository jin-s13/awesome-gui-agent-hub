  abstract_cn: 大型语言模型（LLM）智能体已超越生成式响应，能够通过调用工具、观察结果并迭代决定下一步行动来执行多步骤任务。大多数智能体系统运行在桌面或服务器上，支持工具使用和任务自动化。移动设备同样是重要的智能体环境，因为它们广泛可用且包含用户数据、传感器和日常应用。现有的移动智能体主要通过图形用户界面（GUI）操作（如点击、滑动和输入）来操控智能手机，这类操作通常形成冗长且依赖界面的序列，无法直接访问设备能力，且难以定义执行边界。我们提出PalmClaw，一个开源智能体框架，原生运行在手机上，直接在设备上管理会话、记忆、技能、工具和智能体循环。PalmClaw将设备能力暴露为具有显式参数、结构化结果和明确定义执行边界的设备工具。这种设计使智能体能够直接使用移动能力，同时保持每个动作的显式性和可控性。实验表明，与最强基线相比，任务成功率相对提升11.5%，完成时间减少94.9%，且设置负担更低，痕迹图说明了执行边界的应用。代码可在https://github.com/ModalityDance/PalmClaw获取。
