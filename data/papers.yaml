    methodology: MedCUA-Bench is an interactive, screenshot-only benchmark comprising
      18 clinical scenarios across 10 medical domains, built from real product manuals
      and open-source systems. Each task includes paired intent- and step-level goals,
      and agents are evaluated by a deterministic checker on task completion and five
      clinical safety dimensions. The benchmark was tested on 23 agents, including
      both closed-source and open-source models.
