  title_cn: VISUALSKILL：面向计算机使用代理的多模态技能
  abstract_cn: 计算机使用代理（CUA）在标准化基准上已达到接近人类水平的性能，但在长时任务和未见软件上仍存在困难。现有技能库通过可复用技能解决这一问题，但仅以文本形式表示技能工件，忽略了GUI交互的视觉特性。我们提出VISUALSKILL：一种分层多模态技能，针对每个目标应用定制，组织为按主题文件的中央索引，代理通过load_topic
    MCP工具按需获取相关主题的文本和图形。我们通过两阶段流水线构建每个技能，结合编写文档与实时应用程序UI探索。在两个CUA基准CUA-World和OSExpert-Eval上，由Claude
    Opus 4.6支持的Claude Code CLI代理使用VISUALSKILL达到平均得分0.456，比无技能基线（0.303）绝对提升15.3个百分点。与从相同源内容生成且仅模态不同的匹配纯文本技能相比，VISUALSKILL进一步获得8.3个百分点的绝对提升（0.373
