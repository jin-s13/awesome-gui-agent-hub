- id: envs-environment-native-verified-search-for-long-horizon-gu-2026
  title: 'ENVS: Environment-Native Verified Search for Long-Horizon GUI Agents'
  authors:
  - Yincheng Zhou
  - Athena Zhuoming Zhong
  - Shijie Zhang
  - Kevin Zhang
  - Teresa Xiaotao Shang
  - Shanghang Zhang
  abstract: 'As multimodal agents move from interface understanding to real software
    control, successful trajectory discovery in live desktop environments becomes
    a key challenge. GUI tasks require long-horizon sequences of precise mouse and
    keyboard actions, while feedback is sparse, delayed, and costly to obtain through
    VM rollouts. We propose Environment-Native Verified Search (ENVS), a training-time
    search-and-filter pipeline that uses the environment to construct verified supervision
    before policy optimization: it branches over behaviorally distinct GUI actions
    in live OSWorld VMs, verifies successful leaves, and trains from globally balanced
    step-level supervision. To evaluate robustness under realistic desktop interruptions,
    we also introduce OSWorld-Noisy, a dynamic benchmark for recoverable desktop interruptions
    that preserves the original tasks while testing whether agents can refocus, dismiss,
    wait, or recover under live perturbations. On the 300-task OSWorld pool, ENVS
    reaches 30.3 pass@8 on original evaluations and 29.0 on OSWorld-Noisy, outperforming
    matched ARPO-style online RL while reducing compute from 184-192 to 138-153 GPU-hours;
    even with only 30% of its search data, ENVS reaches 27.0 pass@8, exceeding ARPO
    from the base model. Training from noisy environments also better preserves visual-reasoning
    abilities on auxiliary benchmarks, including OSWorld-G Refusal (16.7 vs. 1.9)
    and BLINK Functional Correspondence (26.2 vs. 23.1).'
