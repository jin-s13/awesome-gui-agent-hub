- id: caped-context-aware-privacy-exposure-defense-for-mobile-gui-2026
  title: 'CAPED: Context-Aware Privacy Exposure Defense for Mobile GUI Agents'
  authors:
  - Siyu Shen
  - Fenghao Xu
  - Wenrui Diao
  - Kehuan Zhang
  abstract: 'Screenshot-based mobile GUI agents can operate ordinary smartphone apps
    through the same visual interface as a human user, but this capability also turns
    every screen observation into a privacy boundary. During normal task execution,
    screenshots may expose contacts, messages, photos, files, recommendations, health
    cues, and other sensitive context that is unrelated to the user''s request. We
    call this problem incidental visual privacy exposure. It is difficult to address
    with existing defenses: text anonymization misses many visual and inferential
    cues, while generic privacy masking can remove the evidence and controls that
    a GUI agent needs to complete the task. This paper presents CAPED, a context-aware
    pre-upload exposure control layer for mobile GUI agents. CAPED is designed as
    a phone-side protection layer: before screenshots are released to a remote multimodal
    agent, it extracts task requirements, uses screen context as a privacy prior,
    parses visible UI elements, and selectively exposes only content needed for the
    current task while masking incidental private content. We evaluate CAPED on AndroidWorld
    for broad task utility and with a controlled 28-task seeded privacy evaluation
    used as a measurement instrument for trajectory-level incidental leakage. In this
    seeded evaluation, Full CAPED reduces success-conditioned weighted seeded leakage
    from 0.766 under raw screenshots to 0.268 while preserving high task utility.
    A broader AndroidWorld run shows a remaining prototype-level utility cost, but
    the results show that task-driven selective exposure can reduce incidental visual
    leakage before screenshots are released to a remote GUI agent.'
