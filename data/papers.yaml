  title_cn: Fara-1.5：面向计算机使用智能体的可扩展学习环境
  abstract_cn: 从人类演示中收集计算机使用数据既昂贵又缓慢，这促使我们需要可扩展的生成策略。这需要两个关键要素：智能体可以行动的环境，以及能够判断其演示是否成功的验证器。我们提出了FaraGen1.5，一个用于计算机使用智能体的可扩展数据流水线，由三个模块化组件组成：环境、求解器和验证器。FaraGen1.5同时使用实时网站和合成环境，后者能够忠实地模拟需要身份验证或需要不可逆操作的领域。它采用了一个可由多个模型（包括GPT-5.4等强大前沿模型）驱动的求解器框架，并集成了一个用户模拟器以实现多轮交互。最后，FaraGen1.5通过三个互补的验证器对生成的轨迹进行评分，涵盖任务正确性、效率和关键点遵循。利用该流水线产生的数据，我们训练了Fara1.5——一个基于Qwen3.5（4B、9B和27B）构建的原生计算机使用智能体（CUA）家族，涵盖三种规模。为了训练这些模型，我们采用了一种监督微调（SFT）策略，该策略精心平衡了来自FaraGen1.5的数据，以覆盖广泛场景、特定高价值任务，并通过迭代方式针对模型缺陷进行修正。每个模型在其规模类别上都在浏览器使用基准测试中达到了新的最先进水平：Fara1.5-9B在Online-Mind2Web上达到63.4%，在WebVoyager上达到86.6%；Fara1.5-27B在Online-Mind2Web上达到72.3%，与规模大得多的专有系统相比具有竞争力。
  tldr_cn: FaraGen1.5流水线通过合成/实时环境生成可扩展的计算机使用智能体数据；训练的Fara1.5模型在浏览器使用基准上达到SOTA。
  analysis_cn:
    innovations:
    - FaraGen1.5：一个模块化组件（环境、求解器、验证器）的可扩展数据流水线，用于计算机使用智能体训练
    - 合成环境，能够模拟需要身份验证或需要不可逆操作的领域，补充实时网站
    - 支持多个模型（包括GPT-5.4）的求解器框架以及用于多轮交互的用户模拟器
    - 三个互补的验证器，对轨迹的任务正确性、效率和关键点遵循进行评分
    - 训练策略平衡流水线数据以覆盖广泛场景、高价值任务，并迭代修正模型缺陷
    - Fara1.5原生计算机使用智能体家族（4B、9B、27B）在其规模类别上设定新的最先进水平
    methodology: FaraGen1.5使用实时和合成环境、支持多个模型和用户模拟器的求解器框架以及三个验证器生成训练数据。所得数据用于监督微调Fara1.5智能体（基于Qwen3.5，规模为4B、9B、27B），采用平衡策略覆盖广泛场景、高价值任务，并迭代针对缺陷。智能体在浏览器使用基准Online-Mind2Web和WebVoyager上评估。
    key_results: Fara1.5-9B在Online-Mind2Web上达到63.4%，在WebVoyager上达到86.6%；Fara1.5-27B在Online-Mind2Web上达到72.3%，与规模大得多的专有系统相比具有竞争力，每个模型在其规模类别上均设定新的最先进水平。
