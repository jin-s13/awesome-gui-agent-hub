  title_cn: PhoneHarness：通过混合GUI、CLI和工具操作来驾驭手机使用代理
  abstract_cn: 手机代理越来越被期望完成真实的移动工作流程，而不仅仅是预测下一个屏幕操作。然而，当前大多数移动代理文献仍然主要将代理评估为GUI控制器，它们观察屏幕、发出点击和滑动操作，并根据目标应用状态进行评分。真实的手机使用任务更为广泛：它们需要决定何时使用应用GUI、设备端命令或结构化工具，同时留下证据表明预期的副作用确实发生了。我们引入了PhoneHarness，这是一个混合操作基准和执行框架，用于研究在可验证移动工作流程上的手机使用代理。PhoneHarness在GUI、CLI和主机端工具操作上运行设备端代理循环，结合了确定性操作路由、有界GUI委托和可审计的执行轨迹。其基准测试PhoneHarness
    Bench评估代理是否完成具有可观察副作用的任务，而不仅仅是它们是否产生合理的最终答案。在标注的评估分割上，PhoneHarness达到了75.0%的通过率，比最强的非PhoneHarness设置高出12.9个百分点。因此，PhoneHarness和PhoneHarness
    Bench扮演着不同但相互依赖的角色：框架使混合手机工作流程可执行，而基准测试衡量代理是否能够可靠且安全地使用该框架。我们的发现表明，可靠的手机自动化依赖于操作表面路由和可验证执行，而不仅仅是视觉GUI控制。
