  title_cn: GUI代理真正需要什么样的记忆？从被动记录到主动任务驱动状态
  abstract_cn: 移动GUI代理越来越多地面临需要跨页面和应用程序读取、更新和重用任务相关数据的长时域任务。现有方法将记忆主要视为被动存储，即积累过去的观察并在需要时检索。然而，检索一个值并不能揭示其在工作流中的当前角色。代理仍然需要从积累的记录中推断该值是应该现在使用、已经使用过，还是必须等待后续依赖。这种隐式重构在具有重复值、干扰项和过时状态的长轨迹中变得不可靠，导致重复或遗漏操作。为了解决这个问题，我们提出了主动任务驱动记忆（ATMem），它将GUI代理的记忆从被动存储转变为主动维护的执行状态。ATMem将任务相关信息维护为一个持续更新的执行状态，将每个值与其角色和当前状态关联，从而能够基于当前工作流状态选择动作。虽然监督微调使代理能够构建ATMem，但它并没有教会代理何时ATMem是有益的。因此，我们引入了STR-GRPO，一种在线强化学习方法，通过对比启用记忆和禁用记忆的轨迹来鼓励基于记忆对任务完成的贡献进行选择性使用。STR-GRPO通过对比记忆开启和记忆关闭的轨迹来估计何时记忆使用能改善执行，同时记忆成本感知奖励会惩罚那些不改善执行的高成本记忆使用。为了评估代理是否能在避免范围外动作的同时完成所有范围内工作，我们构建了一个具有挑战性的移动基准测试。从一系列几乎相同的条目中，代理必须对每个满足指令的条目执行操作，并拒绝违反其约束的条目。我们进一步引入了应用级进度和范围感知F1来分别衡量这两个维度。
  tldr_cn: 提出ATMem，将GUI代理记忆从被动存储转为主动执行状态，结合STR-GRPO强化学习。
  analysis_cn:
    innovations:
    - 主动任务驱动记忆（ATMem）：将GUI代理的记忆从被动存储转变为主动维护的执行状态，将每个值与其角色和当前状态关联。
    - STR-GRPO：一种在线强化学习方法，通过对比启用记忆和禁用记忆的轨迹来鼓励选择性使用ATMem，并采用记忆成本感知奖励。
    - 一个具有挑战性的移动基准测试，用于评估代理是否完成所有范围内工作同时避免范围外动作，包含几乎相同的条目。
    - 新指标：应用级进度（App-Level Progress）和范围感知F1（Scope-Aware F1），分别衡量任务进度和范围遵守情况。
    methodology: 该论文提出了ATMem，一个维护任务相关信息持续更新执行状态的记忆模块。代理首先通过监督微调训练以构建ATMem，然后使用STR-GRPO进行微调，STR-GRPO是一种在线强化学习方法，通过比较启用和禁用记忆的轨迹来学习选择性记忆使用，并使用惩罚不改善执行的高成本记忆操作的奖励。评估在一个新构建的移动基准测试上进行，要求代理对符合指令的条目执行操作并拒绝其他条目，使用指标应用级进度和范围感知F1。
    key_results: 摘要中未报告具体的实验结果；该论文介绍了用于评估的基准测试和指标。
