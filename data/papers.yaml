    methodology: The paper proposes a pipeline that decomposes mobile UI annotation
      into context-aware stages using multimodal large language models with structured
      prompts and schema-constrained JSON outputs. Experiments compare one-step, two-step,
      four-step, and eight-step workflows on the expert-annotated MUIAnno dataset
      across eight common UI element types, measuring precision and recall. Additional
      grouping experiments assess the impact of element-class grouping on annotation
      quality.
    key_results: The two-step workflow achieves the highest precision, while deeper
      decomposition improves recall but introduces more false positives. Annotation
      quality depends on both workflow depth and how element classes are grouped.
    limitations:
    - Deeper workflow decomposition increases false positives, indicating a precision–recall
      trade-off.
    - Results are based on a single dataset (MUIAnno) and eight specific UI element
      types, limiting generalizability.
    - Outputs remain sensitive to prompt design and task organization, as noted in
      the abstract.
    - No single workflow or grouping strategy is universally optimal; performance
      varies with element classes.
  title_cn: 基于上下文感知的工作流分解：使用多模态大语言模型实现自动化移动用户界面标注
  abstract_cn: 准确的移动用户界面标注对于UI理解、无障碍工具、自动化测试、数据集构建和GUI代理至关重要。然而，移动屏幕难以标注，因为它们通常包含微小、密集、嵌套且视觉上模糊的元素。多模态大语言模型可以帮助自动化这一过程，但其输出对提示设计和标注任务的组织方式敏感。本文从工作流设计的角度研究自动化移动UI标注，重点关注提高标注精确率。不同于要求模型单步标注所有UI元素，本文将任务划分为更小的上下文感知阶段，使得相关UI元素能够在更清晰的指令和有用的屏幕上下文中得到处理。所提出的流水线使用结构化提示、模式约束的JSON输出以及元素特定的标注指令。实验在专家标注的MUIAnno数据集上进行，涵盖八种常见UI元素类型：按钮、标签页、可点击文本、卡片、标签、纯文本、图标和图像。评估了四种工作流策略：一步、两步、四步和八步标注。结果表明，两步工作流实现了最高的精确率，而更深层次的分解提高了召回率但产生了更多误报。额外的分组实验表明，标注质量取决于工作流深度和元素类别分组。总体而言，精心设计的工作流可以使基于LLM的移动UI标注在UI理解、数据集构建和GUI代理开发中更加可靠。
  tldr_cn: 提出基于上下文感知的工作流分解，使用多模态大语言模型自动化移动UI标注，两步分解实现更高精确率。
  analysis_cn:
    innovations:
    - 针对移动UI标注的上下文感知工作流分解，将任务划分为更小的阶段而非单步标注。
    - 使用结构化提示和模式约束的JSON输出来引导多模态大语言模型。
    - 针对不同UI元素类型定制的元素特定标注指令。
    - 系统评估工作流深度（一步、两步、四步、八步）和元素类别分组对标注质量的影响。
    methodology: 本文提出了一种流水线，利用多模态大语言模型，通过结构化提示和模式约束的JSON输出，将移动UI标注分解为上下文感知的阶段。实验在专家标注的MUIAnno数据集上比较了一步、两步、四步和八步工作流，涵盖八种常见UI元素类型，测量精确率和召回率。额外的分组实验评估了元素类别分组对标注质量的影响。
    key_results: 两步工作流实现了最高的精确率，而更深层次的分解提高了召回率但引入了更多误报。标注质量取决于工作流深度和元素类别的分组方式。
    limitations:
    - 更深层次的工作流分解增加了误报，表明存在精确率-召回率的权衡。
    - 结果基于单一数据集（MUIAnno）和八种特定UI元素类型，限制了泛化性。
    - 如摘要所述，输出仍然对提示设计和任务组织敏感。
    - 没有单一的工作流或分组策略是普遍最优的；性能随元素类别而变化。
