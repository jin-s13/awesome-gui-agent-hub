    - 将解析经验转化为结构化图像-文本指令的教程合成器
    methodology: Demo2Tutorial通过专用记录器收集人类经验，然后使用多模态动作解析器重建感知、动作和意图。步骤规划器将这些步骤抽象为层次化任务图，教程合成器生成结构化的图像-文本教程。在一个基于官方软件文档的新基准上进行评估，衡量教程质量、人类任务完成速度和GUI智能体规划能力。
