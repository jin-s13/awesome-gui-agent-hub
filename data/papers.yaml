  title_cn: MacArena：在在线macOS环境中基准测试计算机使用代理
  abstract_cn: 计算机使用代理（CUA）通过视觉和控制原语操作图形用户界面（GUI），其能力在标准化在线评估基准（如OSWorld）的推动下迅速发展，这些基准既作为评估工具，也作为强化学习的训练环境。然而，macOS在此领域中仍未被充分覆盖：现有的唯一基准macOSWorld仅覆盖了少数第一方应用且任务较简单，并在与Apple
    Silicon不兼容的x86虚拟机上运行。我们提出了MacArena，一个包含50个应用、421个手动验证任务的基准，它结合了OSWorld任务的精选移植、来自macOSWorld的内容以及49个新的macOS原生任务，全部在Apple
    Silicon上的Apple原生虚拟化框架上运行。我们认为macOS带来了Linux基准无法捕捉的独特GUI挑战，我们的评估支持这一观点：模型在现有基准上的强劲表现可能反映的是对任务分布的熟悉程度，而非真正的跨平台GUI能力。值得注意的是，模型排名在移植任务和macOS原生任务之间发生反转，一个领先模型在MacArena子集上落后超过26%，这表明macOS对当前GUI代理而言是一个更困难的环境。
  tldr_cn: MacArena基准测试含50应用421任务，显示GUI代理在macOS上比Linux更难。
  analysis_cn:
    innovations:
    - 提出了MacArena，一个包含50个应用、421个手动验证任务的计算机使用代理基准，结合了OSWorld任务的移植、macOSWorld内容以及49个新的macOS原生任务。
    - 在Apple Silicon上的Apple原生虚拟化框架上运行，解决了先前macOS基准与Apple Silicon不兼容的问题。
    - 证明了macOS存在独特的GUI挑战，且模型排名在移植任务和macOS原生任务之间反转，揭示了在现有基准上的强劲表现可能反映的是任务分布熟悉度而非跨平台能力。
    methodology: 该基准包含50个应用中的421个任务，结合了OSWorld任务的精选移植、来自macOSWorld的内容以及49个新的macOS原生任务，全部在Apple
      Silicon上的Apple原生虚拟化框架上执行。计算机使用代理在此基准上进行评估，并比较了移植任务子集和macOS原生任务子集的性能。
    key_results: 模型排名在移植任务和macOS原生任务之间反转，一个领先模型在MacArena子集上落后超过26%，表明macOS对当前GUI代理而言是一个更困难的环境。
