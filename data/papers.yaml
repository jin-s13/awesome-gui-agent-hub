  analysis:
    innovations:
    - Introduction of Ko-WideSearch, the first Korean breadth-search benchmark for
      exhaustive set enumeration by web agents.
    - Automated synthesize-and-verify pipeline for constructing breadth tasks with
      complete gold sets and attribute tables.
    - 'Difficulty tiers controlled by two independent structural knobs: table width
      and a 2-D composite key, causing cross-product membership to vary from 0% to
      100%.'
    - Normalization-aware comparator shared between gold construction and grading
      to prevent over-dropping of stable date and count columns due to formatting
      differences.
    methodology: The benchmark is built via an automated synthesize-and-verify pipeline
      that generates tasks requiring full membership and per-item attribute tables
      for set-parent entities (e.g., TV seasons, dynasties). It contains 228 tables
      over 190 entities across 16 categories, with three difficulty tiers set by independently
      varying table width and a 2-D composite key. Evaluation uses Item-F1, Column-F1,
      and Row-F1, and a normalization-aware comparator is shared between gold construction
      and grading to ensure stable columns are not unfairly penalized.
    key_results: Across 20 web agents, Item-F1 reached 92.8 but Row-F1 only 53.7,
      showing agents recover set members but fail to correctly fill attribute rows.
      Performance degrades steadily as difficulty knobs harden, and neither additional
      search steps nor higher spending closes the gap. Error analysis reveals that
      finding correct values for open-ended free-text cells is the main challenge,
      while cells with standard answers like dates or names are usually correct.
    limitations:
    - The benchmark is limited to Korean, so findings may not generalize to other
      languages or multilingual settings.
    - The automated synthesize-and-verify pipeline may still produce imperfect gold
      sets despite the normalization-aware comparator, as certifying completeness
      and correctness remains inherently costly.
    - The difficulty knobs (table width and composite key) may not capture all real-world
      breadth challenges, such as dynamic or ambiguous set boundaries.
  title_cn: Ko-WideSearch：面向网络代理的穷举集合枚举的韩语广度搜索基准
  abstract_cn: 网络代理基准测试 overwhelmingly 衡量深度——在一系列约束背后定位一个晦涩的答案——而广度，即穷举枚举一个封闭集合并填充每个项目的属性，几乎未被评估，尤其是在英语之外。广度也很难构建：证明黄金集合的完整性以及每个单元格的正确性比检查单个答案昂贵得多。我引入了
    Ko-WideSearch，这是一个通过自动化合成与验证流水线构建的韩语广度搜索基准。每个任务命名一个集合父实体——电视剧季、王朝、联赛、行政区、选举——并要求其完整成员资格加上每个项目的属性表，通过
    Item-F1、Column-F1 和 Row-F1 进行评分。它包含 228 个表格，涵盖 190 个实体和 16 个类别，分为三个难度等级，由我独立调节的两个结构旋钮——表格宽度和二维复合键——设定，因此跨产品成员资格从
    0% 到 100% 随等级变化。一个单一的归一化感知比较器在黄金构建和评分之间共享，因此稳定的日期和计数列不会仅因格式差异而被过度丢弃。在 20 个网络代理中，失败是一致的：代理恢复了集合但未能恢复行（例如
    Item-F1 92.8 对比 Row-F1 53.7），随着旋钮变硬，准确率稳步下降，并且更多的搜索或更多的花费都无法缩小差距。按单元格细分，难点在于找到正确的值，而不是格式化：开放式自由文本单元格失败最多，而具有标准答案（如日期或名称）的单元格通常正确。
  tldr_cn: 提出Ko-WideSearch，一个韩语广度搜索基准，揭示网络代理在穷举集合枚举上的困难。
  analysis_cn:
    innovations:
    - 引入 Ko-WideSearch，首个用于网络代理穷举集合枚举的韩语广度搜索基准。
    - 自动化合成与验证流水线，用于构建具有完整黄金集合和属性表的广度任务。
    - 由两个独立结构旋钮（表格宽度和二维复合键）控制的难度等级，使跨产品成员资格从 0% 变化到 100%。
    - 在黄金构建和评分之间共享的归一化感知比较器，防止因格式差异过度丢弃稳定的日期和计数列。
    methodology: 该基准通过自动化合成与验证流水线构建，生成需要完整成员资格和每个项目属性表（针对集合父实体，如电视剧季、王朝）的任务。包含 228
      个表格，涵盖 190 个实体和 16 个类别，三个难度等级通过独立变化表格宽度和二维复合键设定。评估使用 Item-F1、Column-F1 和 Row-F1，并在黄金构建和评分之间共享归一化感知比较器，以确保稳定列不被不公平地惩罚。
    key_results: 在 20 个网络代理中，Item-F1 达到 92.8，但 Row-F1 仅为 53.7，表明代理恢复了集合成员但未能正确填充属性行。随着难度旋钮变硬，性能稳步下降，额外的搜索步骤或更高的花费都无法缩小差距。错误分析显示，为开放式自由文本单元格找到正确值是主要挑战，而具有标准答案（如日期或名称）的单元格通常正确。
    limitations:
    - 该基准仅限于韩语，因此发现可能无法推广到其他语言或多语言环境。
    - 尽管有归一化感知比较器，自动化合成与验证流水线仍可能产生不完美的黄金集合，因为证明完整性和正确性本质上成本高昂。
    - 难度旋钮（表格宽度和复合键）可能无法捕捉所有现实世界的广度挑战，例如动态或模糊的集合边界。
