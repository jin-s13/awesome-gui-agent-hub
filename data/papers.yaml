  title_cn: 能干但粗心：计算机使用代理是否遵循情境完整性？
  abstract_cn: 计算机使用代理（CUA）现在代表用户在个人应用程序（如电子邮件、日历和待办事项列表）中执行操作。这种跨应用程序访问虽然有用，但也带来了一个被广泛忽视的隐私风险：当代理在一个上下文中工作时，它可能会从另一个不适当的上下文中拉取信息。因此，我们引入了AgentCIBench，这是一个评估工具，将这种风险转化为可执行、确定性评分的场景。我们针对CUA中的三种常见故障模式：visual
    co-location、task-ambiguity overshare和recipient misalignment。我们评估了15个前沿代理，发现失败率惊人地高：15个中有11个在超过50%的场景中泄露，平均泄露率为67.9%，并且当代理在环境中端到端完成任务时，同样的故障仍然存在。我们发布AgentCIBench以鼓励开发更安全的计算机使用代理，并将情境披露测试定位为部署前的安全检查。
  tldr_cn: 引入AgentCIBench评估计算机使用代理的隐私风险，发现15个代理因情境完整性违规而普遍高失败率。
