  abstract: Graphical user interface (GUI) agents build on vision-language models
    to complete user tasks end-to-end in real applications through interface actions
    such as tapping, swiping, text entry, and navigation. However, existing GUI agents
    are trained and evaluated largely on offline trajectories, simulated environments,
    and standardized benchmarks. These differ substantially from real applications
    in interface layout, interaction logic, and abnormal-state distribution, and cannot
    faithfully characterize execution stability in real-world use, where account states,
    permission dialogs, payment authentication, and risk control continually reshape
    the state distribution and open a persistent gap between benchmark scores and
    real usability. To close this gap, we propose Xiaomi-GUI-0, a native multimodal
    GUI agent for real mobile environments, trained and evaluated within a real-device
    closed loop. At its core is a real-device-dominant hybrid infrastructure, where
    physical devices are the primary execution environment and sandboxes provide auxiliary
    support, so that data collection, training, rollout, and evaluation share an execution
    distribution close to real deployment. We construct multi-source training data
    spanning high-frequency head tasks, high-generalization data for long-tail intents,
    and capability-enhancement data for reflection and memory, and introduce an error-driven
    data flywheel that turns failure trajectories into corrected actions, reflective
    explanations, and recovery demonstrations. The model is trained through a progressive
    three-stage pipeline of supervised fine-tuning, step-level reinforcement learning,
