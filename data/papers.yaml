  analysis:
    innovations:
    - Transferable interaction patterns (TIPs) that pair induced skills with structural
      sketches of the page snapshot for layout-based skill retrieval and transfer
      across sites.
    - SkillMigrator agent that retrieves skills by layout similarity and grounds their
      references on the live page, enabling cross-domain skill reuse without relying
      on instruction similarity or site metadata.
    methodology: 'SkillMigrator induces web skills from trajectories and stores them
      as TIPs: each skill is paired with a structural sketch of the snapshot at induction
      time. At test time, it retrieves TIPs by layout similarity and grounds their
      element references on the current page. The agent uses standard accessibility-snapshot
      observations with stable references and fixed tool calling over primitives plus
      skill invocations. Evaluation is on WebArena and Mind2Web against state-of-the-art
      baselines, measuring LLM-action count on successful trajectories at matched
      success rate.'
    key_results: SkillMigrator reduces the average LLM-action count on successful
      trajectories by 8-10% across both WebArena and Mind2Web compared to state-of-the-art
      approaches, while maintaining matched success rate.
    limitations: []
  title_cn: 超越领域：通过可迁移交互模式复用网络技能
  abstract_cn: 大型语言模型（LLM）网络代理通常被部署为工具调用者：每轮，模型读取新的页面观察并输出一个结构化的工具动作。当每个动作都是低级原语时，任务步数迅速增长，导致面向策略的LLM补全次数增加，在Mind2Web和WebArena等基准测试中主导了延迟和成本。因此，最近的系统将重复的交互片段封装为网络技能：从成功轨迹或诱导程序中构建的可调用工具，一次调用可替代多个原语。然而，先前的技能库仍然主要依赖于指令相似性或粗略的站点元数据来触发，导致在未见站点上技能复用率低，并且未能充分利用潜在的步骤和令牌减少。我们提出了SkillMigrator，一种学习可复用网络技能并通过匹配布局结构而非特定元素引用来跨站点迁移技能的代理。每个诱导技能存储为可迁移交互模式（TIP）：技能与诱导时快照的结构草图配对。在测试时，SkillMigrator通过布局相似性检索TIP，并将其引用锚定到实时页面。其余部分为标准配置：具有稳定引用的可访问性快照观察，以及基于原语加技能调用的固定工具调用。与最先进的方法相比，SkillMigrator在WebArena和Mind2Web上以匹配的成功率将成功轨迹上的平均LLM动作次数减少了8-10%。
  tldr_cn: SkillMigrator通过学习可复用网络技能并通过匹配布局结构跨站点迁移，在基准测试上将LLM动作次数减少8-10%。
  analysis_cn:
    innovations:
    - 可迁移交互模式（TIP），将诱导技能与页面快照的结构草图配对，用于基于布局的技能检索和跨站点迁移。
    - SkillMigrator代理通过布局相似性检索技能并将其引用锚定到实时页面，实现跨领域技能复用，无需依赖指令相似性或站点元数据。
    methodology: SkillMigrator从轨迹中诱导网络技能并将其存储为TIP：每个技能与诱导时快照的结构草图配对。在测试时，它通过布局相似性检索TIP，并将其元素引用锚定到当前页面。该代理使用具有稳定引用的标准可访问性快照观察，以及基于原语加技能调用的固定工具调用。在WebArena和Mind2Web上针对最先进的基线进行评估，测量匹配成功率下成功轨迹上的LLM动作次数。
    key_results: 与最先进的方法相比，SkillMigrator在WebArena和Mind2Web上以匹配的成功率将成功轨迹上的平均LLM动作次数减少了8-10%。
    limitations: []
    tech_stack: []
