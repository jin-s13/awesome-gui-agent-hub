  title_cn: 一个小型语言与视觉语言模型网络代理中GRPO的学习率门控失败：一个受控零结果及其机制
  abstract_cn: 基于可验证奖励的强化学习，特别是群体相对策略优化（GRPO），现在通常对监督检查点进行例行训练，以期产生更强的代理。我们探究它是否在4B到8B规模的小型语言与视觉语言模型网络代理中增加了技能，还是主要重塑了监督模型已有的行为。通过一个包含18次运行的受控网格，该网格变化了学习率、KL权重、随机种子、初始化和裁剪，没有一种配置能在代理基本掌握的任务上可信地提高强监督基线的成功率。在文本轨道上，中等到高学习率使其可信地变差。在配对检验、25个评估种子、6个训练种子、配方变化、文本和Set-of-Marks截图观测以及将骨干网络扩展到8B的情况下，零结果依然成立；可信的损害是文本轨道的发现，在Set-of-Marks下仅是名义上的。为了证明零结果反映了设置而非管道损坏，我们在奖励可通过采样达到的任务上运行相同的框架、奖励和配方，结果成功率提高了22个百分点，且配对区间排除零。因此，GRPO仅在存在上升空间时才有帮助，即采样策略已经比贪心策略更成功。然后我们解释这种失败。中等学习率使代理退化，高学习率使其崩溃，这两个机制形成双重分离：嫁接将退化定位于注意力与MLP块，而崩溃机制无法追溯到任何单一组，并且主导权重移动的嵌入变化是因果惰性的。在4B规模下，后层有效秩在两个方向上跟踪能力；在8B规模下，两者分离。这种耦合仅存在于较小模型中，因此我们将其报告为尺度依赖的。
  tldr_cn: GRPO未能改进已掌握任务的小型网络代理；仅在存在提升空间时有效，学习率门控导致失败。
  analysis_cn:
    innovations:
    - 在4B-8B规模下，对18次GRPO运行进行受控网格实验，显示相对于强监督网络代理基线没有可信改进
    - 证明GRPO仅在采样策略已经优于贪心策略时，即存在上升空间时才有帮助
    - 双重分离机制：中等学习率通过注意力/MLP块退化代理，高学习率导致无法追溯到任何单一组的崩溃，且嵌入变化是因果惰性的
    - 尺度依赖的后层有效秩与能力耦合，在4B规模下存在而8B规模下不存在
    methodology: 该研究在4B-8B语言与视觉语言模型网络代理上运行了18个GRPO实验的受控网格，变化学习率、KL权重、随机种子、初始化和裁剪，使用文本和Set-of-Marks截图观测。采用25个评估种子和6个训练种子的配对检验，并通过奖励可通过采样达到的控制任务验证管道，随后使用嫁接和有效秩分析来剖析失败机制。
    key_results: 没有GRPO配置可信地改进监督基线；中等到高学习率可靠地损害文本轨道，而零结果在Set-of-Marks和扩展到8B时成立。GRPO仅在采样策略已经优于贪心策略时成功，且失败表现出双重分离：退化定位于注意力/MLP块，崩溃非组特定，嵌入变化因果惰性；有效秩在4B追踪能力，但在8B分化。
    limitations:
    - 结果仅限于4B-8B规模，可能不泛化到更大模型
    - 发现仅限于网络代理领域和强监督基线
    - 可信损害是文本轨道发现，仅在Set-of-Marks观测下是名义上的
    - 尺度依赖的有效秩耦合仅针对较小模型报告
