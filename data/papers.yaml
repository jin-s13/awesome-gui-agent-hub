  title_cn: 'GUICrafter: 利用海量未标注截图的弱监督GUI智能体'
  abstract_cn: 数据作为现代智能的基础基质，极大地推动了当前基础模型的发展。自然地，研究人员希望将这一范式扩展到GUI智能体领域，希望通过类似的范式构建强大的GUI智能体。然而，GUI智能体数据无法直接从互联网获取，导致大规模收集成本高昂且困难。因此，当前的GUI智能体存在跨设备泛化能力差以及对细粒度GUI元素的视觉定位能力有限的问题。为了解决GUI智能体中的数据挑战，我们提出了GUICrafter，一种利用海量未标注截图来大幅减少对昂贵人工标注依赖的弱监督GUI智能体。GUICrafter探索了一种课程学习框架，通过两个渐进阶段训练GUI智能体。首先，模型从大规模未标注截图和网页中学习视觉定位，利用GUI交互中丰富的上下文信号，无需人工标注。然后，在第二阶段，我们利用少量高质量数据通过强化学习对模型进行校准。实验表明，GUICrafter在使用仅0.1%数据的情况下，达到了与UI-TARS等先进系统竞争甚至更优的性能。此外，在相同标注数据量下，GUICrafter超越了所有先前方法，如GUI-R1。代码、数据和模型可在https://github.com/fansunqi/GUICrafter获取。
  tldr_cn: GUICrafter利用未标注截图的弱监督学习训练GUI智能体，以极少量标注数据实现强性能。
  analysis_cn:
    innovations:
    - 利用海量未标注截图的弱监督GUI智能体，减少对昂贵人工标注的依赖
    - 两阶段课程学习框架：从未标注数据学习视觉定位，然后通过强化学习用少量高质量数据校准
    - 仅用UI-TARS 0.1%的数据即达到竞争性能
    methodology: GUICrafter采用两阶段课程：首先，模型从大规模未标注截图和网页中利用上下文信号学习视觉定位，无需人工标注；其次，通过强化学习用少量高质量标注数据进行校准。
