    methodology: ENVS使用实时OSWorld虚拟机分支行为不同的GUI动作，验证成功轨迹，然后从全局平衡的步骤级监督训练策略。与ARPO风格的在线强化学习在300个任务的OSWorld池和新OSWorld-Noisy基准上进行对比。
    key_results: ENVS在原始OSWorld上达到30.3 pass@8，在OSWorld-Noisy上达到29.0，优于ARPO风格的在线强化学习，同时将计算量从184-192
      GPU小时减少到138-153 GPU小时。仅使用30%的搜索数据时，达到27.0 pass@8，超过基于基础模型的ARPO；从噪声环境训练还能更好地保留视觉推理能力（OSWorld-G
