- id: comact-reframing-professional-software-manipulation-via-com-2026
  title: 'ComAct: Reframing Professional Software Manipulation via COM-as-Action Paradigm'
  authors:
  - Jiaxin Ai
  - Tao Hu
  - Xuemeng Yang
  - Shu Zou
  - Hairong Zhang
  - Daocheng Fu
  - Yu Yang
  - Hongbin Zhou
  - Nianchen Deng
  - Pinlong Cai
  - Zhongyuan Wang
  - Botian Shi
  - Kaipeng Zhang
  - Licheng Wen
  abstract: 'Existing computer-use agents remain fundamentally limited in professional
    software manipulation: GUI-based agents suffer from fragile visual grounding and
    long-horizon error accumulation, while API-basedapproaches struggle with heterogeneous
    protocols and inaccessible commercial interfaces. In this work,we identify the
    Component Object Model (COM) as a unified executable abstraction, proposing COM-as-Action:
    a new paradigm that reframes professional software interaction as deterministic
    program synthesisrather than sequential visual control. To validate this paradigm
    in the most demanding environments, weintroduce ComCADBench, the first benchmark
    for agents operating real industrial CAD software. Ourexperiments reveal a substantial
    paradigm gap: frontier proprietary models achieve near-zero successunder GUI-based
    interaction, whereas COM-based execution yields substantial immediate gains. Tobridge
    the remaining gap between syntactic correctness and geometric accuracy, we develop
    ComActor, aself-correcting agent trained through a progressive three-stage framework,
    alongside ComForge, a scalableplatform for large-scale training in Windows containers.
    Extensive experiments show that ComActorachieves state-of-the-art performance
    on ComCADBench, with strong resilience in long-horizon taskswhere baselines collapse,
    and generalizes to external CAD benchmark.'
