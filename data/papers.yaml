  title_cn: 'Plover: 通过以计划为中心的交互引导GUI代理'
  abstract_cn: 图形用户界面（GUI）自动化在现实环境中仍然具有挑战性，动态布局、意外对话框和不断变化的界面状态可能导致自主代理偏离用户意图。最近的基于视觉的多模态代理通过直接操作截图和自然语言指令提高了灵活性，但其规划和适应过程通常保持内部化，限制了用户检查、监督或纠正系统行为的能力。我们提出Plover，一个以计划为中心的基于视觉的GUI自动化系统，将任务计划和重新规划外化为持久、可检查、可修订的工件。通过规划器-执行器架构，Plover支持对演化执行的显式监督、通过可编辑计划的局部修正、自然语言指导以及基于截图的干预，同时在修复过程中保留先前进度。一项有六名参与者的形成性研究为交互设计提供了信息。随后，我们通过基准失败案例修复和基于场景的工作流分析对Plover进行评估。结果表明，当计划保持可见且干预是局部时，许多自主GUI代理的失败在结构上是可修复的，并且明确的重新规划有助于使GUI自动化更透明、可控和适应性强。
  tldr_cn: Plover将GUI代理的计划外化为可检查的工件，支持局部修正和重新规划，从而实现透明、可控的自动化。
