    methodology: MemVenom是一种黑盒攻击，对Web代理中的图结构外部记忆进行投毒。它采用两阶段过程：触发条件检索攻击确保恶意记忆的高概率召回，以及检索后攻击诱导，应用对抗扰动和隐蔽OCR注入来覆盖原始用户目标。该方法在多个Web代理框架和视觉语言模型上进行了评估。
