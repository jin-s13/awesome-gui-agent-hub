  title_cn: PPT-Eval：面向计算机使用代理的PowerPoint任务基准测试
  abstract_cn: 创建和编辑幻灯片是一种丰富的多模态活动，在专业和教育环境中无处不在，使其成为现实世界计算机使用代理的理想测试平台。Microsoft
    PowerPoint 是演示文稿创建中应用最广泛、功能最丰富的环境之一。我们提出了 PPT-Eval，一个包含 12 个文件中 120 个 PowerPoint
    任务的基准测试，涵盖内容创建和演示编辑场景，并按难度组织。该领域的一个核心挑战是评估：任务复杂、多模态，且通常允许多种有效解决方案。此外，当前的代理往往只取得部分进展，而二元成功指标无法捕捉这一点。为解决此问题，我们设计了一个鲁棒的评估框架，帮助为
    PowerPoint 任务创建特定于任务的评分标准，借鉴并扩展了以往基于评分标准的评估工作。这些评分标准为中间步骤分配部分分数，惩罚不必要的更改和不良美学，并提供自然语言反馈。这种细致的方法非常有效，与人类判断的
    Kendall's τ-b 相关性达到 0.77。我们发现，现有前沿代理在解决 PowerPoint 任务方面仍然困难重重，像 Claude-4.5-Opus
    这样的强模型仅达到 45% 的成功率和 57% 的平均部分分数。基准测试位于：https://microsoft.github.io/ppteval。
  tldr_cn: PPT-Eval是一个包含120个PowerPoint任务的基准，采用基于评分标准的评估方法，与人类判断高度相关。
  analysis_cn:
    innovations:
    - 提出PPT-Eval基准，包含12个文件中的120个PowerPoint任务，涵盖内容创建和编辑，按难度组织。
    - 一个鲁棒的评估框架，包含任务特定评分标准，奖励部分进展，惩罚不必要的更改和不良美学，并提供自然语言反馈，与人类判断高度相关（Kendall's τ-b
      = 0.77）。
    methodology: 该基准包含12个文件中的120个PowerPoint任务，涵盖创建和编辑场景，具有难度级别。评估使用任务特定评分标准，为中间步骤分配部分分数，惩罚不必要的更改和不良美学，并提供自然语言反馈。前沿代理如Claude-4.5-Opus通过成功率和平均部分分数进行评估。
    key_results: 基于评分标准的评估与人类判断的Kendall's τ-b相关性为0.77。前沿代理表现不佳，Claude-4.5-Opus仅达到45%的成功率和57%的平均部分分数。
