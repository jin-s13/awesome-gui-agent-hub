  title_cn: 'RunAgent SuperBrowser: 基于人类浏览行为的自主网页导航理论'
  abstract_cn: 我们提出SUPERBROWSER，一个自主网页导航代理，其设计遵循一个核心假设：网页代理应像人类一样浏览。人类阅读页面时不会记住看到的每一个像素；他们会观察少数候选目标，决定一个，并只记住维持目标所需的信息。我们将这一感知-认知-行动三元组操作化为三个耦合机制。首先，一个视觉优先的边界框管道在每个截图上标记候选交互区域，并通过异步预取将其输入语言模型，使“眼睛”先于“手”。其次，一个三角色大脑——一个负责分类和路由的编排器、一个每隔几步评估进度的规划器，以及一个发出每步动作的执行器——将战略推理与操作推理分离。第三，一个结构化的账本只存储人类会记住的内容：目标、最近三个动作、少量事实和死胡同、以及少数检查点；一个六阶段驱逐循环系统性地从实时上下文中丢弃过时的截图、状态块和推理痕迹。动作执行采用三级点击级联（Chrome
    DevTools Protocol到Puppeteer再到脚本化），并带有拟人化的贝塞尔运动，以及一个感知V形箭头的边界框捕捉器，解决“大标签旁的小箭头”歧义。在Mind2Web
    Hard基准测试（66个任务）上，SUPERBROWSER取得了89.47%的成功率，总体排名第三，并以较大优势领先所有已发表的开源/研究浏览器代理基线。我们认为，这一提升并非来自任何单一技巧，而是整个系统中认知契约的一致应用。
  tldr_cn: 一个模仿人类浏览的网页导航代理，采用视觉优先边界框、三角色大脑和结构化记忆，在Mind2Web Hard上达到89.47%成功率。
  analysis_cn:
    innovations:
    - 视觉优先的边界框管道，带有向语言模型的异步预取
    - 三角色大脑架构（编排器、规划器、执行器），分离战略与操作推理
    - 结构化账本与六阶段驱逐循环，模拟人类记忆保留
    - 通过三级点击级联和感知V形箭头的边界框捕捉器实现拟人化动作执行
    methodology: SUPERBROWSER基于感知-认知-行动三元组构建：视觉优先管道标记交互区域并输入语言模型，三角色大脑进行路由和规划，结构化账本仅保留必要信息。在Mind2Web
      Hard基准测试（66个任务）上使用成功率进行评估，并与已发表的开源/研究浏览器代理基线进行比较。
    key_results: SUPERBROWSER在Mind2Web Hard上取得89.47%的成功率，排名第三，并以较大优势超越所有已发表的开源/研究浏览器代理基线。
