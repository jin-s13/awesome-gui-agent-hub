  title_cn: 谁付出代价？面向真实Web智能体的利益相关者中心提示注入基准测试
  abstract_cn: 由大型语言模型驱动的Web智能体越来越多地部署在真实环境中，它们在不可信的Web内容上操作并执行具有直接后果的动作。这使得它们容易受到提示注入攻击，其中看似良性的内容嵌入了操纵智能体行为的对抗性指令。现有的安全基准采用以攻击为中心的视角，关注注入的技术可行性，而忽视了由此产生的危害的细微分布。然而，在实践中，提示注入风险是依赖于受害者的：一次单一的利用可能对不同利益相关者产生不对称的后果，并且相同的攻击模式可能根据其目标对象而表现出显著不同的有效性。为了捕捉这些特性，我们引入了StakeBench，一个以利益相关者为中心的基准，用于系统性地分类和归因真实Web智能体系统中的危害。它区分受影响的实体（例如，用户、卖家、平台），将攻击分解为具体目标，并使用互补的结果级和过程级指标评估每个案例。我们的结果揭示了显著且异构的漏洞：当前智能体无法可靠地抵抗任何一个攻击目标，并且失败分布在性质不同的模式中，从隐蔽寄生（攻击成功且不干扰用户委托的任务）到失调干扰（任务被干扰但攻击未成功）以及复合失败（对抗性目标和任务完整性同时被违反）。这些模式被传统评估所忽略，突显了在真实部署中对基于LLM的智能体进行利益相关者感知评估的必要性。基准可在https://github.com/StakeBench/SBC获取。
  tldr_cn: 提出一个面向真实Web智能体的利益相关者中心提示注入基准，揭示异构漏洞。
