    innovations:
    - Compiling successful agent runs into state-machine programs that check screen
      states and perform actions, enabling replay without per-step language model
      calls.
    - 'Runtime screen-checking during replay: at each step, PreAct verifies the screen
      matches the expected state and falls back to the agent on mismatch.'
    - 'Store-time validation: a compiled program is kept only if an independent evaluator
      confirms it solves the task when re-run from a clean state, preventing accumulation
      of faulty programs.'
    - Fallback mechanism that explores afresh when no stored program fits, matching
      the performance of a strong record-and-replay baseline.
    methodology: PreAct compiles a successful agent run into a state-machine program
      with screen-checking states and action transitions. On later runs, it replays
      the program directly, checking screen matches at each step and handing control
      back to the agent if a mismatch occurs. Programs are stored only after passing
      an independent evaluator re-run from a clean state. The approach is evaluated
      on mobile, desktop, and web benchmarks against a record-and-replay baseline,
      with ablation on store-time checks and fallback.
    key_results: PreAct replays tasks 8.5-13x faster than the original agent with
      no per-step language model calls. The store-time check yields 1.75-2.6 more
      tasks per benchmark by preventing faulty program accumulation, and the fallback
      matches a strong record-and-replay baseline. Prompt wording, runtime guardrails,
      and retriever type (language model vs. embedding) did not affect outcomes.
