  title_cn: DragOn：基于拖拽的图形用户界面交互的基准测试与数据集
  abstract_cn: GUI代理——通过图形用户界面控制桌面、网页浏览器和移动设备的基于视觉的模型——有望自动化广泛的数字任务。虽然百万级数据集在点击定位方面取得了显著进展，但拖拽定位（例如拖放、滑动、高亮）数据仍然小一个数量级，当前模型在复杂的拖拽交互上表现不足。我们引入了DragOn，一个拖拽定位基准测试和训练数据集，涵盖四个领域：文本高亮、单元格选择、元素调整大小和滑块操作。该数据集包含28.6万张训练截图和350万个训练任务，以及一个2000样本的保留评估套件。我们评估了专有模型（GPT、Claude）和开源模型（Qwen、Kimi、Holo），以及在训练数据上微调的Qwen
    VLM。结果表明，我们的数据集可以提升最先进模型在下游计算机使用任务上的性能。
