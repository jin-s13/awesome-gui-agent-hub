  abstract_cn: OpenClaw已成为复杂任务自动化的领先代理框架，但面临跨平台GUI交互支持不足和缺乏完善的自我进化机制的问题。这些缺陷限制了其适应多样设备生态系统的能力，并阻碍了通过持续学习执行经验来提升性能。为解决这些问题，我们提出了个人助手的“深度认知，完美执行”范式，该范式认为累积的用户交互和任务执行经验能直接提升执行准确性和效率，统一了认知理解与操作执行。基于此范式，我们引入了KnowAct-GUIClaw，一种新颖的Know-Route-Act-Reflect框架，旨在解决OpenClaw的GUI操作缺陷，并突破其跨平台和递归自我改进的限制。首先，主机代理利用累积的交互经验和任务相关知识进行长程任务分解与分配（Know）。其次，一个可插拔的GUI子代理配备有经验可归因记忆系统（Know）和自进化技能库（Act），实现无缝跨平台迁移和快速路径集成。尤其地，该框架持续存储用户画像和反馈，以提高任务分解和工具调用的准确性。在Android、iOS、HarmonyOS和Windows上的大量实验表明，KnowAct-GUIClaw实现了卓越的效率、准确性和跨平台适应性。特别是，使用开源Kimi-2.6模型的GUIClaw在长程MobileWorld基准测试上取得了最佳性能（64.1%），超越了所有代理框架和闭源代理模型，例如Seed-2.0-Pro和GPT-5.5。此外，我们的框架支持的知识记忆和执行技能可跨不同基础模型迁移，使Kimi-2.6的性能提升了8.5%。
