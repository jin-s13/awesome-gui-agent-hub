  title_cn: MemGUI-Agent：一种具有主动上下文管理的端到端长时域移动GUI智能体
  abstract_cn: 基于多模态大语言模型的移动GUI智能体在短时域任务上取得了显著进展，但在需要跨多个步骤和应用转换保留中间事实的长时域任务上仍不可靠。我们将这一限制归因于ReAct风格的提示方式，它被动地累积每一步的记录，导致提示膨胀和关键跨应用事实的稀释。为解决此问题，我们提出了MemGUI-Agent，一种具有主动上下文管理的端到端长时域移动GUI智能体。MemGUI-Agent基于Context-as-Action（ConAct）构建，该机制将上下文管理视为与选择UI动作相同的策略发出的第一类动作。ConAct不被动地追加历史，而是维护三个结构化上下文字段：折叠的动作历史、折叠的UI状态和最近步骤记录，在保持上下文紧凑的同时保留关键UI事实。为使主动上下文管理在不同模型规模上可学习，我们构建了MemGUI-3K数据集，包含2,956条轨迹，每条轨迹带有完整的ConAct标注，用于监督训练和离线分析。在MemGUI-3K上训练8B参数模型得到MemGUI-8B-SFT，这是一个8B参数的MemGUI-Agent，在MemGUI-Bench上取得了开源数据下最佳的8B性能，并泛化到分布外的MobileWorld基准。代码、数据和训练模型将在https://memgui-agent.github.io/发布。
  tldr_cn: MemGUI-Agent通过ConAct主动管理上下文，在MemGUI-Bench和MobileWorld上达到最优。
