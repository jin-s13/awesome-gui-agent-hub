  title_cn: AOHP：面向个性化、高效和安全交互的开源操作系统级智能体框架
  abstract_cn: AI智能体正在推动一种新的软件范式，能够自主调用工具、提取信息、管理内存并完成跨应用和数据源的任务。然而，大多数现有的终端用户操作系统是为以应用为中心的工作流设计的，对AI智能体几乎没有原生支持。这种不匹配限制了智能体的广泛采用，并导致在传统系统上运行智能体时产生执行开销和安全风险。尽管智能体原生操作系统的概念正在兴起，但研究社区缺乏一个开放的测试平台来探索智能体中介交互所需的架构原语。我们提出了AOHP（安卓开放框架项目），这是一个基于安卓开源项目（AOSP）构建的操作系统级智能体框架。AOHP的核心设计原则是将智能体视为一等操作系统参与者，实现自适应用户界面和智能体友好的运行时环境。AOHP在保留成熟的安卓软件和硬件生态系统的同时，引入了三种面向智能体的系统机制：个性化服务组合、高效智能体接口和安全信息流。基于涵盖操作系统智能体关键能力的挑战性任务的初步实验，AOHP在任务完成率（+21.12%）、执行成本（-51.55%令牌成本）和安全策略合规性方面表现出明显优势。
  tldr_cn: AOHP是安卓上的开源OS级智能体框架将智能体视为一等OS参与者，提升任务完成率、降低成本与安全性。
