  title_cn: 面向长时域移动GUI代理的任务状态表示
  abstract_cn: 尽管长时域移动GUI代理通常依赖思考-行动-观察循环，但它们难以将持久任务状态与瞬时屏幕观察分离。随着执行历史增长，这种纠缠带来了严重的上下文负担，导致代理遗忘初始需求、幻觉进度或反复与过时界面交互。为解决此问题，我们提出任务状态表示（TSR），一种无需训练的框架，明确将任务状态与感官输入解耦。作为轻量级外部包装器，TSR维护三个结构化组件：全局指令摘要、子目标的动态进度跟踪器和过渡感知动作验证器。通过动作前后的视觉比较持续更新，TSR有效引导代理推理，无需架构修改。在四个移动GUI基准上的实验验证了TSR的有效性，在复杂的跨应用和内存密集型任务中，成功率提升高达12个绝对百分点。
