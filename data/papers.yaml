  title_cn: 'Speculative Rollback Correction: 面向质量多样化的Web智能体模仿学习'
  abstract_cn: 通过从专家轨迹中进行模仿学习来训练交互式Web智能体已成为一种高效的方法。然而，确定专家干预的最佳时机在此背景下是一个关键挑战。延迟干预往往导致早期错误的累积，使页面状态陷入不可恢复的境地。相反，过早或过度干预会使智能体过度依赖专家策略，将模型困在单一、僵化轨迹的局部最优中。我们提出Speculative
    Rollback Correction (SRC)，一种针对可重置智能体环境的分支级模仿框架。SRC不要求在每次访问状态时请求教师标签，也不仅在完成轨迹后才进行修正，而是采用固定视野分支审查：学生先执行一个短推测片段，然后教师仅在局部进展中断时定位第一个有害偏差。回滚保留了有用的前缀，而成功的执行通过硬验证器过滤并存储在轻量级质量多样性存档中。由此产生的数据支持对局部修正和通过验证器的轨迹进行下一动作监督微调。在WebArena-Infinity上，SRC收集了977条通过验证器的轨迹和9,183个下一动作示例；固定视野审查在保留通过验证器的解决方案变体的同时，改善了恢复与查询的权衡。代码可在https://github.com/LongkunHao/SRC_gui_agent获取。
  tldr_cn: 提出推测性回滚修正框架，通过固定视野审查和质量多样性存档改进Web智能体的错误恢复与轨迹多样性。
