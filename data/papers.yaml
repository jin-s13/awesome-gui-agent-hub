  title_cn: MemVenom：Web代理中多模态记忆的触发式投毒
  abstract_cn: 外部记忆已成为现代Web代理的核心组件，通过检索过往经验实现长程推理。然而，这种范式引入了一个关键漏洞：注入记忆的恶意内容可以被持久性地召回，并反复影响代理行为。在本工作中，我们识别并系统性地研究了多模态记忆投毒——Web代理系统中一个被忽视但实际存在的攻击面。我们提出MemVenom，一个统一的黑盒攻击框架，利用协调的文本-图像证据对图结构的外部记忆进行投毒。我们的方法包含两阶段设计：(1)
    触发条件检索攻击，确保恶意记忆的高概率召回；(2) 检索后攻击诱导，利用对抗扰动和隐蔽OCR注入覆盖原始用户目标。与先前针对提示或纯文本记忆的攻击不同，我们的方法无需修改模型参数或重新优化恶意任务，即可实现持久、可复用且目标无关的攻击。在多个Web代理框架和视觉语言模型上的实验表明，MemVenom在最小化对良性性能影响的同时，实现了强大的端到端攻击成功率，在GPT-5系列Web代理上达到99.15%，并能跨架构和模型规模有效迁移。
  tldr_cn: MemVenom通过触发条件检索和对抗扰动对Web代理的多模态记忆进行投毒，实现高攻击成功率。
  analysis_cn:
    innovations:
