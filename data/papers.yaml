  title_cn: UI-MOPD：面向持续GUI智能体学习的多平台在线策略蒸馏
  abstract_cn: 近期多模态基础模型和智能体系统的进展推动了GUI智能体从单平台任务执行向跨平台交互的转变。然而，构建多平台GUI智能体仍面临挑战。一方面，高质量且可执行的跨平台交互轨迹仍然稀缺，现有数据往往平台覆盖有限。另一方面，不同平台展现出不同的交互惯例，使得联合或持续训练容易导致行为模式混合、平台特定能力退化以及灾难性遗忘。为应对这些挑战，我们构建了Uni-GUI，一个高质量的跨平台GUI交互数据集，并提出了UI-MOPD，这是首个将多教师在线策略蒸馏融入GUI智能体持续学习的方法。UI-MOPD根据当前环境动态选择平台特定教师，并通过平台条件蒸馏将平台特定的行为先验传递给共享策略，从而在保留现有平台能力的同时适应新平台。在OSWorld和MobileWorld上的实验表明，UI-MOPD分别达到了38.2%和12.0%的任务成功率，展示了其在跨平台能力保持与新平台适应之间的有效平衡。项目页面：https://elispectre.github.io/UI-MOPD/。
  tldr_cn: 提出UI-MOPD多教师在线策略蒸馏方法，用于跨平台GUI智能体持续学习，在OSWorld和MobileWorld上提升任务成功率。
