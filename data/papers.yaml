  title_cn: 超越GUI范式：移动智能体是否需要手机屏幕？
  abstract_cn: 近期移动智能体的进展主要由GUI范式主导，即智能体感知UI信息并发出屏幕交互指令。然而，移动平台也提供了命令行接口（CLI），可直接访问设备服务与数据。我们认为CLI应与GUI同等重要。本文在AndroidWorld和MobileWorld上，使用四种模型API评估了三个编码智能体（Claude
    Code、Terminus-2、mini-swe-agent），未进行任何移动特定后训练，并与三个可复现的GUI基线（GUI-Owl-1.5-32B、MAI-UI、Qwen3-VL-32B）进行比较。Claude
    Code（Opus 4.7）达到71.8%和51.9%，优于所有可复现的GUI基线（AndroidWorld上69.3/68.1/57.8%；MobileWorld上43.2/26.3/13.3%），而其他CLI配置也保持竞争力。为确立该范式的上限，我们提供了oracle
    CLI解决方案，在AndroidWorld上达到88.8%（103/116个任务可CLI解决），在MobileWorld上达到86.3%（101/117个任务可CLI解决），表明未来仍有较大改进空间。为覆盖超出GUI范围的日常用户意图，我们引入了CLI-Advantage
    Task Suite，包含五个类别的45个模板：批量操作、多条件过滤、聚合、跨应用工作流和隐藏设备状态。每个CLI智能体在所有五个类别中均优于每个GUI基线，且每任务步骤数显著更少（10.7
    vs. 18.6）。为支持未来移动CLI智能体的研究，我们将开源智能体实现、oracle解决方案、CLI-Advantage套件及评估基础设施。
  tldr_cn: 主张移动智能体应使用CLI而非GUI，编码代理在基准测试和新任务套件上优于GUI基线。
  analysis_cn:
    innovations:
    - 提出将CLI作为移动智能体的第一类范式，与GUI并列
    - 证明现成的编码智能体无需移动特定后训练即可作为移动CLI智能体
    - 引入CLI-Advantage Task Suite，覆盖超出GUI范围的任务（批量操作、多条件过滤、聚合、跨应用工作流、隐藏设备状态）
    - 提供oracle CLI解决方案以确立性能上限并量化改进空间
    methodology: 本文在AndroidWorld和MobileWorld基准上，使用四种模型API评估了三个编码智能体（Claude Code、Terminus-2、mini-swe-agent），并与三个可复现的GUI基线（GUI-Owl-1.5-32B、MAI-UI、Qwen3-VL-32B）进行比较。构建了oracle
      CLI解决方案以确定性能上限，并引入CLI-Advantage Task Suite（五个类别45个模板）以评估超出典型GUI能力的任务。
    key_results: Claude Code（Opus 4.7）在AndroidWorld上达到71.8%，在MobileWorld上达到51.9%，优于所有GUI基线（分别为69.3/68.1/57.8%和43.2/26.3/13.3%）。oracle
      CLI解决方案达到88.8%和86.3%，表明仍有较大提升空间。在CLI-Advantage Task Suite上，每个CLI智能体在所有五个类别中均优于每个GUI基线，且每任务步骤数显著更少（10.7
      vs. 18.6）。
    limitations:
    - 智能体未进行移动特定后训练，可能限制其在移动细微特性上的有效性
    - 当前CLI智能体仍远低于oracle性能，存在较大改进空间
    - CLI范式可能不适用于本质上需要视觉或GUI交互的任务（尽管CLI-Advantage套件针对部分超出GUI的意图）
