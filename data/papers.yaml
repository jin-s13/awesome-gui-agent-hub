      an original-skill CLI agent and a CLI agent enhanced with verifier-guided skill
      augmentation.
    key_results: The strongest GUI agent achieves 59.1% full pass rate, the original-skill
      CLI agent 48.2%, and the augmented CLI agent 69.3%, indicating that the CLI
      deficit stems from incomplete skill coverage rather than model capability, while
      GUI agents are bottlenecked by reliable grounded interaction over long horizons.
