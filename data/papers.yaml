- id: gui-agent-guided-exploration-of-user-sensitive-screens-2026
  title: 'GUI agent: Guided Exploration of User-Sensitive Screens'
  authors:
  - Aradhana Nayak
  - Mussadiq Nazeer
  - Wang Peng
  - Feng Liu
  abstract: LLM agents are increasingly being used to automate tasks for users within
    an open GUI environment. They inevitably encounter screens containing user-sensitive
    information, for which takeover of task execution by the user is highly desirable
    or even necessary. State-of-the-art LLM-driven agents are usually fine-tuned to
    complete tasks regardless of the safety implications of their actions. This makes
    their real-world deployment difficult and adversely affects the reliability. Therefore,
    it is crucial to identify and categorize user-sensitive states and define user-sensitive
    queries. This dataset would be to engineers to recognize and request handover
    to the user in critical scenarios. This short paper develops an explorer agent
    that systematically explores the query space starting from one demonstrated task
    to identify queries that, if executed, would lead to user-sensitive states in
    a GUI environment.
