- id: fraudsmswalker-benchmarking-agentic-large-language-models-f-2026
  title: 'FraudSMSWalker: Benchmarking Agentic Large Language Models for SMS-to-Webpage
    Fraud Detection'
  authors:
  - Y. H. Zhou
  - Z. M. Ma
  - Y. J. Zhou
  - Y. T. Li
  - H. X. Xiang
  - Y. M. Cheng
  - T. L. Chen
  - K. J. Zhang
  - Z. H. Nan
  - J. H. Ni
  - Z. Wu
  - Q. Y. Pan
  - S. Zhang
  - S. Cheng
  - M. Y. Luo
  abstract: 'SMS fraud is increasingly cross-channel: a message directs the user to
    a webpage, and the final risk depends on how the SMS claim aligns with the page
    content and requested user action. However, existing evaluations either focus
    on message-only smishing classification or expose URL and domain cues that allow
    models to rely on reputation shortcuts. To address this gap, we introduce \textbf{FraudSMSWalker},
    a controlled benchmark for URL-masked SMS-to-webpage fraud judgment. FraudSMSWalker
    contains 699 bilingual chains, including 332 fraudulent and 367 benign cases,
    across ten service scenarios. The model-visible input consists of the SMS context
    and sanitized webpage evidence, while raw URLs, hosts, domains, IPs, redirects,
    and reputation metadata are withheld. The benchmark further includes hard benign
    cases whose pages contain login, payment, verification, or account-management
    elements that are plausible under the service context but also appear in scam
    flows. We evaluate nine web agents under masked browser-agent protocols and conduct
    URL-visibility ablations. The results show that current agents can detect suspicious
    cues, but struggle to preserve benign recall and often produce positive predictions
    that are weakly supported by the observed evidence. These findings position FraudSMSWalker
    as a benchmark for measuring whether web agents can make fraud judgments that
    remain both accurate and evidence-grounded when direct reputation shortcuts are
    suppressed. The associated code and dataset are accessible at the \href{https://anonymous.4open.science/w/FraudMessageWalker-Bench}{anonymous
    link}.'
