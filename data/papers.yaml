- id: aohp-an-open-source-os-level-agent-harness-for-personalized-2026
  title: 'AOHP: An Open-Source OS-Level Agent Harness for Personalized, Efficient
    and Secure Interaction'
  authors:
  - Shanhui Zhao
  - Jiacheng Liu
  - Guohong Liu
  - Jichao Yan
  - Jialei Ye
  - Yuhao Yang
  - Hao Wen
  - Shizuo Tian
  - Yizhen Yuan
  - Yuxuan Chen
  - Yunxin Liu
  - Ju Ren
  - Ya-Qin Zhang
  - Chao Huang
  - Yao Guo
  - Yuanchun Li
  abstract: 'AI agents are driving a new software paradigm, with the ability to autonomously
    call tools, extract information, manage memory, and complete tasks that span applications
    and data sources. Most existing end-user operating systems, however, are designed
    for application-centric workflows and offer little native support for AI agents.
    This mismatch limits the wider adoption of agents and leads to execution overhead
    and safety risks when running agents on conventional systems. While the concept
    of agent-native operating systems is emerging, the research community lacks an
    open testbed to explore the architectural primitives desired for agent-mediated
    interaction. We present AOHP (Android Open Harness Project), an OS-level agent
    harness built on the Android Open Source Project (AOSP). The core design principle
    of AOHP is to treat agents as first-class OS actors, enabling adaptive user interfaces
    and agent-friendly runtime environments. AOHP preserves the mature Android software
    and hardware ecosystem while introducing three agent-oriented system mechanisms:
    personalized service composition, efficient agent interfaces, and secure information
    flow. Based on preliminary experiments on challenging tasks covering key capabilities
    of OS agents, AOHP shows clear advantages in task completion (+21.12% completion
    rate), execution cost (-51.55% token cost), and security-policy compliance.'
  year: 2026
  venue: arXiv
  paper_type:
  - system
