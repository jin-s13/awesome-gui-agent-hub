  title_cn: 'PreAct: 在重复任务上速度更快的计算机操作代理'
  abstract_cn: 计算机操作代理通过屏幕驱动真实软件——点击和打字——但它们从头解决每个任务：当要求重复一个任务时，代理重新读取屏幕，重新推理每次点击，并再次付出全部代价。我们提出PreAct，它让这样的代理在之前完成过的任务上变得更快。第一次成功时，PreAct将运行编译成一个小的状态机程序——检查屏幕的状态，执行动作的转换——并在后续运行中直接重放它，而不是调用代理，速度提升8.5-13倍，且无需每步的语言模型调用。重放并非盲目：在每一步，PreAct在行动前检查屏幕是否与程序预期匹配，一旦出现偏差就将控制权交还给代理。PreAct在决定保留什么时也应用同样的原则：一个新编译的程序只有在独立评估者从干净状态重新运行确认它解决了任务时才会被存入存储——这捕获了那些重放到最后一步却未完成任务的程序。在移动、桌面和网络基准测试中，这种存储时检查将重复运行中因错误程序积累而退化的运行与改进的运行区分开来，每个基准测试带来1.75-2.6个任务，三个基准测试方向一致；当没有程序匹配时，重新探索的回退机制使PreAct与强大的记录-重放基线持平。我们还报告了哪些因素不重要：提示措辞、运行时护栏，以及是语言模型还是普通嵌入检索器选择要重用的程序。
  tldr_cn: PreAct将成功的计算机操作代理运行编译成状态机程序以实现快速重放，在重复任务上实现8.5-13倍加速。
  analysis_cn:
    innovations:
    - 将成功的代理运行编译成检查屏幕状态并执行动作的状态机程序，实现无需每步语言模型调用的重放。
    - 重放时的运行时屏幕检查：在每一步，PreAct验证屏幕是否与预期状态匹配，并在不匹配时回退到代理。
    - 存储时验证：只有独立评估者从干净状态重新运行确认程序解决了任务时，才保留编译的程序，防止错误程序积累。
    - 当没有存储程序匹配时重新探索的回退机制，与强大的记录-重放基线性能持平。
    methodology: PreAct将成功的代理运行编译成一个带有屏幕检查状态和动作转换的状态机程序。在后续运行中，它直接重放该程序，在每一步检查屏幕是否匹配，并在不匹配时将控制权交还给代理。程序只有在通过独立评估者从干净状态重新运行后才被存储。该方法在移动、桌面和网络基准测试中与记录-重放基线进行评估，并对存储时检查和回退进行消融实验。
    key_results: PreAct重放任务的速度比原始代理快8.5-13倍，且无需每步语言模型调用。存储时检查通过防止错误程序积累，每个基准测试多完成1.75-2.6个任务，回退机制与强大的记录-重放基线持平。提示措辞、运行时护栏和检索器类型（语言模型
      vs. 嵌入）不影响结果。
    limitations: []
    tech_stack: []
- id: procua-sft-technical-report-2026
  title: ProCUA-SFT Technical Report
  authors:
  - Jaehun Jung
  - Ximing Lu
  - Brandon Cui
  - Muhammad Khalifa
  - Shaokun Zhang
  - Hao Zhang
  - Jin Xu
  - Amala Sanjay Deshmukh
  - Karan Sapra
