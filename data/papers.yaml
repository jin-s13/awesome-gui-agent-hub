  title_cn: GUI agent：用户敏感屏幕的引导式探索
  abstract_cn: LLM智能体越来越多地被用于在开放的GUI环境中为用户自动化任务。它们不可避免地会遇到包含用户敏感信息的屏幕，此时由用户接管任务执行是非常可取甚至必要的。最先进的LLM驱动智能体通常经过微调以完成任务，而不考虑其行为的安全影响。这使得它们在现实世界中的部署变得困难，并对其可靠性产生不利影响。因此，识别和分类用户敏感状态并定义用户敏感查询至关重要。该数据集将帮助工程师识别关键场景并请求用户接管。这篇短文开发了一个探索智能体，它从一项演示任务开始，系统地探索查询空间，以识别那些如果执行会导致GUI环境中用户敏感状态的查询。
