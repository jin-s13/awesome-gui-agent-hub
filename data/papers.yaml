  title_cn: 'MobileForge: 基于分层反馈引导策略优化的移动GUI智能体无标注自适应方法'
  abstract_cn: 基于多模态大语言模型的移动GUI智能体在UI理解和动作执行方面取得了显著进展，但将其适配到真实目标应用仍然成本高昂，因为移动应用数量众多、更新频繁，且难以通过人工编写的任务、演示或奖励标签来覆盖。现有的无标注GUI学习方法减少了人工监督，但缺乏一个统一的框架来连接目标应用探索、课程挖掘、轨迹执行和反馈，同时策略优化通常依赖于孤立的轨迹和粗糙的奖励，难以转化为可靠的改进信号。我们提出了MobileForge，一种用于移动GUI智能体的无标注自适应系统。MobileForge包含MobileGym，它将任务生成和轨迹评估锚定在真实移动应用交互中；以及分层反馈引导策略优化（HiFPO），它将轨迹结果、步骤级过程反馈和纠正提示转化为提示上下文化的步骤级GRPO更新。仅使用自动生成的无标注自适应数据，MobileForge将Qwen3-VL-8B在AndroidWorld上的Pass@3提升至67.2%，接近使用封闭数据的GUI专用模型GUI-Owl-1.5-8B的69.0%。经过MobileForge自适应的ForgeOwl-8B进一步在AndroidWorld上达到77.6%的Pass@3，并在域外MobileWorld
    GUI-only分割上达到41.0%的成功率，在我们的评估中建立了最强的开源数据移动GUI智能体。代码、数据和训练模型将在https://mobile-forge.github.io/发布。
  tldr_cn: MobileForge通过分层反馈引导策略优化实现无人工标注的移动GUI智能体自适应，在AndroidWorld上取得优异结果。
  analysis_cn:
