  abstract_cn: 计算机使用智能体（CUA）越来越多地在结合视觉桌面控制、命令行执行、代码编辑、浏览器和外部工具的运行时环境中运行。然而，现有基准通常将这些接口作为可分离的能力进行评估，导致长时域跨接口编排能力测试不足。为此，我们提出WeaveBench，一个长时域混合接口基准，包含8个真实工作领域的114个任务，基于真实用户请求和可公开验证的工件。每个任务要求智能体在单条轨迹中结合GUI观察/动作与CLI/代码操作。我们在部署了CLI智能体运行时并辅以最小桌面控制插件的真实Ubuntu桌面上评估这些任务。我们还提出一个配套的轨迹感知评判器，检查交付物、文件、截图、日志和动作轨迹，同时检测捷径行为，如伪造的视觉证据或硬编码指标。在前沿模型-运行时配对中，最佳PassRate仅为41.2%，表明该基准远未饱和。轨迹感知评判器进一步揭示，仅基于结果的评分会大幅高估智能体性能。总体而言，WeaveBench暴露了CUA评估中的关键差距，并提供了一个有效测试平台，用于衡量智能体是否能在长时域真实任务中编排GUI、CLI和代码操作。
