      previous methods that rely on heuristic prompt engineering, SlimSearcher unifies
      the optimization of accuracy and efficiency into a single Multi-Stage Gating
      mechanism. This mechanism serves a dual purpose: it acts as a Pareto Filter
      during the SFT phase to construct high-signal demonstration data via Rejection
      Sampling, and as a Cascading Reward Function during the RL phase to guide policy
