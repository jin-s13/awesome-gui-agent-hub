    - Demonstration that apparent performance gains from augmentation often vanish
      when compared to a budget-matched actor.
    - Identification of run-to-run variance as a material factor that should be reported
      as a core evaluation criterion.
    methodology: The study compares three online augmentation methods (AWM, ASI, ReasoningBank)
      against a token-matched vanilla baseline that uses the same total inference
      budget for extra actor steps. Evaluation is conducted across three WebArena
      domains and three models (Gemini 3 Flash, GPT-5.4-mini, Qwen 3.6-27B), plus
      WorkArena-L1 with Qwen 3.6-27B, measuring aggregate success rate and total token
      usage.
    key_results: The vanilla baseline matches or surpasses all three augmentation
      methods in aggregate success rate while often using fewer total tokens, and
      a similar trend is observed on WorkArena-L1, indicating that apparent gains
      from augmentation vanish under a fixed budget.
    limitations:
    - Augmentation methods may still provide benefits in specific domains, as noted
      by the authors.
    - Evaluation is limited to WebArena and WorkArena-L1 environments; generalizability
      to other tasks is not established.
    - Only three models were tested, so findings may not extend to all model families
      or scales.
    - Run-to-run variance materially affects outcomes, meaning single-run comparisons
      may be unreliable.
  title_cn: 在线技能与记忆模块是否总是值得其令牌消耗？一项关于网络代理的预算约束研究
  abstract_cn: 在线网络代理通常为基础执行器添加记忆、工作流或技能模块。这些模块可以提升性能，但也会消耗测试时令牌，这一成本很少与执行器的推理成本一同报告。我们研究在线增强，其中这种开销在每个任务上都会产生，并在固定总推理预算下重新评估其收益。我们将AWM、ASI和ReasoningBank与一个令牌匹配的基础基线进行比较，该基线将相同的预算用于额外的执行器步骤。在三个WebArena领域和三个模型（Gemini
    3 Flash、GPT-5.4-mini、Qwen 3.6-27B）上，基础基线在总体成功率上匹配或超越了所有三种增强方法，同时通常使用更少的令牌总数。我们在WorkArena-L1上使用Qwen
    3.6-27B观察到类似趋势，表明该效果也适用于企业知识工作任务。我们的结果表明，技能和工作流记忆在特定领域可能有用，但其表面收益在与预算匹配的执行器对比时往往消失。我们进一步表明，运行间方差对结果有实质性影响，应作为在线网络代理的核心评估标准进行报告。
  tldr_cn: 在线网络代理的技能与记忆模块在固定推理预算下往往无法超越令牌匹配的基础基线。
  analysis_cn:
    innovations:
    - 对网络代理在线增强模块的预算约束评估，考虑了测试时令牌成本。
    - 令牌匹配的基础基线，将相同的总推理预算用于额外的执行器步骤而非增强模块。
    - 证明与预算匹配的执行器相比，增强带来的表面性能提升往往消失。
    - 识别运行间方差作为一个重要因素，应作为核心评估标准报告。
    methodology: 该研究将三种在线增强方法（AWM、ASI、ReasoningBank）与一个令牌匹配的基础基线进行比较，该基线将相同的总推理预算用于额外的执行器步骤。评估在三个WebArena领域和三个模型（Gemini
      3 Flash、GPT-5.4-mini、Qwen 3.6-27B）上进行，外加使用Qwen 3.6-27B的WorkArena-L1，测量总体成功率和总令牌使用量。
    key_results: 基础基线在总体成功率上匹配或超越了所有三种增强方法，同时通常使用更少的令牌总数；在WorkArena-L1上观察到类似趋势，表明在固定预算下增强带来的表面收益消失。
    limitations:
    - 增强方法在特定领域可能仍有收益，如作者所述。
    - 评估仅限于WebArena和WorkArena-L1环境，未建立对其他任务的泛化性。
    - 仅测试了三个模型，因此发现可能不适用于所有模型系列或规模。
    - 运行间方差对结果有实质性影响，意味着单次运行比较可能不可靠。
