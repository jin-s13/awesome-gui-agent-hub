- id: lumos-a-semantic-operating-system-layer-for-accessibility-g-2026
  title: 'LUMOS: A Semantic Operating-System Layer for Accessibility-Grounded AI Agents'
  authors:
  - Yogeswar Reddy Thota
  abstract: Current operating systems expose interfaces optimized for human users
    but not for AI agents. Humans benefit from pixels, icons, windows, visual grouping,
    mouse movement, and keyboard shortcuts; AI agents instead need compact semantic
    state, grounded actions, and reliable feedback. As a result, many computer-use
    agents are forced to interpret screenshots, OCR output, and visual crops, introducing
    high token costs, visual ambiguity, latency, and coordinate uncertainty. This
    paper introduces LUMOS (Language Model Unified Machine-Readable Operating-System
    Semantics), a semantic interaction layer between AI agents and operating systems.
    LUMOS converts native accessibility metadata and browser UI structures into machine
    readable semantic blueprints with stable identifiers, roles, names, values, bounds,
    and action affordances. It also supports live semantic pointer grounding by querying
    the UI element under or near the cursor through operating-system automation APIs.
    An LLM then acts through an accessibility grounded observe act loop using constrained
    visible-UI primitives rather than application-specific scripts. LUMOS does not
    claim to replace visual agents; instead, it reduces dependence on screenshots
    when operating systems already provide semantic structure. These results suggest
    a path toward AI-native operating systems and machine-readable interaction layers.
