  title_cn: OSWorld2.0：在长期真实世界任务上对计算机使用智能体进行基准测试
  abstract_cn: 现有的计算机使用基准测试未能捕捉真实世界计算机使用的现实性、复杂性和长期需求，限制了它们揭示前沿智能体局限性的能力。我们推出了OSWorld
    2.0，一个包含108个跨日常和专业任务的长期计算机使用工作流的基准测试，旨在捕捉复杂且具有挑战性的真实世界现象。每个任务代表一个真实的端到端工作流，人类用户完成的中位时间约为1.6小时，而使用Claude
    Opus 4.7最大思考模式平均需要318次工具调用，相比之下OSWorld 1.0中约为30次。OSWorld 2.0针对真实工作流中常见但在先前基准测试中未被充分代表的挑战现象，涵盖交互设计挑战（如流式交互和动态环境）以及智能体模式挑战（如跨源推理、隐式状态推断和视觉空间精度）。任务基于真实的输入工件，并与真实的有状态用户配置文件数据交叉引用，还包括单独的安全报告以审计安全敏感的执行。在我们500步的主要二元完成指标下，使用最大思考和批量工具调用的Claude
    Opus 4.8得分最高，但仍仅完成20.6%的任务，部分得分为54.8%；GPT-5.5在令牌效率上远胜一筹，但停滞在13%左右。这些结果表明，当前智能体距离专业级计算机使用仍有很大差距：它们并非在基本GUI控制或编码上出错，而是会丢失约束条件、错过任务中途出现的信息、猜测而非询问用户、跳过验证，并且在任务依赖于必须恢复的隐藏状态时最为挣扎。
  tldr_cn: OSWorld2.0对长期真实世界计算机使用任务进行基准测试，揭示当前智能体仅完成约20%的任务。
